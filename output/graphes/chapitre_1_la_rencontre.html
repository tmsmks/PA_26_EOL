next_id": "14", "target_node_id": "C1_S1_I14", "edge_id": "C1_S1_I13_R3_>C1_S1_I14", "RespectAndDignity": -3, "Empathy": -1, "Compassion": -3, "EmotionalRegulation": -2, "CommunicationClarity": 0, "ProfessionalBoundaries": -1, "InterprofessionalCollaboration": 0}]}, {"node_id": "C1_S1_I16", "actor": "Agathe", "text": "''Je suis perdue ici.''", "image": "Agathe_confused.png", "responses": [{"text": "Perdue.", "next_id": "18", "target_node_id": "C1_S1_I18", "edge_id": "C1_S1_I16_R0_>C1_S1_I18", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Qu’est-ce qui a changé par rapport à chez vous ?''", "next_id": "17", "target_node_id": "C1_S1_I17", "edge_id": "C1_S1_I16_R1_>C1_S1_I17", "RespectAndDignity": 0, "Empathy": 1, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 1, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Dans une semaine vous aurez de nouveaux repères.", "next_id": "18", "target_node_id": "C1_S1_I18", "edge_id": "C1_S1_I16_R2_>C1_S1_I18", "RespectAndDignity": 0, "Empathy": -2, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Il y a des gens bien plus perdus que vous ici ! Quand vous en aurez pris conscience, je reviendrai ! et je sors.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": -2, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C1_S1_I18", "actor": "Agathe", "text": "Agathe a la voix qui tremble :''Non vous ne comprenez pas !... Je suis entourée d’inconnus ici ! vous-même vous entrez dans cette chambre sans que je ne sois avertie de rien.''", "image": "Agathe_hurt.png", "responses": [{"text": "L’air désolé :''Je suis vraiment navrée que votre arrivée soit à ce point difficile Agathe… je vous indiquerai mes venues si vous préférez''", "next_id": "21", "target_node_id": "C1_S1_I21", "edge_id": "C1_S1_I18_R0_>C1_S1_I21", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Pardon, mais il vaut mieux vous y faire… Madame Epiney votre voisine a aussi eu du mal au début mais ça va mieux. Elle est charmante d’ailleurs.''", "next_id": "20", "target_node_id": "C1_S1_I20", "edge_id": "C1_S1_I18_R1_>C1_S1_I20", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Ne vous inquiétez pas, nous allons apprendre à nous connaître au fil des jours. Vous rencontrerez les résidents et aurez l’occasion de faire connaissance.", "next_id": "22", "target_node_id": "C1_S1_I22", "edge_id": "C1_S1_I18_R2_>C1_S1_I22", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C1_S1_I21", "actor": "Agathe", "text": "Agathe soupire :''Comment des enfants peuvent trahir leur maman ?''", "image": "Agathe_depressed.png", "responses": [{"text": "''Je vous sentez trahie par vos enfants ?''", "next_id": "22", "target_node_id": "C1_S1_I22", "edge_id": "C1_S1_I21_R0_>C1_S1_I22", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je vous entends soupirer ! Qu’est-ce qu’il veut dire ce soupir ?''", "next_id": "24", "target_node_id": "C1_S1_I24", "edge_id": "C1_S1_I21_R1_>C1_S1_I24", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 1, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Ils voulaient sûrement votre bien !''", "next_id": "22", "target_node_id": "C1_S1_I22", "edge_id": "C1_S1_I21_R2_>C1_S1_I22", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''C’est horrible !''", "next_id": "25", "target_node_id": "C1_S1_I25", "edge_id": "C1_S1_I21_R3_>C1_S1_I25", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je fronce les sourcils :''Trahir, vous ne croyez pas que vous exagérez un peu ?''", "next_id": "24", "target_node_id": "C1_S1_I24", "edge_id": "C1_S1_I21_R4_>C1_S1_I24", "RespectAndDignity": -2, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C1_S1_I22", "actor": "Agathe", "text": "Agathe ne répond pas.", "image": "Agathe_confused.png", "responses": [{"text": "Je après une minute de silence :''Est-ce que je peux vous faire votre insuline maintenant ?''", "next_id": "25", "target_node_id": "C1_S1_I25", "edge_id": "C1_S1_I22_R0_>C1_S1_I25", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je suis un peu désemparée :''Vous ne dites rien ! C’est difficile pour moi !''", "next_id": "24", "target_node_id": "C1_S1_I24", "edge_id": "C1_S1_I22_R1_>C1_S1_I24", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Bon et bien je vous fais votre insuline et je reviendrai plus tard. Je fais l’injection et je sors.", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Si votre fille était là qu’est-ce qu’elle dirait de cette situation ?''", "next_id": "25", "target_node_id": "C1_S1_I25", "edge_id": "C1_S1_I22_R3_>C1_S1_I25", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 1, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C1_S1_I25", "actor": "Agathe", "text": "Agathe acquiesse.", "image": "Agathe_suspicious.png", "responses": [{"text": "Je lui administre l’insuline. Et je dis :''Je reviendrai dans la matinée pour changer votre pansement. À tantôt ! Et je sors.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je lui administre l’insuline lui dit :''Au revoir ! Et je sors.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": -2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je lui administre l’insuline, respecte son silence et sors.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C1_S1_I24", "actor": "Agathe", "text": "Agathe reste dans son silence", "image": "Agathe_resigned.png", "responses": [{"text": "''Est-ce que je peux vous faire votre insuline maintenant ?''", "next_id": "25", "target_node_id": "C1_S1_I25", "edge_id": "C1_S1_I24_R0_>C1_S1_I25", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "C’est l’heure de votre insuline.", "next_id": "25", "target_node_id": "C1_S1_I25", "edge_id": "C1_S1_I24_R1_>C1_S1_I25", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je vois que ce sujet est important pour vous. Prenons le temps d’en parler.''", "next_id": "25", "target_node_id": "C1_S1_I25", "edge_id": "C1_S1_I24_R2_>C1_S1_I25", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C1_S1_I20", "actor": "Agathe", "text": "''Mais qu’est-ce qui vous prend ? Je vous interdis de me toucher !''", "image": "Agathe_annoyed.png", "responses": [{"text": "''Excusez-moi Agathe ! Je pensais vous réconforter... je vais vous laisser. Elle sort.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Si vous ne voulez pas que je vous console, je reviendrai dans un moment. Et je sors.", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Excusez-moi. Merci de me l’avoir dit. Je vais garder mes distances et rester disponible.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 2, "InterprofessionalCollaboration": 0}]}, {"node_id": "C1_S1_I17", "actor": "Agathe", "text": "''J’avais mes habitudes, mes voisins, mon jardin ! Qu’est-ce que je vais devenir ? J’avais dit à mes enfants ! Me mettez pas au home ! Pas dans un home ! J’ai pas envie de mourir ici. Ils m’ont trahie.''", "image": "Agathe_anxious.png", "responses": [{"text": "''Il me semble qu’il y a plein de choses importantes pour vous. Qu’est-ce qui vous touche le plus ?''", "next_id": "18", "target_node_id": "C1_S1_I18", "edge_id": "C1_S1_I17_R0_>C1_S1_I18", "RespectAndDignity": 0, "Empathy": 1, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 1, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Et si on parlait un tout petit", "next_id": "19", "target_node_id": "C1_S1_I19", "edge_id": "C1_S1_I17_R1_>C1_S1_I19", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je suis sûr que vous allez faire la paix avec vos enfants.''", "next_id": "19", "target_node_id": "C1_S1_I19", "edge_id": "C1_S1_I17_R2_>C1_S1_I19", "RespectAndDignity": 0, "Empathy": -2, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Vos enfants vous ont trahie ! Comme je vous plains.''", "next_id": "22", "target_node_id": "C1_S1_I22", "edge_id": "C1_S1_I17_R3_>C1_S1_I22", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "En souriant : Et bien vous tombez bien. Il y a un très beau jardin ici et rassurez-vous, vous aurez plein de nouveaux voisins.", "next_id": "18", "target_node_id": "C1_S1_I18", "edge_id": "C1_S1_I17_R4_>C1_S1_I18", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C1_S1_I19", "actor": "Agathe", "text": "Agathe pleure.", "image": "Agathe_sad.png", "responses": [{"text": "Je reste un moment silencieuse : Votre tristesse me touche.", "next_id": "21", "target_node_id": "C1_S1_I21", "edge_id": "C1_S1_I19_R0_>C1_S1_I21", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je pose sa main sur son bras : Nous ferons tout pour que vous soyez bien ici.", "next_id": "21", "target_node_id": "C1_S1_I21", "edge_id": "C1_S1_I19_R1_>C1_S1_I21", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Ça va aller !''", "next_id": "25", "target_node_id": "C1_S1_I25", "edge_id": "C1_S1_I19_R2_>C1_S1_I25", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je m’approche d’elle et lui fais un gros câlin.''", "next_id": "20", "target_node_id": "C1_S1_I20", "edge_id": "C1_S1_I19_R3_>C1_S1_I20", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C1_S1_I14", "actor": "Agathe", "text": "Agathe crie :''Je ne veux pas en discuter ! Je veux juste rentrer chez moi !''", "image": "Agathe_angry.png", "responses": [{"text": "Je sors", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": -2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je dis :''« Je vous avais prévenu » et je sors''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": -2, "Empathy": 0, "Compassion": -3, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Pardonnez-moi, j’ai été brusque et m’en excuse !''", "next_id": "19", "target_node_id": "C1_S1_I19", "edge_id": "C1_S1_I14_R2_>C1_S1_I19", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 1, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C1_S1_I15", "actor": "Agathe", "text": "Agathe a les larmes aux yeux : Ma famille… ma fille et son mari m’ont placé ici contre ma volonté, comme si j’étais un fardeau.", "image": "Agathe_sad.png", "responses": [{"text": "Peut-être n’ont-ils pas vu d’autre choix… vous êtes en sécurité ici", "next_id": "16", "target_node_id": "C1_S1_I16", "edge_id": "C1_S1_I15_R0_>C1_S1_I16", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Auriez-vous préféré qu’ils vous maintiennent à domicile ?''", "next_id": "17", "target_node_id": "C1_S1_I17", "edge_id": "C1_S1_I15_R1_>C1_S1_I17", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Mes parents avaient placé ma grand-maman au home. Au début c’était difficile mais au fur et à mesure elle s’y est faite et nous sommes restés proches.", "next_id": "16", "target_node_id": "C1_S1_I16", "edge_id": "C1_S1_I15_R2_>C1_S1_I16", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C1_S1_I5", "actor": "Agathe", "text": "Agathe la regarde en fronçant les sourcils :''on est dans un parc d’attraction ici, ou bien ?''", "image": "Agathe_annoyed.png", "responses": [{"text": "Étonnée :''Je vous prie de m’excuser si j’ai été désagréable, ce n’était pas mon intention.''", "next_id": "8", "target_node_id": "C1_S1_I8", "edge_id": "C1_S1_I5_R0_>C1_S1_I8", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "En fronçant les sourcils :''Non mais, ça va ou bien !''", "next_id": "9", "target_node_id": "C1_S1_I9", "edge_id": "C1_S1_I5_R1_>C1_S1_I9", "RespectAndDignity": -2, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": -2, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "En souriant :''Je sens qu’on va pas rire tous les jours''", "next_id": "7", "target_node_id": "C1_S1_I7", "edge_id": "C1_S1_I5_R2_>C1_S1_I7", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C1_S1_I9", "actor": "Agathe", "text": "Agathe ne réagit pas.", "image": "Agathe_depressed.png", "responses": [{"text": "''Je peux imaginer qu’il est difficile pour vous d’être ici.''", "next_id": "16", "target_node_id": "C1_S1_I16", "edge_id": "C1_S1_I9_R0_>C1_S1_I16", "RespectAndDignity": 0, "Empathy": 1, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''J’imagine que ça va être compliqué notre relation si vous refusez de parler !''", "next_id": "13", "target_node_id": "C1_S1_I13", "edge_id": "C1_S1_I9_R1_>C1_S1_I13", "RespectAndDignity": 0, "Empathy": 1, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je la regarde :''Si vous ne répondez pas, comment voulez-vous que je vous aide ?''", "next_id": "10", "target_node_id": "C1_S1_I10", "edge_id": "C1_S1_I9_R2_>C1_S1_I10", "RespectAndDignity": 0, "Empathy": -1, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C1_S1_I10", "actor": "Agathe", "text": "Agathe ne dit rien. Elle regarde par la fenêtre.", "image": "Agathe_discussed.png", "responses": [{"text": "''Je peux bien imaginer que c’est dur de quitter sa maison.''", "next_id": "11", "target_node_id": "C1_S1_I11", "edge_id": "C1_S1_I10_R0_>C1_S1_I11", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "J’imagine qu’à votre place je ferais pareil", "next_id": "11", "target_node_id": "C1_S1_I11", "edge_id": "C1_S1_I10_R1_>C1_S1_I11", "RespectAndDignity": 0, "Empathy": 1, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "J’imagine que c’est mal parti nous deux.", "next_id": "14", "target_node_id": "C1_S1_I14", "edge_id": "C1_S1_I10_R2_>C1_S1_I14", "RespectAndDignity": 0, "Empathy": 1, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C1_S1_I11", "actor": "Agathe", "text": "''Vous n’imaginez rien du tout. Vous n’avez pas 90 ans ! On vous a jamais prise pour vous mettre dans un EMS, vous !''", "image": "Agathe_angry.png", "responses": [{"text": "J’inspire :''C’est vrai. Et si un jour cela m’arrivait je pense que ce serait très difficile pour moi. C’est si difficile pour vous ?''", "next_id": "16", "target_node_id": "C1_S1_I16", "edge_id": "C1_S1_I11_R0_>C1_S1_I16", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Ce n’est pas parce que vous êtes en colère que vous avez le droit de me parler sur ce ton.", "next_id": "18", "target_node_id": "C1_S1_I18", "edge_id": "C1_S1_I11_R1_>C1_S1_I18", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je après un court silence : C’est vrai j’ai 25 ans, mais j’ai accompagné ma grand-mère quand elle rentrée en EMS.''", "next_id": "13", "target_node_id": "C1_S1_I13", "edge_id": "C1_S1_I11_R2_>C1_S1_I13", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 2, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je détourne le regard :''Je vous laisse un moment seul et reviendrai quand vous vous serez calmée.''", "next_id": "26", "target_node_id": "C1_S1_I26", "edge_id": "C1_S1_I11_R3_>C1_S1_I26", "RespectAndDignity": -1, "Empathy": -1, "Compassion": -1, "EmotionalRegulation": 0, "CommunicationClarity": 1, "ProfessionalBoundaries": -1, "InterprofessionalCollaboration": 0}]}, {"node_id": "C1_S1_I26", "actor": "Agathe", "text": "Et je sors.", "image": "Agathe_neutral.png", "responses": [{"text": "Sortir", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je vous entends. Ce que vous vivez est difficile. On peut prendre un moment pour en parler.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''D’accord. Je vous laisse pour le moment.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": -2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C1_S1_I7", "actor": "Agathe", "text": "Agathe ne répond pas.", "image": "Agathe_depressed.png", "responses": [{"text": "Je prends une chaise la pose à la hauteur du visage d’Agathe, je m’assieds auprès d’elle, et la regarde.", "next_id": "9", "target_node_id": "C1_S1_I9", "edge_id": "C1_S1_I7_R0_>C1_S1_I9", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je m’assieds sur le lit d’Agathe et je regarde par la fenêtre.''", "next_id": "9", "target_node_id": "C1_S1_I9", "edge_id": "C1_S1_I7_R1_>C1_S1_I9", "RespectAndDignity": -1, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": -2, "InterprofessionalCollaboration": 0}, {"text": "''Je me rapproche du lit et me tiens debout au côté d’Agathe.''", "next_id": "8", "target_node_id": "C1_S1_I8", "edge_id": "C1_S1_I7_R2_>C1_S1_I8", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C1_S1_I2", "actor": "Agathe", "text": "''On ne vous a jamais appris à frapper !''", "image": "Agathe_cold-anger.png", "responses": [{"text": "''Pardon''", "next_id": "3", "target_node_id": "C1_S1_I3", "edge_id": "C1_S1_I2_R0_>C1_S1_I3", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "En la regardant :''Je ne voulais pas vous déranger !''", "next_id": "3", "target_node_id": "C1_S1_I3", "edge_id": "C1_S1_I2_R1_>C1_S1_I3", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je lui souris :''Je vous prie de m’excuser votre chambre est restée un moment inoccupée.''", "next_id": "3", "target_node_id": "C1_S1_I3", "edge_id": "C1_S1_I2_R2_>C1_S1_I3", "RespectAndDignity": 2, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C1_S1_I12", "actor": "Agathe", "text": "Ce n’est pas parce qu’on est vieux qu’on ne peut pas se débrouiller seul.", "image": "Agathe_cold-anger.png", "responses": [{"text": "''Pardon mais ce n’est peut-être pas l’avis de votre famille. En avez-vous discuté avec eux ?''", "next_id": "15", "target_node_id": "C1_S1_I15", "edge_id": "C1_S1_I12_R0_>C1_S1_I15", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''J’ai raison Agathe… (silence) mais parfois la vieillesse inquiète les proches, d’autant plus lorsqu’ils n’habitent pas à proximité''", "next_id": "15", "target_node_id": "C1_S1_I15", "edge_id": "C1_S1_I12_R1_>C1_S1_I15", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Votre famille avait certainement ses raisons de vous placer ici ", "next_id": "14", "target_node_id": "C1_S1_I14", "edge_id": "C1_S1_I12_R2_>C1_S1_I14", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C1_S1_I23", "actor": "Agathe", "text": "Ma fille, elle a sa vie…", "image": "Agathe_melancholic.png", "responses": [{"text": "''Je laisse un silence''", "next_id": "24", "target_node_id": "C1_S1_I24", "edge_id": "C1_S1_I23_R0_>C1_S1_I24", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Oui elle a sa vie !''", "next_id": "24", "target_node_id": "C1_S1_I24", "edge_id": "C1_S1_I23_R1_>C1_S1_I24", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je aussi vous avez votre vie !''", "next_id": "25", "target_node_id": "C1_S1_I25", "edge_id": "C1_S1_I23_R2_>C1_S1_I25", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}], "id_to_parcours": {"1": {"node_id": "C1_S1_I1", "actor": "Claude", "text": "''Je suis devant la porte,...''", "image": "Claude_neutral.png", "responses": [{"text": "Je frappe puis j’entre.", "next_id": "3", "target_node_id": "C1_S1_I3", "edge_id": "C1_S1_I1_R0_>C1_S1_I3", "RespectAndDignity": 2, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "J’entre sans frapper pour ne pas la déranger.", "next_id": "2", "target_node_id": "C1_S1_I2", "edge_id": "C1_S1_I1_R1_>C1_S1_I2", "RespectAndDignity": 2, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je frappe doucement et j’attends un instant pour respecter son rythme.", "next_id": "3", "target_node_id": "C1_S1_I3", "edge_id": "C1_S1_I1_R2_>C1_S1_I3", "RespectAndDignity": 2, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "3": {"node_id": "C1_S1_I3", "actor": "Agathe", "text": "Agathe ne répond pas.", "image": "Agathe_resigned.png", "responses": [{"text": "''Bonjour, je m’appelle Claude Berset. Je suis infirmière et suis là pour vous accompagner durant votre séjour. Dans un premier temps, je vous propose de vous faire votre insuline.''", "next_id": "4", "target_node_id": "C1_S1_I4", "edge_id": "C1_S1_I3_R0_>C1_S1_I4", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 2, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Bonjour Madame Salamin ! Je viens pour l’insuline !''", "next_id": "4", "target_node_id": "C1_S1_I4", "edge_id": "C1_S1_I3_R1_>C1_S1_I4", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 2, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Avec entrain :''Bonjour on ne se connaît pas mais ça va bien se passer !''", "next_id": "5", "target_node_id": "C1_S1_I5", "edge_id": "C1_S1_I3_R2_>C1_S1_I5", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": -1, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Avec un grand sourire :''Bonjour et bienvenue à La maison des Lilas, je suis Claude Berset votre infirmière !''", "next_id": "5", "target_node_id": "C1_S1_I5", "edge_id": "C1_S1_I3_R3_>C1_S1_I5", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "4": {"node_id": "C1_S1_I4", "actor": "Agathe", "text": "Agathe ne répond pas. Elle est dans son lit. Son visage est fermé. Elle regarde le sol. Ses traits sont tirés. Elle serre les dents.", "image": "Agathe_melancholic.png", "responses": [{"text": "Je m’approche d’Agathe et la regarde :''Comment s’est passée votre arrivée ici ?''", "next_id": "6", "target_node_id": "C1_S1_I6", "edge_id": "C1_S1_I4_R0_>C1_S1_I6", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 1, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Ben alors, faites pas cette tête ! La vie est belle, non ?''", "next_id": "5", "target_node_id": "C1_S1_I5", "edge_id": "C1_S1_I4_R1_>C1_S1_I5", "RespectAndDignity": 0, "Empathy": -2, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je vois que vous n’êtes pas bien ! Qu’est-ce que vous ressentez maintenant ?''", "next_id": "7", "target_node_id": "C1_S1_I7", "edge_id": "C1_S1_I4_R2_>C1_S1_I7", "RespectAndDignity": 0, "Empathy": 3, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 1, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "6": {"node_id": "C1_S1_I6", "actor": "Agathe", "text": "Agathe détourne le regard :''d’après vous ?''", "image": "Agathe_hurt.png", "responses": [{"text": "S’assied auprès d’Agathe, elle inspire et répond calmement : je vous sens en colère et triste d’être ici.", "next_id": "8", "target_node_id": "C1_S1_I8", "edge_id": "C1_S1_I6_R0_>C1_S1_I8", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 0, "EmotionalRegulation": 2, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je suis vraiment d’une humeur massacrante, rencontrer les autres résidents vous ferait le plus grand bien.''", "next_id": "13", "target_node_id": "C1_S1_I13", "edge_id": "C1_S1_I6_R1_>C1_S1_I13", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": -3, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Avec un sourire : Au vu de votre accueil je dirais pas très bien.", "next_id": "8", "target_node_id": "C1_S1_I8", "edge_id": "C1_S1_I6_R2_>C1_S1_I8", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "8": {"node_id": "C1_S1_I8", "actor": "Agathe", "text": "Agathe soupire :''Je… je ne devrais pas être là.''", "image": "Agathe_ashamed.png", "responses": [{"text": "L'air désolé : Parfois hélas on ne choisit pas toujours.", "next_id": "13", "target_node_id": "C1_S1_I13", "edge_id": "C1_S1_I8_R0_>C1_S1_I13", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Hoche la tête en la regardant : je vois, si je comprends bien votre famille a dû prendre cette décision.", "next_id": "15", "target_node_id": "C1_S1_I15", "edge_id": "C1_S1_I8_R1_>C1_S1_I15", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Mais comment voulez-vous faire autrement ?''", "next_id": "13", "target_node_id": "C1_S1_I13", "edge_id": "C1_S1_I8_R2_>C1_S1_I13", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "13": {"node_id": "C1_S1_I13", "actor": "Agathe", "text": "''Je veux rentrer chez moi !''", "image": "Agathe_sad.png", "responses": [{"text": "''Je veux rentrer chez vous.''", "next_id": "16", "target_node_id": "C1_S1_I16", "edge_id": "C1_S1_I13_R0_>C1_S1_I16", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je l’air désolé :''Oui, je comprends mais vous savez bien que ce n’est pas possible, Madame Salamin !''", "next_id": "21", "target_node_id": "C1_S1_I21", "edge_id": "C1_S1_I13_R1_>C1_S1_I21", "RespectAndDignity": 0, "Empathy": 1, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Et bien moi aussi, j’aimerais bien rentrer chez moi !''", "next_id": "19", "target_node_id": "C1_S1_I19", "edge_id": "C1_S1_I13_R2_>C1_S1_I19", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je ne peux pas rentrer chez vous. Alors vous allez vous calmer sinon je sors !''", "next_id": "14", "target_node_id": "C1_S1_I14", "edge_id": "C1_S1_I13_R3_>C1_S1_I14", "RespectAndDignity": -3, "Empathy": -1, "Compassion": -3, "EmotionalRegulation": -2, "CommunicationClarity": 0, "ProfessionalBoundaries": -1, "InterprofessionalCollaboration": 0}]}, "16": {"node_id": "C1_S1_I16", "actor": "Agathe", "text": "''Je suis perdue ici.''", "image": "Agathe_confused.png", "responses": [{"text": "Perdue.", "next_id": "18", "target_node_id": "C1_S1_I18", "edge_id": "C1_S1_I16_R0_>C1_S1_I18", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Qu’est-ce qui a changé par rapport à chez vous ?''", "next_id": "17", "target_node_id": "C1_S1_I17", "edge_id": "C1_S1_I16_R1_>C1_S1_I17", "RespectAndDignity": 0, "Empathy": 1, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 1, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Dans une semaine vous aurez de nouveaux repères.", "next_id": "18", "target_node_id": "C1_S1_I18", "edge_id": "C1_S1_I16_R2_>C1_S1_I18", "RespectAndDignity": 0, "Empathy": -2, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Il y a des gens bien plus perdus que vous ici ! Quand vous en aurez pris conscience, je reviendrai ! et je sors.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": -2, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "18": {"node_id": "C1_S1_I18", "actor": "Agathe", "text": "Agathe a la voix qui tremble :''Non vous ne comprenez pas !... Je suis entourée d’inconnus ici ! vous-même vous entrez dans cette chambre sans que je ne sois avertie de rien.''", "image": "Agathe_hurt.png", "responses": [{"text": "L’air désolé :''Je suis vraiment navrée que votre arrivée soit à ce point difficile Agathe… je vous indiquerai mes venues si vous préférez''", "next_id": "21", "target_node_id": "C1_S1_I21", "edge_id": "C1_S1_I18_R0_>C1_S1_I21", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Pardon, mais il vaut mieux vous y faire… Madame Epiney votre voisine a aussi eu du mal au début mais ça va mieux. Elle est charmante d’ailleurs.''", "next_id": "20", "target_node_id": "C1_S1_I20", "edge_id": "C1_S1_I18_R1_>C1_S1_I20", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Ne vous inquiétez pas, nous allons apprendre à nous connaître au fil des jours. Vous rencontrerez les résidents et aurez l’occasion de faire connaissance.", "next_id": "22", "target_node_id": "C1_S1_I22", "edge_id": "C1_S1_I18_R2_>C1_S1_I22", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "21": {"node_id": "C1_S1_I21", "actor": "Agathe", "text": "Agathe soupire :''Comment des enfants peuvent trahir leur maman ?''", "image": "Agathe_depressed.png", "responses": [{"text": "''Je vous sentez trahie par vos enfants ?''", "next_id": "22", "target_node_id": "C1_S1_I22", "edge_id": "C1_S1_I21_R0_>C1_S1_I22", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je vous entends soupirer ! Qu’est-ce qu’il veut dire ce soupir ?''", "next_id": "24", "target_node_id": "C1_S1_I24", "edge_id": "C1_S1_I21_R1_>C1_S1_I24", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 1, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Ils voulaient sûrement votre bien !''", "next_id": "22", "target_node_id": "C1_S1_I22", "edge_id": "C1_S1_I21_R2_>C1_S1_I22", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''C’est horrible !''", "next_id": "25", "target_node_id": "C1_S1_I25", "edge_id": "C1_S1_I21_R3_>C1_S1_I25", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je fronce les sourcils :''Trahir, vous ne croyez pas que vous exagérez un peu ?''", "next_id": "24", "target_node_id": "C1_S1_I24", "edge_id": "C1_S1_I21_R4_>C1_S1_I24", "RespectAndDignity": -2, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "22": {"node_id": "C1_S1_I22", "actor": "Agathe", "text": "Agathe ne répond pas.", "image": "Agathe_confused.png", "responses": [{"text": "Je après une minute de silence :''Est-ce que je peux vous faire votre insuline maintenant ?''", "next_id": "25", "target_node_id": "C1_S1_I25", "edge_id": "C1_S1_I22_R0_>C1_S1_I25", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je suis un peu désemparée :''Vous ne dites rien ! C’est difficile pour moi !''", "next_id": "24", "target_node_id": "C1_S1_I24", "edge_id": "C1_S1_I22_R1_>C1_S1_I24", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Bon et bien je vous fais votre insuline et je reviendrai plus tard. Je fais l’injection et je sors.", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Si votre fille était là qu’est-ce qu’elle dirait de cette situation ?''", "next_id": "25", "target_node_id": "C1_S1_I25", "edge_id": "C1_S1_I22_R3_>C1_S1_I25", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 1, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "25": {"node_id": "C1_S1_I25", "actor": "Agathe", "text": "Agathe acquiesse.", "image": "Agathe_suspicious.png", "responses": [{"text": "Je lui administre l’insuline. Et je dis :''Je reviendrai dans la matinée pour changer votre pansement. À tantôt ! Et je sors.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je lui administre l’insuline lui dit :''Au revoir ! Et je sors.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": -2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je lui administre l’insuline, respecte son silence et sors.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "24": {"node_id": "C1_S1_I24", "actor": "Agathe", "text": "Agathe reste dans son silence", "image": "Agathe_resigned.png", "responses": [{"text": "''Est-ce que je peux vous faire votre insuline maintenant ?''", "next_id": "25", "target_node_id": "C1_S1_I25", "edge_id": "C1_S1_I24_R0_>C1_S1_I25", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "C’est l’heure de votre insuline.", "next_id": "25", "target_node_id": "C1_S1_I25", "edge_id": "C1_S1_I24_R1_>C1_S1_I25", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je vois que ce sujet est important pour vous. Prenons le temps d’en parler.''", "next_id": "25", "target_node_id": "C1_S1_I25", "edge_id": "C1_S1_I24_R2_>C1_S1_I25", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "20": {"node_id": "C1_S1_I20", "actor": "Agathe", "text": "''Mais qu’est-ce qui vous prend ? Je vous interdis de me toucher !''", "image": "Agathe_annoyed.png", "responses": [{"text": "''Excusez-moi Agathe ! Je pensais vous réconforter... je vais vous laisser. Elle sort.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Si vous ne voulez pas que je vous console, je reviendrai dans un moment. Et je sors.", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Excusez-moi. Merci de me l’avoir dit. Je vais garder mes distances et rester disponible.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 2, "InterprofessionalCollaboration": 0}]}, "17": {"node_id": "C1_S1_I17", "actor": "Agathe", "text": "''J’avais mes habitudes, mes voisins, mon jardin ! Qu’est-ce que je vais devenir ? J’avais dit à mes enfants ! Me mettez pas au home ! Pas dans un home ! J’ai pas envie de mourir ici. Ils m’ont trahie.''", "image": "Agathe_anxious.png", "responses": [{"text": "''Il me semble qu’il y a plein de choses importantes pour vous. Qu’est-ce qui vous touche le plus ?''", "next_id": "18", "target_node_id": "C1_S1_I18", "edge_id": "C1_S1_I17_R0_>C1_S1_I18", "RespectAndDignity": 0, "Empathy": 1, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 1, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Et si on parlait un tout petit", "next_id": "19", "target_node_id": "C1_S1_I19", "edge_id": "C1_S1_I17_R1_>C1_S1_I19", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je suis sûr que vous allez faire la paix avec vos enfants.''", "next_id": "19", "target_node_id": "C1_S1_I19", "edge_id": "C1_S1_I17_R2_>C1_S1_I19", "RespectAndDignity": 0, "Empathy": -2, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Vos enfants vous ont trahie ! Comme je vous plains.''", "next_id": "22", "target_node_id": "C1_S1_I22", "edge_id": "C1_S1_I17_R3_>C1_S1_I22", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "En souriant : Et bien vous tombez bien. Il y a un très beau jardin ici et rassurez-vous, vous aurez plein de nouveaux voisins.", "next_id": "18", "target_node_id": "C1_S1_I18", "edge_id": "C1_S1_I17_R4_>C1_S1_I18", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "19": {"node_id": "C1_S1_I19", "actor": "Agathe", "text": "Agathe pleure.", "image": "Agathe_sad.png", "responses": [{"text": "Je reste un moment silencieuse : Votre tristesse me touche.", "next_id": "21", "target_node_id": "C1_S1_I21", "edge_id": "C1_S1_I19_R0_>C1_S1_I21", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je pose sa main sur son bras : Nous ferons tout pour que vous soyez bien ici.", "next_id": "21", "target_node_id": "C1_S1_I21", "edge_id": "C1_S1_I19_R1_>C1_S1_I21", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Ça va aller !''", "next_id": "25", "target_node_id": "C1_S1_I25", "edge_id": "C1_S1_I19_R2_>C1_S1_I25", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je m’approche d’elle et lui fais un gros câlin.''", "next_id": "20", "target_node_id": "C1_S1_I20", "edge_id": "C1_S1_I19_R3_>C1_S1_I20", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "14": {"node_id": "C1_S1_I14", "actor": "Agathe", "text": "Agathe crie :''Je ne veux pas en discuter ! Je veux juste rentrer chez moi !''", "image": "Agathe_angry.png", "responses": [{"text": "Je sors", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": -2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je dis :''« Je vous avais prévenu » et je sors''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": -2, "Empathy": 0, "Compassion": -3, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Pardonnez-moi, j’ai été brusque et m’en excuse !''", "next_id": "19", "target_node_id": "C1_S1_I19", "edge_id": "C1_S1_I14_R2_>C1_S1_I19", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 1, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "15": {"node_id": "C1_S1_I15", "actor": "Agathe", "text": "Agathe a les larmes aux yeux : Ma famille… ma fille et son mari m’ont placé ici contre ma volonté, comme si j’étais un fardeau.", "image": "Agathe_sad.png", "responses": [{"text": "Peut-être n’ont-ils pas vu d’autre choix… vous êtes en sécurité ici", "next_id": "16", "target_node_id": "C1_S1_I16", "edge_id": "C1_S1_I15_R0_>C1_S1_I16", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Auriez-vous préféré qu’ils vous maintiennent à domicile ?''", "next_id": "17", "target_node_id": "C1_S1_I17", "edge_id": "C1_S1_I15_R1_>C1_S1_I17", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Mes parents avaient placé ma grand-maman au home. Au début c’était difficile mais au fur et à mesure elle s’y est faite et nous sommes restés proches.", "next_id": "16", "target_node_id": "C1_S1_I16", "edge_id": "C1_S1_I15_R2_>C1_S1_I16", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "5": {"node_id": "C1_S1_I5", "actor": "Agathe", "text": "Agathe la regarde en fronçant les sourcils :''on est dans un parc d’attraction ici, ou bien ?''", "image": "Agathe_annoyed.png", "responses": [{"text": "Étonnée :''Je vous prie de m’excuser si j’ai été désagréable, ce n’était pas mon intention.''", "next_id": "8", "target_node_id": "C1_S1_I8", "edge_id": "C1_S1_I5_R0_>C1_S1_I8", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "En fronçant les sourcils :''Non mais, ça va ou bien !''", "next_id": "9", "target_node_id": "C1_S1_I9", "edge_id": "C1_S1_I5_R1_>C1_S1_I9", "RespectAndDignity": -2, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": -2, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "En souriant :''Je sens qu’on va pas rire tous les jours''", "next_id": "7", "target_node_id": "C1_S1_I7", "edge_id": "C1_S1_I5_R2_>C1_S1_I7", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "9": {"node_id": "C1_S1_I9", "actor": "Agathe", "text": "Agathe ne réagit pas.", "image": "Agathe_depressed.png", "responses": [{"text": "''Je peux imaginer qu’il est difficile pour vous d’être ici.''", "next_id": "16", "target_node_id": "C1_S1_I16", "edge_id": "C1_S1_I9_R0_>C1_S1_I16", "RespectAndDignity": 0, "Empathy": 1, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''J’imagine que ça va être compliqué notre relation si vous refusez de parler !''", "next_id": "13", "target_node_id": "C1_S1_I13", "edge_id": "C1_S1_I9_R1_>C1_S1_I13", "RespectAndDignity": 0, "Empathy": 1, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je la regarde :''Si vous ne répondez pas, comment voulez-vous que je vous aide ?''", "next_id": "10", "target_node_id": "C1_S1_I10", "edge_id": "C1_S1_I9_R2_>C1_S1_I10", "RespectAndDignity": 0, "Empathy": -1, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "10": {"node_id": "C1_S1_I10", "actor": "Agathe", "text": "Agathe ne dit rien. Elle regarde par la fenêtre.", "image": "Agathe_discussed.png", "responses": [{"text": "''Je peux bien imaginer que c’est dur de quitter sa maison.''", "next_id": "11", "target_node_id": "C1_S1_I11", "edge_id": "C1_S1_I10_R0_>C1_S1_I11", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "J’imagine qu’à votre place je ferais pareil", "next_id": "11", "target_node_id": "C1_S1_I11", "edge_id": "C1_S1_I10_R1_>C1_S1_I11", "RespectAndDignity": 0, "Empathy": 1, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "J’imagine que c’est mal parti nous deux.", "next_id": "14", "target_node_id": "C1_S1_I14", "edge_id": "C1_S1_I10_R2_>C1_S1_I14", "RespectAndDignity": 0, "Empathy": 1, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "11": {"node_id": "C1_S1_I11", "actor": "Agathe", "text": "''Vous n’imaginez rien du tout. Vous n’avez pas 90 ans ! On vous a jamais prise pour vous mettre dans un EMS, vous !''", "image": "Agathe_angry.png", "responses": [{"text": "J’inspire :''C’est vrai. Et si un jour cela m’arrivait je pense que ce serait très difficile pour moi. C’est si difficile pour vous ?''", "next_id": "16", "target_node_id": "C1_S1_I16", "edge_id": "C1_S1_I11_R0_>C1_S1_I16", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Ce n’est pas parce que vous êtes en colère que vous avez le droit de me parler sur ce ton.", "next_id": "18", "target_node_id": "C1_S1_I18", "edge_id": "C1_S1_I11_R1_>C1_S1_I18", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je après un court silence : C’est vrai j’ai 25 ans, mais j’ai accompagné ma grand-mère quand elle rentrée en EMS.''", "next_id": "13", "target_node_id": "C1_S1_I13", "edge_id": "C1_S1_I11_R2_>C1_S1_I13", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 2, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je détourne le regard :''Je vous laisse un moment seul et reviendrai quand vous vous serez calmée.''", "next_id": "26", "target_node_id": "C1_S1_I26", "edge_id": "C1_S1_I11_R3_>C1_S1_I26", "RespectAndDignity": -1, "Empathy": -1, "Compassion": -1, "EmotionalRegulation": 0, "CommunicationClarity": 1, "ProfessionalBoundaries": -1, "InterprofessionalCollaboration": 0}]}, "26": {"node_id": "C1_S1_I26", "actor": "Agathe", "text": "Et je sors.", "image": "Agathe_neutral.png", "responses": [{"text": "Sortir", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je vous entends. Ce que vous vivez est difficile. On peut prendre un moment pour en parler.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''D’accord. Je vous laisse pour le moment.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": -2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "7": {"node_id": "C1_S1_I7", "actor": "Agathe", "text": "Agathe ne répond pas.", "image": "Agathe_depressed.png", "responses": [{"text": "Je prends une chaise la pose à la hauteur du visage d’Agathe, je m’assieds auprès d’elle, et la regarde.", "next_id": "9", "target_node_id": "C1_S1_I9", "edge_id": "C1_S1_I7_R0_>C1_S1_I9", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je m’assieds sur le lit d’Agathe et je regarde par la fenêtre.''", "next_id": "9", "target_node_id": "C1_S1_I9", "edge_id": "C1_S1_I7_R1_>C1_S1_I9", "RespectAndDignity": -1, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": -2, "InterprofessionalCollaboration": 0}, {"text": "''Je me rapproche du lit et me tiens debout au côté d’Agathe.''", "next_id": "8", "target_node_id": "C1_S1_I8", "edge_id": "C1_S1_I7_R2_>C1_S1_I8", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "2": {"node_id": "C1_S1_I2", "actor": "Agathe", "text": "''On ne vous a jamais appris à frapper !''", "image": "Agathe_cold-anger.png", "responses": [{"text": "''Pardon''", "next_id": "3", "target_node_id": "C1_S1_I3", "edge_id": "C1_S1_I2_R0_>C1_S1_I3", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "En la regardant :''Je ne voulais pas vous déranger !''", "next_id": "3", "target_node_id": "C1_S1_I3", "edge_id": "C1_S1_I2_R1_>C1_S1_I3", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je lui souris :''Je vous prie de m’excuser votre chambre est restée un moment inoccupée.''", "next_id": "3", "target_node_id": "C1_S1_I3", "edge_id": "C1_S1_I2_R2_>C1_S1_I3", "RespectAndDignity": 2, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "12": {"node_id": "C1_S1_I12", "actor": "Agathe", "text": "Ce n’est pas parce qu’on est vieux qu’on ne peut pas se débrouiller seul.", "image": "Agathe_cold-anger.png", "responses": [{"text": "''Pardon mais ce n’est peut-être pas l’avis de votre famille. En avez-vous discuté avec eux ?''", "next_id": "15", "target_node_id": "C1_S1_I15", "edge_id": "C1_S1_I12_R0_>C1_S1_I15", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''J’ai raison Agathe… (silence) mais parfois la vieillesse inquiète les proches, d’autant plus lorsqu’ils n’habitent pas à proximité''", "next_id": "15", "target_node_id": "C1_S1_I15", "edge_id": "C1_S1_I12_R1_>C1_S1_I15", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Votre famille avait certainement ses raisons de vous placer ici ", "next_id": "14", "target_node_id": "C1_S1_I14", "edge_id": "C1_S1_I12_R2_>C1_S1_I14", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "23": {"node_id": "C1_S1_I23", "actor": "Agathe", "text": "Ma fille, elle a sa vie…", "image": "Agathe_melancholic.png", "responses": [{"text": "''Je laisse un silence''", "next_id": "24", "target_node_id": "C1_S1_I24", "edge_id": "C1_S1_I23_R0_>C1_S1_I24", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Oui elle a sa vie !''", "next_id": "24", "target_node_id": "C1_S1_I24", "edge_id": "C1_S1_I23_R1_>C1_S1_I24", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je aussi vous avez votre vie !''", "next_id": "25", "target_node_id": "C1_S1_I25", "edge_id": "C1_S1_I23_R2_>C1_S1_I25", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}}}, {"title": "Vite fait bien fait", "scene_id": 2, "scene_intro": "Pascal interpelle Claude à sa sortie de la chambre d’Agathe. - Pascal :''Écoute Claude, ça fait maintenant plus de vingt minutes que tu es rentrée dans la chambre 14. Tout ça pour des présentations. Je te rappelle que tu as beaucoup de choses à faire aujourd’hui ! On va pas s’en sortir, si tu continues comme ça ! C’est pas possible. J’ai besoin que tu travailles plus rapidement.''", "nodes": [{"id": "C1_S2_I1", "label": "Écoute Claude", "title": "[Pascal] ''J’ai besoin que tu travailles plus rapidement.''"}, {"id": "C1_S2_I2", "label": "''Je suis désolée Claude,''", "title": "[Pascal] ''Je suis désolée Claude, mais je suis là pour veiller au bon fonctionnement du service.''"}, {"id": "C1_S2_I3", "label": "Je vois", "title": "[Pascal] ''Je vois''"}, {"id": "C1_S2_I4", "label": "Ça peut arriver.", "title": "[Pascal] Ça peut arriver."}, {"id": "C1_S2_
