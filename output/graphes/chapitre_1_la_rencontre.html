thy": 1}, {"text": "Bonjour, on ne se connaît pas mais ça va bien se passer !", "next_id": "5", "target_node_id": "C1_S1_I5", "edge_id": "C1_S1_I4_R1_>C1_S1_I5", "Authenticity": 1, "Respect": 0, "Compassion": 1, "Hope": 0, "Empathy": 0}, {"text": "Bonjour Madame Salamin ! Je viens pour l’injection d'insuline !", "next_id": "5", "target_node_id": "C1_S1_I5", "edge_id": "C1_S1_I4_R2_>C1_S1_I5", "Authenticity": 0, "Respect": 0, "Compassion": -2, "Hope": 0, "Empathy": 0}]}, {"node_id": "C1_S1_I5", "actor": "Agathe", "text": "Agathe ne répond pas. Elle est dans son lit. Son visage est fermé. Elle regarde le sol. Ses traits sont tirés. Elle serre les dents.", "responses": [{"text": "Je vois que vous n’êtes pas bien ! Que ressentez-vous en ce moment ?", "next_id": "6", "target_node_id": "C1_S1_I6", "edge_id": "C1_S1_I5_R0_>C1_S1_I6", "Authenticity": 2, "Respect": 2, "Compassion": 2, "Hope": 3, "Empathy": 2}, {"text": "Comment s’est passé votre arrivée ici ?", "next_id": "6", "target_node_id": "C1_S1_I6", "edge_id": "C1_S1_I5_R1_>C1_S1_I6", "Authenticity": 0, "Respect": 0, "Compassion": -2, "Hope": 0, "Empathy": -1}, {"text": "Ben alors, vous en faites une tête ! La vie est belle. Je peux faire quelque chose pour vous ?", "next_id": "6", "target_node_id": "C1_S1_I6", "edge_id": "C1_S1_I5_R2_>C1_S1_I6", "Authenticity": -2, "Respect": 0, "Compassion": -2, "Hope": 0, "Empathy": 0}]}, {"node_id": "C1_S1_I6", "actor": "Agathe", "text": "Agathe ne répond pas.", "responses": [{"text": "Je ne peux pas vous obliger à me répondre, toutefois, je ne sais que faire pour vous sans votre réponse.", "next_id": "7", "target_node_id": "C1_S1_I7", "edge_id": "C1_S1_I6_R0_>C1_S1_I7", "Authenticity": -2, "Respect": -1, "Compassion": 1, "Hope": 1, "Empathy": 1}, {"text": "Je peux imaginer qu’il est difficile pour vous d’être ici.", "next_id": "7", "target_node_id": "C1_S1_I7", "edge_id": "C1_S1_I6_R1_>C1_S1_I7", "Authenticity": 2, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": -5}, {"text": "Si vous ne répondez pas, comment voulez-vous que je vous aide ?", "next_id": "7", "target_node_id": "C1_S1_I7", "edge_id": "C1_S1_I6_R2_>C1_S1_I7", "Authenticity": -3, "Respect": 0, "Compassion": 0, "Hope": 2, "Empathy": 0}]}, {"node_id": "C1_S1_I7", "actor": "Agathe", "text": "Agathe ne dit rien.", "responses": [{"text": "J’imagine qu’à votre place je ferais pareil.", "next_id": "8", "target_node_id": "C1_S1_I8", "edge_id": "C1_S1_I7_R0_>C1_S1_I8", "Authenticity": 2, "Respect": 0, "Compassion": 0, "Hope": 3, "Empathy": 0}, {"text": "Je peux bien imaginer que c’est douloureux de quitter sa maison.", "next_id": "8", "target_node_id": "C1_S1_I8", "edge_id": "C1_S1_I7_R1_>C1_S1_I8", "Authenticity": 1, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 1}, {"text": "J’imagine que c’est mal parti. Comment allons-nous communiquer toutes les deux ?", "next_id": "8", "target_node_id": "C1_S1_I8", "edge_id": "C1_S1_I7_R2_>C1_S1_I8", "Authenticity": 4, "Respect": 2, "Compassion": 0, "Hope": 0, "Empathy": 2}]}, {"node_id": "C1_S1_I8", "actor": "Agathe", "text": "Vous n’imaginez rien du tout. Vous n’avez pas 90 ans ! On vous a jamais prise pour vous mettre dans un EMS, vous !", "responses": [{"text": "C’est vrai. Et si un jour cela m’arrivait je pense que ce serait très difficile pour moi. C’est si difficile pour vous ?", "next_id": "9", "target_node_id": "C1_S1_I9", "edge_id": "C1_S1_I8_R0_>C1_S1_I9", "Authenticity": 2, "Respect": 0, "Compassion": 1, "Hope": 0, "Empathy": 0}, {"text": "C’est vrai j’ai 25 ans, mais j’ai accompagné ma grand-mère quand elle est rentrée en EMS.", "next_id": "9", "target_node_id": "C1_S1_I9", "edge_id": "C1_S1_I8_R1_>C1_S1_I9", "Authenticity": 0, "Respect": 0, "Compassion": 1, "Hope": 0, "Empathy": 0}, {"text": "Peut-être préférez-vous rester seule, je reviendrai un peu plus tard.", "next_id": "21", "target_node_id": "C1_S1_I21", "edge_id": "C1_S1_I8_R2_>C1_S1_I21", "Authenticity": -2, "Respect": 0, "Compassion": -2, "Hope": 0, "Empathy": 0}, {"text": "Ce n’est pas parce que vous êtes en colère que vous avez le droit de me parler sur ce ton.", "next_id": "9", "target_node_id": "C1_S1_I9", "edge_id": "C1_S1_I8_R3_>C1_S1_I9", "Authenticity": -5, "Respect": 0, "Compassion": 0, "Hope": -4, "Empathy": 0}]}, {"node_id": "C1_S1_I9", "actor": "Agathe", "text": "Je veux rentrer chez moi !", "responses": [{"text": "Je vous comprends. Ma grand-mère aussi voulait rentrer chez elle.", "next_id": "10", "target_node_id": "C1_S1_I10", "edge_id": "C1_S1_I9_R0_>C1_S1_I10", "Authenticity": 2, "Respect": 0, "Compassion": 2, "Hope": 0, "Empathy": 0}, {"text": "Comme je vous comprends, moi aussi j’aimerais bien rentrer chez moi!", "next_id": "11", "target_node_id": "C1_S1_I11", "edge_id": "C1_S1_I9_R1_>C1_S1_I11", "Authenticity": 1, "Respect": 0, "Compassion": 0, "Hope": 1, "Empathy": 0}, {"text": "Vous voulez rentrer chez vous.", "next_id": "11", "target_node_id": "C1_S1_I11", "edge_id": "C1_S1_I9_R2_>C1_S1_I11", "Authenticity": 2, "Respect": 0, "Compassion": 0, "Hope": 2, "Empathy": 0}, {"text": "Oui, je comprends mais vous savez bien que ce n’est pas possible, Madame Salamin.", "next_id": "11", "target_node_id": "C1_S1_I11", "edge_id": "C1_S1_I9_R3_>C1_S1_I11", "Authenticity": -3, "Respect": 0, "Compassion": 0, "Hope": 2, "Empathy": 0}, {"text": "Soyez raisonnable Madame Salamin, votre état de santé ne le permet pas.", "next_id": "10", "target_node_id": "C1_S1_I10", "edge_id": "C1_S1_I9_R4_>C1_S1_I10", "Authenticity": -4, "Respect": 0, "Compassion": -4, "Hope": 0, "Empathy": 0}]}, {"node_id": "C1_S1_I10", "actor": "Agathe", "text": "Agathe se met en colère, son visage est rouge, son menton et ses mains tremblent, elle est démunie face à l’attitude de l’infirmière. Elle est prête à crier. !", "responses": [{"text": "Ne vous mettez pas dans cet état… calmez-vous Madame Salamin.", "next_id": "21", "target_node_id": "C1_S1_I21", "edge_id": "C1_S1_I10_R0_>C1_S1_I21", "Authenticity": -5, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": -5}, {"text": "Madame Salamin, veuillez m’excuser, j’oublie à quel point il peut être difficile de quitter son domicile et se retrouver ici sans repère!", "next_id": "11", "target_node_id": "C1_S1_I11", "edge_id": "C1_S1_I10_R1_>C1_S1_I11", "Authenticity": 1, "Respect": 0, "Compassion": 1, "Hope": 0, "Empathy": 0}, {"text": "Je vais appeler mon infirmier chef afin qu’il vous donne des informations sur votre situation.", "next_id": "21", "target_node_id": "C1_S1_I21", "edge_id": "C1_S1_I10_R2_>C1_S1_I21", "Authenticity": -5, "Respect": 0, "Compassion": -5, "Hope": 0, "Empathy": -2}]}, {"node_id": "C1_S1_I21", "actor": "Agathe", "text": "...", "responses": [{"text": "Sortir", "next_id": "-1", "target_node_id": "", "edge_id": "", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C1_S1_I11", "actor": "Agathe", "text": "Je suis perdue ici.", "responses": [{"text": "Comment cela perdue ? Qu’est-ce qui a changé par rapport à chez vous ?", "next_id": "12", "target_node_id": "C1_S1_I12", "edge_id": "C1_S1_I11_R0_>C1_S1_I12", "Authenticity": 1, "Respect": 1, "Compassion": 1, "Hope": 0, "Empathy": 0}, {"text": "Perdue.", "next_id": "12", "target_node_id": "C1_S1_I12", "edge_id": "C1_S1_I11_R1_>C1_S1_I12", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Dans une semaine vous aurez de nouveaux repères.", "next_id": "12", "target_node_id": "C1_S1_I12", "edge_id": "C1_S1_I11_R2_>C1_S1_I12", "Authenticity": 1, "Respect": 0, "Compassion": 1, "Hope": 0, "Empathy": 0}, {"text": "Il y a des gens bien plus perdus que vous ici ! Sortir de la pièce", "next_id": "20", "target_node_id": "C1_S1_I20", "edge_id": "C1_S1_I11_R3_>C1_S1_I20", "Authenticity": -2, "Respect": 0, "Compassion": -2, "Hope": 0, "Empathy": -2}]}, {"node_id": "C1_S1_I12", "actor": "Agathe", "text": "J’avais mes habitudes, mes voisins, mon jardin ! Qu’est-ce que je vais devenir ? J’avais dit à mes enfants ! Me mettez pas au home ! Pas dans un home ! J’ai pas envie de mourir ici. Ils m’ont trahie.", "responses": [{"text": "Et si on parlait un tout petit peu de votre jardin, de vos voisins. Si je comprends bien vous aviez une maison.", "next_id": "13", "target_node_id": "C1_S1_I13", "edge_id": "C1_S1_I12_R0_>C1_S1_I13", "Authenticity": 1, "Respect": 0, "Compassion": 1, "Hope": 0, "Empathy": 0}, {"text": "Je suis sûre que vous allez faire la paix avec vos enfants.", "next_id": "13", "target_node_id": "C1_S1_I13", "edge_id": "C1_S1_I12_R1_>C1_S1_I13", "Authenticity": -2, "Respect": 0, "Compassion": -2, "Hope": 0, "Empathy": 0}, {"text": "... Il me semble qu’il y a plein de choses importantes pour vous. Qu’est-ce qui vous touche le plus ?", "next_id": "13", "target_node_id": "C1_S1_I13", "edge_id": "C1_S1_I12_R2_>C1_S1_I13", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 1, "Empathy": 0}, {"text": "Vos enfants vous ont trahie ! Comme je suis triste pour vous.", "next_id": "13", "target_node_id": "C1_S1_I13", "edge_id": "C1_S1_I12_R3_>C1_S1_I13", "Authenticity": 0, "Respect": 0, "Compassion": 1, "Hope": 0, "Empathy": 1}, {"text": "Et bien vous tombez bien. Il y a un très beau jardin ici et vous aurez, rassurez-vous, plein de nouveaux voisins.", "next_id": "13", "target_node_id": "C1_S1_I13", "edge_id": "C1_S1_I12_R4_>C1_S1_I13", "Authenticity": -2, "Respect": 0, "Compassion": -3, "Hope": 0, "Empathy": -3}]}, {"node_id": "C1_S1_I13", "actor": "Agathe", "text": "Agathe pleure.", "responses": [{"text": "Nous ferons tout pour que vous soyez bien ici.", "next_id": "15", "target_node_id": "C1_S1_I15", "edge_id": "C1_S1_I13_R0_>C1_S1_I15", "Authenticity": 1, "Respect": 0, "Compassion": 1, "Hope": 0, "Empathy": 0}, {"text": "Il me semble que vous êtes triste. Votre tristesse me touche.", "next_id": "15", "target_node_id": "C1_S1_I15", "edge_id": "C1_S1_I13_R1_>C1_S1_I15", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Ça va aller !", "next_id": "15", "target_node_id": "C1_S1_I15", "edge_id": "C1_S1_I13_R2_>C1_S1_I15", "Authenticity": -4, "Respect": 1, "Compassion": 0, "Hope": -4, "Empathy": 0}, {"text": "Je m’approche d’elle et lui passe mon bras sur ses épaules. Je suis tentée de lui caresser la joue.", "next_id": "13", "target_node_id": "C1_S1_I13", "edge_id": "C1_S1_I13_R3_>C1_S1_I13", "Authenticity": 1, "Respect": 0, "Compassion": 2, "Hope": 0, "Empathy": 2}]}, {"node_id": "C1_S1_I15", "actor": "Agathe", "text": "Agathe soupire. Comment des enfants peuvent trahir leur maman ?", "responses": [{"text": "Je vous entends soupirer ! Qu’est-ce qu’il veut dire ce soupir ?", "next_id": "16", "target_node_id": "C1_S1_I16", "edge_id": "C1_S1_I15_R0_>C1_S1_I16", "Authenticity": -3, "Respect": 0, "Compassion": -3, "Hope": 0, "Empathy": -2}, {"text": "Ils voulaient sûrement votre bien !", "next_id": "16", "target_node_id": "C1_S1_I16", "edge_id": "C1_S1_I15_R1_>C1_S1_I16", "Authenticity": -1, "Respect": 0, "Compassion": -4, "Hope": 0, "Empathy": -4}, {"text": "Vous vous sentez trahie par vos enfants ?", "next_id": "16", "target_node_id": "C1_S1_I16", "edge_id": "C1_S1_I15_R2_>C1_S1_I16", "Authenticity": -5, "Respect": 0, "Compassion": -5, "Hope": 0, "Empathy": -5}, {"text": "Probablement n’avaient-ils pas d’autres solutions !", "next_id": "16", "target_node_id": "C1_S1_I16", "edge_id": "C1_S1_I15_R3_>C1_S1_I16", "Authenticity": -3, "Respect": -3, "Compassion": -3, "Hope": 0, "Empathy": 0}, {"text": "Trahir, vous ne pensez pas que vous exagérez un peu ?", "next_id": "16", "target_node_id": "C1_S1_I16", "edge_id": "C1_S1_I15_R4_>C1_S1_I16", "Authenticity": -5, "Respect": 0, "Compassion": -5, "Hope": 0, "Empathy": -5}]}, {"node_id": "C1_S1_I16", "actor": "Agathe", "text": "Agathe ne répond pas.", "responses": [{"text": "Est-ce que je peux vous faire votre injection d’insuline maintenant ?", "next_id": "20", "target_node_id": "C1_S1_I20", "edge_id": "C1_S1_I16_R0_>C1_S1_I20", "Authenticity": 1, "Respect": 0, "Compassion": 1, "Hope": 0, "Empathy": 0}, {"text": "Si votre fille était là qu’est-ce qu’elle dirait de cette situation ?", "next_id": "17", "target_node_id": "C1_S1_I17", "edge_id": "C1_S1_I16_R1_>C1_S1_I17", "Authenticity": -2, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": -2}, {"text": "Vous ne dîtes rien ! C’est difficile pour moi !", "next_id": "19", "target_node_id": "C1_S1_I19", "edge_id": "C1_S1_I16_R2_>C1_S1_I19", "Authenticity": 2, "Respect": 0, "Compassion": 1, "Hope": 0, "Empathy": 0}, {"text": "Bon et bien je propose de vous faire votre injection d’insuline afin de respecter l’horaire établi et permettre à ma collègue de vous apporter votre petit-déjeuner. ", "next_id": "22", "target_node_id": "C1_S1_I22", "edge_id": "C1_S1_I16_R3_>C1_S1_I22", "Authenticity": 1, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 1}]}, {"node_id": "C1_S1_I20", "actor": "Agathe", "text": "Agathe acquiesse.", "responses": [{"text": "Je lui administre l’insuline. Je reviendrai dans la matinée pour changer votre pansement. Nous pourrions alors envisager de nous voir un moment pour reprendre notre conversation. À tantôt !", "next_id": "-1", "target_node_id": "", "edge_id": "", "Authenticity": 0, "Respect": 1, "Compassion": 0, "Hope": 0, "Empathy": 1}, {"text": "Je lui administre l’insuline. Au revoir !", "next_id": "-1", "target_node_id": "", "edge_id": "", "Authenticity": 0, "Respect": 1, "Compassion": 0, "Hope": -2, "Empathy": 0}, {"text": "Je lui administre l’insuline et respecte son silence", "next_id": "-1", "target_node_id": "", "edge_id": "", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": -2, "Empathy": 0}]}, {"node_id": "C1_S1_I17", "actor": "Agathe", "text": "Ma fille, elle a sa vie…", "responses": [{"text": "Vous aussi vous avez votre vie !", "next_id": "18", "target_node_id": "C1_S1_I18", "edge_id": "C1_S1_I17_R0_>C1_S1_I18", "Authenticity": 1, "Respect": 0, "Compassion": 1, "Hope": 0, "Empathy": 0}, {"text": "Oui elle a sa vie !", "next_id": "19", "target_node_id": " ion": 0, "Hope": -2, "Empathy": -2}, {"text": "Je ne voulais pas vous déranger !", "next_id": "4", "target_node_id": "C1_S1_I4", "edge_id": "C1_S1_I2_R1_>C1_S1_I4", "Authenticity": -3, "Respect": 0, "Compassion": -3, "Hope": 0, "Empathy": 0}]}, {"node_id": "C1_S1_I14", "actor": "Agathe", "text": "Mais qu’est-ce qui vous prends ? Je vous interdis de me toucher !", "responses": [{"text": "Excusez-moi Agathe ! Je pensais vous réconforter.", "next_id": "15", "target_node_id": "C1_S1_I15", "edge_id": "C1_S1_I14_R0_>C1_S1_I15", "Authenticity": -1, "Respect": 0, "Compassion": -1, "Hope": 0, "Empathy": -3}, {"text": "Si vous ne voulez pas que je vous console, je reviendrai plus tard. Il est mieux que je vous laisse un moment seule. Je sors de la pièce", "next_id": "20", "target_node_id": "C1_S1_I20", "edge_id": "C1_S1_I14_R1_>C1_S1_I20", "Authenticity": -1, "Respect": 0, "Compassion": -3, "Hope": 0, "Empathy": 0}]}], "id_to_parcours": {"1": {"node_id": "C1_S1_I1", "actor": "Claude", "text": "Je suis devant la porte,...", "responses": [{"text": "Je frappe", "next_id": "3", "target_node_id": "C1_S1_I3", "edge_id": "C1_S1_I1_R0_>C1_S1_I3", "Authenticity": 3, "Respect": 0, "Compassion": 1, "Hope": 0, "Empathy": 3}, {"text": "J'entre sans frapper pour ne pas la déranger", "next_id": "2", "target_node_id": "C1_S1_I2", "edge_id": "C1_S1_I1_R1_>C1_S1_I2", "Authenticity": -2, "Respect": -3, "Compassion": -3, "Hope": -3, "Empathy": -1}]}, "3": {"node_id": "C1_S1_I3", "actor": "Agathe", "text": "Agathe ne répond pas.", "responses": [{"text": "Entrer", "next_id": "4", "target_node_id": "C1_S1_I4", "edge_id": "C1_S1_I3_R0_>C1_S1_I4", "Authenticity": 2, "Respect": 1, "Compassion": 2, "Hope": 3, "Empathy": 0}]}, "4": {"node_id": "C1_S1_I4", "actor": "Agathe", "text": "...", "responses": [{"text": "Bonjour Madame Salamin, je m’appelle Claude Berset. Je suis infirmière et suis là pour vous accompagner durant votre séjour. Dans un premier temps, je vous propose de vous faire votre injection d'insuline.", "next_id": "5", "target_node_id": "C1_S1_I5", "edge_id": "C1_S1_I4_R0_>C1_S1_I5", "Authenticity": 0, "Respect": 2, "Compassion": 0, "Hope": 3, "Empathy": 1}, {"text": "Bonjour, on ne se connaît pas mais ça va bien se passer !", "next_id": "5", "target_node_id": "C1_S1_I5", "edge_id": "C1_S1_I4_R1_>C1_S1_I5", "Authenticity": 1, "Respect": 0, "Compassion": 1, "Hope": 0, "Empathy": 0}, {"text": "Bonjour Madame Salamin ! Je viens pour l’injection d'insuline !", "next_id": "5", "target_node_id": "C1_S1_I5", "edge_id": "C1_S1_I4_R2_>C1_S1_I5", "Authenticity": 0, "Respect": 0, "Compassion": -2, "Hope": 0, "Empathy": 0}]}, "5": {"node_id": "C1_S1_I5", "actor": "Agathe", "text": "Agathe ne répond pas. Elle est dans son lit. Son visage est fermé. Elle regarde le sol. Ses traits sont tirés. Elle serre les dents.", "responses": [{"text": "Je vois que vous n’êtes pas bien ! Que ressentez-vous en ce moment ?", "next_id": "6", "target_node_id": "C1_S1_I6", "edge_id": "C1_S1_I5_R0_>C1_S1_I6", "Authenticity": 2, "Respect": 2, "Compassion": 2, "Hope": 3, "Empathy": 2}, {"text": "Comment s’est passé votre arrivée ici ?", "next_id": "6", "target_node_id": "C1_S1_I6", "edge_id": "C1_S1_I5_R1_>C1_S1_I6", "Authenticity": 0, "Respect": 0, "Compassion": -2, "Hope": 0, "Empathy": -1}, {"text": "Ben alors, vous en faites une tête ! La vie est belle. Je peux faire quelque chose pour vous ?", "next_id": "6", "target_node_id": "C1_S1_I6", "edge_id": "C1_S1_I5_R2_>C1_S1_I6", "Authenticity": -2, "Respect": 0, "Compassion": -2, "Hope": 0, "Empathy": 0}]}, "6": {"node_id": "C1_S1_I6", "actor": "Agathe", "text": "Agathe ne répond pas.", "responses": [{"text": "Je ne peux pas vous obliger à me répondre, toutefois, je ne sais que faire pour vous sans votre réponse.", "next_id": "7", "target_node_id": "C1_S1_I7", "edge_id": "C1_S1_I6_R0_>C1_S1_I7", "Authenticity": -2, "Respect": -1, "Compassion": 1, "Hope": 1, "Empathy": 1}, {"text": "Je peux imaginer qu’il est difficile pour vous d’être ici.", "next_id": "7", "target_node_id": "C1_S1_I7", "edge_id": "C1_S1_I6_R1_>C1_S1_I7", "Authenticity": 2, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": -5}, {"text": "Si vous ne répondez pas, comment voulez-vous que je vous aide ?", "next_id": "7", "target_node_id": "C1_S1_I7", "edge_id": "C1_S1_I6_R2_>C1_S1_I7", "Authenticity": -3, "Respect": 0, "Compassion": 0, "Hope": 2, "Empathy": 0}]}, "7": {"node_id": "C1_S1_I7", "actor": "Agathe", "text": "Agathe ne dit rien.", "responses": [{"text": "J’imagine qu’à votre place je ferais pareil.", "next_id": "8", "target_node_id": "C1_S1_I8", "edge_id": "C1_S1_I7_R0_>C1_S1_I8", "Authenticity": 2, "Respect": 0, "Compassion": 0, "Hope": 3, "Empathy": 0}, {"text": "Je peux bien imaginer que c’est douloureux de quitter sa maison.", "next_id": "8", "target_node_id": "C1_S1_I8", "edge_id": "C1_S1_I7_R1_>C1_S1_I8", "Authenticity": 1, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 1}, {"text": "J’imagine que c’est mal parti. Comment allons-nous communiquer toutes les deux ?", "next_id": "8", "target_node_id": "C1_S1_I8", "edge_id": "C1_S1_I7_R2_>C1_S1_I8", "Authenticity": 4, "Respect": 2, "Compassion": 0, "Hope": 0, "Empathy": 2}]}, "8": {"node_id": "C1_S1_I8", "actor": "Agathe", "text": "Vous n’imaginez rien du tout. Vous n’avez pas 90 ans ! On vous a jamais prise pour vous mettre dans un EMS, vous !", "responses": [{"text": "C’est vrai. Et si un jour cela m’arrivait je pense que ce serait très difficile pour moi. C’est si difficile pour vous ?", "next_id": "9", "target_node_id": "C1_S1_I9", "edge_id": "C1_S1_I8_R0_>C1_S1_I9", "Authenticity": 2, "Respect": 0, "Compassion": 1, "Hope": 0, "Empathy": 0}, {"text": "C’est vrai j’ai 25 ans, mais j’ai accompagné ma grand-mère quand elle est rentrée en EMS.", "next_id": "9", "target_node_id": "C1_S1_I9", "edge_id": "C1_S1_I8_R1_>C1_S1_I9", "Authenticity": 0, "Respect": 0, "Compassion": 1, "Hope": 0, "Empathy": 0}, {"text": "Peut-être préférez-vous rester seule, je reviendrai un peu plus tard.", "next_id": "21", "target_node_id": "C1_S1_I21", "edge_id": "C1_S1_I8_R2_>C1_S1_I21", "Authenticity": -2, "Respect": 0, "Compassion": -2, "Hope": 0, "Empathy": 0}, {"text": "Ce n’est pas parce que vous êtes en colère que vous avez le droit de me parler sur ce ton.", "next_id": "9", "target_node_id": "C1_S1_I9", "edge_id": "C1_S1_I8_R3_>C1_S1_I9", "Authenticity": -5, "Respect": 0, "Compassion": 0, "Hope": -4, "Empathy": 0}]}, "9": {"node_id": "C1_S1_I9", "actor": "Agathe", "text": "Je veux rentrer chez moi !", "responses": [{"text": "Je vous comprends. Ma grand-mère aussi voulait rentrer chez elle.", "next_id": "10", "target_node_id": "C1_S1_I10", "edge_id": "C1_S1_I9_R0_>C1_S1_I10", "Authenticity": 2, "Respect": 0, "Compassion": 2, "Hope": 0, "Empathy": 0}, {"text": "Comme je vous comprends, moi aussi j’aimerais bien rentrer chez moi!", "next_id": "11", "target_node_id": "C1_S1_I11", "edge_id": "C1_S1_I9_R1_>C1_S1_I11", "Authenticity": 1, "Respect": 0, "Compassion": 0, "Hope": 1, "Empathy": 0}, {"text": "Vous voulez rentrer chez vous.", "next_id": "11", "target_node_id": "C1_S1_I11", "edge_id": "C1_S1_I9_R2_>C1_S1_I11", "Authenticity": 2, "Respect": 0, "Compassion": 0, "Hope": 2, "Empathy": 0}, {"text": "Oui, je comprends mais vous savez bien que ce n’est pas possible, Madame Salamin.", "next_id": "11", "target_node_id": "C1_S1_I11", "edge_id": "C1_S1_I9_R3_>C1_S1_I11", "Authenticity": -3, "Respect": 0, "Compassion": 0, "Hope": 2, "Empathy": 0}, {"text": "Soyez raisonnable Madame Salamin, votre état de santé ne le permet pas.", "next_id": "10", "target_node_id": "C1_S1_I10", "edge_id": "C1_S1_I9_R4_>C1_S1_I10", "Authenticity": -4, "Respect": 0, "Compassion": -4, "Hope": 0, "Empathy": 0}]}, "10": {"node_id": "C1_S1_I10", "actor": "Agathe", "text": "Agathe se met en colère, son visage est rouge, son menton et ses mains tremblent, elle est démunie face à l’attitude de l’infirmière. Elle est prête à crier. !", "responses": [{"text": "Ne vous mettez pas dans cet état… calmez-vous Madame Salamin.", "next_id": "21", "target_node_id": "C1_S1_I21", "edge_id": "C1_S1_I10_R0_>C1_S1_I21", "Authenticity": -5, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": -5}, {"text": "Madame Salamin, veuillez m’excuser, j’oublie à quel point il peut être difficile de quitter son domicile et se retrouver ici sans repère!", "next_id": "11", "target_node_id": "C1_S1_I11", "edge_id": "C1_S1_I10_R1_>C1_S1_I11", "Authenticity": 1, "Respect": 0, "Compassion": 1, "Hope": 0, "Empathy": 0}, {"text": "Je vais appeler mon infirmier chef afin qu’il vous donne des informations sur votre situation.", "next_id": "21", "target_node_id": "C1_S1_I21", "edge_id": "C1_S1_I10_R2_>C1_S1_I21", "Authenticity": -5, "Respect": 0, "Compassion": -5, "Hope": 0, "Empathy": -2}]}, "21": {"node_id": "C1_S1_I21", "actor": "Agathe", "text": "...", "responses": [{"text": "Sortir", "next_id": "-1", "target_node_id": "", "edge_id": "", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "11": {"node_id": "C1_S1_I11", "actor": "Agathe", "text": "Je suis perdue ici.", "responses": [{"text": "Comment cela perdue ? Qu’est-ce qui a changé par rapport à chez vous ?", "next_id": "12", "target_node_id": "C1_S1_I12", "edge_id": "C1_S1_I11_R0_>C1_S1_I12", "Authenticity": 1, "Respect": 1, "Compassion": 1, "Hope": 0, "Empathy": 0}, {"text": "Perdue.", "next_id": "12", "target_node_id": "C1_S1_I12", "edge_id": "C1_S1_I11_R1_>C1_S1_I12", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Dans une semaine vous aurez de nouveaux repères.", "next_id": "12", "target_node_id": "C1_S1_I12", "edge_id": "C1_S1_I11_R2_>C1_S1_I12", "Authenticity": 1, "Respect": 0, "Compassion": 1, "Hope": 0, "Empathy": 0}, {"text": "Il y a des gens bien plus perdus que vous ici ! Sortir de la pièce", "next_id": "20", "target_node_id": "C1_S1_I20", "edge_id": "C1_S1_I11_R3_>C1_S1_I20", "Authenticity": -2, "Respect": 0, "Compassion": -2, "Hope": 0, "Empathy": -2}]}, "12": {"node_id": "C1_S1_I12", "actor": "Agathe", "text": "J’avais mes habitudes, mes voisins, mon jardin ! Qu’est-ce que je vais devenir ? J’avais dit à mes enfants ! Me mettez pas au home ! Pas dans un home ! J’ai pas envie de mourir ici. Ils m’ont trahie.", "responses": [{"text": "Et si on parlait un tout petit peu de votre jardin, de vos voisins. Si je comprends bien vous aviez une maison.", "next_id": "13", "target_node_id": "C1_S1_I13", "edge_id": "C1_S1_I12_R0_>C1_S1_I13", "Authenticity": 1, "Respect": 0, "Compassion": 1, "Hope": 0, "Empathy": 0}, {"text": "Je suis sûre que vous allez faire la paix avec vos enfants.", "next_id": "13", "target_node_id": "C1_S1_I13", "edge_id": "C1_S1_I12_R1_>C1_S1_I13", "Authenticity": -2, "Respect": 0, "Compassion": -2, "Hope": 0, "Empathy": 0}, {"text": "... Il me semble qu’il y a plein de choses importantes pour vous. Qu’est-ce qui vous touche le plus ?", "next_id": "13", "target_node_id": "C1_S1_I13", "edge_id": "C1_S1_I12_R2_>C1_S1_I13", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 1, "Empathy": 0}, {"text": "Vos enfants vous ont trahie ! Comme je suis triste pour vous.", "next_id": "13", "target_node_id": "C1_S1_I13", "edge_id": "C1_S1_I12_R3_>C1_S1_I13", "Authenticity": 0, "Respect": 0, "Compassion": 1, "Hope": 0, "Empathy": 1}, {"text": "Et bien vous tombez bien. Il y a un très beau jardin ici et vous aurez, rassurez-vous, plein de nouveaux voisins.", "next_id": "13", "target_node_id": "C1_S1_I13", "edge_id": "C1_S1_I12_R4_>C1_S1_I13", "Authenticity": -2, "Respect": 0, "Compassion": -3, "Hope": 0, "Empathy": -3}]}, "13": {"node_id": "C1_S1_I13", "actor": "Agathe", "text": "Agathe pleure.", "responses": [{"text": "Nous ferons tout pour que vous soyez bien ici.", "next_id": "15", "target_node_id": "C1_S1_I15", "edge_id": "C1_S1_I13_R0_>C1_S1_I15", "Authenticity": 1, "Respect": 0, "Compassion": 1, "Hope": 0, "Empathy": 0}, {"text": "Il me semble que vous êtes triste. Votre tristesse me touche.", "next_id": "15", "target_node_id": "C1_S1_I15", "edge_id": "C1_S1_I13_R1_>C1_S1_I15", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Ça va aller !", "next_id": "15", "target_node_id": "C1_S1_I15", "edge_id": "C1_S1_I13_R2_>C1_S1_I15", "Authenticity": -4, "Respect": 1, "Compassion": 0, "Hope": -4, "Empathy": 0}, {"text": "Je m’approche d’elle et lui passe mon bras sur ses épaules. Je suis tentée de lui caresser la joue.", "next_id": "13", "target_node_id": "C1_S1_I13", "edge_id": "C1_S1_I13_R3_>C1_S1_I13", "Authenticity": 1, "Respect": 0, "Compassion": 2, "Hope": 0, "Empathy": 2}]}, "15": {"node_id": "C1_S1_I15", "actor": "Agathe", "text": "Agathe soupire. Comment des enfants peuvent trahir leur maman ?", "responses": [{"text": "Je vous entends soupirer ! Qu’est-ce qu’il veut dire ce soupir ?", "next_id": "16", "target_node_id": "C1_S1_I16", "edge_id": "C1_S1_I15_R0_>C1_S1_I16", "Authenticity": -3, "Respect": 0, "Compassion": -3, "Hope": 0, "Empathy": -2}, {"text": "Ils voulaient sûrement votre bien !", "next_id": "16", "target_node_id": "C1_S1_I16", "edge_id": "C1_S1_I15_R1_>C1_S1_I16", "Authenticity": -1, "Respect": 0, "Compassion": -4, "Hope": 0, "Empathy": -4}, {"text": "Vous vous sentez trahie par vos enfants ?", "next_id": "16", "target_node_id": "C1_S1_I16", "edge_id": "C1_S1_I15_R2_>C1_S1_I16", "Authenticity": -5, "Respect": 0, "Compassion": -5, "Hope": 0, "Empathy": -5}, {"text": "Probablement n’avaient-ils pas d’autres solutions !", "next_id": "16", "target_node_id": "C1_S1_I16", "edge_id": "C1_S1_I15_R3_>C1_S1_I16", "Authenticity": -3, "Respect": -3, "Compassion": -3, "Hope": 0, "Empathy": 0}, {"text": "Trahir, vous ne pensez pas que vous exagérez un peu ?", "next_id": "16", "target_node_id": "C1_S1_I16", "edge_id": "C1_S1_I15_R4_>C1_S1_I16", "Authenticity": -5, "Respect": 0, "Compassion": -5, "Hope": 0, "Empathy": -5}]}, "16": {"node_id": "C1_S1_I16", "actor": "Agathe", "text": "Agathe ne répond pas.", "responses": [{"text": "Est-ce que je peux vous faire votre injection d’insuline maintenant ?", "next_id": "20", "target_node_id": "C1_S1_I20", "edge_id": "C1_S1_I16_R0_>C1_S1_I20", "Authenticity": 1, "Respect": 0, "Compassion": 1, "Hope": 0, "Empathy": 0}, {"text": "Si votre fille était là qu’est-ce qu’elle dirait de cette situation ?", "next_id": "17", "target_node_id": "C1_S1_I17", "edge_id": "C1_S1_I16_R1_>C1_S1_I17", "Authenticity": -2, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": -2}, {"text": "Vous ne dîtes rien ! C’est difficile pour moi !", "next_id": "19", "target_node_id": "C1_S1_I19", "edge_id": "C1_S1_I16_R2_>C1_S1_I19", "Authenticity": 2, "Respect": 0, "Compassion": 1, "Hope": 0, "Empathy": 0}, {"text": "Bon et bien je propose de vous faire votre injection d’insuline afin de respecter l’horaire établi et permettre à ma collègue de vous apporter votre petit-déjeuner. ", "next_id": "22", "target_node_id": "C1_S1_I22", "edge_id": "C1_S1_I16_R3_>C1_S1_I22", "Authenticity": 1, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 1}]}, "20": {"node_id": "C1_S1_I20", "actor": "Agathe", "text": "Agathe acquiesse.", "responses": [{"text": "Je lui administre l’insuline. Je reviendrai dans la matinée pour changer votre pansement. Nous pourrions alors envisager de nous voir un moment pour reprendre notre conversation. À tantôt !", "next_id": "-1", "target_node_id": "", "edge_id": "", "Authenticity": 0, "Respect": 1, "Compassion": 0, "Hope": 0, "Empathy": 1}, {"text": "Je lui administre l’insuline. Au revoir !", "next_id": "-1", "target_node_id": "", "edge_id": "", "Authenticity": 0, "Respect": 1, "Compassion": 0, "Hope": -2, "Empathy": 0}, {"text": "Je lui administre l’insuline et respecte son silence", "next_id": "-1", "target_node_id": "", "edge_id": "", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": -2, "Empathy": 0}]}, "17": {"node_id": "C1_S1_I17", "actor": "Agathe", "text": "Ma fille, elle a sa vie…", "responses": [{"text": "Vous aussi vous avez votre vie !", "next_id": "18", "target_node_id": "C1_S1_I18", "edge_id": "C1_S1_I17_R0_>C1_S1_I18", "Authenticity": 1, "Respect": 0, "Compassion": 1, "Hope": 0, "Empathy": 0}, {"text": "Oui elle a sa vie !", "next_id": "19", "target_node_id": "C1_S1_I19", "edge_id": "C1_S1_I17_R1_>C1_S1_I19", "Authenticity": 1, "Respect": 0, "Compassion": 1, "Hope": 0, "Empathy": 0}, {"text": "Vous restez silencieux", "next_id": "19", "target_node_id": "C1_S1_I19", "edge_id": "C1_S1_I17_R2_>C1_S1_I19", "Authenticity": -2, "Respect": 0, "Compassion": 0, "Hope": -2, "Empathy": 0}]}, "18": {"node_id": "C1_S1_I18", "actor": "Agathe", "text": "Agathe acquiesse.", "responses": [{"text": "Est-ce que je peux vous faire votre injection d’insuline maintenant ?", "next_id": "20", "target_node_id": "C1_S1_I20", "edge_id": "C1_S1_I18_R0_>C1_S1_I20", "Authenticity": 1, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 1}, {"text": "Il est important que je fasse votre injection d’insuline maintenant.", "next_id": "20", "target_node_id": "C1_S1_I20", "edge_id": "C1_S1_I18_R1_>C1_S1_I20", "Authenticity": 0, "Respect": 1, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "19": {"node_id": "C1_S1_I19", "actor": "Agathe", "text": "Agathe reste dans son silence.", "responses": [{"text": "Est-ce que je peux vous faire votre injection d’insuline maintenant ?", "next_id": "20", "target_node_id": "C1_S1_I20", "edge_id": "C1_S1_I19_R0_>C1_S1_I20", "Authenticity": 1, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 1}, {"text": "Il est important que je fasse votre injection d’insuline maintenant.", "next_id": "20", "target_node_id": "C1_S1_I20", "edge_id": "C1_S1_I19_R1_>C1_S1_I20", "Authenticity": 0, "Respect": 0, "Compassion": 1, "Hope": 0, "Empathy": 0}]}, "22": {"node_id": "C1_S1_I22", "actor": "Agathe", "text": "...", "responses": [{"text": "Je fais l'injection et je sors.", "next_id": "-1", "target_node_id": "", "edge_id": "", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "2": {"node_id": "C1_S1_I2", "actor": "Agathe", "text": "On ne vous a jamais appris à frapper !", "responses": [{"text": "Pardonnez-moi.", "next_id": "4", "target_node_id": "C1_S1_I4", "edge_id": "C1_S1_I2_R0_>C1_S1_I4", "Authenticity": -2, "Respect": -2, "Compassion": 0, "Hope": -2, "Empathy": -2}, {"text": "Je ne voulais pas vous déranger !", "next_id": "4", "target_node_id": "C1_S1_I4", "edge_id": "C1_S1_I2_R1_>C1_S1_I4", "Authenticity": -3, "Respect": 0, "Compassion": -3, "Hope": 0, "Empathy": 0}]}, "14": {"node_id": "C1_S1_I14", "actor": "Agathe", "text": "Mais qu’est-ce qui vous prends ? Je vous interdis de me toucher !", "responses": [{"text": "Excusez-moi Agathe ! Je pensais vous réconforter.", "next_id": "15", "target_node_id": "C1_S1_I15", "edge_id": "C1_S1_I14_R0_>C1_S1_I15", "Authenticity": -1, "Respect": 0, "Compassion": -1, "Hope": 0, "Empathy": -3}, {"text": "Si vous ne voulez pas que je vous console, je reviendrai plus tard. Il est mieux que je vous laisse un moment seule. Je sors de la pièce", "next_id": "20", "target_node_id": "C1_S1_I20", "edge_id": "C1_S1_I14_R1_>C1_S1_I20", "Authenticity": -1, "Respect": 0, "Compassion": -3, "Hope": 0, "Empathy": 0}]}}}, {"title": "Vite fait bien fait", "scene_id": 2, "scene_intro": "Pascal interpelle Claude à sa sortie de la chambre d’Agathe.\r\n- Pascal : Écoute Claude, ça fait maintenant plus de vingt minutes que tu es rentrée dans la chambre 14. Tout ça pour des présentations. Je te rappelle que tu as beaucoup de choses à faire aujourd’hui ! On va pas s’en sortir, si tu continues comme ça ! C’est pas possible. J’ai besoin que tu travailles plus rapidement.\r\n ", "nodes": [{"id": "C1_S2_I1", "label": "Écoute Claude", "title": "[Pascal] J’ai besoin que tu travailles plus rapidement."}, {"id": "C1_S2_I2", "label": "Bon, tâche", "title": "[Pascal] Bon, tâche à l’avenir de le faire plus rapidement."}, {"id": "C1_S2_I3", "label": "Je n’ai pas que ça à faire", "title": "[Pascal] Je n’ai pas que ça à faire. Agis plus et parle moins s’il te plaît. Si cette dame a besoin de parler appelle l’animatrice."}, {"id": "C1_S2_I4", "label": "Merci Claude !", "title": "[Pascal] Merci Claude ! À l’avenir, il te faudra travailler à la fois vite et bien. Nous nous verrons tout à l’heure."}, {"id": "C1_S2_I5", "label": "Si tu continues", "title": "[Pascal] Si tu continues à contester mon autorité. Je ne pourrai plus travailler avec toi. Réfléchis bien la prochaine fois que tu auras envie de me répondre non…"}, {"id": "C1_S2_I6", "label": "Ça peut arriver", "title": "[Pascal] Ça peut arriver ! À l’avenir, Il te faudra travailler à la fois vite et bien. Nous nous verrons tout à l’heure."}], "edges": [{"id": "C1_S2_I1_R0_>C1_S2_I2", "from": "C1_S2_I1", "to": "C1_S2_I2", "smooth": {"type": "curvedCW", "roundness": -0.59}}, {"id": "C1_S2_I1_R1_>C1_S2_I2", "from": "C1_S2_I1", "to": "C1_S2_I2", "smooth": {"type": "curvedCW", "roundness": -0.19666666666666666}}, {"id": "C1_S2_I1_R2_>C1_S2_I6", "from": "C1_S2_I1", "to": "C1_S2_I6", "smooth": {"type": "curvedCW", "roundness": 0.19666666666666666}}, {"id": "C1_S2_I1_R3_>C1_S2_I2", "from": "C1_S2_I1", "to": "C1_S2_I2", "smooth": {"type": "curvedCW", "roundness": 0.59}}, {"id": "C1_S2_I2_R0_>C1_S2_I3", "from": "C1_S2_I2", "to": "C1_S2_I3", "smooth": {"type": "curvedCW", "roundness": -0.59}}, {"id": "C1_S2_I2_R1_>C1_S2_I3", "from": "C1_S2_I2", "to": "C1_S2_I3", "smooth": {"type": "curvedCW", "roundness": -0.19666666666666666}}, {"id": "C1_S2_I2_R2_>C1_S2_I4", "from": "C1_S2_I2", "to": "C1_S2_I4", "smooth": {"type": "curvedCW", "roundness": 0.19666666666666666}}, {"id": "C1_S2_I2_R3_>C1_S2_I5", "from": "C1_S2_I2", "to": "C1_S2_I5", "smooth": {"type": "curvedCW", "roundness": 0.59}}], "editor": "<div class=\"block\" data-interaction-id=\"1\"><div class=\"header\">Interaction 1 — Pascal</div><label>EG-4 : Name</label><textarea class=\"edit\" data-type=\"name\" data-i=\"0\" rows=\"1\">Écoute Claude</textarea><label>EG-4 : Text</label><textarea class=\"edit\" data-type=\"text\" data-i=\"0\" rows=\"3\">J’ai besoin que tu travailles plus rapidement.</textarea><div class=\"resp\"><label>Réponse 1 — Text</label><textarea class=\"edit\" data-type=\"response\" data-i=\"0\" data-r=\"0\" rows=\"2\">Que se passe-t-il Pascal ? C’est bien la première fois que tu te permets une remarque sur le temps que je passe avec un résident. Pourtant toi qui es infirmier, tu sais bien que prendre du temps pour se présenter et accueillir un résident permet une meilleure relation de soin.</textarea><div class=\"scores\"><label>Authenticity</label><input type=\"number\" class=\"score\" data-i=\"0\" data-r=\"0\" data-skill=\"Authenticity\" value=\"0\" min=\"-3\" max=\"3\"><label>Respect</label><input type=\"number\" class=\"score\" data-i=\"0\" data-r=\"0\" data-skill=\"Respect\" value=\"0\" min=\"-3\" max=\"3\"><label>Compassion</label><input type=\"number\" class=\"score\" data-i=\"0\" data-r=\"0\" data-skill=\"Compassion\" value=\"0\" min=\"-3\" max=\"3\"><label>Hope</label><input type=\"number\" class=\"score\" data-i=\"0\" data-r=\"0\" data-skill=\"Hope\" value=\"0\" min=\"-3\" max=\"3\"><label>Empathy</label><input type=\"number\" class=\"score\" data-i=\"0\" data-r=\"0\" data-skill=\"Empathy\" value=\"0\" min=\"-3\" max=\"3\"></div></div><div class=\"resp\"><label>Réponse 2 — Text</label><textarea class=\"edit\" data-type=\"response\" data-i=\"0\" data-r=\"1\" rows=\"2\">Pascal, j’entends ton besoin de faire un maximum de tâches en un minimum de temps. Et en même temps, je suis infirmière. Je vais m’occuper de Madame Salamin. Son arrivée a été difficile. Cela fait deux jours qu’elle n’a pas dit un mot. Là, elle s’est ouverte et avait besoin de parler. L’écouter était prioritaire.</textarea><div class=\"scores\"><label>Authenticity</label><input type=\"number\" class=\"score\" data-i=\"0\" data-r=\"1\" data-skill=\"Authenticity\" value=\"0\" min=\"-3\" max=\"3\"><label>Respect</label><input type=\"number\" class=\"score\" data-i=\"0\" data-r=\"1\" data-skill=\"Respect\" value=\"0\" min=\"-3\" max=\"3\"><label>Compassion</label><input type=\"number\" class=\"score\" data-i=\"0\" data-r=\"1\" data-skill=\"Compassion\" value=\"0\" min=\"-3\" max=\"3\"><label>Hope</label><input type=\"number\" class=\"score\" data-i=\"0\" data-r=\"1\" data-skill=\"Hope\" value=\"0\" min=\"-3\" max=\"3\"><label>Empathy</label><input type=\"number\" class=\"score\" data-i=\"0\" data-r=\"1\" data-skill=\"Empathy\" value=\"0\" min=\"-3\" max=\"3\"></div></div><div class=\"resp\"><label>Réponse 3 — Text</label><textarea class=\"edit\" data-type=\"response\" data-i=\"0\" data-r=\"2\" rows=\"2\">Je serai plus attentive au temps que je prends avec Madame Salamin, la prochaine fois. Je n’ai pas vu le temps passer. Pascal, je suis étonnée par ton attitude en ce moment, il semble que tout doit être fait rapidement sans lien avec les valeurs infirmières.</textarea><div class=\"scores\"><label>Authenticity</label><input type=\"number\" class=\"score\" data-i=\"0\" data-r=\"2\" data-skill=\"Authenticity\" value=\"0\" min=\"-3\" max=\"3\"><label>Respect</label><input type=\"number\" class=\"score\" data-i=\"0\" data-r=\"2\" data-skill=\"Respect\" value=\"0\" min=\"-3\" max=\"3\"><label>Compassion</label><input type=\"number\" class=\"score\" data-i=\"0\" data-r=\"2\" data-skill=\"Compassion\" value=\"0\" min=\"-3\" max=\"3\"><label>Hope</label><input type=\"number\" class=\"score\" data-i=\"0\" data-r=\"2\" data-skill=\"Hope\" value=\"0\" min=\"-3\" max=\"3\"><label>Empathy</label><input type=\"number\" class=\"score\" data-i=\"0\" data-r=\"2\" data-skill=\"Empathy\" value=\"0\" min=\"-3\" max=\"3\"></div></div><div class=\"resp\"><label>Réponse 4 — Text</label><textarea class=\"edit\" data-type=\"response\" data-i=\"0\" data-r=\"3\" rows=\"2\">Travailler rapidement ! Mais j’ai à peine passé 10 minutes avec Madame Salamin ! Je fais mon travail du mieux que je peux, Pascal.</textarea><div class=\"scores\"><label>Authenticity</label><input type=\"number\" class=\"score\" data-i=\"0\" data-r=\"3\" data-skill=\"Authenticity\" value=\"0\" min=\"-3\" max=\"3\"><label>Respect</label><input type=\"number\" class=\"score\" data-i=\"0\" data-r=\"3\" data-skill=\"Respect\" value=\"0\" min=\"-3\" max=\"3\"><label>Compassion</label><input type=\"number\" class=\"score\" data-i=\"0\" data-r=\"3\" data-skill=\"Compassion\" value=\"0\" min=\"-3\" max=\"3\"><label>Hope</label><input type=\"number\" class=\"score\" data-i=\"0\" data-r=\"3\" data-skill=\"Hope\" value=\"0\" min=\"-3\" max=\"3\"><label>Empathy</label><input type=\"number\" class=\"score\" data-i=\"0\" data-r=\"3\" data-skill=\"Empathy\" value=\"0\" min=\"-3\" max=\"3\"></div></div></div><div class=\"block\" data-interaction-id=\"2\"><div class=\"header\">Interaction 2 — Pascal</div><label>EG-4 : Name</label><textarea class=\"edit\" data-type=\"name\" data-i=\"1\" rows=\"1\">Bon, tâche</textarea><label>EG-4 : Text</label><textarea class=\"edit\" data-type=\"text\" data-i=\"1\" rows=\"3\">Bon, tâche à l’avenir de le faire plus rapidement.</textarea><div class=\"resp\"><label>Réponse 1 — Text</label><textarea class=\"edit\" data-type=\"response\" data-i=\"1\" data-r=\"0\" rows=\"2\">Rencontrer un résident, l’écouter, comprendre ses besoins prend du temps. J’aurais l’impression de ne plus suivre mes valeurs professionnelles, si j’en faisais l’économie !</textarea><div class=\"scores\"><label>Authenticity</label><input type=\"number\" class=\"score\" data-i=\"1\" data-r=\"0\" data-skill=\"Authenticity\" value=\"0\" min=\"-3\" max=\"3\"><label>Respect</label><input type=\"number\" class=\"score\" data-i=\"1\" data-r=\"0\" data-skill=\"Respect\" value=\"0\" min=\"-3\" max=\"3\"><label>Compassion</label><input type=\"number\" class=\"score\" data-i=\"1\" data-r=\"0\" data-skill=\"Compassion\" value=\"0\" min=\"-3\" max=\"3\"><label>Hope</label><input type=\"number\" class=\"score\" data-i=\"1\" data-r=\"0\" data-skill=\"Hope\" value=\"0\" min=\"-3\" max=\"3\"> ée. J’observe une rougeur autour de la plaie, un gonflement des bordures de la plaie, je ne perçois pas d’odeur particulière.", "next_id": "30", "target_node_id": "C1_S3_I30", "edge_id": "C1_S3_I29_R0_>C1_S3_I30", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C1_S3_I30", "actor": "Agathe", "text": "...", "responses": [{"text": "La plaie est infectée. Je vais la nettoyer et faire un nouveau pansement. Suite à quoi je demanderai au médecin de venir vous voir.", "next_id": "-1", "target_node_id": "", "edge_id": "", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "C’est une petite infection. Je vais m’en occuper et demanderai au médecin de passer vous voir.", "next_id": "-1", "target_node_id": "", "edge_id": "", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Je demanderai au médecin de venir vous voir.", "next_id": "-1", "target_node_id": "", "edge_id": "", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "C’est bien ce que je pensais. C’est infecté !", "next_id": "31", "target_node_id": "C1_S3_I31", "edge_id": "C1_S3_I30_R3_>C1_S3_I31", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C1_S3_I31", "actor": "Agathe", "text": "...", "responses": [{"text": "Je nettoie la plaie et fais un nouveau pansement.", "next_id": "32", "target_node_id": "C1_S3_I32", "edge_id": "C1_S3_I31_R0_>C1_S3_I32", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C1_S3_I32", "actor": "Agathe", "text": "...", "responses": [{"text": "Je pars.", "next_id": "-1", "target_node_id": "", "edge_id": "", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C1_S3_I15", "actor": "Agathe", "text": "J’ai un petit-fils ! Mon petit-fils chéri, Xavier. Agathe baisse les yeux comme si elle regardait à l’intérieur d’elle-même, soupire, des larmes se mettent à couler le long de ses joues.", "responses": [{"text": "Je prends une chaise et m’installe à la hauteur du visage d’Agathe, je perçois sa respiration rapide et ressens son émotion.", "next_id": "16", "target_node_id": "C1_S3_I16", "edge_id": "C1_S3_I15_R0_>C1_S3_I16", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Je suis touchée par sa tristesse et en même temps je dois refaire son pansement. Je lui dis donc : Je vois que vous êtes triste et ça me touche. Je dois maintenant changer votre pansement. Est-ce que c’est le bon moment pour vous ?", "next_id": "14", "target_node_id": "C1_S3_I14", "edge_id": "C1_S3_I15_R1_>C1_S3_I14", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "J’ai l’impression qu’Agathe a besoin de rester seule. Je prends congé d’elle et lui dis que je reviendrai plus tard. ", "next_id": "32", "target_node_id": "C1_S3_I32", "edge_id": "C1_S3_I15_R2_>C1_S3_I32", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C1_S3_I16", "actor": "Agathe", "text": "Les larmes d’Agathe ne cessent de couler.", "responses": [{"text": "Il compte beaucoup pour vous.", "next_id": "17", "target_node_id": "C1_S3_I17", "edge_id": "C1_S3_I16_R0_>C1_S3_I17", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Qu’est-ce qui vous rend si triste ?", "next_id": "18", "target_node_id": "C1_S3_I18", "edge_id": "C1_S3_I16_R1_>C1_S3_I18", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Pleurez, allez-y, pleurez, laissez sortir toutes ces larmes.", "next_id": "18", "target_node_id": "C1_S3_I18", "edge_id": "C1_S3_I16_R2_>C1_S3_I18", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C1_S3_I17", "actor": "Agathe", "text": "Oui. Ça fait maintenant plus d’un mois qu’il est parti en Amérique. Et je n’ai pas de nouvelles de lui.", "responses": [ ez quel âge, Claude ?", "responses": [{"text": "J’ai 25 ans.", "next_id": "10", "target_node_id": "C1_S3_I10", "edge_id": "C1_S3_I9_R0_>C1_S3_I10", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "J’ai 25 ans et je vais changer votre pansement.", "next_id": "10", "target_node_id": "C1_S3_I10", "edge_id": "C1_S3_I9_R1_>C1_S3_I10", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C1_S3_I6", "actor": "Agathe", "text": "Mais je vous parle comme je veux. Ce n’est pas vous qui allez m’apprendre à parler.", "responses": [{"text": "Oui c’est vrai. J’ai peu d’expérience. Néanmoins j’ai besoin de respect. Et j’ai eu le sentiment que vous ne me respectiez pas. Êtes-vous d’accord qu’à l’avenir nous essayions de de nous parler de façon bienveillante toutes les deux ?<", "next_id": "7", "target_node_id": "C1_S3_I7", "edge_id": "C1_S3_I6_R0_>C1_S3_I7", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Oui vous me parlez comme vous voulez. Cependant, je vous respecte et vous demande aussi de me respecter. Est-ce que vous êtes d’accord avec ça ?<", "next_id": "7", "target_node_id": "C1_S3_I7", "edge_id": "C1_S3_I6_R1_>C1_S3_I7", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Excusez-moi Agathe. J’ai eu l’impression que vous ne me respectiez pas.", "next_id": "33", "target_node_id": "C1_S3_I33", "edge_id": "C1_S3_I6_R2_>C1_S3_I33", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Non, vous ne me parlez pas comme vous voulez. Ici il y a des règles et je vous demande de les respecter.", "next_id": "33", "target_node_id": "C1_S3_I33", "edge_id": "C1_S3_I6_R3_>C1_S3_I33", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C1_S3_I7", "actor": "Agathe", "text": "Oui ça me convient ! Laissez les « Madame » à la porte ! Je m’appelle Agathe !", "responses": [{"text": "Agathe, je viens pour la réfection de votre pansement.", "next_id": "8", "target_node_id": "C1_S3_I8", "edge_id": "C1_S3_I7_R0_>C1_S3_I8", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Agathe, il est l’heure de changer votre pansement.", "next_id": "8", "target_node_id": "C1_S3_I8", "edge_id": "C1_S3_I7_R1_>C1_S3_I8", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Agathe, montrez-moi votre pied s’il vous plaît ? Je dois changer votre pansement.", "next_id": "8", "target_node_id": "C1_S3_I8", "edge_id": "C1_S3_I7_R2_>C1_S3_I8", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Montrez-moi votre pansement s’il vous plaît ! J’ai encore beaucoup de travail à faire aujourd’hui.", "next_id": "8", "target_node_id": "C1_S3_I8", "edge_id": "C1_S3_I7_R3_>C1_S3_I8", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C1_S3_I2", "actor": "Agathe", "text": "On ne vous a jamais appris à frapper !", "responses": [{"text": "Excusez-moi, je pensais que vous dormiez.", "next_id": "4", "target_node_id": "C1_S3_I4", "edge_id": "C1_S3_I2_R0_>C1_S3_I4", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Je ne voulais pas vous déranger, Madame Salamin !", "next_id": "4", "target_node_id": "C1_S3_I4", "edge_id": "C1_S3_I2_R1_>C1_S3_I4", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C1_S3_I34", "actor": "Agathe", "text": "Agathe ne répond rien. Je lui refais son pansement puis je sors. Pascal sera content : j’ai pris peu de temps.", "responses": [{"text": "Je pars.", "next_id": "-1", "target_node_id": "", "edge_id": "", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}], "id_to_parcours": {"1": {"node_id": "C1_S3_I1", "actor": "Claude", "text": "Vous êtes devant la porte.", "responses": [{"text": "Je frappe à la porte d’Agathe.", "next_id": "3", "target_node_id": "C1_S3_I3", "edge_id": "C1_S3_I1_R0_>C1_S3_I3", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "J’entre sans frapper.", "next_id": "2", "target_node_id": "C1_S3_I2", "edge_id": "C1_S3_I1_R1_>C1_S3_I2", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "3": {"node_id": "C1_S3_I3", "actor": "Agathe", "text": "Agathe ne me dit pas d’entrer.", "responses": [{"text": "Je prends la décision d’entrer doucement.", "next_id": "4", "target_node_id": "C1_S3_I4", "edge_id": "C1_S3_I3_R0_>C1_S3_I4", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Je frappe plus fort", "next_id": "3", "target_node_id": "C1_S3_I3", "edge_id": "C1_S3_I3_R1_>C1_S3_I3", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Je reviendrai plus tard.", "next_id": "32", "target_node_id": "C1_S3_I32", "edge_id": "C1_S3_I3_R2_>C1_S3_I32", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "4": {"node_id": "C1_S3_I4", "actor": "Agathe", "text": "Agathe est dans son lit et me regarde sans dire un mot.", "responses": [{"text": "Madame Salamin, je viens pour la réfection de votre pansement", "next_id": "5", "target_node_id": "C1_S3_I5", "edge_id": "C1_S3_I4_R0_>C1_S3_I5", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Madame Salamin, il est temps de changer votre pansement...", "next_id": "5", "target_node_id": "C1_S3_I5", "edge_id": "C1_S3_I4_R1_>C1_S3_I5", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Madame Salamin, montrez-moi votre pansement...", "next_id": "5", "target_node_id": "C1_S3_I5", "edge_id": "C1_S3_I4_R2_>C1_S3_I5", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "5": {"node_id": "C1_S3_I5", "actor": "Agathe", "text": "Agathe m’interromps d’une voix vive, en me regardant.", "responses": [{"text": "Je perçois Agathe comme animée par un élan de vie, je me pose la question de savoir si son propos est une remarque et comment lui répondre, j’hésite à poursuivre, je suis sensible au ton de la voix de la résidente et dis : Pardon ?", "next_id": "33", "target_node_id": "C1_S3_I33", "edge_id": "C1_S3_I5_R0_>C1_S3_I33", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "J’ai l’impression qu’Agathe m’invective pour m’inviter à jouer avec elle. Derrière sa froideur apparente se cache peut-être une femme très sensible. Je tiens à vérifier cette hypothèse en lui demandant : Qu’est-ce que vous voulez dire par là?", "next_id": "33", "target_node_id": "C1_S3_I33", "edge_id": "C1_S3_I5_R1_>C1_S3_I33", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Je me sens dérangée par ce ton virulent. Je me dis qu’il faut préciser le cadre de notre relation et lui dis : Moi non plus je ne suis pas une aristocrate. Toutefois, j’ai besoin que vous me respectiez.", "next_id": "33", "target_node_id": "C1_S3_I33", "edge_id": "C1_S3_I5_R2_>C1_S3_I33", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Je refuse qu’elle utilise ce ton avec moi et le lui signifie ainsi : Veuillez me parler avec un autre ton. S’il vous plaît ?", "next_id": "6", "target_node_id": "C1_S3_I6", "edge_id": "C1_S3_I5_R3_>C1_S3_I6", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "33": {"node_id": "C1_S3_I33", "actor": "Agathe", "text": "Laissez les « Madame » à la porte ! Je m’appelle Agathe !", "responses": [{"text": "Agathe, je viens pour la réfection de votre pansement.", "next_id": "8", "target_node_id": "C1_S3_I8", "edge_id": "C1_S3_I33_R0_>C1_S3_I8", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Agathe, il est l’heure de changer votre pansement.", "next_id": "8", "target_node_id": "C1_S3_I8", "edge_id": "C1_S3_I33_R1_>C1_S3_I8", "Authent 1_S3_I13", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Vous avez des petits enfants ?", "next_id": "13", "target_node_id": "C1_S3_I13", "edge_id": "C1_S3_I10_R1_>C1_S3_I13", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "C’est vrai ! Vous pourriez être ma grand-mère.", "next_id": "13", "target_node_id": "C1_S3_I13", "edge_id": "C1_S3_I10_R2_>C1_S3_I13", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Ma grand-mère est morte.", "next_id": "11", "target_node_id": "C1_S3_I11", "edge_id": "C1_S3_I10_R3_>C1_S3_I11", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Agathe, je suis votre infirmière et vous êtes résidente ici.", "next_id": "12", "target_node_id": "C1_S3_I12", "edge_id": "C1_S3_I10_R4_>C1_S3_I12", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "13": {"node_id": "C1_S3_I13", "actor": "Agathe", "text": "Agathe ne répond pas. Elle baisse les yeux comme si elle regardait à l’intérieur d’elle-même.", "responses": [{"text": "Je laisse le silence s’installer et observe Agathe attentivement.", "next_id": "12", "target_node_id": "C1_S3_I12", "edge_id": "C1_S3_I13_R0_>C1_S3_I12", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Vous êtes grand-mère ?", "next_id": "15", "target_node_id": "C1_S3_I15", "edge_id": "C1_S3_I13_R1_>C1_S3_I15", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Vous avez des petits enfants ?", "next_id": "15", "target_node_id": "C1_S3_I15", "edge_id": "C1_S3_I13_R2_>C1_S3_I15", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Vous pourriez être ma grand-mère.", "next_id": "28", "target_node_id": "C1_S3_I28", "edge_id": "C1_S3_I13_R3_>C1_S3_I28", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Est-ce que je peux changer votre pansement maintenant ?", "next_id": "14", "target_node_id": "C1_S3_I14", "edge_id": "C1_S3_I13_R4_>C1_S3_I14", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "12": {"node_id": "C1_S3_I12", "actor": "Agathe", "text": "J’avais bien compris. Pouvez-vous changer mon pansement maintenant et me laisser seul ? Allez-y doucement ! Mon pied me fait mal. Ça tape !", "responses": [{"text": "Ça tape ?", "next_id": "28", "target_node_id": "C1_S3_I28", "edge_id": "C1_S3_I12_R0_>C1_S3_I28", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Ce doit être infecté.", "next_id": "28", "target_node_id": "C1_S3_I28", "edge_id": "C1_S3_I12_R1_>C1_S3_I28", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Cela m’inquiète.", "next_id": "28", "target_node_id": "C1_S3_I28", "edge_id": "C1_S3_I12_R2_>C1_S3_I28", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "28": {"node_id": "C1_S3_I28", "actor": "Agathe", "text": "Je sens mon cœur battre dedans.", "responses": [{"text": "Je vais d’abord enlever le pansement. Tout doucement.", "next_id": "29", "target_node_id": "C1_S3_I29", "edge_id": "C1_S3_I28_R0_>C1_S3_I29", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Cela arrive parfois en cas d’infection.", "next_id": "29", "target_node_id": "C1_S3_I29", "edge_id": "C1_S3_I28_R1_>C1_S3_I29", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "On va voir tout ça.", "next_id": "29", "target_node_id": "C1_S3_I29", "edge_id": "C1_S3_I28_R2_>C1_S3_I29", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "29": {"node_id": "C1_S3_I29", "actor": "Agathe", "text": "...", "responses": [{"text": "Je retire le pansement avec  le plus grand soin. La plaie du talon droit d’Agathe semble s’être infectée. J’observe une rougeur autour de la plaie, un gonflement des bordures de la plaie, je ne perçois pas d’odeur particulière.", "next_id": "30", "target_node_id": "C1_S3_I30", "edge_id": "C1_S3_I29_R0_>C1_S3_I30", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "30": {"node_id": "C1_S3_I30", "actor": "Agathe", "text": "...", "responses": [{"text": "La plaie est infectée. Je vais la nettoyer et faire un nouveau pansement. Suite à quoi je demanderai au médecin de venir vous voir.", "next_id": "-1", "target_node_id": "", "edge_id": "", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "C’est une petite infection. Je vais m’en occuper et demanderai au médecin de passer vous voir.", "next_id": "-1", "target_node_id": "", "edge_id": "", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Je demanderai au médecin de venir vous voir.", "next_id": "-1", "target_node_id": "", "edge_id": "", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "C’est bien ce que je pensais. C’est infecté !", "next_id": "31", "target_node_id": "C1_S3_I31", "edge_id": "C1_S3_I30_R3_>C1_S3_I31", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "31": {"node_id": "C1_S3_I31", "actor": "Agathe", "text": "...", "responses": [{"text": "Je nettoie la plaie et fais un nouveau pansement.", "next_id": "32", "target_node_id": "C1_S3_I32", "edge_id": "C1_S3_I31_R0_>C1_S3_I32", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "32": {"node_id": "C1_S3_I32", "actor": "Agathe", "text": "...", "responses": [{"text": "Je pars.", "next_id": "-1", "target_node_id": "", "edge_id": "", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "15": {"node_id": "C1_S3_I15", "actor": "Agathe", "text": "J’ai un petit-fils ! Mon petit-fils chéri, Xavier. Agathe baisse les yeux comme si elle regardait à l’intérieur d’elle-même, soupire, des larmes se mettent à couler le long de ses joues.", "responses": [{"text": "Je prends une chaise et m’installe à la hauteur du visage d’Agathe, je perçois sa respiration rapide et ressens son émotion.", "next_id": "16", "target_node_id": "C1_S3_I16", "edge_id": "C1_S3_I15_R0_>C1_S3_I16", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Je suis touchée par sa tristesse et en même temps je dois refaire son pansement. Je lui dis donc : Je vois que vous êtes triste et ça me touche. Je dois maintenant changer votre pansement. Est-ce que c’est le bon moment pour vous ?", "next_id": "14", "target_node_id": "C1_S3_I14", "edge_id": "C1_S3_I15_R1_>C1_S3_I14", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "J’ai l’impression qu’Agathe a besoin de rester seule. Je prends congé d’elle et lui dis que je reviendrai plus tard. ", "next_id": "32", "target_node_id": "C1_S3_I32", "edge_id": "C1_S3_I15_R2_>C1_S3_I32", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "16": {"node_id": "C1_S3_I16", "actor": "Agathe", "text": "Les larmes d’Agathe ne cessent de couler.", "responses": [{"text": "Il compte beaucoup pour vous.", "next_id": "17", "target_node_id": "C1_S3_I17", "edge_id": "C1_S3_I16_R0_>C1_S3_I17", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Qu’est-ce qui vous rend si triste ?", "next_id": "18", "target_node_id": "C1_S3_I18", "edge_id": "C1_S3_I16_R1_>C1_S3_I18", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Pleurez, allez-y, pleurez, laissez sortir toutes ces larmes.", "next_id": "18", "target_node_id": "C1_S3_I18", "edge_id": "C1_S3_I16_R2_>C1_S3_I18", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "17": {"node_id": "C1_S3_I17", "actor": "Agathe", "text": "Oui. Ça fait maintenant plus d’un mois qu’il est parti en Amérique. Et je n’ai pas de nouvelles de lui.", "responses": [{"text": "Vous êtes sans nouvelles de lu 25", "edge_id": "C1_S3_I24_R2_>C1_S3_I25", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "25": {"node_id": "C1_S3_I25", "actor": "Agathe", "text": "Ils n’avaient pas le droit de m’abandonner.", "responses": [{"text": "De vous abandonner. Que pensez-vous que vos enfants diraient de votre situation ?", "next_id": "27", "target_node_id": "C1_S3_I27", "edge_id": "C1_S3_I25_R0_>C1_S3_I27", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Qu’est-ce que vous auriez fait à leur place ?", "next_id": "27", "target_node_id": "C1_S3_I27", "edge_id": "C1_S3_I25_R1_>C1_S3_I27", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "27": {"node_id": "C1_S3_I27", "actor": "Agathe", "text": "Agathe ne répond pas. Elle semble plus calme dans l’observation de sa respiration, de son soupir et des traits détendus de son visage. J’écoute son silence.", "responses": [{"text": "Je dois maintenant changer votre pansement. Est-ce que c’est le bon moment pour vous ?", "next_id": "14", "target_node_id": "C1_S3_I14", "edge_id": "C1_S3_I27_R0_>C1_S3_I14", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Je dois maintenant changer votre pansement.", "next_id": "14", "target_node_id": "C1_S3_I14", "edge_id": "C1_S3_I27_R1_>C1_S3_I14", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Montrez-moi ce talon s’il vous plaît.", "next_id": "14", "target_node_id": "C1_S3_I14", "edge_id": "C1_S3_I27_R2_>C1_S3_I14", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "14": {"node_id": "C1_S3_I14", "actor": "Agathe", "text": "Allez-y doucement ! Mon pied me fait mal. Ça tape !", "responses": [{"text": "Ça tape ?", "next_id": "28", "target_node_id": "C1_S3_I28", "edge_id": "C1_S3_I14_R0_>C1_S3_I28", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Ce doit être infecté.", "next_id": "         ia.responses.forEach(function(r, i) {
            var label = (r.text || "").length > 80 ? (r.text || "").substring(0, 80) + "…" : (r.text || "→ I" + r.next_id);
            html += '<button class="parcours-choice" data-next="' + r.next_id + '" data-target="' + esc(r.target_node_id || "") + '" data-edge="' + esc(r.edge_id || "") + '" data-auth="' + (r.Authenticity||0) + '" data-respect="' + (r.Respect||0) + '" data-compassion="' + (r.Compassion||0) + '" data-hope="' + (r.Hope||0) + '" data-empathy="' + (r.Empathy||0) + '">' + esc(label) + '</button>';
        });
    } else {
        html += '<div class="parcours-end">Fin de cette branche.</div>';
    }
    html += '</div>';
    document.getElementById("parcours-content").innerHTML = html;
    document.getElementById("parcours-restart").style.display = parcoursPath.nodes.length > 0 ? "block" : "none";
    document.querySelectorAll(".parcours-choice").forEach(function(btn) {
        btn.addEventListener("click", function() {
            parcoursScores.Authenticity += parseInt(this.dataset.auth) || 0;
            parcoursScores.Respect += parseInt(this.dataset.respect) || 0;
            parcoursScores.Compassion += parseInt(this.dataset.compassion) || 0;
            parcoursScores.Hope += parseInt(this.dataset.hope) || 0;
            parcoursScores.Empathy += parseInt(this.dataset.empathy) || 0;
            var nextId = this.dataset.next;
            var edgeId = this.dataset.edge;
            if (parcoursCurrent && parcoursCurrent.node_id) parcoursPath.nodes.push(parcoursCurrent.node_id);
            if (edgeId) parcoursPath.edges.push(edgeId);
            parcoursCurrent = s.id_to_parcours && nextId !== "-1" && nextId !== "" ? s.id_to_parcours[nextId] : null;
            if (parcoursCurrent) parcoursPath.nodes.push(parcoursCurrent.node_id);
            renderParcours(s);
            highlightPath();
        });
    });
}

function highlightPath() {
    try {
        if (!nodesDS || !edgesDS) return;
        var pathNodes = parcoursPath.nodes || [];
        var pathEdges = parcoursPath.edges || [];
        var curNode = parcoursCurrent ? parcoursCurrent.node_id : null;
        nodesDS.getIds().forEach(function(nid) {
            var inPath = pathNodes.indexOf(nid) >= 0;
            var isCurrent = curNode === nid;
            nodesDS.update({ id: nid, color: { background: inPath ? "#166534" : "#27272a", border: isCurrent ? "#fbbf24" : (inPath ? "#22c55e" : "#38bdf8") } });
        });
        edgesDS.getIds().forEach(function(eid) {
            var inPath = pathEdges.indexOf(eid) >= 0;
            edgesDS.update({ id: eid, color: inPath ? "#22c55e" : "#3f3f46" });
        });
    } catch (err) { console.warn("highlightPath:", err); }
}

function showScene(idx) {
    currentSceneIdx = idx;
    document.querySelectorAll(".scene-btn").forEach(function(b) {
        b.classList.toggle("active", parseInt(b.dataset.idx) === idx);
    });
    var s = scenesData[idx];
    document.getElementById("ed-title").textContent = s.title;
    var introHtml = '<div class="scene-intro"><label>EG-4 : SceneIntroduction</label><textarea class="edit" data-type="intro" rows="3">' + (s.scene_intro || '').replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;") + '</textarea></div>';
    document.getElementById("ed-content").innerHTML = introHtml + s.editor;

    var opts = {
        nodes: { font: { size: 18, color: "#fafafa", face: "system-ui, -apple-system, sans-serif" }, shape: "box", color: { background: "#27272a", border: "#38bdf8" }, margin: 20, borderWidth: 2, widthConstraint: { minimum: 160, maximum: 280 } },
        edges: { arrows: "to", width: 2, color: "#3f3f46", font: { color: "#94a3b8", size: 12, face: "system-ui, sans-serif" } },
        layout: { hierarchical: { enabled: true, direction: "UD", sortMethod: "directed", levelSeparation: 380, nodeSpacing: 420, treeSpacing: 380, blockShifting: true, edgeMinimization: true } },
        physics: { enabled: false },
        interaction: { zoomView: true, dragView: true }
    };

    if (nodesDS && edgesDS) {
        nodesDS.clear();
        edgesDS.clear();
        s.nodes.forEach(function(n) { nodesDS.add(n); });
        s.edges.forEach(function(e) { edgesDS.add(e); });
        setTimeout(function() { if (network) network.fit({ animation: { duration: 300 }, scale: 1.3 }); }, 200);
    } else {
        nodesDS = new vis.DataSet(s.nodes);
        edgesDS = new vis.DataSet(s.edges);
        network = new vis.Network(container, { nodes: nodesDS, edges: edgesDS }, opts);
        network.once("afterDrawing", function() { network.fit({ animation: { duration: 400 }, scale: 1.3 }); });
        setTimeout(function() { if (network) { network.redraw(); network.fit({ scale: 1.3 }); } }, 300);
        network.on("click", function(params) {
            if (params.nodes && params.nodes.length > 0) {
                var nid = String(params.nodes[0]);
                var m = nid.match(/_I(\d+)$/);
                if (m) {
                    var block = document.querySelector('.block[data-interaction-id="' + m[1] + '"]');
                    if (block) block.scrollIntoView({ behavior: "smooth" });
                }
            }
        });
    }

    attachEditors(idx);
    updateValidation();
    if (document.getElementById("panel-parcours").classList.contains("active")) {
        parcoursPath = { nodes: [], edges: [] };
        parcoursCurrent = null;
        showParcoursScene(idx);
    } else {
        highlightPath();
    }
}

function escapeHtml(s) {
    if (!s) return '';
    return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function attachEditors(idx) {
    var ch = chaptersData.Chapters[0];
    var sc = ch.Scenes[idx];
    document.querySelectorAll("#ed-content .edit").forEach(function(el) {
        el.addEventListener("input", function() {
            var type = this.dataset.type;
            var i = parseInt(this.dataset.i);
            if (type === "intro") {
                sc.SceneIntroduction = this.value;
            } else if (type === "name") {
                sc.Interactions[i].Name = this.value;
            } else if (type === "text") {
                sc.Interactions[i].Text = this.value;
                sc.Interactions[i].Name = this.value.substring(0, 50);
            } else if (type === "response") {
                var r = parseInt(this.dataset.r);
                sc.Interactions[i].Responses[r].Text = this.value;
                sc.Interactions[i].Responses[r].Name = this.value.substring(0, 80);
            }
        });
    });
    document.querySelectorAll("#ed-content .score").forEach(function(el) {
        el.addEventListener("change", function() {
            var i = parseInt(this.dataset.i), r = parseInt(this.dataset.r), skill = this.dataset.skill;
            var v = parseInt(this.value) || 0;
            if (v < -3) v = -3;
            if (v > 3) v = 3;
            sc.Interactions[i].Responses[r][skill] = v;
        });
    });
}

function updateValidation() {
    var errs = [];
    var ch = chaptersData.Chapters[0];
    ch.Scenes.forEach(function(sc) {
        var ids = {};
        sc.Interactions.forEach(function(ia) { ids[ia.Id] = true; });
        sc.Interactions.forEach(function(ia) {
            (ia.Responses || []).forEach(function(r) {
                var nid = r.NextInteractionID;
                if (nid != null && nid !== -1 && !ids[nid]) errs.push("EG-7: NextInteractionID " + nid + " invalide (scène " + sc.Title + ")");
            });
        });
    });
    var div = document.getElementById("validation");
    if (errs.length > 0) {
        div.className = "validation";
        div.textContent = errs.join(" ; ");
    } else {
        div.className = "validation ok";
        div.textContent = "EG-7 : Validation OK — NextInteractionID valides.";
    }
}

document.querySelectorAll(".scene-btn").forEach(function(b) {
    b.addEventListener("click", function() { showScene(parseInt(this.dataset.idx)); });
});

document.querySelectorAll(".mode-btn").forEach(function(b) {
    b.addEventListener("click", function() { setMode(this.dataset.mode); });
});

document.getElementById("parcours-restart").addEventListener("click", function() {
    if (scenesData.length > 0) showParcoursScene(currentSceneIdx);
});

document.getElementById("search").addEventListener("input", function() {
    var q = (this.value || "").toLowerCase();
    document.querySelectorAll(".scene-btn").forEach(function(b) {
        b.style.display = q && b.textContent.toLowerCase().indexOf(q) < 0 ? "none" : "block";
    });
    if (scenesData && scenesData.length > 0) {
        var vis = (this.value || "").toLowerCase();
        if (vis && nodesDS && edgesDS) {
            var nodeIds = nodesDS.getIds();
            nodeIds.forEach(function(nid) {
                var node = nodesDS.get(nid);
                var match = (node.label && node.label.toLowerCase().indexOf(vis) >= 0) || (node.title && node.title.toLowerCase().indexOf(vis) >= 0);
                nodesDS.update({ id: nid, hidden: !match });
            });
        } else if (nodesDS) {
            nodesDS.getIds().forEach(function(nid) { nodesDS.update({ id: nid, hidden: false }); });
        }
    }
});

document.getElementById("save-btn").addEventListener("click", function() {
    var btn = this;
    var statusEl = document.getElementById("save-status");
    btn.disabled = true;
    statusEl.className = "";
    statusEl.textContent = "Enregistrement…";
    fetch("/api/save", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(chaptersData)
    }).then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
    .then(function(result) {
        btn.disabled = false;
        if (result.ok) {
            statusEl.className = "save-ok";
            statusEl.textContent = result.data.message || "Sauvegardé.";
        } else {
            statusEl.className = "save-err";
            statusEl.textContent = result.data.error || "Erreur. Utilisez python app.py pour activer la sauvegarde directe.";
        }
    }).catch(function(err) {
        btn.disabled = false;
        statusEl.className = "save-err";
        statusEl.textContent = "Erreur réseau. Lancez python app.py puis ouvrez http://localhost:8765";
    });
});

document.getElementById("export-btn").addEventListener("click", function() {
    var blob = new Blob([JSON.stringify(chaptersData, null, 2)], { type: "application/json" });
    var a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "Chapitre_" + chapterId + "_modified.json";
    a.click();
});

function init() {
    if (typeof vis === "undefined") {
        container.innerHTML = "<p style='color:#ef4444;padding:20px'>vis-network non chargé. Vérifiez votre connexion et rechargez.</p>";
        return;
    }
    if (scenesData && scenesData.length > 0) {
        try { showScene(0); } catch (err) {
            console.error("showScene:", err);
            container.innerHTML = "<p style='color:#ef4444;padding:20px'>Erreur: " + String(err.message || err) + "</p>";
        }
    } else {
        document.getElementById("ed-content").innerHTML = "<div class='empty'>Aucune donnée (erreur de chargement?).</div>";
    }
}
function runInit() {
    if (typeof vis !== "undefined") { init(); return; }
    var n = 0;
    var t = setInterval(function() {
        n++;
        if (typeof vis !== "undefined") { clearInterval(t); init(); }
        else if (n > 60) { clearInterval(t); container.innerHTML = "<p style='color:#ef4444;padding:20px'>vis-network timeout.</p>"; }
    }, 100);
}
window.addEventListener("load", function() { setTimeout(runInit, 80); });
</script>
</body>
</html>
