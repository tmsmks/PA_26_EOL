-i=\"33\" rows=\"3\">Il est très occupé, je ne voudrais pas qu’il s’inquiète inutilement.</textarea><div class=\"resp\"><label>Réponse 1 — Text</label><textarea class=\"edit\" data-type=\"response\" data-i=\"33\" data-r=\"0\" rows=\"2\">Je avec la même présence :''Et qu’en est-il de sa maman, votre fille ?''</textarea><div class=\"scores\"><div class=\"score-item\"><label>RespectAndDignity</label><input type=\"number\" class=\"score\" data-i=\"33\" data-r=\"0\" data-skill=\"RespectAndDignity\" value=\"0\" min=\"-3\" max=\"3\"></div><div class=\"score-item\"><label>Empathy</label><input type=\"number\" class=\"score\" data-i=\"33\" data-r=\"0\" data-skill=\"Empathy\" value=\"0\" min=\"-3\" max=\"3\"></div><div class=\"score-item\"><label>Compassion</label><input type=\"number\" class=\"score\" data-i=\"33\" data-r=\"0\" data-skill=\"Compassion\" value=\"0\" min=\"-3\" max=\"3\"></div><div class=\"score-item\"><label>EmotionalRegulation</label><input type=\"number\" class=\"score\" data-i=\"33\" data-r=\"0\" data-skill=\"EmotionalRegulation\" value=\"0\" min=\"-3\" max=\"3\"></div><div class=\"score-item\"><label>CommunicationClarity</label><input type=\"number\" class=\"score\" data-i=\"33\" data-r=\"0\" data-skill=\"CommunicationClarity\" value=\"0\" min=\"-3\" max=\"3\"></div><div class=\"score-item\"><label>ProfessionalBoundaries</label><input type=\"number\" class=\"score\" data-i=\"33\" data-r=\"0\" data-skill=\"ProfessionalBoundaries\" value=\"0\" min=\"-3\" max=\"3\"></div><div class=\"score-item\"><label>InterprofessionalCollaboration</label><input type=\"number\" class=\"score\" data-i=\"33\" data-r=\"0\" data-skill=\"InterprofessionalCollaboration\" value=\"0\" min=\"-3\" max=\"3\"></div></div></div><div class=\"resp\"><label>Réponse 2 — Text</label><textarea class=\"edit\" data-type=\"response\" data-i=\"33\" data-r=\"1\" rows=\"2\">''Je dis avec tact : Il voudrait peut-être le savoir…''</textarea><div class=\"scores\"><div class=\"score-item\"><label>RespectAndDignity</label><input type=\"number\" class=\"score\" data-i=\"33\" data-r=\"1\" data-skill=\"RespectAndDignity\" value=\"0\" min=\"-3\" max=\"3\"></div><div class=\"score-item\"><label>Empathy</label><input type=\"number\" class=\"score\" data-i=\"33\" data-r=\"1\" data-skill=\"Empathy\" value=\"0\" min=\"-3\" max=\"3\"></div><div class=\"score-item\"><label>Compassion</label><input type=\"number\" class=\"score\" data-i=\"33\" data-r=\"1\" data-skill=\"Compassion\" value=\"0\" min=\"-3\" max=\"3\"></div><div class=\"score-item\"><label>EmotionalRegulation</label><input type=\"number\" class=\"score\" data-i=\"33\" data-r=\"1\" data-skill=\"EmotionalRegulation\" value=\"0\" min=\"-3\" max=\"3\"></div><div class=\"score-item\"><label>CommunicationClarity</label><input type=\"number\" class=\"score\" data-i=\"33\" data-r=\"1\" data-skill=\"CommunicationClarity\" value=\"0\" min=\"-3\" max=\"3\"></div><div class=\"score-item\"><label>ProfessionalBoundaries</label><input type=\"number\" class=\"score\" data-i=\"33\" data-r=\"1\" data-skill=\"ProfessionalBoundaries\" value=\"0\" min=\"-3\" max=\"3\"></div><div class=\"score-item\"><label>InterprofessionalCollaboration</label><input type=\"number\" class=\"score\" data-i=\"33\" data-r=\"1\" data-skill=\"InterprofessionalCollaboration\" value=\"0\" min=\"-3\" max=\"3\"></div></div></div><div class=\"resp\"><label>Réponse 3 — Text</label><textarea class=\"edit\" data-type=\"response\" data-i=\"33\" data-r=\"2\" rows=\"2\">''Il faut coopérer, je ne peux pas perdre plus de temps.''</textarea><div class=\"scores\"><div class=\"score-item\"><label>RespectAndDignity</label><input type=\"number\" class=\"score\" data-i=\"33\" data-r=\"2\" data-skill=\"RespectAndDignity\" value=\"0\" min=\"-3\" max=\"3\"></div><div class=\"score-item\"><label>Empathy</label><input type=\"number\" class=\"score\" data-i=\"33\" data-r=\"2\" data-skill=\"Empathy\" value=\"0\" min=\"-3\" max=\"3\"></div><div class=\"score-item\"><label>Compassion</label><input type=\"number\" class=\"score\" data-i=\"33\" data-r=\"2\" data-skill=\"Compassion\" value=\"-2\" min=\"-3\" max=\"3\"></div><div class=\"score-item\"><label>EmotionalRegulation</label><input type=\"number\" class=\"score\" data-i=\"33\" data-r=\"2\" data-skill=\"EmotionalRegulation\" value=\"0\" min=\"-3\" max=\"3\"></div><div class=\"score-item\"><label>CommunicationClarity</label><input type=\"number\" class=\"score\" data-i=\"33\" data-r=\"2\" data-skill=\"CommunicationClarity\" value=\"0\" min=\"-3\" max=\"3\"></div><div class=\"score-item\"><label>ProfessionalBoundaries</label><input type=\"number\" class=\"score\" data-i=\"33\" data-r=\"2\" data-skill=\"ProfessionalBoundaries\" value=\"0\" min=\"-3\" max=\"3\"></div><div class=\"score-item\"><label>InterprofessionalCollaboration</label><input type=\"number\" class=\"score\" data-i=\"33\" data-r=\"2\" data-skill=\"InterprofessionalCollaboration\" value=\"0\" min=\"-3\" max=\"3\"></div></div></div></div>", "parcours": [{"node_id": "C1_S3_I1", "actor": "Claude", "text": "''Je suis devant la porte.''", "image": "Claude_neutral.png", "responses": [{"text": "Je frappe à la porte d’Agathe.", "next_id": "3", "target_node_id": "C1_S3_I3", "edge_id": "C1_S3_I1_R0_>C1_S3_I3", "RespectAndDignity": 2, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "J’entre sans frapper pour ne pas déranger.", "next_id": "2", "target_node_id": "C1_S3_I2", "edge_id": "C1_S3_I1_R1_>C1_S3_I2", "RespectAndDignity": 2, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "J’entre rapidement, j’ai peu de temps.", "next_id": "3", "target_node_id": "C1_S3_I3", "edge_id": "C1_S3_I1_R2_>C1_S3_I3", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C1_S3_I3", "actor": "Agathe", "text": "Agathe ne me dit pas d’entrer.", "image": "Agathe_neutral.png", "responses": [{"text": "Je frappe plus fort", "next_id": "3", "target_node_id": "C1_S3_I3", "edge_id": "C1_S3_I3_R0_>C1_S3_I3", "RespectAndDignity": 2, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je reviendrai plus tard.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je prends la décision d’entrer doucement.", "next_id": "4", "target_node_id": "C1_S3_I4", "edge_id": "C1_S3_I3_R2_>C1_S3_I4", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C1_S3_I4", "actor": "Agathe", "text": "Agathe est dans son lit et me regarde sans dire un mot.", "image": "Agathe_neutral.png", "responses": [{"text": "''Je sourit à Agathe : Madame Salamin, je viens pour la réfection de votre pansement''", "next_id": "5", "target_node_id": "C1_S3_I5", "edge_id": "C1_S3_I4_R0_>C1_S3_I5", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 2, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Madame Salamin, il est temps de changer votre pansement ", "next_id": "5", "target_node_id": "C1_S3_I5", "edge_id": "C1_S3_I4_R1_>C1_S3_I5", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Bonjour, montrez-moi votre pansement''", "next_id": "5", "target_node_id": "C1_S3_I5", "edge_id": "C1_S3_I4_R2_>C1_S3_I5", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C1_S3_I5", "actor": "Agathe", "text": "''M’interromps d’une voix vive, en me regardant. Je suis pas une aristocrate moi !''", "image": "Agathe_angry.png", "responses": [{"text": "Je la regarde :''Je perçois Agathe comme animée par un élan de vie, je me pose la question de savoir si son propos est une remarque et comment lui répondre, j’hésite à poursuivre, je suis sensible au ton de la voix de la résidente et dis : Pardon ?''", "next_id": "7", "target_node_id": "C1_S3_I7", "edge_id": "C1_S3_I5_R0_>C1_S3_I7", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 1, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "J’inspire :''J’ai l’impression qu’Agathe m’invective pour m’inviter à jouer avec elle. Derrière sa froideur apparente se cache peut-être une femme très sensible. Je tiens à vérifier cette hypothèse en lui demandant : Qu’est-ce que vous voulez dire par là ?''", "next_id": "7", "target_node_id": "C1_S3_I7", "edge_id": "C1_S3_I5_R1_>C1_S3_I7", "RespectAndDignity": 0, "Empathy": 1, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 1, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je regarde un instant ailleurs :''Je me dérangée par ce ton virulent. Je me dis qu’il faut préciser le cadre de notre relation et lui dis : Moi non plus je ne suis pas une aristocrate. Toutefois, j’ai besoin que vous me respectiez.''", "next_id": "7", "target_node_id": "C1_S3_I7", "edge_id": "C1_S3_I5_R2_>C1_S3_I7", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "En fronçant les sourcils :''Je refuse qu’elle utilise ce ton avec moi et le lui signifie ainsi : Changez de ton avec moi s’il vous plaît !''", "next_id": "6", "target_node_id": "C1_S3_I6", "edge_id": "C1_S3_I5_R3_>C1_S3_I6", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": -2, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C1_S3_I7", "actor": "Agathe", "text": "''Laissez les « Madame » à la porte ! Je m’appelle Agathe !''", "image": "Agathe_angry.png", "responses": [{"text": "Comme vous voudrez Agathe - elle lui sourit - je viens pour la réfection de votre pansement.", "next_id": "9", "target_node_id": "C1_S3_I9", "edge_id": "C1_S3_I7_R0_>C1_S3_I9", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 2, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "En la regardant : C’est d’accord Agathe, à présent il est l’heure de changer votre pansement.", "next_id": "9", "target_node_id": "C1_S3_I9", "edge_id": "C1_S3_I7_R1_>C1_S3_I9", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je sourit :''Eh bien Agathe, montrez-moi votre pied s’il vous plaît ? Je dois changer votre pansement.''", "next_id": "9", "target_node_id": "C1_S3_I9", "edge_id": "C1_S3_I7_R2_>C1_S3_I9", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "En préparant son matériel :''Montrez-moi votre pansement s’il vous plaît ! J’ai encore beaucoup de travail à faire aujourd’hui.''", "next_id": "9", "target_node_id": "C1_S3_I9", "edge_id": "C1_S3_I7_R3_>C1_S3_I9", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C1_S3_I9", "actor": "Agathe", "text": "Le ton vif, le regard pétillant, en remontant dans son lit sans aide. A :''Je peux très bien me le faire toute seule ! J’ai pas attendu que vous soyez née pour prendre soin de moi. Vous avez quel âge Madame Berset ?''", "image": "Agathe_angry.png", "responses": [{"text": "''Je la regarde avec assurance : J’ai 25 ans.''", "next_id": "11", "target_node_id": "C1_S3_I11", "edge_id": "C1_S3_I9_R0_>C1_S3_I11", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "En s’approchant :''Je ne suis pas non plus une aristocrate. Vous pouvez m’appeler Claude.''", "next_id": "10", "target_node_id": "C1_S3_I10", "edge_id": "C1_S3_I9_R1_>C1_S3_I10", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je avec un grand sourire :''Laissez les « madame » à la porte. Je m’appelle Claude.''", "next_id": "10", "target_node_id": "C1_S3_I10", "edge_id": "C1_S3_I9_R2_>C1_S3_I10", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 2, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Cela m’étonnerait que votre état vous permette de faire ce pansement toute seule. Agathe ne répond rien. Je lui refais son pansement puis je sors. Pascal sera content : j’ai pris peu de temps.", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": -2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C1_S3_I11", "actor": "Agathe", "text": "''Je pourrais être votre grand-mère !''", "image": "Agathe_angry.png", "responses": [{"text": "Je tout en préparant de quoi changer le pensement :''Vous êtes grand-mère ?''", "next_id": "11", "target_node_id": "C1_S3_I11", "edge_id": "C1_S3_I11_R0_>C1_S3_I11", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je lui demande avec intérêt :''Vous avez des petits enfants ?''", "next_id": "14", "target_node_id": "C1_S3_I14", "edge_id": "C1_S3_I11_R1_>C1_S3_I14", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "J’ai l’air ravi :''C’est vrai ! Vous pourriez être ma grand-mère.''", "next_id": "14", "target_node_id": "C1_S3_I14", "edge_id": "C1_S3_I11_R2_>C1_S3_I14", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je la regarde avec un léger sourire : Ma grand-mère est morte.''", "next_id": "12", "target_node_id": "C1_S3_I12", "edge_id": "C1_S3_I11_R3_>C1_S3_I12", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Agathe, je suis votre infirmière et vous êtes résidente ici.", "next_id": "13", "target_node_id": "C1_S3_I13", "edge_id": "C1_S3_I11_R4_>C1_S3_I13", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C1_S3_I14", "actor": "Agathe", "text": "Agathe ne répond pas. Elle baisse les yeux comme si elle regardait à l’intérieur d’elle-même.", "image": "Agathe_neutral.png", "responses": [{"text": "''Je laisse le silence s’installer et observe Agathe attentivement.''", "next_id": "16", "target_node_id": "C1_S3_I16", "edge_id": "C1_S3_I14_R0_>C1_S3_I16", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je répète ma phrase''", "next_id": "16", "target_node_id": "C1_S3_I16", "edge_id": "C1_S3_I14_R1_>C1_S3_I16", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Est-ce que je peux changer votre pansement maintenant ?''", "next_id": "12", "target_node_id": "C1_S3_I12", "edge_id": "C1_S3_I14_R2_>C1_S3_I12", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C1_S3_I16", "actor": "Agathe", "text": "''J’ai un petit-fils ! Mon petit-fils chéri, Xavier. Agathe baisse les yeux comme si elle regardait à l’intérieur d’elle-même, soupire, des larmes se mettent à couler le long de ses joues.''", "image": "Agathe_sad.png", "responses": [{"text": "Je prends une chaise et m’installe à la hauteur du visage d’Agathe, je perçois sa respiration rapide et ressens son émotion.", "next_id": "18", "target_node_id": "C1_S3_I18", "edge_id": "C1_S3_I16_R0_>C1_S3_I18", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je suis touchée par sa tristesse et en même temps je dois refaire son pansement. Je lui dis donc :''Je vois que vous êtes triste et ça me touche. Je dois maintenant changer votre pansement. Est-ce que c’est le bon moment pour vous ?''", "next_id": "17", "target_node_id": "C1_S3_I17", "edge_id": "C1_S3_I16_R1_>C1_S3_I17", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''J’ai l’impression qu’Agathe a besoin de rester seule. Je prends congé d’elle et lui dis que je reviendrai plus tard. Je sors.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C1_S3_I18", "actor": "Agathe", "text": "Les larmes d’Agathe ne cessent de couler.", "image": "Agathe_sad.png", "responses": [{"text": "''Je laisse un silence puis dit : Il compte beaucoup pour vous.''", "next_id": "20", "target_node_id": "C1_S3_I20", "edge_id": "C1_S3_I18_R0_>C1_S3_I20", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Qu’est-ce qui vous rend si triste ?''", "next_id": "19", "target_node_id": "C1_S3_I19", "edge_id": "C1_S3_I18_R1_>C1_S3_I19", "RespectAndDignity": 0, "Empathy": 1, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 1, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je lui prend la main : Pleurez, allez-y, pleurez, laissez sortir toutes ces larmes.''", "next_id": "19", "target_node_id": "C1_S3_I19", "edge_id": "C1_S3_I18_R2_>C1_S3_I19", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C1_S3_I20", "actor": "Agathe", "text": "''Oui. Ça fait maintenant plus d’un mois qu’il est parti en Amérique. Et je n’ai pas de nouvelles de lui.''", "image": "Agathe_neutral.png", "responses": [{"text": "Je me rapproche encore. Elle a visiblement l’air désolé :''Vous êtes sans nouvelles de lui ?''", "next_id": "25", "target_node_id": "C1_S3_I25", "edge_id": "C1_S3_I20_R0_>C1_S3_I25", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je la regarde :''Qui est-ce qui pourrait avoir des nouvelles de lui ?''", "next_id": "24", "target_node_id": "C1_S3_I24", "edge_id": "C1_S3_I20_R1_>C1_S3_I24", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Reprenez-vous Agathe, il va vous contacter.", "next_id": "21", "target_node_id": "C1_S3_I21", "edge_id": "C1_S3_I20_R2_>C1_S3_I21", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C1_S3_I25", "actor": "Agathe", "text": "''Je ne parle plus à sa maman !''", "image": "Agathe_angry.png", "responses": [{"text": "Je me tait un instant :''Vous ne parlez plus à sa maman ?''", "next_id": "26", "target_node_id": "C1_S3_I26", "edge_id": "C1_S3_I25_R0_>C1_S3_I26", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je étonnée :''Pourquoi ne parlez-vous plus à sa maman ?''", "next_id": "26", "target_node_id": "C1_S3_I26", "edge_id": "C1_S3_I25_R1_>C1_S3_I26", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 2, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "J’inspire :''Voulez-vous que je lui parle ?''", "next_id": "26", "target_node_id": "C1_S3_I26", "edge_id": "C1_S3_I25_R2_>C1_S3_I26", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C1_S3_I26", "actor": "Agathe", "text": "''Elle a décidé de m’abandonner dans ce trou !''", "image": "Agathe_angry.png", "responses": [{"text": "''Je hoche la tête : J’ai l’impression que vous en voulez énormément à vos enfants.''", "next_id": "27", "target_node_id": "C1_S3_I27", "edge_id": "C1_S3_I26_R0_>C1_S3_I27", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Qu’est-ce que vous voulez dire par là ?''", "next_id": "28", "target_node_id": "C1_S3_I28", "edge_id": "C1_S3_I26_R1_>C1_S3_I28", "RespectAndDignity": 0, "Empathy": 1, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 1, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je ne croyez pas que vous exagérez un peu ?''", "next_id": "27", "target_node_id": "C1_S3_I27", "edge_id": "C1_S3_I26_R2_>C1_S3_I27", "RespectAndDignity": -2, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C1_S3_I27", "actor": "Agathe", "text": "''Ils n’avaient pas le droit de m’abandonner. Ce n’était peut-être pas ce qu’ils souhaitaient en vous plaçant ici ?''", "image": "Agathe_confused.png", "responses": [{"text": "En haussant la voix :''Qu’est-ce que vous auriez fait à leur place ?''", "next_id": "29", "target_node_id": "C1_S3_I29", "edge_id": "C1_S3_I27_R0_>C1_S3_I29", "RespectAndDignity": 0, "Empathy": 1, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 1, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''De vous abandonner. Ce n’était peut-être pas ce qu’ils souhaitaient en vous plaçant ici ?''", "next_id": "29", "target_node_id": "C1_S3_I29", "edge_id": "C1_S3_I27_R1_>C1_S3_I29", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je vous entends. Ce que vous vivez est difficile. On peut prendre un moment pour en parler.''", "next_id": "29", "target_node_id": "C1_S3_I29", "edge_id": "C1_S3_I27_R2_>C1_S3_I29", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C1_S3_I29", "actor": "Agathe", "text": "Agathe ne répond pas. Elle semble plus calme dans l’observation de sa respiration, de son soupir et des traits détendus de son visage. J’écoute son silence.", "image": "Agathe_neutral.png", "responses": [{"text": "Je lui souris :''Je dois maintenant changer votre pansement. Est-ce que c’est le bon moment pour vous ?''", "next_id": "30", "target_node_id": "C1_S3_I30", "edge_id": "C1_S3_I29_R0_>C1_S3_I30", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je la regarde :''Je dois maintenant changer votre pansement. C’est important.''", "next_id": "30", "target_node_id": "C1_S3_I30", "edge_id": "C1_S3_I29_R1_>C1_S3_I30", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je regarde sa montre : Montrez-moi ce talon s’il vous plaît.", "next_id": "30", "target_node_id": "C1_S3_I30", "edge_id": "C1_S3_I29_R2_>C1_S3_I30", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C1_S3_I30", "actor": "Agathe", "text": "''Allez-y doucement ! Mon pied me fait mal. Ça tape !''", "image": "Agathe_angry.png", "responses": [{"text": "Je la regarde et lui demande à nouveau :''Ça tape ?''", "next_id": "31", "target_node_id": "C1_S3_I31", "edge_id": "C1_S3_I30_R0_>C1_S3_I31", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je prends du désinfectant : Ce doit être infecté.", "next_id": "31", "target_node_id": "C1_S3_I31", "edge_id": "C1_S3_I30_R1_>C1_S3_I31", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je regarde le pieds d’Agathe : Cela m’inquiète.", "next_id": "31", "target_node_id": "C1_S3_I31", "edge_id": "C1_S3_I30_R2_>C1_S3_I31", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C1_S3_I31", "actor": "Agathe", "text": "''Je sens mon cœur battre dedans.''", "image": "Agathe_neutral.png", "responses": [{"text": "''D’accord, je vais d’abord enlever le pansement. Je vais faire tout doucement.''", "next_id": "32", "target_node_id": "C1_S3_I32", "edge_id": "C1_S3_I31_R0_>C1_S3_I32", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Cela arrive parfois en cas d’infection.", "next_id": "32", "target_node_id": "C1_S3_I32", "edge_id": "C1_S3_I31_R1_>C1_S3_I32", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Pas d’inquiétude, on va voir tout ça.", "next_id": "32", "target_node_id": "C1_S3_I32", "edge_id": "C1_S3_I31_R2_>C1_S3_I32", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C1_S3_I32", "actor": "Agathe", "text": "''Je retire le pansement avec le plus grand soin. La plaie du talon droit d’Agathe semble s’être infectée. J’observe une rougeur autour de la plaie, un gonflement des bordures de la plaie, je ne perçois pas d’odeur particulière.''", "image": "Agathe_neutral.png", "responses": [{"text": "En cherchant dans son matériel : La plaie est infectée. Je vais la nettoyer et faire un nouveau pansement, je demanderai au médecin de venir vous voir après.", "next_id": "33", "target_node_id": "C1_S3_I33", "edge_id": "C1_S3_I32_R0_>C1_S3_I33", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je la regarde : C’est une petite infection. Ne vous inquiétez pas je vais m’en occuper et demanderai au médecin de passer vous voir.''", "next_id": "33", "target_node_id": "C1_S3_I33", "edge_id": "C1_S3_I32_R1_>C1_S3_I33", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je regarde la plaie de plus près et dit :''Je demanderai au médecin de venir vous voir.''", "next_id": "33", "target_node_id": "C1_S3_I33", "edge_id": "C1_S3_I32_R2_>C1_S3_I33", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je regarde la plaie :''C’est bien ce que je pensais. C’est infecté !''", "next_id": "33", "target_node_id": "C1_S3_I33", "edge_id": "C1_S3_I32_R3_>C1_S3_I33", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C1_S3_I33", "actor": "Agathe", "text": "Fin", "image": "Agathe_neutral.png", "responses": [{"text": "''Je nettoie la plaie et fais un nouveau pansement.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je vous entends. Ce que vous vivez est difficile. On peut prendre un moment pour en parler.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je termine le soin et je vous laisse vous reposer.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": -2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C1_S3_I28", "actor": "Agathe", "text": "''Je me abandonnée !''", "image": "Agathe_angry.png", "responses": [{"text": "Je hoche de nouveau la tête puis dit :''Que pensez-vous que vos enfants diraient de votre situation ?''", "next_id": "29", "target_node_id": "C1_S3_I29", "edge_id": "C1_S3_I28_R0_>C1_S3_I29", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Qu’est-ce que vous auriez fait à la place de vos enfants ?''", "next_id": "29", "target_node_id": "C1_S3_I29", "edge_id": "C1_S3_I28_R1_>C1_S3_I29", "RespectAndDignity": 0, "Empathy": 1, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 1, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je vous entends. Ce que vous vivez est difficile. On peut prendre un moment pour en parler.''", "next_id": "29", "target_node_id": "C1_S3_I29", "edge_id": "C1_S3_I28_R2_>C1_S3_I29", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C1_S3_I24", "actor": "Agathe", "text": "''Sa maman ! Mais je ne lui parle plus !''", "image": "Agathe_angry.png", "responses": [{"text": "Je me tait un instant :''Vous ne parlez plus à sa maman ?''", "next_id": "26", "target_node_id": "C1_S3_I26", "edge_id": "C1_S3_I24_R0_>C1_S3_I26", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je étonnée :''Pourquoi ne parlez-vous plus à sa maman ?''", "next_id": "26", "target_node_id": "C1_S3_I26", "edge_id": "C1_S3_I24_R1_>C1_S3_I26", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 2, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "J’inspire :''Voulez-vous que je lui parle ?''", "next_id": "26", "target_node_id": "C1_S3_I26", "edge_id": "C1_S3_I24_R2_>C1_S3_I26", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C1_S3_I21", "actor": "Agathe", "text": "''Il ne sait sûrement pas que je suis au home. Comment voulez-vous qu’il me contacte ?''", "image": "Agathe_confused.png", "responses": [{"text": "Je la regarde intensément :''Est-ce que vous voulez le contacter ?''", "next_id": "34", "target_node_id": "C1_S3_I34", "edge_id": "C1_S3_I21_R0_>C1_S3_I34", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Il le fera.", "next_id": "22", "target_node_id": "C1_S3_I22", "edge_id": "C1_S3_I21_R1_>C1_S3_I22", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je vous entends. Ce que vous vivez est difficile. On peut prendre un moment pour en parler.''", "next_id": "34", "target_node_id": "C1_S3_I34", "edge_id": "C1_S3_I21_R2_>C1_S3_I34", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C1_S3_I34", "actor": "Agathe", "text": "Il est très occupé, je ne voudrais pas qu’il s’inquiète inutilement.", "image": "Agathe_neutral.png", "responses": [{"text": "Je avec la même présence :''Et qu’en est-il de sa maman, votre fille ?''", "next_id": "25", "target_node_id": "C1_S3_I25", "edge_id": "C1_S3_I34_R0_>C1_S3_I25", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je dis avec tact : Il voudrait peut-être le savoir…''", "next_id": "29", "target_node_id": "C1_S3_I29", "edge_id": "C1_S3_I34_R1_>C1_S3_I29", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Il faut coopérer, je ne peux pas perdre plus de temps.''", "next_id": "25", "target_node_id": "C1_S3_I25", "edge_id": "C1_S3_I34_R2_>C1_S3_I25", "RespectAndDignity": 0, "Empathy": 0, "Compassion": -2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C1_S3_I22", "actor": "Agathe", "text": "''Mais ma parole ! Vous êtes devine ? Ça vous amuse de me donner de faux espoirs ?''", "image": "Agathe_angry.png", "responses": [{"text": "''Je l’air désolé : Pardonnez-moi Agathe. Je pensais vous consoler.''", "next_id": "23", "target_node_id": "C1_S3_I23", "edge_id": "C1_S3_I22_R0_>C1_S3_I23", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBou ": 0, "InterprofessionalCollaboration": 0}, {"text": "J’entre sans frapper pour ne pas déranger.", "next_id": "2", "target_node_id": "C1_S3_I2", "edge_id": "C1_S3_I1_R1_>C1_S3_I2", "RespectAndDignity": 2, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "J’entre rapidement, j’ai peu de temps.", "next_id": "3", "target_node_id": "C1_S3_I3", "edge_id": "C1_S3_I1_R2_>C1_S3_I3", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "3": {"node_id": "C1_S3_I3", "actor": "Agathe", "text": "Agathe ne me dit pas d’entrer.", "image": "Agathe_neutral.png", "responses": [{"text": "Je frappe plus fort", "next_id": "3", "target_node_id": "C1_S3_I3", "edge_id": "C1_S3_I3_R0_>C1_S3_I3", "RespectAndDignity": 2, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je reviendrai plus tard.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je prends la décision d’entrer doucement.", "next_id": "4", "target_node_id": "C1_S3_I4", "edge_id": "C1_S3_I3_R2_>C1_S3_I4", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "4": {"node_id": "C1_S3_I4", "actor": "Agathe", "text": "Agathe est dans son lit et me regarde sans dire un mot.", "image": "Agathe_neutral.png", "responses": [{"text": "''Je sourit à Agathe : Madame Salamin, je viens pour la réfection de votre pansement''", "next_id": "5", "target_node_id": "C1_S3_I5", "edge_id": "C1_S3_I4_R0_>C1_S3_I5", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 2, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Madame Salamin, il est temps de changer votre pansement ", "next_id": "5", "target_node_id": "C1_S3_I5", "edge_id": "C1_S3_I4_R1_>C1_S3_I5", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Bonjour, montrez-moi votre pansement''", "next_id": "5", "target_node_id": "C1_S3_I5", "edge_id": "C1_S3_I4_R2_>C1_S3_I5", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "5": {"node_id": "C1_S3_I5", "actor": "Agathe", "text": "''M’interromps d’une voix vive, en me regardant. Je suis pas une aristocrate moi !''", "image": "Agathe_angry.png", "responses": [{"text": "Je la regarde :''Je perçois Agathe comme animée par un élan de vie, je me pose la question de savoir si son propos est une remarque et comment lui répondre, j’hésite à poursuivre, je suis sensible au ton de la voix de la résidente et dis : Pardon ?''", "next_id": "7", "target_node_id": "C1_S3_I7", "edge_id": "C1_S3_I5_R0_>C1_S3_I7", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 1, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "J’inspire :''J’ai l’impression qu’Agathe m’invective pour m’inviter à jouer avec elle. Derrière sa froideur apparente se cache peut-être une femme très sensible. Je tiens à vérifier cette hypothèse en lui demandant : Qu’est-ce que vous voulez dire par là ?''", "next_id": "7", "target_node_id": "C1_S3_I7", "edge_id": "C1_S3_I5_R1_>C1_S3_I7", "RespectAndDignity": 0, "Empathy": 1, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 1, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je regarde un instant ailleurs :''Je me dérangée par ce ton virulent. Je me dis qu’il faut préciser le cadre de notre relation et lui dis : Moi non plus je ne suis pas une aristocrate. Toutefois, j’ai besoin que vous me respectiez.''", "next_id": "7", "target_node_id": "C1_S3_I7", "edge_id": "C1_S3_I5_R2_>C1_S3_I7", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "En fronçant les sourcils :''Je refuse qu’elle utilise ce ton avec moi et le lui signifie ainsi : Changez de ton avec moi s’il vous plaît !''", "next_id": "6", "target_node_id": "C1_S3_I6", "edge_id": "C1_S3_I5_R3_>C1_S3_I6", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": -2, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "7": {"node_id": "C1_S3_I7", "actor": "Agathe", "text": "''Laissez les « Madame » à la porte ! Je m’appelle Agathe !''", "image": "Agathe_angry.png", "responses": [{"text": "Comme vous voudrez Agathe - elle lui sourit - je viens pour la réfection de votre pansement.", "next_id": "9", "target_node_id": "C1_S3_I9", "edge_id": "C1_S3_I7_R0_>C1_S3_I9", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 2, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "En la regardant : C’est d’accord Agathe, à présent il est l’heure de changer votre pansement.", "next_id": "9", "target_node_id": "C1_S3_I9", "edge_id": "C1_S3_I7_R1_>C1_S3_I9", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je sourit :''Eh bien Agathe, montrez-moi votre pied s’il vous plaît ? Je dois changer votre pansement.''", "next_id": "9", 0}, {"text": "Cela m’étonnerait que votre état vous permette de faire ce pansement toute seule. Agathe ne répond rien. Je lui refais son pansement puis je sors. Pascal sera content : j’ai pris peu de temps.", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": -2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "11": {"node_id": "C1_S3_I11", "actor": "Agathe", "text": "''Je pourrais être votre grand-mère !''", "image": "Agathe_angry.png", "responses": [{"text": "Je tout en préparant de quoi changer le pensement :''Vous êtes grand-mère ?''", "next_id": "11", "target_node_id": "C1_S3_I11", "edge_id": "C1_S3_I11_R0_>C1_S3_I11", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je lui demande avec intérêt :''Vous avez des petits enfants ?''", "next_id": "14", "target_node_id": "C1_S3_I14", "edge_id": "C1_S3_I11_R1_>C1_S3_I14", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "J’ai l’air ravi :''C’est vrai ! Vous pourriez être ma grand-mère.''", "next_id": "14", "target_node_id": "C1_S3_I14", "edge_id": "C1_S3_I11_R2_>C1_S3_I14", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je la regarde avec un léger sourire : Ma grand-mère est morte.''", "next_id": "12", "target_node_id": "C1_S3_I12", "edge_id": "C1_S3_I11_R3_>C1_S3_I12", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Agathe, je suis votre infirmière et vous êtes résidente ici.", "next_id": "13", "target_node_id": "C1_S3_I13", "edge_id": "C1_S3_I11_R4_>C1_S3_I13", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "14": {"node_id": "C1_S3_I14", "actor": "Agathe", "text": "Agathe ne répond pas. Elle baisse les yeux comme si elle regardait à l’intérieur d’elle-même.", "image": "Agathe_neutral.png", "responses": [{"text": "''Je laisse le silence s’installer et observe Agathe attentivement.''", "next_id": "16", "target_node_id": "C1_S3_I16", "edge_id": "C1_S3_I14_R0_>C1_S3_I16", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je répète ma phrase''", "next_id": "16", "target_node_id": "C1_S3_I16", "edge_id": "C1_S3_I14_R1_>C1_S3_I16", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Est-ce que je peux changer votre pansement maintenant ?''", "next_id": "12", "target_node_id": "C1_S3_I12", "edge_id": "C1_S3_I14_R2_>C1_S3_I12", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "16": {"node_id": "C1_S3_I16", "actor": "Agathe", "text": "''J’ai un petit-fils ! Mon petit-fils chéri, Xavier. Agathe baisse les yeux comme si elle regardait à l’intérieur d’elle-même, soupire, des larmes se mettent à couler le long de ses joues.''", "image": "Agathe_sad.png", "responses": [{"text": "Je prends une chaise et m’installe à la hauteur du visage d’Agathe, je perçois sa respiration rapide et ressens son émotion.", "next_id": "18", "target_node_id": "C1_S3_I18", "edge_id": "C1_S3_I16_R0_>C1_S3_I18", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je suis touchée par sa tristesse et en même temps je dois refaire son pansement. Je lui dis donc :''Je vois que vous êtes triste et ça me touche. Je dois maintenant changer votre pansement. Est-ce que c’est le bon moment pour vous ?''", "next_id": "17", "target_node_id": "C1_S3_I17", "edge_id": "C1_S3_I16_R1_>C1_S3_I17", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''J’ai l’impression qu’Agathe a besoin de rester seule. Je prends congé d’elle et lui dis que je reviendrai plus tard. Je sors.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "18": {"node_id": "C1_S3_I18", "actor": "Agathe", "text": "Les larmes d’Agathe ne cessent de couler.", "image": "Agathe_sad.png", "responses": [{"text": "''Je laisse un silence puis dit : Il compte beaucoup pour vous.''", "next_id": "20", "target_node_id": "C1_S3_I20", "edge_id": "C1_S3_I18_R0_>C1_S3_I20", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Qu’est-ce qui vous rend si triste ?''", "next_id": "19", "target_node_id": "C1_S3_I19", "edge_id": "C1_S3_I18_R1_>C1_S3_I19", "RespectAndDignity": 0, "Empathy": 1, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 1, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je lui prend la main : Pleurez, allez-y, pleurez, laissez sortir toutes ces larmes.''", "next_id": "19", "target_node_id": "C1_S3_I19", "edge_id": "C1_S3_I18_R2_>C1_S3_I19", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "20": {"node_id": "C1_S3_I20", "actor": "Agathe", "text": "''Oui. Ça fait maintenant plus d’un mois qu’il est parti en Amérique. Et je n’ai pas de nouvelles de lui.''", "image": "Agathe_neutral.png", "responses": [{"text": "Je me rapproche encore. Elle a visiblement l’air désolé :''Vous êtes sans nouvelles de lui ?''", "next_id": "25", "target_node_id": "C1_S3_I25", "edge_id": "C1_S3_I20_R0_>C1_S3_I25", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je la regarde :''Qui est-ce qui pourrait avoir des nouvelles de lui ?''", "next_id": "24", "target_node_id": "C1_S3_I24", "edge_id": "C1_S3_I20_R1_>C1_S3_I24", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Reprenez-vous Agathe, il va vous contacter.", "next_id": "21", "target_node_id": "C1_S3_I21", "edge_id": "C1_S3_I20_R2_>C1_S3_I21", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "25": {"node_id": "C1_S3_I25", "actor": "Agathe", "text": "''Je ne parle plus à sa maman !''", "image": "Agathe_angry.png", "responses": [{"text": "Je me tait un instant :''Vous ne parlez plus à sa maman ?''", "next_id": "26", "target_node_id": "C1_S3_I26", "edge_id": "C1_S3_I25_R0_>C1_S3_I26", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je étonnée :''Pourquoi ne parlez-vous plus à sa maman ?''", "next_id": "26", "target_node_id": "C1_S3_I26", "edge_id": "C1_S3_I25_R1_>C1_S3_I26", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 2, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "J’inspire :''Voulez-vous que je lui parle ?''", "next_id": "26", "target_node_id": "C1_S3_I26", "edge_id": "C1_S3_I25_R2_>C1_S3_I26", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "26": {"node_id": "C1_S3_I26", "actor": "Agathe", "text": "''Elle a décidé de m’abandonner dans ce trou !''", "image": "Agathe_angry.png", "responses": [{"text": "''Je hoche la tête : J’ai l’impression que vous en voulez énormément à vos enfants.''", "next_id": "27", "target_node_id": "C1_S3_I27", "edge_id": "C1_S3_I26_R0_>C1_S3_I27", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Qu’est-ce que vous voulez dire par là ?''", "next_id": "28", "target_node_id": "C1_S3_I28", "edge_id": "C1_S3_I26_R1_>C1_S3_I28", "RespectAndDignity": 0, "Empathy": 1, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 1, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je ne croyez pas que vous exagérez un peu ?''", "next_id": "27", "target_node_id": "C1_S3_I27", "edge_id": "C1_S3_I26_R2_>C1_S3_I27", "RespectAndDignity": -2, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "27": {"node_id": "C1_S3_I27", "actor": "Agathe", "text": "''Ils n’avaient pas le droit de m’abandonner. Ce n’était peut-être pas ce qu’ils souhaitaient en vous plaçant ici ?''", "image": "Agathe_confused.png", "responses": [{"text": "En haussant la voix :''Qu’est-ce que vous auriez fait à leur place ?''", "next_id": "29", "target_node_id": "C1_S3_I29", "edge_id": "C1_S3_I27_R0_>C1_S3_I29", "RespectAndDignity": 0, "Empathy": 1, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 1, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''De vous abandonner. Ce n’était peut-être pas ce qu’ils souhaitaient en vous plaçant ici ?''", "next_id": "29", "target_node_id": "C1_S3_I29", "edge_id": "C1_S3_I27_R1_>C1_S3_I29", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je vous entends. Ce que vous vivez est difficile. On peut prendre un moment pour en parler.''", "next_id": "29", "target_node_id": "C1_S3_I29", "edge_id": "C1_S3_I27_R2_>C1_S3_I29", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "29": {"node_id": "C1_S3_I29", "actor": "Agathe", "text": "Agathe ne répond pas. Elle semble plus calme dans l’observation de sa respiration, de son soupir et des traits détendus de son visage. J’écoute son silence.", "image": "Agathe_neutral.png", "responses": [{"text": "Je lui souris :''Je dois maintenant changer votre pansement. Est-ce que c’est le bon moment pour vous ?''", "next_id": "30", "target_node_id": "C1_S3_I30", "edge_id": "C1_S3_I29_R0_>C1_S3_I30", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je la regarde :''Je dois maintenant changer votre pansement. C’est important.''", "next_id": "30", "target_node_id": "C1_S3_I30", "edge_id": "C1_S3_I29_R1_>C1_S3_I30", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je regarde sa montre : Montrez-moi ce talon s’il vous plaît.", "next_id": "30", "target_node_id": "C1_S3_I30", "edge_id": "C1_S3_I29_R2_>C1_S3_I30", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "30": {"node_id": "C1_S3_I30", "actor": "Agathe", "text": "''Allez-y doucement ! Mon pied me fait mal. Ça tape !''", "image": "Agathe_angry.png", "responses": [{"text": "Je la regarde et lui demande à nouveau :''Ça tape ?''", "next_id": "31", "target_node_id": "C1_S3_I31", "edge_id": "C1_S3_I30_R0_>C1_S3_I31", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je prends du désinfectant : Ce doit être infecté.", "next_id": "31", "target_node_id": "C1_S3_I31", "edge_id": "C1_S3_I30_R1_>C1_S3_I31", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je regarde le pieds d’Agathe : Cela m’inquiète.", "next_id": "31", "target_node_id": "C1_S3_I31", "edge_id": "C1_S3_I30_R2_>C1_S3_I31", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "31": {"node_id": "C1_S3_I31", "actor": "Agathe", "text": "''Je sens mon cœur battre dedans.''", "image": "Agathe_neutral.png", "responses": [{"text": "''D’accord, je vais d’abord enlever le pansement. Je vais faire tout doucement.''", "next_id": "32", "target_node_id": "C1_S3_I32", "edge_id": "C1_S3_I31_R0_>C1_S3_I32", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Cela arrive parfois en cas d’infection.", "next_id": "32", "target_node_id": "C1_S3_I32", "edge_id": "C1_S3_I31_R1_>C1_S3_I32", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Pas d’inquiétude, on va voir tout ça.", "next_id": "32", "target_node_id": "C1_S3_I32", "edge_id": "C1_S3_I31_R2_>C1_S3_I32", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "32": {"node_id": "C1_S3_I32", "actor": "Agathe", "text": "''Je retire le pansement avec le plus grand soin. La plaie du talon droit d’Agathe semble s’être infectée. J’observe une rougeur autour de la plaie, un gonflement des bordures de la plaie, je ne perçois pas d’odeur particulière.''", "image": "Agathe_neutral.png", "responses": [{"text": "En cherchant dans son matériel : La plaie est infectée. Je vais la nettoyer et faire un nouveau pansement, je demanderai au médecin de venir vous voir après.", "next_id": "33", "target_node_id": "C1_S3_I33", "edge_id": "C1_S3_I32_R0_>C1_S3_I33", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je la regarde : C’est une petite infection. Ne vous inquiétez pas je vais m’en occuper et demanderai au médecin de passer vous voir.''", "next_id": "33", "target_node_id": "C1_S3_I33", "edge_id": "C1_S3_I32_R1_>C1_S3_I33", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je regarde la plaie de plus près et dit :''Je demanderai au médecin de venir vous voir.''", "next_id": "33", "target_node_id": "C1_S3_I33", "edge_id": "C1_S3_I32_R2_>C1_S3_I33", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je regarde la plaie :''C’est bien ce que je pensais. C’est infecté !''", "next_id": "33", "target_node_id": "C1_S3_I33", "edge_id": "C1_S3_I32_R3_>C1_S3_I33", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "33": {"node_id": "C1_S3_I33", "actor": "Agathe", "text": "Fin", "image": "Agathe_neutral.png", "responses": [{"text": "''Je nettoie la plaie et fais un nouveau pansement.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je vous entends. Ce que vous vivez est difficile. On peut prendre un moment pour en parler.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je termine le soin et je vous laisse vous reposer.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": -2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "28": {"node_id": "C1_S3_I28", "actor": "Agathe", "text": "''Je me abandonnée !''", "image": "Agathe_angry.png", "responses": [{"text": "Je hoche de nouveau la tête puis dit :''Que pensez-vous que vos enfants diraient de votre situation ?''", "next_id": "29", "target_node_id": "C1_S3_I29", "edge_id": "C1_S3_I28_R0_>C1_S3_I29", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Qu’est-ce que vous auriez fait à la place de vos enfants ?''", "next_id": "29", "target_node_id": "C1_S3_I29", "edge_id": "C1_S3_I28_R1_>C1_S3_I29", "RespectAndDignity": 0, "Empathy": 1, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 1, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je vous entends. Ce que vous vivez est difficile. On peut prendre un moment pour en parler.''", "next_id": "29", "target_node_id": "C1_S3_I29", "edge_id": "C1_S3_I28_R2_>C1_S3_I29", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "24": {"node_id": "C1_S3_I24", "actor": "Agathe", "text": "''Sa maman ! Mais je ne lui parle plus !''", "image": "Agathe_angry.png", "responses": [{"text": "Je me tait un instant :''Vous ne parlez plus à sa maman ?''", "next_id": "26", "target_node_id": "C1_S3_I26", "edge_id": "C1_S3_I24_R0_>C1_S3_I26", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je étonnée :''Pourquoi ne parlez-vous plus à sa maman ?''", "next_id": "26", "target_node_id": "C1_S3_I26", "edge_id": "C1_S3_I24_R1_>C1_S3_I26", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 2, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "J’inspire :''Voulez-vous que je lui parle ?''", "next_id": "26", "target_node_id": "C1_S3_I26", "edge_id": "C1_S3_I24_R2_>C1_S3_I26", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "21": {"node_id": "C1_S3_I21", "actor": "Agathe", "text": "''Il ne sait sûrement pas que je suis au home. Comment voulez-vous qu’il me contacte ?''", "image": "Agathe_confused.png", "responses": [{"text": "Je la regarde intensément :''Est-ce que vous voulez le contacter ?''", "next_id": "34", "target_node_id": "C1_S3_I34", "edge_id": "C1_S3_I21_R0_>C1_S3_I34", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Il le fera.", "next_id": "22", "target_node_id": "C1_S3_I22", "edge_id": "C1_S3_I21_R1_>C1_S3_I22", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je vous entends. Ce que vous vivez est difficile. On peut prendre un moment pour en parler.''", "next_id": "34", "target_node_id": "C1_S3_I34", "edge_id": "C1_S3_I21_R2_>C1_S3_I34", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "34": {"node_id": "C1_S3_I34", "actor": "Agathe", "text": "Il est très occupé, je ne voudrais pas qu’il s’inquiète inutilement.", "image": "Agathe_neutral.png", "responses": [{"text": "Je avec la même présence :''Et qu’en est-il de sa maman, votre fille ?''", "next_id": "25", "target_node_id": "C1_S3_I25", "edge_id": "C1_S3_I34_R0_>C1_S3_I25", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je dis avec tact : Il voudrait peut-être le savoir…''", "next_id": "29", "target_node_id": "C1_S3_I29", "edge_id": "C1_S3_I34_R1_>C1_S3_I29", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Il faut coopérer, je ne peux pas perdre plus de temps.''", "next_id": "25", "target_node_id": "C1_S3_I25", "edge_id": "C1_S3_I34_R2_>C1_S3_I25", "RespectAndDignity": 0, "Empathy": 0, "Compassion": -2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "22": {"node_id": "C1_S3_I22", "actor": "Agathe", "text": "''Mais ma parole ! Vous êtes devine ? Ça vous amuse de me donner de faux espoirs ?''", "image": "Agathe_angry.png", "responses": [{"text": "''Je l’air désolé : Pardonnez-moi Agathe. Je pensais vous consoler.''", "next_id": "23", "target_node_id": "C1_S3_I23", "edge_id": "C1_S3_I22_R0_>C1_S3_I23", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Non. Je suis juste persuadée qu’il vous contactera.''", "next_id": "23", "target_node_id": "C1_S3_I23", "edge_id": "C1_S3_I22_R1_>C1_S3_I23", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je vous entends. Ce que vous vivez est difficile. On peut prendre un moment pour en parler.''", "next_id": "23", "target_node_id": "C1_S3_I23", "edge_id": "C1_S3_I22_R2_>C1_S3_I23", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "23": {"node_id": "C1_S3_I23", "actor": "Agathe", "text": "Agathe soupire :''Changez-moi ce pansement maintenant et allez y doucement, ça tape !''", "image": "Agathe_angry.png", "responses": [{"text": "Je la regarde et lui demande à nouveau :''Ça tape ?''", "next_id": "31", "target_node_id": "C1_S3_I31", "edge_id": "C1_S3_I23_R0_>C1_S3_I31", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollabo ’est vrai. J’ai peu d’expérience. Néanmoins j’ai besoin de respect. Et j’ai eu le sentiment que vous ne me respectiez pas. Êtes-vous d’accord qu’à l’avenir nous essayions de de nous parler de façon bienveillante toutes les deux ?''", "next_id": "8", "target_node_id": "C1_S3_I8", "edge_id": "C1_S3_I6_R3_>C1_S3_I8", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "8": {"node_id": "C1_S3_I8", "actor": "Agathe", "text": "''Oui ça me convient ! Laissez les « Madame » à la porte ! Je m’appelle Agathe !''", "image": "Agathe_angry.png", "responses": [{"text": "Comme vous voudrez Agathe - elle lui sourit - je viens pour la réfection de votre pansement.", "next_id": "9", "target_node_id": "C1_S3_I9", "edge_id": "C1_S3_I8_R0_>C1_S3_I9", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 2, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "En la regardant : C’est d’accord Agathe, à présent il est l’heure de changer votre pansement.", "next_id": "9", "target_node_id": "C1_S3_I9", "edge_id": "C1_S3_I8_R1_>C1_S3_I9", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je sourit :''Eh bien Agathe, montrez-moi votre pied s’il vous plaît ? Je dois changer votre pansement.''", "next_id": "9", "target_node_id": "C1_S3_I9", "edge_id": "C1_S3_I8_R2_>C1_S3_I9", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "En préparant son matériel :''Montrez-moi votre pansement s’il vous plaît ! J’ai encore beaucoup de travail à faire aujourd’hui.''", "next_id": "9", "target_node_id": "C1_S3_I9", "edge_id": "C1_S3_I8_R3_>C1_S3_I9",
