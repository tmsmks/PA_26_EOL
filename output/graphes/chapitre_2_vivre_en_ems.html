", "responses": [{"text": "Je m'accroupis devant Agathe et je me tiens aux manches du fauteuil.", "next_id": "3", "target_node_id": "C2_S1_I3", "edge_id": "C2_S1_I2_R0_>C2_S1_I3", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Je m'approche du bord du lit d'Agathe tout en me baissant.", "next_id": "3", "target_node_id": "C2_S1_I3", "edge_id": "C2_S1_I2_R1_>C2_S1_I3", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Je m'approche d’Agathe en m'appuyant sur le bord du lit et je me penche au-dessus d’elle", "next_id": "3", "target_node_id": "C2_S1_I3", "edge_id": "C2_S1_I2_R2_>C2_S1_I3", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S1_I3", "actor": "Agathe", "text": "...", "responses": [{"text": "Vous me semblez triste ? … je vous vois en larme et les yeux rougis.", "next_id": "7", "target_node_id": "C2_S1_I7", "edge_id": "C2_S1_I3_R0_>C2_S1_I7", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Vous me semblez triste ? … je vous vois en larme et les yeux rougis.", "next_id": "4", "target_node_id": "C2_S1_I4", "edge_id": "C2_S1_I3_R1_>C2_S1_I4", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Vous me dites ne pas avoir bien dormi, la veilleuse a toutefois observé que  vous dormiez.  Que se passe-t-il pour vous ?", "next_id": "5", "target_node_id": "C2_S1_I5", "edge_id": "C2_S1_I3_R2_>C2_S1_I5", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S1_I7", "actor": "Agathe", "text": "Mon mari me manque. J’aimerais le rejoindre! Mes enfants m’ont abandonné et pourtant je les aime tellement fort. Je me sens seule !", "responses": [{"text": "Seule !", "next_id": "8", "target_node_id": "C2_S1_I8", "edge_id": "C2_S1_I7_R0_>C2_S1_I8", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Si je vous comprends bien, vous aimez forts vos enfants bien qu’ils vous ont abandonnés, vous éprouvez un sentiment quelque peu contradictoire et… cela vous est difficile. Je prends une chaise pour m'asseoir aux côtés d’Agathe. Je me positionne en face d’Agathe, assise le buste penchée en avant et regardant la résidente dans les yeux, elle s’exprime d’un ton calme et posé dans un rythme lent.", "next_id": "9", "target_node_id": "C2_S1_I9", "edge_id": "C2_S1_I7_R1_>C2_S1_I9", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Que pensez-vous que diraient vos enfants s’ils vous entendaient ?", "next_id": "11", "target_node_id": "C2_S1_I11", "edge_id": "C2_S1_I7_R2_>C2_S1_I11", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Je me demande ce que diraient vos enfants s’ils vous entendaient ?", "next_id": "10", "target_node_id": "C2_S1_I10", "edge_id": "C2_S1_I7_R3_>C2_S1_I10", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Comment cela, rejoindre votre mari ? Avez-vous déjà pensé à vous faire du mal ?", "next_id": "5", "target_node_id": "C2_S1_I5", "edge_id": "C2_S1_I7_R4_>C2_S1_I5", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S1_I8", "actor": "Agathe", "text": "Vous comprenez mes enfants ont leur vie. Ils sont loin d’ici ! En plus ils m’ont placé !", "responses": [{"text": "Oui, bien sûr ! Mais qu’est-ce qui a changé ? Qu’est-ce qui renforce ce sentiment de solitude ?", "next_id": "13", "target_node_id": "C2_S1_I13", "edge_id": "C2_S1_I8_R0_>C2_S1_I13", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Oui, je comprends, avec ce sentiment il vous est difficile de vous endormir.", "next_id": "12", "target_node_id": "C2_S1_I12", "edge_id": "C2_S1_I8_R1_>C2_S1_I12", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Cela vous attriste ?", "next_id": "13", "target_node_id": "C2_S1_I13", "edge_id": "C2_S1_I8_R2_>C2_S1_I13", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S1_I13", "actor": "Agathe", "text": "Je sais pas ce que je fais ici ! Les vieux viennent ici pour mourir ! Je prends une chaise pour m'asseoir aux côtés d’Agathe. Je me positionne en face d’Agathe, assise le buste penchée en avant et regardant la résidente dans les yeux, elle s’exprime d’un ton calme et posé dans un rythme lent.", "responses": [{"text": "Pour vous, c’est seulement un lieu pour mourir ?", "next_id": "12", "target_node_id": "C2_S1_I12", "edge_id": "C2_S1_I13_R0_>C2_S1_I12", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Le home, n'est-il pas aussi un lieu de vie ?", "next_id": "12", "target_node_id": "C2_S1_I12", "edge_id": "C2_S1_I13_R1_>C2_S1_I12", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "C'est vrai… je réponds, qui renvoyée à la réalité de l'expérience de ma grand-maman, ne peut en dire plus ! puis, Excusez-moi Agathe, je suis rattrapée par un souvenir personnel. Que me disiez-vous ?", "next_id": "14", "target_node_id": "C2_S1_I14", "edge_id": "C2_S1_I13_R2_>C2_S1_I14", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Je m'en vais les larmes aux yeux et vais chercher une collègue pour me remplacer.", "next_id": "37", "target_node_id": "C2_S1_I37", "edge_id": "C2_S1_I13_R3_>C2_S1_I37", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S1_I12", "actor": "Agathe", "text": "Tous ceux qui sont venus aux Lilas sont morts aux Lilas.", "responses": [{"text": "Si je posais la question aux vieux de votre village, qu’en diraient-ils ?", "next_id": "15", "target_node_id": "C2_S1_I15", "edge_id": "C2_S1_I12_R0_>C2_S1_I15", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Que diraient ceux qui, comme vous, sont passés par ici ?", "next_id": "15", "target_node_id": "C2_S1_I15", "edge_id": "C2_S1_I12_R1_>C2_S1_I15", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Pleins d'autre ont aussi dû passer par ici Agathe, qu'en penseraient-ils ?", "next_id": "15", "target_node_id": "C2_S1_I15", "edge_id": "C2_S1_I12_R2_>C2_S1_I15", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S1_I15", "actor": "Agathe", "text": "Ils ont pas eu le choix ! Mais ils pouvaient plus vivre à la maison. Quand je pense à mon cousin Marcel, il pouvait plus se débrouiller tout seul.", "responses": [{"text": "Comment ça s’est passé pour lui son séjour aux Lilas ?", "next_id": "16", "target_node_id": "C2_S1_I16", "edge_id": "C2_S1_I15_R0_>C2_S1_I16", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "S'est-il plû aux Lilas ?", "next_id": "16", "target_node_id": "C2_S1_I16", "edge_id": "C2_S1_I15_R1_>C2_S1_I16", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Je suis sûre que sont séjour était très agréable !", "next_id": "16", "target_node_id": "C2_S1_I16", "edge_id": "C2_S1_I15_R2_>C2_S1_I16", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S1_I16", "actor": "Agathe", "text": "Il est mort trois jours après !", "responses": [{"text": "Est-ce que vous imaginez vivre la même chose ?", "next_id": "17", "target_node_id": "C2_S1_I17", "edge_id": "C2_S1_I16_R0_>C2_S1_I17", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Vous êtes en pleine forme, pensez-vous vraiment que cela va vous arriver ?<", "next_id": "17", "target_node_id": "C2_S1_I17", "edge_id": "C2_S1_I16_R1_>C2_S1_I17", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Arrêtez voir de vous faire du souci, pensez-vous vraiment que vous allez mourir dans 3 jours ?", "next_id": "17", "target_node_id": "C2_S1_I17", "edge_id": "C2_S1_I16_R2_>C2_S1_I17", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S1_I17", "actor": "Agathe", "text": "Oui et ça me fait peur !", "responses": [{"text": "Je comprends bien votre peur. Et en même temps, il se peut que vous viviez encore quelques mois avec nous ! Vous connaissez Séraphine ?", "next_id": "18", "target_node_id": "C2_S1_I18", "edge_id": "C2_S1_I17_R0_>C2_S1_I18", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Vous dîtes n'importe quoi, regardez Séraphine.", "next_id": "18", "target_node_id": "C2_S1_I18", "edge_id": "C2_S1_I17_R1_>C2_S1_I18", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Je suis sûre que votre séjour sera autant long que celui de Séraphine.", "next_id": "18", "target_node_id": "C2_S1_I18", "edge_id": "C2_S1_I17_R2_>C2_S1_I18", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S1_I18", "actor": "Agathe", "text": "Séraphine du boulanger ?", "responses": [{"text": "Oui ! Et bien, Séraphine vit ici depuis sept mois.", "next_id": "19", "target_node_id": "C2_S1_I19", "edge_id": "C2_S1_I18_R0_>C2_S1_I19", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Elle-même ! Vous voyez, soyez un peu plus courageuse.", "next_id": "19", "target_node_id": "C2_S1_I19", "edge_id": "C2_S1_I18_R1_>C2_S1_I19", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Oui et elle ne passe pas son temps à se plaindre.", "next_id": "19", "target_node_id": "C2_S1_I19", "edge_id": "C2_S1_I18_R2_>C2_S1_I19", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S1_I19", "actor": "Agathe", "text": "Agathe soupire. Vous percevez Agathe plus détendue, les traits de son visage s’adoucissent, elle respire calment. Un long silence s'installe...", "responses": [{"text": "Vous pourriez m’en dire un peu plus.", "next_id": "10", "target_node_id": "C2_S1_I10", "edge_id": "C2_S1_I19_R0_>C2_S1_I10", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Personne ne choisirait d'aller en home, me semble-t-il ?", "next_id": "20", "target_node_id": "C2_S1_I20", "edge_id": "C2_S1_I19_R1_>C2_S1_I20", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Pourquoi pas le home ?", "next_id": "21", "target_node_id": "C2_S1_I21", "edge_id": "C2_S1_I19_R2_>C2_S1_I21", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S1_I10", "actor": "Agathe", "text": "Qui choisit vraiment d'aller en home ? Seules nos enfants pensent que nous y sommes bien ! Agathe reste silencieuse.", "responses": [{"text": "Si je me souviens bien, vous m’avez dit que vous aviez le sentiment d’être abandonnée par vos enfants.", "next_id": "22", "target_node_id": "C2_S1_I22", "edge_id": "C2_S1_I10_R0_>C2_S1_I22", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Bon et ce sentiment d'abandon ?", "next_id": "22", "target_node_id": "C2_S1_I22", "edge_id": "C2_S1_I10_R1_>C2_S1_I22", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Du coup en plus de vous sentir trahie, vous avez un sentiment d'abandon ?", "next_id": "22", "target_node_id": "C2_S1_I22", "edge_id": "C2_S1_I10_R2_>C2_S1_I22", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S1_I22", "actor": "Agathe", "text": "...", "responses": [{"text": "Si je m’adressais à vos enfants, que me diraient ils de ce sentiment d’abandon ?", "next_id": "11", "target_node_id": "C2_S1_I11", "edge_id": "C2_S1_I22_R0_>C2_S1_I11", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Et vos enfants, que pensez-vous qu'diraient de votre sentiment d'abandon ?", "next_id": "11", "target_node_id": "C2_S1_I11", "edge_id": "C2_S1_I22_R1_>C2_S1_I11", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Vous et votre abandon...Que pensez-vous que vos enfant diraient ?", "next_id": "11", "target_node_id": "C2_S1_I11", "edge_id": "C2_S1_I22_R2_>C2_S1_I11", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S1_I11", "actor": "Agathe", "text": "Que je suis bien ici. Qu’il y a des gens qui sont là pour s’occuper de moi. Qu’ils se sont fait beaucoup de soucis quand j’étais seul à la maison. Ils avaient peur que je tombe, que je ne mange pas assez.", "responses": [{"text": "Que pensez-vous que vos enfants ressentent, maintenant que vous êtes ici ?", "next_id": "23", "target_node_id": "C2_S1_I23", "edge_id": "C2_S1_I11_R0_>C2_S1_I23", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Pensez-vous que vos enfants sont heureux que vous soyez ici ?", "next_id": "23", "target_node_id": "C2_S1_I23", "edge_id": "C2_S1_I11_R1_>C2_S1_I23", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Et vous pensez à ce que vos enfants resentent ?", "next_id": "23", "target_node_id": "C2_S1_I23", "edge_id": "C2_S1_I11_R2_>C2_S1_I23", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S1_I23", "actor": "Agathe", "text": "Je pense qu’ils doivent être soulagés. Silencieuse, vous laissez résonner le mot « soulagés »", "responses": [{"text": "Et vous, comment vous-sentez-vous ?", "next_id": "24", "target_node_id": "C2_S1_I24", "edge_id": "C2_S1_I23_R0_>C2_S1_I24", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Du coup ça va comment maintenant ?", "next_id": "24", "target_node_id": "C2_S1_I24", "edge_id": "C2_S1_I23_R1_>C2_S1_I24", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Bon, ça vous a aidé cette discussion ?", "next_id": "24", "target_node_id": "C2_S1_I24", "edge_id": "C2_S1_I23_R2_>C2_S1_I24", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S1_I24", "actor": "Agathe", "text": "Ça va mieux ! Merci Claude.", "responses": [{"text": "Si je peux me permettre de reprendre un peu notre conversation en amont, nous disions que le home c’est votre dernier lieu de vie. C’est bien ça ? Ou vous le diriez autrement ?", "next_id": "25", "target_node_id": "C2_S1_I25", "edge_id": "C2_S1_I24_R0_>C2_S1_I25", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Alors vous êtes d'accord que c'est aussi votre dernier lieu de vie non ?", "next_id": "25", "target_node_id": "C2_S1_I25", "edge_id": "C2_S1_I24_R1_>C2_S1_I25", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Ici c'est donc votre dernier lieu de vie, non ?", "next_id": "25", "target_node_id": "C2_S1_I25", "edge_id": "C2_S1_I24_R2_>C2_S1_I25", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S1_I25", "actor": "Agathe", "text": "Oui c’est ça !", "responses": [{"text": "En effet, mais avant d’y mourir, vous allez y vivre ! Le mieux possible. Ce serait comment pour vous, le mieux possible ?", "next_id": "26", "target_node_id": "C2_S1_I26", "edge_id": "C2_S1_I25_R0_>C2_S1_I26", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Vous allez évidement y mourir, mais vous allez aussi y vivre ! Comment aimeriez-vous passer cette dernière phase ?", "next_id": "26", "target_node_id": "C2_S1_I26", "edge_id": "C2_S1_I25_R1_>C2_S1_I26", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Arrêtez donc de penser que ce n'est que pour y mourir, vous allez aussi y vivre ! Il est surtout temps de savoir ce que vous aimeriez faire ?", "next_id": "26", "target_node_id": "C2_S1_I26", "edge_id": "C2_S1_I25_R2_>C2_S1_I26", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S1_I26", "actor": "Agathe", "text": "Revoir mon petit-fils ! Pouvoir choisir ce que je veux faire ! Me sentir bien !", "responses": [{"text": "Vous aimeriez revoir votre petit-fils ?", "next_id": "27", "target_node_id": "C2_S1_I27", "edge_id": "C2_S1_I26_R0_>C2_S1_I27", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Comment cela vivre tranquillement, à votre rythme ?", "next_id": "28", "target_node_id": "C2_S1_I28", "edge_id": "C2_S1_I26_R1_>C2_S1_I28", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Agathe, vous ne pouvez pas penser tout choisir… après quelques secondes, vous comprenez l'incohérence de votre discours. Vous ajoutez. Je suis partagée entre ce que vous me demandez et la réalité institutionnelle. J’ai à la fois envie de vous répondre oui, toutefois, selon vos voeux, je vais devoir négocier avec mes collèges.", "next_id": "29", "target_node_id": "C2_S1_I29", "edge_id": "C2_S1_I26_R2_>C2_S1_I29", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Rêver ?", "next_id": "30", "target_node_id": "C2_S1_I30", "edge_id": "C2_S1_I26_R3_>C2_S1_I30", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S1_I27", "actor": "Agathe", "text": "Oh oui, je tiens absolument à le revoir avant de m'en aller. Je m'envole pour quelques jours aux USA ? C'est la fête… mais peut-être ne va-t-il pas avoir envie d'accueillir sa grand-mère invalide…Quoique mon talon droit semble mieux aller, il doit être en voie de guérison.", "responses": [{"text": "Comme je suis venue pour l’insuline, je vous propose de la faire maintenant et de prendre un temps après les soins jeudi pour continuer à explorer ensemble votre nouvelle vie ici. Est-ce que ça vous convient ?", "next_id": "33", "target_node_id": "C2_S1_I33", "edge_id": "C2_S1_I27_R0_>C2_S1_I33", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Bon le temps passe, je vais faire l'insuline et on parlera jeudi. D'accord ?", "next_id": "33", "target_node_id": "C2_S1_I33", "edge_id": "C2_S1_I27_R1_>C2_S1_I33", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Allez on reprend jeudi, maintenant l'insuline ! Ça vous va ?", "next_id": "33", "target_node_id": "C2_S1_I33", "edge_id": "C2_S1_I27_R2_>C2_S1_I33", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S1_I33", "actor": "Agathe", "text": "J’aimerais bien continuer à discuter avec vous maintenant.", "responses": [{"text": "Vous répondez en souriant, tout en acquiesçant d’un signe de tête. Je comprends bien ! Moi aussi j’aurais du plaisir à continuer à discuter avec vous. Toutefois, je me dois de soigner d’autres résidents maintenant.", "next_id": "38", "target_node_id": "C2_S1_I38", "edge_id": "C2_S1_I33_R0_>C2_S1_I38", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Un peu agacée, vous acquiesez d’un signe de tête. Je voudrais bien, mais vous n'êtes pas la seule résidente !", "next_id": "38", "target_node_id": "C2_S1_I38", "edge_id": "C2_S1_I33_R1_>C2_S1_I38", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Vous acquiescez d’un signe de tête. Je comprend mais je dois aussi passer du temps avec les autres résidents.", "next_id": "38", "target_node_id": "C2_S1_I38", "edge_id": "C2_S1_I33_R2_>C2_S1_I38", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S1_I38", "actor": "Agathe", "text": "...", "responses": [{"text": "Il me semble que ça sera plus facile pour vous de continuer cette discussion après avoir fait connaissance des lieux. Je prendrai un temps pour discuter avec vous en dehors d’une activité de soins.", "next_id": "34", "target_node_id": "C2_S1_I34", "edge_id": "C2_S1_I38_R0_>C2_S1_I34", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "On reprendra le temps de discuter une fois que vous aurez fait le tour des lieux. On verra ça la prochaine fois.", "next_id": "34", "target_node_id": "C2_S1_I34", "edge_id": "C2_S1_I38_R1_>C2_S1_I34", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Bon arrêtez de vous faire du souci, on fera le tour des lieux et on continuera à discuter la prochaine fois que je passe.", "next_id": "34", "target_node_id": "C2_S1_I34", "edge_id": "C2_S1_I38_R2_>C2_S1_I34", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S1_I34", "actor": "Agathe", "text": "Mais quand ?", "responses": [{"text": "Jeudi après les soins.", "next_id": "35", "target_node_id": "C2_S1_I35", "edge_id": "C2_S1_I34_R0_>C2_S1_I35", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Jeudi dans la journée.", "next_id": "35", "target_node_id": "C2_S1_I35", "edge_id": "C2_S1_I34_R1_>C2_S1_I35", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Après-demain Agathe.", "next_id": "35", "target_node_id": "C2_S1_I35", "edge_id": "C2_S1_I34_R2_>C2_S1_I35", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S1_I35", "actor": "Agathe", "text": "Mais ça veut dire que je ne vous verrai pas demain.", "responses": [{"text": "Non, le mercredi c’est mon jour de congé. Vous préparez l’injection et lui administrez l’insuline. Le petit déjeuner d’Agathe lui est servi dans sa chambre. Au revoir Agathe. Je me réjouis de vous revoir jeudi. Bon appétit !", "next_id": "36", "target_node_id": "C2_S1_I36", "edge_id": "C2_S1_I35_R0_>C2_S1_I36", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Non, demain je me repose. Vous préparez l’injection et lui administrez l’insuline. Le petit déjeuner d’Agathe lui est servi dans sa chambre. Au revoir Agathe. Je me réjouis de vous revoir jeudi. Bon appétit !", "next_id": "36", "target_node_id": "C2_S1_I36", "edge_id": "C2_S1_I35_R1_>C2_S1_I36", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Non, j'ai un jour de repos bien mérité demain ! Vous préparez l’injection et lui administrez l’insuline. Le petit déjeuner d’Agathe lui est servi dans sa chambre. Au revoir Agathe. Je me réjouis de vous revoir jeudi. Bon appétit !", "next_id": "36", "target_node_id": "C2_S1_I36", "edge_id": "C2_S1_I35_R2_>C2_S1_I36", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S1_I36", "actor": "Agathe", "text": "Merci Claude. Au revoir.", "responses": [{"text": "Vous sortez de la chambre", "next_id": "-1", "target_node_id": "", "edge_id": "", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S1_I28", "actor": "Agathe", "text": "Après quelques minutes de silence Agathe répond : Cela va être difficile, je suis justement dans un home et partage une vie avec un grand nombre de résidents ! Alors quoi bon me demander ce que vivre le mieux possible signifie pour moi ?", "responses": [{"text": "Il me semble que ça sera plus facile pour vous de continuer cette discussion après avoir fait connaissance des lieux. Je prendrai un temps pour discuter avec vous en dehors d’une activité de soins.", "next_id": "34", "target_node_id": "C2_S1_I34", "edge_id": "C2_S1_I28_R0_>C2_S1_I34", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "On reprendra le temps de discuter une fois que vous aurez fait le tour des lieux. On verra ça la prochaine fois.", "next_id": "34", "target_node_id": "C2_S1_I34", "edge_id": "C2_S1_I28_R1_>C2_S1_I34", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Bon arrêtez de vous faire du souci, on fera le tour des lieux et on continuera à discuter la prochaine fois que je passe.", "next_id": "34", "target_node_id": "C2_S1_I34", "edge_id": "C2_S1_I28_R2_>C2_S1_I34", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S1_I29", "actor": "Agathe", "text": "Agathe la regarde toujours, son sourire à disparu, les étoiles dans ses yeux ont disparu elles aussi… elle n'écoute déjà plus les paroles de Claude.", "responses": [{"text": "Vous sortez de la chambre.", "next_id": "-1", "target_node_id": "", "edge_id": "", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S1_I30", "actor": "Agathe", "text": "Agathe acquiesce d'un signe de tête, tout en regardant Claude dans les yeux, elle sourit franchement en soupirant. Vivre tranquillement, à mon rythme sans être obligée de faire quoi que ce soit !", "responses": [{"text": "Comment vous viviez votre quotidien à la maison ?", "next_id": "31", "target_node_id": "C2_S1_I31", "edge_id": "C2_S1_I30_R0_>C2_S1_I31", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Chez vous, c'était comment un jour dans la vie de Agathe ?", "next_id": "31", "target_node_id": "C2_S1_I31", "edge_id": "C2_S1_I30_R1_>C2_S1_I31", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S1_I31", "actor": "Agathe", "text": "Je m’occupais de mon ménage, de mon jardin, c’était beaucoup de travail !", "responses": [{"text": "Si je comprends bien, pour vous le travail c’est toute votre vie ! Je retrouve ce que disait mon grand-père ! Il devait traire les vaches et amener le lait à la laiterie avant d’aller à l’école. Si je résume ce qu’on a vu ensemble, Agathe, on a déjà un peu exploré votre vision du home et votre ressenti.", "next_id": "32", "target_node_id": "C2_S1_I32", "edge_id": "C2_S1_I31_R0_>C2_S1_I32", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Exactement comme mon grand-père ! Bon on a déjà discuté de ce que vous pensiez du home et de ce que vous ressentez.", "next_id": "32", "target_node_id": "C2_S1_I32", "edge_id": "C2_S1_I31_R1_>C2_S1_I32", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S1_I32", "actor": "Agathe", "text": "...", "responses": [{"text": "Comme je suis venue pour l’insuline, je vous propose de la faire maintenant et de prendre un temps après les soins jeudi pour continuer à explorer ensemble votre nouvelle vie ici. Est-ce que ça vous convient ?", "next_id": "33", "target_node_id": "C2_S1_I33", "edge_id": "C2_S1_I32_R0_>C2_S1_I33", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Bon le temps passe, je vais faire l'insuline et on parlera jeudi. D'accord ?", "next_id": "33", "target_node_id": "C2_S1_I33", "edge_id": "C2_S1_I32_R1_>C2_S1_I33", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Allez on reprend jeudi, maintenant l'insuline ! Ça vous va ?", "next_id": "33", "target_node_id": "C2_S1_I33", "edge_id": "C2_S1_I32_R2_>C2_S1_I33", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S1_I20", "actor": "Agathe", "text": "Agathe reste silencieuse.", "responses": [{"text": "Si je me souviens bien, vous m’avez dit que vous aviez le sentiment d’être abandonnée par vos enfants.", "next_id": "22", "target_node_id": "C2_S1_I22", "edge_id": "C2_S1_I20_R0_>C2_S1_I22", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Bon et ce sentiment d'abandon ?", "next_id": "22", "target_node_id": "C2_S1_I22", "edge_id": "C2_S1_I20_R1_>C2_S1_I22", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Du coup en plus de vous sentir trahie, vous avez un sentiment d'abandon ?", "next_id": "22", "target_node_id": "C2_S1_I22", "edge_id": "C2_S1_I20_R2_>C2_S1_I22", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S1_I21", "actor": "Agathe", "text": "Agathe regarde Claude en secouant la tête et sans plus avoir envie de répondre.", "responses": [{"text": "Si je peux me permettre de reprendre un peu notre conversation en amont, nous disions que le home c’est votre dernier lieu de vie. C’est bien ça ? Ou vous le diriez autrement ?", "next_id": "25", "target_node_id": "C2_S1_I25", "edge_id": "C2_S1_I21_R0_>C2_S1_I25", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Alors vous êtes d'accord que c'est aussi votre dernier lieu de vie non ?", "next_id": "25", "target_node_id": "C2_S1_I25", "edge_id": "C2_S1_I21_R1_>C2_S1_I25", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Ici c'est donc votre dernier lieu de vie, non ?", "next_id": "25", "target_node_id": "C2_S1_I25", "edge_id": "C2_S1_I21_R2_>C2_S1_I25", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S1_I14", "actor": "Agathe", "text": "Agathe la regarde attentivement, surprise par la franchise de Claude. Tous ceux qui sont venus aux Lilas sont morts aux Lilas.", "responses": [{"text": "Si je posais la question aux vieux de votre village, qu’en diraient-ils ?", "next_id": "15", "target_node_id": "C2_S1_I15", "edge_id": "C2_S1_I14_R0_>C2_S1_I15", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Que diraient ceux qui, comme vous, sont passés par ici ?", "next_id": "15", "target_node_id": "C2_S1_I15", "edge_id": "C2_S1_I14_R1_>C2_S1_I15", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Pleins d'autre ont aussi dû passer par ici Agathe, qu'en penseraient-ils ?", "next_id": "15", "target_node_id": "C2_S1_I15", "edge_id": "C2_S1_I14_R2_>C2_S1_I15", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S1_I37", "actor": "Agathe", "text": "...", "responses": [{"text": "Sortir", "next_id": "-1", "target_node_id": "", "edge_id": "", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S1_I9", "actor": "Agathe", "text": "...", "responses": [{"text": "Que pensez-vous que diraient vos enfants s’ils vous entendaient ? ", "next_id": "8", "target_node_id": "C2_S1_I8", "edge_id": "C2_S1_I9_R0_>C2_S1_I8", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Je me demande ce que diraient vos enfants s’ils vous entendaient ?", "next_id": "10", "target_node_id": "C2_S1_I10", "edge_id": "C2_S1_I9_R1_>C2_S1_I10", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S1_I5", "actor": "Agathe", "text": "Agathe d'un ton vif et rapide. Mais, mais, mais ces jeunes… vous n'y comprenez vraiment rien !", "responses": [{"text": "En effet, je vous ai mal comprise, dites m’en un peu plus Agathe ?", "next_id": "7", "target_node_id": "C2_S1_I7", "edge_id": "C2_S1_I5_R0_>C2_S1_I7", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Il m’est difficile de vous comprendre et vous semblez agacée.", "next_id": "6", "target_node_id": "C2_S1_I6", "edge_id": "C2_S1_I5_R1_>C2_S1_I6", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S1_I6", "actor": "Agathe", "text": "Agathe tourne la tête ostensiblement et regarde par la fenêtre, elle serre les poings de colère.", "responses": [{"text": "Je sors de la chambre", "next_id": "-1", "target_node_id": "", "edge_id": "", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "...", "next_id": "12", "target_node_id": "C2_S1_I12", "edge_id": "C2_S1_I6_R1_>C2_S1_I12", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S1_I4", "actor": "Agathe", "text": "Je n’ai pas bien dormi, mais c'est bien normal, je ne suis ni chez moi, ni dans mon lit, et qu'est-ce que vous pourriez  bien y faire ? Mon mari me manque. J’aimerais le rejoindre! Mes enfants m’ont abandonné et pourtant je les aime tellement fort. Je me sens seule !", "responses": [{"text": "Seule !", "next_id": "8", "target_node_id": "C2_S1_I8", "edge_id": "C2_S1_I4_R0_>C2_S1_I8", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Si je vous comprends bien, vous aimez forts vos enfants bien qu’ils vous ont abandonnés, vous éprouvez un sentiment quelque peu contradictoire et… cela vous est difficile. Je prends une chaise pour m'asseoir aux côtés d’Agathe. Je me positionne en face d’Agathe, assise le buste penchée en avant et regardant la résidente dans les yeux, elle s’exprime d’un ton calme et posé dans un rythme lent.", "next_id": "9", "target_node_id": "C2_S1_I9", "edge_id": "C2_S1_I4_R1_>C2_S1_I9", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Que pensez-vous que diraient vos enfants s’ils vous entendaient ?", "next_id": "11", "target_node_id": "C2_S1_I11", "edge_id": "C2_S1_I4_R2_>C2_S1_I11", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Je me demande ce que diraient vos enfants s’ils vous entendaient ?", "next_id": "10", "target_node_id": "C2_S1_I10", "edge_id": "C2_S1_I4_R3_>C2_S1_I10", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Comment cela, rejoindre votre mari ? Avez-vous déjà pensé à vous faire du mal ?", "next_id": "5", "target_node_id": "C2_S1_I5", "edge_id": "C2_S1_I4_R4_>C2_S1_I5", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}], "id_to_parcours": {"1": {"node_id": "C2_S1_I1", "actor": "Claude", "text": "Claude frappe à la porte d’Agathe puis entre", "responses": [{"text": "Bonjour Agathe. Comment s'est passée votre nuit ?", "next_id": "2", "target_node_id": "C2_S1_I2", "edge_id": "C2_S1_I1_R0_>C2_S1_I2", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Bonjour ! Alors Agathe, bien pioncé ?", "next_id": "2", "target_node_id": "C2_S1_I2", "edge_id": "C2_S1_I1_R1_>C2_S1_I2", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Bonjour Agathe, pas trop dur cette nuit ?", "next_id": "2", "target_node_id": "C2_S1_I2", "edge_id": "C2_S1_I1_R2_>C2_S1_I2", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "2": {"node_id": "C2_S1_I2", "actor": "Agathe", "text": "Bonjour Claude. Je peine à trouver le sommeil. Vous savez, à mon âge, les nuits sont courtes. Agathe sort un mouchoir de sa table de nuit pour s’essuyer les yeux. Elle pleure.", "responses": [{"text": "Je m'accroupis devant Agathe et je me tiens aux manches du fauteuil.", "next_id": "3", "target_node_id": "C2_S1_I3", "edge_id": "C2_S1_I2_R0_>C2_S1_I3", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Je m'approche du bord du lit d'Agathe tout en me baissant.", "next_id": "3", "target_node_id": "C2_S1_I3", "edge_id": "C2_S1_I2_R1_>C2_S1_I3", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Je m'approche d’Agathe en m'appuyant sur le bord du lit et je me penche au-dessus d’elle", "next_id": "3", "target_node_id": "C2_S1_I3", "edge_id": "C2_S1_I2_R2_>C2_S1_I3", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "3": {"node_id": "C2_S1_I3", "actor": "Agathe", "text": "...", "responses": [{"text": "Vous me semblez triste ? … je vous vois en larme et les yeux rougis.", "next_id": "7", "target_node_id": "C2_S1_I7", "edge_id": "C2_S1_I3_R0_>C2_S1_I7", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Vous me semblez triste ? … je vous vois en larme et les yeux rougis.", "next_id": "4", "target_node_id": "C2_S1_I4", "edge_id": "C2_S1_I3_R1_>C2_S1_I4", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Vous me dites ne pas avoir bien dormi, la veilleuse a toutefois observé que  vous dormiez.  Que se passe-t-il pour vous ?", "next_id": "5", "target_node_id": "C2_S1_I5", "edge_id": "C2_S1_I3_R2_>C2_S1_I5", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "7": {"node_id": "C2_S1_I7", "actor": "Agathe", "text": "Mon mari me manque. J’aimerais le rejoindre! Mes enfants m’ont abandonné et pourtant je les aime tellement fort. Je me sens seule !", "responses": [{"text": "Seule !", "next_id": "8", "target_node_id": "C2_S1_I8", "edge_id": "C2_S1_I7_R0_>C2_S1_I8", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Si je vous comprends bien, vous aimez forts vos enfants bien qu’ils vous ont abandonnés, vous éprouvez un sentiment quelque peu contradictoire et… cela vous est difficile. Je prends une chaise pour m'asseoir aux côtés d’Agathe. Je me positionne en face d’Agathe, assise le buste penchée en avant et regardant la résidente dans les yeux, elle s’exprime d’un ton calme et posé dans un rythme lent.", "next_id": "9", "target_node_id": "C2_S1_I9", "edge_id": "C2_S1_I7_R1_>C2_S1_I9", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Que pensez-vous que diraient vos enfants s’ils vous entendaient ?", "next_id": "11", "target_node_id": "C2_S1_I11", "edge_id": "C2_S1_I7_R2_>C2_S1_I11", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Je me demande ce que diraient vos enfants s’ils vous entendaient ?", "next_id": "10", "target_node_id": "C2_S1_I10", "edge_id": "C2_S1_I7_R3_>C2_S1_I10", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Comment cela, rejoindre votre mari ? Avez-vous déjà pensé à vous faire du mal ?", "next_id": "5", "target_node_id": "C2_S1_I5", "edge_id": "C2_S1_I7_R4_>C2_S1_I5", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "8": {"node_id": "C2_S1_I8", "actor": "Agathe", "text": "Vous comprenez mes enfants ont leur vie. Ils sont loin d’ici ! En plus ils m’ont placé !", "responses": [{"text": "Oui, bien sûr ! Mais qu’est-ce qui a changé ? Qu’est-ce qui renforce ce sentiment de solitude ?", "next_id": "13", "target_node_id": "C2_S1_I13", "edge_id": "C2_S1_I8_R0_>C2_S1_I13", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Oui, je comprends, avec ce sentiment il vous est difficile de vous endormir.", "next_id": "12", "target_node_id": "C2_S1_I12", "edge_id": "C2_S1_I8_R1_>C2_S1_I12", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Cela vous attriste ?", "next_id": "13", "target_node_id": "C2_S1_I13", "edge_id": "C2_S1_I8_R2_>C2_S1_I13", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "13": {"node_id": "C2_S1_I13", "actor": "Agathe", "text": "Je sais pas ce que je fais ici ! Les vieux viennent ici pour mourir ! Je prends une chaise pour m'asseoir aux côtés d’Agathe. Je me positionne en face d’Agathe, assise le buste penchée en avant et regardant la résidente dans les yeux, elle s’exprime d’un ton calme et posé dans un rythme lent.", "responses": [{"text": "Pour vous, c’est seulement un lieu pour mourir ?", "next_id": "12", "target_node_id": "C2_S1_I12", "edge_id": "C2_S1_I13_R0_>C2_S1_I12", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Le home, n'est-il pas aussi un lieu de vie ?", "next_id": "12", "target_node_id": "C2_S1_I12", "edge_id": "C2_S1_I13_R1_>C2_S1_I12", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "C'est vrai… je réponds, qui renvoyée à la réalité de l'expérience de ma grand-maman, ne peut en dire plus ! puis, Excusez-moi Agathe, je suis rattrapée par un souvenir personnel. Que me disiez-vous ?", "next_id": "14", "target_node_id": "C2_S1_I14", "edge_id": "C2_S1_I13_R2_>C2_S1_I14", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Je m'en vais les larmes aux yeux et vais chercher une collègue pour me remplacer.", "next_id": "37", "target_node_id": "C2_S1_I37", "edge_id": "C2_S1_I13_R3_>C2_S1_I37", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "12": {"node_id": "C2_S1_I12", "actor": "Agathe", "text": "Tous ceux qui sont venus aux Lilas sont morts aux Lilas.", "responses": [{"text": "Si je posais la question aux vieux de votre village, qu’en diraient-ils ?", "next_id": "15", "target_node_id": "C2_S1_I15", "edge_id": "C2_S1_I12_R0_>C2_S1_I15", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Que diraient ceux qui, comme vous, sont passés par ici ?", "next_id": "15", "target_node_id": "C2_S1_I15", "edge_id": "C2_S1_I12_R1_>C2_S1_I15", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Pleins d'autre ont aussi dû passer par ici Agathe, qu'en penseraient-ils ?", "next_id": "15", "target_node_id": "C2_S1_I15", "edge_id": "C2_S1_I12_R2_>C2_S1_I15", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "15": {"node_id": "C2_S1_I15", "actor": "Agathe", "text": "Ils ont pas eu le choix ! Mais ils pouvaient plus vivre à la maison. Quand je pense à mon cousin Marcel, il pouvait plus se débrouiller tout seul.", "responses": [{"text": "Comment ça s’est passé pour lui son séjour aux Lilas ?", "next_id": "16", "target_node_id": "C2_S1_I16", "edge_id": "C2_S1_I15_R0_>C2_S1_I16", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "S'est-il plû aux Lilas ?", "next_id": "16", "target_node_id": "C2_S1_I16", "edge_id": "C2_S1_I15_R1_>C2_S1_I16", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Je suis sûre que sont séjour était très agréable !", "next_id": "16", "target_node_id": "C2_S1_I16", "edge_id": "C2_S1_I15_R2_>C2_S1_I16", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "16": {"node_id": "C2_S1_I16", "actor": "Agathe", "text": "Il est mort trois jours après !", "responses": [{"text": "Est-ce que vous imaginez vivre la même chose ?", "next_id": "17", "target_node_id": "C2_S1_I17", "edge_id": "C2_S1_I16_R0_>C2_S1_I17", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Vous êtes en pleine forme, pensez-vous vraiment que cela va vous arriver ?<", "next_id": "17", "target_node_id": "C2_S1_I17", "edge_id": "C2_S1_I16_R1_>C2_S1_I17", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Arrêtez voir de vous faire du souci, pensez-vous vraiment que vous allez mourir dans 3 jours ?", "next_id": "17", "target_node_id": "C2_S1_I17", "edge_id": "C2_S1_I16_R2_>C2_S1_I17", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "17": {"node_id": "C2_S1_I17", "actor": "Agathe", "text": "Oui et ça me fait peur !", "responses": [{"text": "Je comprends bien votre peur. Et en même temps, il se peut que vous viviez encore quelques mois avec nous ! Vous connaissez Séraphine ?", "next_id": "18", "target_node_id": "C2_S1_I18", "edge_id": "C2_S1_I17_R0_>C2_S1_I18", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Vous dîtes n'importe quoi, regardez Séraphine.", "next_id": "18", "target_node_id": "C2_S1_I18", "edge_id": "C2_S1_I17_R1_>C2_S1_I18", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Je suis sûre que votre séjour sera autant long que celui de Séraphine.", "next_id": "18", "target_node_id": "C2_S1_I18", "edge_id": "C2_S1_I17_R2_>C2_S1_I18", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "18": {"node_id": "C2_S1_I18", "actor": "Agathe", "text": "Séraphine du boulanger ?", "responses": [{"text": "Oui ! Et bien, Séraphine vit ici depuis sept mois.", "next_id": "19", "target_node_id": "C2_S1_I19", "edge_id": "C2_S1_I18_R0_>C2_S1_I19", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Elle-même ! Vous voyez, soyez un peu plus courageuse.", "next_id": "19", "target_node_id": "C2_S1_I19", "edge_id": "C2_S1_I18_R1_>C2_S1_I19", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Oui et elle ne passe pas son temps à se plaindre.", "next_id": "19", "target_node_id": "C2_S1_I19", "edge_id": "C2_S1_I18_R2_>C2_S1_I19", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "19": {"node_id": "C2_S1_I19", "actor": "Agathe", "text": "Agathe soupire. Vous percevez Agathe plus détendue, les traits de son visage s’adoucissent, elle respire calment. Un long silence s'installe...", "responses": [{"text": "Vous pourriez m’en dire un peu plus.", "next_id": "10", "target_node_id": "C2_S1_I10", "edge_id": "C2_S1_I19_R0_>C2_S1_I10", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Personne ne choisirait d'aller en home, me semble-t-il ?", "next_id": "20", "target_node_id": "C2_S1_I20", "edge_id": "C2_S1_I19_R1_>C2_S1_I20", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Pourquoi pas le home ?", "next_id": "21", "target_node_id": "C2_S1_I21", "edge_id": "C2_S1_I19_R2_>C2_S1_I21", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "10": {"node_id": "C2_S1_I10", "actor": "Agathe", "text": "Qui choisit vraiment d'aller en home ? Seules nos enfants pensent que nous y sommes bien ! Agathe reste silencieuse.", "responses": [{"text": "Si je me souviens bien, vous m’avez dit que vous aviez le sentiment d’être abandonnée par vos enfants.", "next_id": "22", "target_node_id": "C2_S1_I22", "edge_id": "C2_S1_I10_R0_>C2_S1_I22", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Bon et ce sentiment d'abandon ?", "next_id": "22", "target_node_id": "C2_S1_I22", "edge_id": "C2_S1_I10_R1_>C2_S1_I22", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Du coup en plus de vous sentir trahie, vous avez un sentiment d'abandon ?", "next_id": "22", "target_node_id": "C2_S1_I22", "edge_id": "C2_S1_I10_R2_>C2_S1_I22", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "22": {"node_id": "C2_S1_I22", "actor": "Agathe", "text": "...", "responses": [{"text": "Si je m’adressais à vos enfants, que me diraient ils de ce sentiment d’abandon ?", "next_id": "11", "target_node_id": "C2_S1_I11", "edge_id": "C2_S1_I22_R0_>C2_S1_I11", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Et vos enfants, que pensez-vous qu'diraient de votre sentiment d'abandon ?", "next_id": "11", "target_node_id": "C2_S1_I11", "edge_id": "C2_S1_I22_R1_>C2_S1_I11", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Vous et votre abandon...Que pensez-vous que vos enfant diraient ?", "next_id": "11", "target_node_id": "C2_S1_I11", "edge_id": "C2_S1_I22_R2_>C2_S1_I11", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "11": {"node_id": "C2_S1_I11", "actor": "Agathe", "text": "Que je suis bien ici. Qu’il y a des gens qui sont là pour s’occuper de moi. Qu’ils se sont fait beaucoup de soucis quand j’étais seul à la maison. Ils avaient peur que je tombe, que je ne mange pas assez.", "responses": [{"text": "Que pensez-vous que vos enfants ressentent, maintenant que vous êtes ici ?", "next_id": "23", "target_node_id": "C2_S1_I23", "edge_id": "C2_S1_I11_R0_>C2_S1_I23", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Pensez-vous que vos enfants sont heureux que vous soyez ici ?", "next_id": "23", "target_node_id": "C2_S1_I23", "edge_id": "C2_S1_I11_R1_>C2_S1_I23", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Et vous pensez à ce que vos enfants resentent ?", "next_id": "23", "target_node_id": "C2_S1_I23", "edge_id": "C2_S1_I11_R2_>C2_S1_I23", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "23": {"node_id": "C2_S1_I23", "actor": "Agathe", "text": "Je pense qu’ils doivent être soulagés. Silencieuse, vous laissez résonner le mot « soulagés »", "responses": [{"text": "Et vous, comment vous-sentez-vous ?", "next_id": "24", "target_node_id": "C2_S1_I24", "edge_id": "C2_S1_I23_R0_>C2_S1_I24", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Du coup ça va comment maintenant ?", "next_id": "24", "target_node_id": "C2_S1_I24", "edge_id": "C2_S1_I23_R1_>C2_S1_I24", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Bon, ça vous a aidé cette discussion ?", "next_id": "24", "target_node_id": "C2_S1_I24", "edge_id": "C2_S1_I23_R2_>C2_S1_I24", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "24": {"node_id": "C2_S1_I24", "actor": "Agathe", "text": "Ça va mieux ! Merci Claude.", "responses": [{"text": "Si je peux me permettre de reprendre un peu notre conversation en amont, nous disions que le home c’est votre dernier lieu de vie. C’est bien ça ? Ou vous le diriez autrement ?", "next_id": "25", "target_node_id": "C2_S1_I25", "edge_id": "C2_S1_I24_R0_>C2_S1_I25", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Alors vous êtes d'accord que c'est aussi votre dernier lieu de vie non ?", "next_id": "25", "target_node_id": "C2_S1_I25", "edge_id": "C2_S1_I24_R1_>C2_S1_I25", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Ici c'est donc votre dernier lieu de vie, non ?", "next_id": "25", "target_node_id": "C2_S1_I25", "edge_id": "C2_S1_I24_R2_>C2_S1_I25", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "25": {"node_id": "C2_S1_I25", "actor": "Agathe", "text": "Oui c’est ça !", "responses": [{"text": "En effet, mais avant d’y mourir, vous allez y vivre ! Le mieux possible. Ce serait comment pour vous, le mieux possible ?", "next_id": "26", "target_node_id": "C2_S1_I26", "edge_id": "C2_S1_I25_R0_>C2_S1_I26", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Vous allez évidement y mourir, mais vous allez aussi y vivre ! Comment aimeriez-vous passer cette dernière phase ?", "next_id": "26", "target_node_id": "C2_S1_I26", "edge_id": "C2_S1_I25_R1_>C2_S1_I26", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Arrêtez donc de penser que ce n'est que pour y mourir, vous allez aussi y vivre ! Il est surtout temps de savoir ce que vous aimeriez faire ?", "next_id": "26", "target_node_id": "C2_S1_I26", "edge_id": "C2_S1_I25_R2_>C2_S1_I26", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "26": {"node_id": "C2_S1_I26", "actor": "Agathe", "text": "Revoir mon petit-fils ! Pouvoir choisir ce que je veux faire ! Me sentir bien !", "responses": [{"text": "Vous aimeriez revoir votre petit-fils ?", "next_id": "27", "target_node_id": "C2_S1_I27", "edge_id": "C2_S1_I26_R0_>C2_S1_I27", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Comment cela vivre tranquillement, à votre rythme ?", "next_id": "28", "target_node_id": "C2_S1_I28", "edge_id": "C2_S1_I26_R1_>C2_S1_I28", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Agathe, vous ne pouvez pas penser tout choisir… après quelques secondes, vous comprenez l'incohérence de votre discours. Vous ajoutez. Je suis partagée entre ce que vous me demandez et la réalité institutionnelle. J’ai à la fois envie de vous répondre oui, toutefois, selon vos voeux, je vais devoir négocier avec mes collèges.", "next_id": "29", "target_node_id": "C2_S1_I29", "edge_id": "C2_S1_I26_R2_>C2_S1_I29", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Rêver ?", "next_id": "30", "target_node_id": "C2_S1_I30", "edge_id": "C2_S1_I26_R3_>C2_S1_I30", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "27": {"node_id": "C2_S1_I27", "actor": "Agathe", "text": "Oh oui, je tiens absolument à le revoir avant de m'en aller. Je m'envole pour quelques jours aux USA ? C'est la fête… mais peut-être ne va-t-il pas avoir envie d'accueillir sa grand-mère invalide…Quoique mon talon droit semble mieux aller, il doit être en voie de guérison.", "responses": [{"text": "Comme je suis venue pour l’insuline, je vous propose de la faire maintenant et de prendre un temps après les soins jeudi pour continuer à explorer ensemble votre nouvelle vie ici. Est-ce que ça vous convient ?", "next_id": "33", "target_node_id": "C2_S1_I33", "edge_id": "C2_S1_I27_R0_>C2_S1_I33", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Bon le temps passe, je vais faire l'insuline et on parlera jeudi. D'accord ?", "next_id": "33", "target_node_id": "C2_S1_I33", "edge_id": "C2_S1_I27_R1_>C2_S1_I33", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Allez on reprend jeudi, maintenant l'insuline ! Ça vous va ?", "next_id": "33", "target_node_id": "C2_S1_I33", "edge_id": "C2_S1_I27_R2_>C2_S1_I33", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "33": {"node_id": "C2_S1_I33", "actor": "Agathe", "text": "J’aimerais bien continuer à discuter avec vous maintenant.", "responses": [{"text": "Vous répondez en souriant, tout en acquiesçant d’un signe de tête. Je comprends bien ! Moi aussi j’aurais du plaisir à continuer à discuter avec vous. Toutefois, je me dois de soigner d’autres résidents maintenant.", "next_id": "38", "target_node_id": "C2_S1_I38", "edge_id": "C2_S1_I33_R0_>C2_S1_I38", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Un peu agacée, vous acquiesez d’un signe de tête. Je voudrais bien, mais vous n'êtes pas la seule résidente !", "next_id": "38", "target_node_id": "C2_S1_I38", "edge_id": "C2_S1_I33_R1_>C2_S1_I38", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Vous acquiescez d’un signe de tête. Je comprend mais je dois aussi passer du temps avec les autres résidents.", "next_id": "38", "target_node_id": "C2_S1_I38", "edge_id": "C2_S1_I33_R2_>C2_S1_I38", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "38": {"node_id": "C2_S1_I38", "actor": "Agathe", "text": "...", "responses": [{"text": "Il me semble que ça sera plus facile pour vous de continuer cette discussion après avoir fait connaissance des lieux. Je prendrai un temps pour discuter avec vous en dehors d’une activité de soins.", "next_id": "34", "target_node_id": "C2_S1_I34", "edge_id": "C2_S1_I38_R0_>C2_S1_I34", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "On reprendra le temps de discuter une fois que vous aurez fait le tour des lieux. On verra ça la prochaine fois.", "next_id": "34", "target_node_id": "C2_S1_I34", "edge_id": "C2_S1_I38_R1_>C2_S1_I34", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Bon arrêtez de vous faire du souci, on fera le tour des lieux et on continuera à discuter la prochaine fois que je passe.", "next_id": "34", "target_node_id": "C2_S1_I34", "edge_id": "C2_S1_I38_R2_>C2_S1_I34", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "34": {"node_id": "C2_S1_I34", "actor": "Agathe", "text": "Mais quand ?", "responses": [{"text": "Jeudi après les soins.", "next_id": "35", "target_node_id": "C2_S1_I35", "edge_id": "C2_S1_I34_R0_>C2_S1_I35", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Jeudi dans la journée.", "next_id": "35", "target_node_id": "C2_S1_I35", "edge_id": "C2_S1_I34_R1_>C2_S1_I35", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Après-demain Agathe.", "next_id": "35", "target_node_id": "C2_S1_I35", "edge_id": "C2_S1_I34_R2_>C2_S1_I35", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "35": {"node_id": "C2_S1_I35", "actor": "Agathe", "text": "Mais ça veut dire que je ne vous verrai pas demain.", "responses": [{"text": "Non, le mercredi c’est mon jour de congé. Vous préparez l’injection et lui administrez l’insuline. Le petit déjeuner d’Agathe lui est servi dans sa chambre. Au revoir Agathe. Je me réjouis de vous revoir jeudi. Bon appétit !", "next_id": "36", "target_node_id": "C2_S1_I36", "edge_id": "C2_S1_I35_R0_>C2_S1_I36", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Non, demain je me repose. Vous préparez l’injection et lui administrez l’insuline. Le petit déjeuner d’Agathe lui est servi dans sa chambre. Au revoir Agathe. Je me réjouis de vous revoir jeudi. Bon appétit !", "next_id": "36", "target_node_id": "C2_S1_I36", "edge_id": "C2_S1_I35_R1_>C2_S1_I36", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Non, j'ai un jour de repos bien mérité demain ! Vous préparez l’injection et lui administrez l’insuline. Le petit déjeuner d’Agathe lui est servi dans sa chambre. Au revoir Agathe. Je me réjouis de vous revoir jeudi. Bon appétit !", "next_id": "36", "target_node_id": "C2_S1_I36", "edge_id": "C2_S1_I35_R2_>C2_S1_I36", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "36": {"node_id": "C2_S1_I36", "actor": "Agathe", "text": "Merci Claude. Au revoir.", "responses": [{"text": "Vous sortez de la chambre", "next_id": "-1", "target_node_id": "", "edge_id": "", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "28": {"node_id": "C2_S1_I28", "actor": "Agathe", "text": "Après quelques minutes de silence Agathe répond : Cela va être difficile, je suis justement dans un home et partage une vie avec un grand nombre de résidents ! Alors quoi bon me demander ce que vivre le mieux possible signifie pour moi ?", "responses": [{"text": "Il me semble que ça sera plus facile pour vous de continuer cette discussion après avoir fait connaissance des lieux. Je prendrai un temps pour discuter avec vous en dehors d’une activité de soins.", "next_id": "34", "target_node_id": "C2_S1_I34", "edge_id": "C2_S1_I28_R0_>C2_S1_I34", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "On reprendra le temps de discuter une fois que vous aurez fait le tour des lieux. On verra ça la prochaine fois.", "next_id": "34", "target_node_id": "C2_S1_I34", "edge_id": "C2_S1_I28_R1_>C2_S1_I34", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Bon arrêtez de vous faire du souci, on fera le tour des lieux et on continuera à discuter la prochaine fois que je passe.", "next_id": "34", "target_node_id": "C2_S1_I34", "edge_id": "C2_S1_I28_R2_>C2_S1_I34", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "29": {"node_id": "C2_S1_I29", "actor": "Agathe", "text": "Agathe la regarde toujours, son sourire à disparu, les étoiles dans ses yeux ont disparu elles aussi… elle n'écoute déjà plus les paroles de Claude.", "responses": [{"text": "Vous sortez de la chambre.", "next_id": "-1", "target_node_id": "", "edge_id": "", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "30": {"node_id": "C2_S1_I30", "actor": "Agathe", "text": "Agathe acquiesce d'un signe de tête, tout en regardant Claude dans les yeux, elle sourit franchement en soupirant. Vivre tranquillement, à mon rythme sans être obligée de faire quoi que ce soit !", "responses": [{"text": "Comment vous viviez votre quotidien à la maison ?", "next_id": "31", "target_node_id": "C2_S1_I31", "edge_id": "C2_S1_I30_R0_>C2_S1_I31", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Chez vous, c'était comment un jour dans la vie de Agathe ?", "next_id": "31", "target_node_id": "C2_S1_I31", "edge_id": "C2_S1_I30_R1_>C2_S1_I31", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "31": {"node_id": "C2_S1_I31", "actor": "Agathe", "text": "Je m’occupais de mon ménage, de mon jardin, c’était beaucoup de travail !", "responses": [{"text": "Si je comprends bien, pour vous le travail c’est toute votre vie ! Je retrouve ce que disait mon grand-père ! Il devait traire les vaches et amener le lait à la laiterie avant d’aller à l’école. Si je résume ce qu’on a vu ensemble, Agathe, on a déjà un peu exploré votre vision du home et votre ressenti.", "next_id": "32", "target_node_id": "C2_S1_I32", "edge_id": "C2_S1_I31_R0_>C2_S1_I32", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Exactement comme mon grand-père ! Bon on a déjà discuté de ce que vous pensiez du home et de ce que vous ressentez.", "next_id": "32", "target_node_id": "C2_S1_I32", "edge_id": "C2_S1_I31_R1_>C2_S1_I32", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "32": {"node_id": "C2_S1_I32", "actor": "Agathe", "text": "...", "responses": [{"text": "Comme je suis venue pour l’insuline, je vous propose de la faire maintenant et de prendre un temps après les soins jeudi pour continuer à explorer ensemble votre nouvelle vie ici. Est-ce que ça vous convient ?", "next_id": "33", "target_node_id": "C2_S1_I33", "edge_id": "C2_S1_I32_R0_>C2_S1_I33", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Bon le temps passe, je vais faire l'insuline et on parlera jeudi. D'accord ?", "next_id": "33", "target_node_id": "C2_S1_I33", "edge_id": "C2_S1_I32_R1_>C2_S1_I33", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Allez on reprend jeudi, maintenant l'insuline ! Ça vous va ?", "next_id": "33", "target_node_id": "C2_S1_I33", "edge_id": "C2_S1_I32_R2_>C2_S1_I33", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "20": {"node_id": "C2_S1_I20", "actor": "Agathe", "text": "Agathe reste silencieuse.", "responses": [{"text": "Si je me souviens bien, vous m’avez dit que vous aviez le sentiment d’être abandonnée par vos enfants.", "next_id": "22", "target_node_id": "C2_S1_I22", "edge_id": "C2_S1_I20_R0_>C2_S1_I22", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Bon et ce sentiment d'abandon ?", "next_id": "22", "target_node_id": "C2_S1_I22", "edge_id": "C2_S1_I20_R1_>C2_S1_I22", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Du coup en plus de vous sentir trahie, vous avez un sentiment d'abandon ?", "next_id": "22", "target_node_id": "C2_S1_I22", "edge_id": "C2_S1_I20_R2_>C2_S1_I22", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "21": {"node_id": "C2_S1_I21", "actor": "Agathe", "text": "Agathe regarde Claude en secouant la tête et sans plus avoir envie de répondre.", "responses": [{"text": "Si je peux me permettre de reprendre un peu notre conversation en amont, nous disions que le home c’est votre dernier lieu de vie. C’est bien ça ? Ou vous le diriez autrement ?", "next_id": "25", "target_node_id": "C2_S1_I25", "edge_id": "C2_S1_I21_R0_>C2_S1_I25", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Alors vous êtes d'accord que c'est aussi votre dernier lieu de vie non ?", "next_id": "25", "target_node_id": "C2_S1_I25", "edge_id": "C2_S1_I21_R1_>C2_S1_I25", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Ici c'est donc votre dernier lieu de vie, non ?", "next_id": "25", "target_node_id": "C2_S1_I25", "edge_id": "C2_S1_I21_R2_>C2_S1_I25", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "14": {"node_id": "C2_S1_I14", "actor": "Agathe", "text": "Agathe la regarde attentivement, surprise par la franchise de Claude. Tous ceux qui sont venus aux Lilas sont morts aux Lilas.", "responses": [{"text": "Si je posais la question aux vieux de votre village, qu’en diraient-ils ?", "next_id": "15", "target_node_id": "C2_S1_I15", "edge_id": "C2_S1_I14_R0_>C2_S1_I15", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Que diraient ceux qui, comme vous, sont passés par ici ?", "next_id": "15", "target_node_id": "C2_S1_I15", "edge_id": "C2_S1_I14_R1_>C2_S1_I15", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Pleins d'autre ont aussi dû passer par ici Agathe, qu'en penseraient-ils ?", "next_id": "15", "target_node_id": "C2_S1_I15", "edge_id": "C2_S1_I14_R2_>C2_S1_I15", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "37": {"node_id": "C2_S1_I37", "actor": "Agathe", "text": "...", "responses": [{"text": "Sortir", "next_id": "-1", "target_node_id": "", "edge_id": "", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "9": {"node_id": "C2_S1_I9", "actor": "Agathe", "text": "...", "responses": [{"text": "Que pensez-vous que diraient vos enfants s’ils vous entendaient ? ", "next_id": "8", "target_node_id": "C2_S1_I8", "edge_id": "C2_S1_I9_R0_>C2_S1_I8", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Je me demande ce que diraient vos enfants s’ils vous entendaient ?", "next_id": "10", "target_node_id": "C2_S1_I10", "edge_id": "C2_S1_I9_R1_>C2_S1_I10", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "5": {"node_id": "C2_S1_I5", "actor": "Agathe", "text": "Agathe d'un ton vif et rapide. Mais, mais, mais ces jeunes… vous n'y comprenez vraiment rien !", "responses": [{"text": "En effet, je vous ai mal comprise, dites m’en un peu plus Agathe ?", "next_id": "7", "target_node_id": "C2_S1_I7", "edge_id": "C2_S1_I5_R0_>C2_S1_I7", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Il m’est difficile de vous comprendre et vous semblez agacée.", "next_id": "6", "target_node_id": "C2_S1_I6", "edge_id": "C2_S1_I5_R1_>C2_S1_I6", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "6": {"node_id": "C2_S1_I6", "actor": "Agathe", "text": "Agathe tourne la tête ostensiblement et regarde par la fenêtre, elle serre les poings de colère.", "responses": [{"text": "Je sors de la chambre", "next_id": "-1", "target_node_id": "", "edge_id": "", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "...", "next_id": "12", "target_node_id": "C2_S1_I12", "edge_id": "C2_S1_I6_R1_>C2_S1_I12", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "4": {"node_id": "C2_S1_I4", "actor": "Agathe", "text": "Je n’ai pas bien dormi, mais c'est bien normal, je ne suis ni chez moi, ni dans mon lit, et qu'est-ce que vous pourriez  bien y faire ? Mon mari me manque. J’aimerais le rejoindre! Mes enfants m’ont abandonné et pourtant je les aime tellement fort. Je me sens seule !", "responses": [{"text": "Seule !", "next_id": "8", "target_node_id": "C2_S1_I8", "edge_id": "C2_S1_I4_R0_>C2_S1_I8", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Si je vous comprends bien, vous aimez forts vos enfants bien qu’ils vous ont abandonnés, vous éprouvez un sentiment quelque peu contradictoire et… cela vous est difficile. Je prends une chaise pour m'asseoir aux côtés d’Agathe. Je me positionne en face d’Agathe, assise le buste penchée en avant et regardant la résidente dans les yeux, elle s’exprime d’un ton calme et posé dans un rythme lent.", "next_id": "9", "target_node_id": "C2_S1_I9", "edge_id": "C2_S1_I4_R1_>C2_S1_I9", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Que pensez-vous que diraient vos enfants s’ils vous entendaient ?", "next_id": "11", "target_node_id": "C2_S1_I11", "edge_id": "C2_S1_I4_R2_>C2_S1_I11", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Je me demande ce que diraient vos enfants s’ils vous entendaient ?", "next_id": "10", "target_node_id": "C2_S1_I10", "edge_id": "C2_S1_I4_R3_>C2_S1_I10", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Comment cela, rejoindre votre mari ? Avez-vous déjà pensé à vous faire du mal ?", "next_id": "5", "target_node_id": "C2_S1_I5", "edge_id": "C2_S1_I4_R4_>C2_S1_I5", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}}}, {"title": "Projet de vie", "scene_id": 2, "scene_intro": "Claude, dans son partage d'informations avec sa collègue infirmière, a compris qu'Agathe ne s'exprime que peu sur ses besoins. Si les professionnels ne lui posent pas de questions, elle ne dit rien d'elle-même.\r\nElle décide de la rencontrer, comme prévu, ce jour, plutôt dans la matinée afin de donner suite à ses éventuelles demandes dans l'après-midi. Elle s'organise afin de se libérer à la fois pour changer son pansement et prendre 20 à 30 minutes pour explorer sa situation actuelle, c'est-à-dire, ce qui l'habite aujourd'hui suite à son entrée en home et la perte de ses repères.\r\nMarc, bien que présent, ne lui fait aucune remarque sur la gestion de son temps de la matinée.", "nodes": [{"id": "C2_S2_I1", "label": "silence", "title": "[Claude] ..."}, {"id": "C2_S2_I2", "label": "Mais attendez donc", "title": "[Agathe] Mais attendez donc que je vous réponde ! Que diriez-vous si j'entrais chez vous ainsi ? Dit Agathe en me regardant fixement le visage renfrogné, les sourcils serrés."}, {"id": "C2_S2_I3", "label": "Je vais finir par me fâche", "title": "[Agathe] Je vais finir par me fâcher et m'adressez à votre chef ! C'est insupportable ! En plus je m'ennui !"}, {"id": "C2_S2_I4", "label": "Agathe est dans son fauteuil", "title": "[Agathe] Agathe est dans son fauteuil : Gentiment."}, {"id": "C2_S2_I5", "label": "Oui, ça va, je m’ennuie un peu.", "title": "[Agathe] Oui, ça va, je m’ennuie un peu."}, {"id": "C2_S2_I6", "label": "Tout à fait.", "title": "[Agathe] Tout à fait."}, {"id": "C2_S2_I7", "label": "Agathe se lève", "title": "[Agathe] Agathe se lève et s’installe dans son lit. Claude change le pansement du pied d’Agathe. La plaie commence à se cicatriser."}, {"id": "C2_S2_I8", "label": "Agathe soupire.", "title": "[Agathe] Agathe soupire."}, {"id": "C2_S2_I9", "label": "Oui, avec mon diabète", "title": "[Agathe] Oui, avec mon diabète, vous savez j’avais peur… Agathe tremble du menton."}, {"id": "C2_S2_I10", "label": "Oui, qu’on m’ampute !!!", "title": "[Agathe] Oui, qu’on m’ampute !!! Agathe attrape son drap de lit pour s’essuyer les yeux. Je lui tends un mouchoir. Un petit silence s'installe. Merci."}, {"id": "C2_S2_I11", "label": "Oui que je sois amputée,", "title": "[Agathe] Oui que je sois amputée, avec le diabète on ne sait jamais.Agathe attrape son drap de lit pour s’essuyer les yeux. Je lui tends un mouchoir. Un petit silence s'installe. Merci."}, {"id": "C2_S2_I12", "label": "Pas vraiment.", "title": "[Agathe] Pas vraiment. Je me rappelle… que vous aviez du partir pour soigner d’autres patients."}, {"id": "C2_S2_I13", "label": "Agathe sourit, ses yeux brillent, pét…", "title": "[Agathe] Agathe sourit, ses yeux brillent, pétillent…"}, {"id": "C2_S2_I14", "label": "Agathe, des étoiles", "title": "[Agathe] Agathe, des étoiles dans les yeux. Rêver !"}, {"id": "C2_S2_I15", "label": "Rimbaud, Baudelaire…", "title": "[Agathe] Rimbaud, Baudelaire… J’aime les mots. Voler avec l’Albatros !!!"}, {"id": "C2_S2_I16", "label": "Non, non, je ne souhait", "title": "[Agathe] Non, non, je ne souhaite déranger personne …en plus … je n'y tiens plus ! J’ai beaucoup lu dans ma vie. Des poèmes ! Ça fait quelques années que je ne peux plus. Alors Lucie, ma voisine me fait la lecture de temps en temps."}, {"id": "C2_S2_I17", "label": "J’ai beaucoup lu", "title": "[Agathe] J’ai beaucoup lu dans ma vie. Des poèmes ! Ça fait quelques années que je ne peux plus. Alors Lucie, ma voisine me fait la lecture de temps en temps."}, {"id": "C2_S2_I18", "label": "Oh oui ! Je serais ravie.", "title": "[Agathe] Oh oui ! Je serais ravie."}, {"id": "C2_S2_I19", "label": "Vous feriez ça", "title": "[Agathe] Vous feriez ça pour moi ! Merci Claude ! Du fond du coeur merci !"}, {"id": "C2_S2_I20", "label": "Xavier !", "title": "[Agathe] Xavier ! Il est parti travailler aux Etats-Unis et je n’ai plus de nouvelles de lui. Il venait me voir toutes les semaines. On rigolait bien tous les deux ! On jouait au scrabble."}, {"id": "C2_S2_I21", "label": "Oui, les lettres sont grandes", "title": "[Agathe] Oui, les lettres sont grandes, c’est plus facile pour moi."}, {"id": "C2_S2_I22", "label": "Oui nous avions pris", "title": "[Agathe] Oui nous avions pris l’habitude de jouer ensemble lorsqu’il était enfant déjà…, nous ne comptions pas les points. Ensuite, nous nous lancions des défis… le mot le plus long, un mot nouveau… je me demande s’il le fait maintenant avec ses copains, aux USA ? Il faudra que je lui demande."}, {"id": "C2_S2_I23", "label": "Oui, si je suis libre d’y aller quand…", "title": "[Agathe] Oui, si je suis libre d’y aller quand je veux."}, {"id": "C2_S2_I24", "label": "Je suis obligée", "title": "[Agathe] Je suis obligée de prendre mes médicaments quand vous voulez ! Chez moi, je gérais mon semainier comme je l’entendais."}, {"id": "C2_S2_I25", "label": "Agathe sourit.", "title": "[Agathe] Agathe sourit."}, {"id": "C2_S2_I26", "label": "C'est tout ou rien, je l'ai fait jusq…", "title": "[Agathe] C'est tout ou rien, je l'ai fait jusqu'à présent."}, {"id": "C2_S2_I27", "label": "C'est tout ou rien, je l'ai fait jusq…", "title": "[Agathe] C'est tout ou rien, je l'ai fait jusqu'à présent."}, {"id": "C2_S2_I28", "label": "C'est tout ou rien, je l'ai", "title": "[Agathe] C'est tout ou rien, je l'ai fait jusqu'à présent. J'explique à Agathe que je comprend et je la laisse. "}, {"id": "C2_S2_I29", "label": "Oui merci Claude.", "title": "[Agathe] Oui merci Claude. Je salue Agathe et je sors de la chambre. Au revoir !"}, {"id": "C2_S2_I30", "label": "Je comprends.", "title": "[Agathe] Je comprends. Merci pour votre temps. Je salue Agathe et je sors de la chambre."}, {"id": "C2_S2_I31", "label": "Je suis en paix avec eux !", "title": "[Agathe] Je suis en paix avec eux ! Ils me manquent !"}, {"id": "C2_S2_I32", "label": "J’appellerai Margot", "title": "[Agathe] J’appellerai Margot aujourd’hui. La dernière fois que je lui ai parlée, j’étais fâchée ! Je n’ai pas pu lui demander des nouvelles de Xavier."}, {"id": "C2_S2_I33", "label": "Ma foi", "title": "[Agathe] Ma foi je ne sais pas si je me souviens de tout, je préfère que ce soit vous qui résumiez Claude."}, {"id": "C2_S2_I34", "label": "Je ne pensais pas pouvoir", "title": "[Agathe] Je ne pensais pas pouvoir encore vivre de bons moments ici. Ça me fait du bien de penser que c’est possible! Merci Claude."}, {"id": "C2_S2_I35", "label": "silence", "title": "[Agathe] ..."}, {"id": "C2_S2_I36", "label": "J’ai le sentiment", "title": "[Agathe] J’ai le sentiment de ne plus avoir de famille en ce moment et il est important que je les revois…"}, {"id": "C2_S2_I37", "label": "Oui, je ne sais pas trop quoi faire i…", "title": "[Agathe] Oui, je ne sais pas trop quoi faire ici."}, {"id": "C2_S2_I38", "label": "C’est, vrai, ma maison,", "title": "[Agathe] C’est, vrai, ma maison, mon jardin me manquent…ici je suis bloquée dans cette chambre avec ce pied !!! J’aimais mon indépendance, découvrir de nouveaux lieux… la perdre renforce mon sentiment d’inutilité."}, {"id": "C2_S2_I39", "label": "Justement, avant", "title": "[Agathe] Justement, avant de venir ici, je n'ai jamais eu à me poser cette question."}, {"id": "C2_S2_I40", "label": "Il ne s’agit pas de ça…", "title": "[Agathe] Il ne s’agit pas de ça… Agathe secoue la tête et tourne son regard vers la fenêtre. Les larmes montent et commencent à couler sur ses joues. Je décide de la laisser un moment"}], "edges": [{"id": "C2_S2_I1_R0_>C2_S2_I4", "from": "C2_S2_I1", "to": "C2_S2_I4", "smooth": {"type": "c
