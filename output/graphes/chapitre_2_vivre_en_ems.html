: "C2_S3_I9", "actor": "Margot", "text": "Excusez-moi de vous avoir dérangée ! Margot s'en va, tête baissée, sans regard pour qui que ce soit. Elle choisit de boire un café seule en cafétéria en attendant que sa maman se repose quelque peu. Je retourne m'occuper de mes autres résidents.", "responses": [{"text": "Sortir", "next_id": "-1", "target_node_id": "", "edge_id": "", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S3_I10", "actor": "Margot", "text": "J’en suis responsable ! Je m’en veux ! Je n’aurais pas dû insister pour qu’elle vienne ici. Mais j’ai 70 ans. Comment voulez-vous que je fasse ? C’est pas possible ! Je ne peux pas m’en occuper ! C’est ma maman ! Margot s’agite, secoue la tête. Elle est au bord des larmes. Vous lui prenez la main.", "responses": [{"text": "Je vois que cette situation vous touche profondément. Cela vous dirait de prendre un moment maintenant pour en parler ?", "next_id": "6", "target_node_id": "C2_S3_I6", "edge_id": "C2_S3_I10_R0_>C2_S3_I6", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Je vois que cette situation vous touche profondément et que vous semblez seule à la porter ici ?", "next_id": "11", "target_node_id": "C2_S3_I11", "edge_id": "C2_S3_I10_R1_>C2_S3_I11", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Cette situation ne vous touche-t-elle pas trop ?", "next_id": "12", "target_node_id": "C2_S3_I12", "edge_id": "C2_S3_I10_R2_>C2_S3_I12", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S3_I5", "actor": "Margot", "text": "Margot s’agite, secoue la tête. Elle est au bord des larmes. Je lui prends la main.", "responses": [{"text": "Je vois que cette situation vous touche profondément. Voulez-vous en parler ?", "next_id": "6", "target_node_id": "C2_S3_I6", "edge_id": "C2_S3_I5_R0_>C2_S3_I6", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empa sponses": [{"text": "Agathe vit un grand changement. Et j’ai l’impression que c’est très éprouvant pour elle.", "next_id": "4", "target_node_id": "C2_S3_I4", "edge_id": "C2_S3_I2_R0_>C2_S3_I4", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Que pensez-vous qu’elle dirait si elle vous entendait dire que vous la voyez fatiguée ? ", "next_id": "16", "target_node_id": "C2_S3_I16", "edge_id": "C2_S3_I2_R1_>C2_S3_I16", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Vous a-t-elle exprimée qu'elle était fatiguée ?", "next_id": "4", "target_node_id": "C2_S3_I4", "edge_id": "C2_S3_I2_R2_>C2_S3_I4", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Qu'est-ce qui vous fait dire cela ?", "next_id": "6", "target_node_id": "C2_S3_I6", "edge_id": "C2_S3_I2_R3_>C2_S3_I6", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Tout est nouveau ici pour votre maman, il est normal qu'elle soit fatiguée !", "next_id": "7", "target_node_id": "C2_S3_I7", "edge_id": "C2_S3_I2_R4_>C2_S3_I7", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}], "id_to_parcours": {"1": {"node_id": "C2_S3_I1", "actor": "Claude", "text": "Elle se dirige vers elle et engage la conversation.", "responses": [{"text": "Bonjour, je suppose que vous êtes Margot. Je m’appelle Claude et suis l’une des deux infirmières qui prend soin de votre maman.", "next_id": "3", "target_node_id": "C2_S3_I3", "edge_id": "C2_S3_I1_R0_>C2_S3_I3", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Bonjour Madame, je vois que vous sortez de la chambre de Madame Salamin, puis-je savoir qui vous êtes ?", "next_id": "2", "target_node_id": "C2_S3_I2", "edge_id": "C2_S3_I1_R1_>C2_S3_I2", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "3": {"node_id": "C2_S3_I3", "actor": "Margot", "text": "Bonjour, maman s’est endormie. Elle a l’air très fatiguée.", "responses": [{"text": "Agathe vit un grand changement. Et j’ai l’impression que c’est très éprouvant pour elle.", "next_id": "4", "target_node_id": "C2_S3_I4", "edge_id": "C2_S3_I3_R0_>C2_S3_I4", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Que pensez-vous qu’elle dirait si elle vous entendait dire que vous la voyez fatiguée ?", "next_id": "16", "target_node_id": "C2_S3_I16", "edge_id": "C2_S3_I3_R1_>C2_S3_I16", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Vous a-t-elle exprimée qu'elle était fatiguée ?", "next_id": "4", "target_node_id": "C2_S3_I4", "edge_id": "C2_S3_I3_R2_>C2_S3_I4", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Qu'est-ce qui vous fait dire cela ?", "next_id": "6", "target_node_id": "C2_S3_I6", "edge_id": "C2_S3_I3_R3_>C2_S3_I6", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Tout est nouveau ici pour votre maman.", "next_id": "7", "target_node_id": "C2_S3_I7", "edge_id": "C2_S3_I3_R4_>C2_S3_I7", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "4": {"node_id": "C2_S3_I4", "actor": "Margot", "text": "Non, mais je la trouve changée, elle respire plus rapidement, des cernes marquent le contour de ses yeux et j'ai l'impression qu'elle n'est pas si coquette que d'habitude !", "responses": [{"text": "Je me dis que la fille de Madame Salamin semble coquette elle aussi, c'est de famille; il faudra que j'observe Agathe !", "next_id": "34", "target_node_id": "C2_S3_I34", "edge_id": "C2_S3_I4_R0_>C2_S3_I34", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Vous la voyez changée ? C'est source d'inquiétude pour vous…", "next_id": "10", "target_node_id": "C2_S3_I10", "edge_id": "C2_S3_I4_R1_>C2_S3_I10", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Je réa ément et que vous semblez seule à la porter ici ?", "next_id": "11", "target_node_id": "C2_S3_I11", "edge_id": "C2_S3_I6_R1_>C2_S3_I11", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Cette situation ne vous touche-t-elle pas trop ?", "next_id": "12", "target_node_id": "C2_S3_I12", "edge_id": "C2_S3_I6_R2_>C2_S3_I12", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "13": {"node_id": "C2_S3_I13", "actor": "Margot", "text": "Oui, je veux bien !", "responses": [{"text": "Allons dans mon bureau, nous serons plus tranquilles. Margot et moi entrons dans le bureau. Lui pointant une chaise du doigt je lui dis :  Vous pouvez vous asseoir.", "next_id": "14", "target_node_id": "C2_S3_I14", "edge_id": "C2_S3_I13_R0_>C2_S3_I14", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 8, "Empathy": 0}, {"text": "Dans mon bureau cela sera plus adéquat. Margot et moi entrons dans le bureau. Lui pointant une chaise du doigt je lui dis :  Vous pouvez vous asseoir.", "next_id": "14", "target_node_id": "C2_S3_I14", "edge_id": "C2_S3_I13_R1_>C2_S3_I14", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "14": {"node_id": "C2_S3_I14", "actor": "Margot", "text": "Merci ! dit Margot en s'asseyant", "responses": [{"text": "Je m'installe sur une chaise placée sur la droite de Margot afin d'être proche d'elle et afin de pouvoir lui porter toute mon attention. Je la regarde et explore le sentiment de culpabilité perçu au travers de son discours. Vous sentez vous responsable de cette situation ?", "next_id": "16", "target_node_id": "C2_S3_I16", "edge_id": "C2_S3_I14_R0_>C2_S3_I16", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Je reste debout devant mon bureau, à droit de Margot. Je jete un coup d'oeil à l'ordinateur avant de porter l'attention à cette dernière. Pensant à la quantité de travail qu'il me reste à réaliser je me demande pourquoi je l'ai invitée à prendre du temps pour discuter.", "next_id": "15", "target_node_id": "C2_S3_I15", "edge_id": "C2_S3_I14_R1_>C2_S3_I15", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Je m'installe confortablement derrière mon bureau, en face de Margot. Je jette de fréquent coups d'oeil à mon téléphone portable posé discrètement sur le côté gauche de l'ordinateur.", "next_id": "15", "target_node_id": "C2_S3_I15", "edge_id": "C2_S3_I14_R2_>C2_S3_I15", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "16": {"node_id": "C2_S3_I16", "actor": "Margot", "text": "Ma maman vous a dit que je l’avais abandonnée. Elle me l’a dit plusieurs fois le jour de son entrée au home : « C’est comme ça tu m’abandonnes ! Oui c’est bien ça ! Tu m’abandonnes ! Abandonnée ! » Elle répétait ce mot ! « Abandonnée » ! Elle disait qu’elle ne voudrait plus jamais me voir ! Elle vous a dit que je l’avais abandonnée.", "responses": [{"text": "Ce que votre maman me dit est confidentiel. Je ne peux pas vous en parler. Comment se sont passées vos retrouvailles ?", "next_id": "18", "target_node_id": "C2_S3_I18", "edge_id": "C2_S3_I16_R0_>C2_S3_I18", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Vous avez le sentiment de l'avoir abandonnée ?", "next_id": "19", "target_node_id": "C2_S3_I19", "edge_id": "C2_S3_I16_R1_>C2_S3_I19", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Cela doit être très difficile de l'entendre vous dire cela ?", "next_id": "17", "target_node_id": "C2_S3_I17", "edge_id": "C2_S3_I16_R2_>C2_S3_I17", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Je ne peux pas partager avec vous ce que me dit votre maman. Toutefois, ce que vous me dites là est la réaction de nombreux résidents à leur arrivée ici.", "next_id": "21", "target_node_id": "C2_S3_I21", "edge_id": "C2_S3_I16_R3_>C2_S3_I21", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Votre maman était probablement sous le coup de la colère, il vous faut la comprendre, quitter son domicile, son jardin… de plus être restreinte dans sa mobilité. Son sentiment envers vous me semble légitime !", "next_id": "33", "target_node_id": "C2_S3_I33", "edge_id": "C2_S3_I16_R4_>C2_S3_I33", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "18": {"node_id": "C2_S3_I18", "actor": "Margot", "text": "Mieux que ce que je pensais. J’étais très étonnée qu’elle m’appelle. Après ce que je lui ai fait !", "responses": [{"text": "Qu’est-ce que vous lui avez fait ?", "next_id": "19", "target_node_id": "C2_S3_I19", "edge_id": "C2_S3_I18_R0_>C2_S3_I19", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "C'est à dire ?", "next_id": "19", "target_node_id": "C2_S3_I19", "edge_id": "C2_S3_I18_R1_>C2_S3_I19", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Que sous-entendez-vous ?", "next_id": "19", "target_node_id": "C2_S3_I19", "edge_id": "C2_S3_I18_R2_>C2_S3_I19", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "19": {"node_id": "C2_S3_I19", "actor": "Margot", "text": "J’ai organisé son entrée en EMS. C’est à cause de moi qu’elle est ici ! Je suis horrible !", "responses": [{"text": "Vous avez le sentiment d’être horrible parce que vous avez entrepris des démarches pour placer votre maman qui ne pouvait plus vivre seule dans un home.", "next_id": "20", "target_node_id": "C2_S3_I20", "edge_id": "C2_S3_I19_R0_>C2_S3_I20", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Vous ne devez pas vous en vouloir, elle ne pouvait plus vivre seule. Il fallait la placer chez nous.", "next_id": "20", "target_node_id": "C2_S3_I20", "edge_id": "C2_S3_I19_R1_>C2_S3_I20", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "20": {"node_id": "C2_S3_I20", "actor": "Margot", "text": "C’est exactement ça ! J’aurais dû la prendre chez moi !", "responses": [{"text": "Héberger votre mère chez vous et vous en occuper au quotidien…. C’est de votre point de vue quelque chose de réalisable ?", "next_id": "21", "target_node_id": "C2_S3_I21", "edge_id": "C2_S3_I20_R0_>C2_S3_I21", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Soyez réaliste, vivre avec votre mère et vous en occuper. Comment pensez-vous réaliser cela ?", "next_id": "21", "target_node_id": "C2_S3_I21", "edge_id": "C2_S3_I20_R1_>C2_S3_I21", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "21": {"node_id": "C2_S3_I21", "actor": "Margot", "text": "Est-ce que ce n’est pas le rôle des enfants de s’occuper de leurs parents ?", "responses": [{"text": "Je ne crois qu’il y ait des règles et des normes. Mais vous Margot, quels sont les avantages que vous verriez à ce que votre maman vive avec vous ?", "next_id": "35", "target_node_id": "C2_S3_I35", "edge_id": "C2_S3_I21_R0_>C2_S3_I35", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "S'il s'agissait de ma maman, je serais heureuse qu'elle puisse vivre ici, en profitant des différentes animations qui lui sont offertes et en partageant son quotidien avec les gens de son village", "next_id": "22", "target_node_id": "C2_S3_I22", "edge_id": "C2_S3_I21_R1_>C2_S3_I22", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Je ne sais pas vraiment…", "next_id": "23", "target_node_id": "C2_S3_I23", "edge_id": "C2_S3_I21_R2_>C2_S3_I23", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Réfléchissez bien, les places en home se font rares… Si votre choix est de la prendre à la maison, vous prenez le risque de la déraciner.", "next_id": "37", "target_node_id": "C2_S3_I37", "edge_id": "C2_S3_I21_R3_>C2_S3_I37", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "35": {"node_id": "C2_S3_I35", "actor": "Margot", "text": "Je serais plus proche d’elle. Je la verrais tous les jours. Et comme ça je ferais mon devoir.", "responses": [{"text": "Quelles difficultés vous rencontreriez si votre maman vivait avec vous ?", "next_id": "36", "target_node_id": "C2_S3_I36", "edge_id": "C2_S3_I35_R0_>C2_S3_I36", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Ne serait-elle pas un fardeaux en vivant chez vous ? Cela ne poserait-il pas de problèmes ?", "next_id": "36", "target_node_id": "C2_S3_I36", "edge_id": "C2_S3_I35_R1_>C2_S3_I36", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "36": {"node_id": "C2_S3_I36", "actor": "Margot", "text": "Je serais obligée de transformer la chambre de Xavier. Après un court silence : Je suis à la retraite et j’ai envie de voyager. Si ma maman vivait chez moi, je serais obligée de rester tous les jours à ces côtés. Je ne suis pas sûr d’avoir la force pour m’occuper d’elle au quotidien.", "responses": [{"text": "Quels seraient les avantages que vous voyiez dans le placement de votre maman chez nous ?", "next_id": "24", "target_node_id": "C2_S3_I24", "edge_id": "C2_S3_I36_R0_>C2_S3_I24", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Ne pensez-vous donc pas qu'il y a des avantages à la voir chez nous ?", "next_id": "24", "target_node_id": "C2_S3_I24", "edge_id": "C2_S3_I36_R1_>C2_S3_I24", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "24": {"node_id": "C2_S3_I24", "actor": "Margot", "text": "Elle est en sécurité. Elle est en contact avec des gens de son âge.", "responses": [{"text": "Y voyiez-vous alors des désavantages ?", "next_id": "25", "target_node_id": "C2_S3_I25", "edge_id": "C2_S3_I24_R0_>C2_S3_I25", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Et il n y a pas vraiment d'aspect négatifs, si ?", "nex     document.querySelectorAll(".mode-btn").forEach(function(b) { b.classList.toggle("active", b.dataset.mode === mode); });
    document.getElementById("panel-edit").classList.toggle("hidden", mode !== "edit");
    document.getElementById("panel-parcours").classList.toggle("active", mode === "parcours");
    if (mode === "parcours" && scenesData.length > 0) {
        parcoursPath = { nodes: [], edges: [] };
        parcoursCurrent = null;
        parcoursScores = { Authenticity: 0, Respect: 0, Compassion: 0, Hope: 0, Empathy: 0 };
        showParcoursScene(currentSceneIdx);
    } else {
        parcoursPath = { nodes: [], edges: [] };
        parcoursCurrent = null;
        if (nodesDS && edgesDS) highlightPath();
    }
}

function showParcoursScene(idx) {
    var s = scenesData[idx];
    document.getElementById("parcours-title").textContent = s.title + " — Parcours joueur";
    if (!s.parcours || s.parcours.length === 0) {
        document.getElementById("parcours-content").innerHTML = '<div class="parcours-card"><div class="parcours-end">Aucune interaction dans ce scénario.</div></div>';
        document.getElementById("parcours-restart").style.display = "none";
        return;
    }
    parcoursPath = { nodes: [], edges: [] };
    parcoursScores = { Authenticity: 0, Respect: 0, Compassion: 0, Hope: 0, Empathy: 0 };
    parcoursCurrent = s.parcours[0];
    renderParcours(s);
    highlightPath();
}

function esc(s) { if (!s) return ""; return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function renderParcours(s) {
    var ia = parcoursCurrent;
    if (!ia) {
        var totalsHtml = '<div class="parcours-card"><div class="parcours-end">Fin de cette branche.</div>';
        if (parcoursPath.nodes.length > 0) {
            totalsHtml += '<div class="parcours-totals"><h4>Score total du parcours</h4>';
            var labels = { Authenticity: "Authenticité", Respect: "Respect", Compassion: "Compassion", Hope: "Espoir", Empathy: "Empathie" };
            for (var k in parcoursScores) {
                var v = parcoursScores[k];
                var cls = v > 0 ? "positive" : (v < 0 ? "negative" : "zero");
                totalsHtml += '<div class="score-line ' + cls + '">' + (labels[k] || k) + ': ' + (v >= 0 ? '+' : '') + v + '</div>';
            }
            totalsHtml += '</div>';
        }
        totalsHtml += '</div>';
        document.getElementById("parcours-content").innerHTML = totalsHtml;
        document.getElementById("parcours-restart").style.display = parcoursPath.nodes.length > 0 ? "block" : "none";
        return;
    }
    var html = '<div class="parcours-card"><span class="actor">' + esc(ia.actor) + '</span><div class="text">' + esc(ia.text || "—") + '</div>';
    if (ia.responses && ia.responses.length > 0) {
        ia.responses.forEach(function(r, i) {
            var label = (r.text || "").length > 80 ? (r.text || "").substring(0, 80) + "…" : (r.text || "→ I" + r.next_id);
            html += '<button class="parcours-choice" data-next="' + r.next_id + '" data-target="' + esc(r.target_node_id || "") + '" data-edge="' + esc(r.edge_id || "") + '" data-auth="' + (r.Authenticity||0) + '" data-respect="' + (r.Respect||0) + '" data-compassion="' + (r.Compassion||0) + '" data-hope="' + (r.Hope||0) + '" data-empathy="' + (r.Empathy||0) + '">' + esc(label) + '</button>';
        });
    } else {
        html += '<div class="parcours-end">Fin de cette branche.</div>';
    }
    html += '</div>';
    document.getElementById("parcours-content").innerHTML = html;
    document.getElementById("parcours-restart").style.display = parcoursPath.nodes.length > 0 ? "block" : "none";
    document.querySelectorAll(".parcours-choice").forEach(function(btn) {
        btn.addEventListener("click", function() {
            parcoursScores.Authenticity += parseInt(this.dataset.auth) || 0;
            parcoursScores.Respect += parseInt(this.dataset.respect) || 0;
            parcoursScores.Compassion += parseInt(this.dataset.compassion) || 0;
            parcoursScores.Hope += parseInt(this.dataset.hope) || 0;
            parcoursScores.Empathy += parseInt(this.dataset.empathy) || 0;
            var nextId = this.dataset.next;
            var edgeId = this.dataset.edge;
            if (parcoursCurrent && parcoursCurrent.node_id) parcoursPath.nodes.push(parcoursCurrent.node_id);
            if (edgeId) parcoursPath.edges.push(edgeId);
            parcoursCurrent = s.id_to_parcours && nextId !== "-1" && nextId !== "" ? s.id_to_parcours[nextId] : null;
            if (parcoursCurrent) parcoursPath.nodes.push(parcoursCurrent.node_id);
            renderParcours(s);
            highlightPath();
        });
    });
}

function highlightPath() {
    try {
        if (!nodesDS || !edgesDS) return;
        var pathNodes = parcoursPath.nodes || [];
        var pathEdges = parcoursPath.edges || [];
        var curNode = parcoursCurrent ? parcoursCurrent.node_id : null;
        nodesDS.getIds().forEach(function(nid) {
            var inPath = pathNodes.indexOf(nid) >= 0;
            var isCurrent = curNode === nid;
            nodesDS.update({ id: nid, color: { background: inPath ? "#166534" : "#27272a", border: isCurrent ? "#fbbf24" : (inPath ? "#22c55e" : "#38bdf8") } });
        });
        edgesDS.getIds().forEach(function(eid) {
            var inPath = pathEdges.indexOf(eid) >= 0;
            edgesDS.update({ id: eid, color: inPath ? "#22c55e" : "#3f3f46" });
        });
    } catch (err) { console.warn("highlightPath:", err); }
}

function showScene(idx) {
    currentSceneIdx = idx;
    document.querySelectorAll(".scene-btn").forEach(function(b) {
        b.classList.toggle("active", parseInt(b.dataset.idx) === idx);
    });
    var s = scenesData[idx];
    document.getElementById("ed-title").textContent = s.title;
    var introHtml = '<div class="scene-intro"><label>EG-4 : SceneIntroduction</label><textarea class="edit" data-type="intro" rows="3">' + (s.scene_intro || '').replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;") + '</textarea></div>';
    document.getElementById("ed-content").innerHTML = introHtml + s.editor;

    var opts = {
        nodes: { font: { size: 18, color: "#fafafa", face: "system-ui, -apple-system, sans-serif" }, shape: "box", color: { background: "#27272a", border: "#38bdf8" }, margin: 20, borderWidth: 2, widthConstraint: { minimum: 160, maximum: 280 } },
        edges: { arrows: "to", width: 2, color: "#3f3f46", font: { color: "#94a3b8", size: 12, face: "system-ui, sans-serif" } },
        layout: { hierarchical: { enabled: true, direction: "UD", sortMethod: "directed", levelSeparation: 380, nodeSpacing: 420, treeSpacing: 380, blockShifting: true, edgeMinimization: true } },
        physics: { enabled: false },
        interaction: { zoomView: true, dragView: true }
    };

    if (nodesDS && edgesDS) {
        nodesDS.clear();
        edgesDS.clear();
        s.nodes.forEach(function(n) { nodesDS.add(n); });
        s.edges.forEach(function(e) { edgesDS.add(e); });
        setTimeout(function() { if (network) network.fit({ animation: { duration: 300 }, scale: 1.3 }); }, 200);
    } else {
        nodesDS = new vis.DataSet(s.nodes);
        edgesDS = new vis.DataSet(s.edges);
        network = new vis.Network(container, { nodes: nodesDS, edges: edgesDS }, opts);
        network.once("afterDrawing", function() { network.fit({ animation: { duration: 400 }, scale: 1.3 }); });
        setTimeout(function() { if (network) { network.redraw(); network.fit({ scale: 1.3 }); } }, 300);
        network.on("click", function(params) {
            if (params.nodes && params.nodes.length > 0) {
                var nid = String(params.nodes[0]);
                var m = nid.match(/_I(\d+)$/);
                if (m) {
                    var block = document.querySelector('.block[data-interaction-id="' + m[1] + '"]');
                    if (block) block.scrollIntoView({ behavior: "smooth" });
                }
            }
        });
    }

    attachEditors(idx);
    updateValidation();
    if (document.getElementById("panel-parcours").classList.contains("active")) {
        parcoursPath = { nodes: [], edges: [] };
        parcoursCurrent = null;
        showParcoursScene(idx);
    } else {
        highlightPath();
    }
}

function escapeHtml(s) {
    if (!s) return '';
    return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function attachEditors(idx) {
    var ch = chaptersData.Chapters[0];
    var sc = ch.Scenes[idx];
    document.querySelectorAll("#ed-content .edit").forEach(function(el) {
        el.addEventListener("input", function() {
            var type = this.dataset.type;
            var i = parseInt(this.dataset.i);
            if (type === "intro") {
                sc.SceneIntroduction = this.value;
            } else if (type === "name") {
                sc.Interactions[i].Name = this.value;
            } else if (type === "text") {
                sc.Interactions[i].Text = this.value;
                sc.Interactions[i].Name = this.value.substring(0, 50);
            } else if (type === "response") {
                var r = parseInt(this.dataset.r);
                sc.Interactions[i].Responses[r].Text = this.value;
                sc.Interactions[i].Responses[r].Name = this.value.substring(0, 80);
            }
        });
    });
    document.querySelectorAll("#ed-content .score").forEach(function(el) {
        el.addEventListener("change", function() {
            var i = parseInt(this.dataset.i), r = parseInt(this.dataset.r), skill = this.dataset.skill;
            var v = parseInt(this.value) || 0;
            if (v < -3) v = -3;
            if (v > 3) v = 3;
            sc.Interactions[i].Responses[r][skill] = v;
        });
    });
}

function updateValidation() {
    var errs = [];
    var ch = chaptersData.Chapters[0];
    ch.Scenes.forEach(function(sc) {
        var ids = {};
        sc.Interactions.forEach(function(ia) { ids[ia.Id] = true; });
        sc.Interactions.forEach(function(ia) {
            (ia.Responses || []).forEach(function(r) {
                var nid = r.NextInteractionID;
                if (nid != null && nid !== -1 && !ids[nid]) errs.push("EG-7: NextInteractionID " + nid + " invalide (scène " + sc.Title + ")");
            });
        });
    });
    var div = document.getElementById("validation");
    if (errs.length > 0) {
        div.className = "validation";
        div.textContent = errs.join(" ; ");
    } else {
        div.className = "validation ok";
        div.textContent = "EG-7 : Validation OK — NextInteractionID valides.";
    }
}

document.querySelectorAll(".scene-btn").forEach(function(b) {
    b.addEventListener("click", function() { showScene(parseInt(this.dataset.idx)); });
});

document.querySelectorAll(".mode-btn").forEach(function(b) {
    b.addEventListener("click", function() { setMode(this.dataset.mode); });
});

document.getElementById("parcours-restart").addEventListener("click", function() {
    if (scenesData.length > 0) showParcoursScene(currentSceneIdx);
});

document.getElementById("search").addEventListener("input", function() {
    var q = (this.value || "").toLowerCase();
    document.querySelectorAll(".scene-btn").forEach(function(b) {
        b.style.display = q && b.textContent.toLowerCase().indexOf(q) < 0 ? "none" : "block";
    });
    if (scenesData && scenesData.length > 0) {
        var vis = (this.value || "").toLowerCase();
        if (vis && nodesDS && edgesDS) {
            var nodeIds = nodesDS.getIds();
            nodeIds.forEach(function(nid) {
                var node = nodesDS.get(nid);
                var match = (node.label && node.label.toLowerCase().indexOf(vis) >= 0) || (node.title && node.title.toLowerCase().indexOf(vis) >= 0);
                nodesDS.update({ id: nid, hidden: !match });
            });
        } else if (nodesDS) {
            nodesDS.getIds().forEach(function(nid) { nodesDS.update({ id: nid, hidden: false }); });
        }
    }
});

document.getElementById("save-btn").addEventListener("click", function() {
    var btn = this;
    var statusEl = document.getElementById("save-status");
    btn.disabled = true;
    statusEl.className = "";
    statusEl.textContent = "Enregistrement…";
    fetch("/api/save", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(chaptersData)
    }).then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
    .then(function(result) {
        btn.disabled = false;
        if (result.ok) {
            statusEl.className = "save-ok";
            statusEl.textContent = result.data.message || "Sauvegardé.";
        } else {
            statusEl.className = "save-err";
            statusEl.textContent = result.data.error || "Erreur. Utilisez python app.py pour activer la sauvegarde directe.";
        }
    }).catch(function(err) {
        btn.disabled = false;
        statusEl.className = "save-err";
        statusEl.textContent = "Erreur réseau. Lancez python app.py puis ouvrez http://localhost:8765";
    });
});

document.getElementById("export-btn").addEventListener("click", function() {
    var blob = new Blob([JSON.stringify(chaptersData, null, 2)], { type: "application/json" });
    var a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "Chapitre_" + chapterId + "_modified.json";
    a.click();
});

function init() {
    if (typeof vis === "undefined") {
        container.innerHTML = "<p style='color:#ef4444;padding:20px'>vis-network non chargé. Vérifiez votre connexion et rechargez.</p>";
        return;
    }
    if (scenesData && scenesData.length > 0) {
        try { showScene(0); } catch (err) {
            console.error("showScene:", err);
            container.innerHTML = "<p style='color:#ef4444;padding:20px'>Erreur: " + String(err.message || err) + "</p>";
        }
    } else {
        document.getElementById("ed-content").innerHTML = "<div class='empty'>Aucune donnée (erreur de chargement?).</div>";
    }
}
function runInit() {
    if (typeof vis !== "undefined") { init(); return; }
    var n = 0;
    var t = setInterval(function() {
        n++;
        if (typeof vis !== "undefined") { clearInterval(t); init(); }
        else if (n > 60) { clearInterval(t); container.innerHTML = "<p style='color:#ef4444;padding:20px'>vis-network timeout.</p>"; }
    }, 100);
}
window.addEventListener("load", function() { setTimeout(runInit, 80); });
</script>
</body>
</html>
