    scenesData = [{"title": "Lieu de vie, lieu de mort", "scene_id": 1, "scene_intro": "Mardi matin. 7h30. Claude a eu le rapport de la nuit. Elle sait qu’Agathe a bien dormi. Elle a vérifié la prescription d’insuline et préparé son plateau. Elle a croisé Pascal qui lui a rappelé de bien respecter le continuum des soins.\r\nClaude frappe à la porte d’Agathe puis entre\r\n ", "nodes": [{"id": "C2_S1_I1", "label": "Claude frappe à la porte", "title": "[Claude] Claude frappe à la porte d’Agathe puis entre"}, {"id": "C2_S1_I2", "label": "Bonjour Claude.", "title": "[Agathe] Bonjour Claude. Je peine à trouver le sommeil. Vous savez, à mon âge, les nuits sont courtes. Agathe sort un mouchoir de sa table de nuit pour s’essuyer les yeux. Elle pleure."}, {"id": "C2_S1_I3", "label": "silence", "title": "[Agathe] ..."}, {"id": "C2_S1_I4", "label": "Je n’ai pas bien dormi,", "title": "[Agathe] Je n’ai pas bien dormi, mais c'est bien normal, je ne suis ni chez moi, ni dans mon lit, et qu'est-ce que vous pourriez  bien y faire ? Mon mari me manque. J’aimerais le rejoindre! Mes enfants m’ont abandonné et pourtant je les aime tellement fort. Je me sens seule !"}, {"id": "C2_S1_I5", "label": "Agathe d'un ton vif et rapide.", "title": "[Agathe] Agathe d'un ton vif et rapide. Mais, mais, mais ces jeunes… vous n'y comprenez vraiment rien !"}, {"id": "C2_S1_I6", "label": "Agathe tourne", "title": "[Agathe] Agathe tourne la tête ostensiblement et regarde par la fenêtre, elle serre les poings de colère."}, {"id": "C2_S1_I7", "label": "Mon mari me manque.", "title": "[Agathe] Mon mari me manque. J’aimerais le rejoindre! Mes enfants m’ont abandonné et pourtant je les aime tellement fort. Je me sens seule !"}, {"id": "C2_S1_I8", "label": "Vous comprenez", "title": "[Agathe] Vous comprenez mes enfants ont leur vie. Ils sont loin d’ici ! En plus ils m’ont placé !"}, {"id": "C2_S1_I9", "label": "silence", "title": "[Agathe] ..."}, {"id": "C2_S1_I10", "label": "Qui choisit vraiment", "title": "[Agathe] Qui choisit vraiment d'aller en home ? Seules nos enfants pensent que nous y sommes bien ! Agathe reste silencieuse."}, {"id": "C2_S1_I11", "label": "Que je suis bien ici.", "title": "[Agathe] Que je suis bien ici. Qu’il y a des gens qui sont là pour s’occuper de moi. Qu’ils se sont fait beaucoup de soucis quand j’étais seul à la maison. Ils avaient peur que je tombe, que je ne mange pas assez."}, {"id": "C2_S1_I12", "label": "Tous ceux qui sont", "title": "[Agathe] Tous ceux qui sont venus aux Lilas sont morts aux Lilas."}, {"id": "C2_S1_I13", "label": "Je sais pas ce que je fais ici !", "title": "[Agathe] Je sais pas ce que je fais ici ! Les vieux viennent ici pour mourir ! Je prends une chaise pour m'asseoir aux côtés d’Agathe. Je me positionne en face d’Agathe, assise le buste penchée en avant et regardant la résidente dans les yeux, elle s’exprime d’un ton calme et posé dans un rythme lent."}, {"id": "C2_S1_I14", "label": "Agathe la regarde attentivement", "title": "[Agathe] Agathe la regarde attentivement, surprise par la franchise de Claude. Tous ceux qui sont venus aux Lilas sont morts aux Lilas."}, {"id": "C2_S1_I15", "label": "Ils ont pas eu le choix", "title": "[Agathe] Ils ont pas eu le choix ! Mais ils pouvaient plus vivre à la maison. Quand je pense à mon cousin Marcel, il pouvait plus se débrouiller tout seul."}, {"id": "C2_S1_I16", "label": "Il est mort trois jours après !", "title": "[Agathe] Il est mort trois jours après !"}, {"id": "C2_S1_I17", "label": "Oui et ça me fait peur !", "title": "[Agathe] Oui et ça me fait peur !"}, {"id": "C2_S1_I18", "label": "Séraphine du boulanger ?", "title": "[Agathe] Séraphine du boulanger ?"}, {"id": "C2_S1_I19", "label": "Agathe soupire.", "title": "[Agathe] Agathe soupire. Vous percevez Agathe plus détendue, les traits de son visage s’adoucissent, elle respire calment. Un long silence s'installe..."}, {"id": "C2_S1_I20", "label": "Agathe reste silencieuse.", "title": "[Agathe] Agathe reste silencieuse."}, {"id": "C2_S1_I21", "label": "Agathe regarde Claude", "title": "[Agathe] Agathe regarde Claude en secouant la tête et sans plus avoir envie de répondre."}, {"id": "C2_S1_I22", "label": "silence", "title": "[Agathe] ..."}, {"id": "C2_S1_I23", "label": "Je pense qu’ils doivent être soulagés.", "title": "[Agathe] Je pense qu’ils doivent être soulagés. Silencieuse, vous laissez résonner le mot « soulagés »"}, {"id": "C2_S1_I24", "label": "Ça va mieux !", "title": "[Agathe] Ça va mieux ! Merci Claude."}, {"id": "C2_S1_I25", "label": "Oui c’est ça !", "title": "[Agathe] Oui c’est ça !"}, {"id": "C2_S1_I26", "label": "Revoir mon petit-fils !", "title": "[Agathe] Revoir mon petit-fils ! Pouvoir choisir ce que je veux faire ! Me sentir bien !"}, {"id": "C2_S1_I27", "label": "Oh oui, je tiens absolument", "title": "[Agathe] Oh oui, je tiens absolument à le revoir avant de m'en aller. Je m'envole pour quelques jours aux USA ? C'est la fête… mais peut-être ne va-t-il pas avoir envie d'accueillir sa grand-mère invalide…Quoique mon talon droit semble mieux aller, il doit être en voie de guérison."}, {"id": "C2_S1_I28", "label": "Après quelques minutes", "title": "[Agathe] Après quelques minutes de silence Agathe répond : Cela va être difficile, je suis justement dans un home et partage une vie avec un grand nombre de résidents ! Alors quoi bon me demander ce que vivre le mieux possible signifie pour moi ?"}, {"id": "C2_S1_I29", "label": "Agathe la regarde toujours", "title": "[Agathe] Agathe la regarde toujours, son sourire à disparu, les étoiles dans ses yeux ont disparu elles aussi… elle n'écoute déjà plus les paroles de Claude."}, {"id": "C2_S1_I30", "label": "Agathe acquiesce", "title": "[Agathe] Agathe acquiesce d'un signe de tête, tout en regardant Claude dans les yeux, elle sourit franchement en soupirant. Vivre tranquillement, à mon rythme sans être obligée de faire quoi que ce soit !"}, {"id": "C2_S1_I31", "label": "Je m’occupais", "title": "[Agathe] Je m’occupais de mon ménage, de mon jardin, c’était beaucoup de travail !"}, {"id": "C2_S1_I32", "label": "silence", "title": "[Agathe] ..."}, {"id": "C2_S1_I33", "label": "J’aimerais bien", "title": "[Agathe] J’aimerais bien continuer à discuter avec vous maintenant."}, {"id": "C2_S1_I34", "label": "Mais quand ?", "title": "[Agathe] Mais quand ?"}, {"id": "C2_S1_I35", "label": "Mais ça veut dire", "title": "[Agathe] Mais ça veut dire que je ne vous verrai pas demain."}, {"id": "C2_S1_I36", "label": "Merci Claude. Au revoir.", "title": "[Agathe] Merci Claude. Au revoir."}, {"id": "C2_S1_I37", "label": "silence", "title": "[Agathe] ..."}, {"id": "C2_S1_I38", "label": "silence", "title": "[Agathe] ..."}], "edges": [{"id": "C2_S1_I1_R0_>C2_S1_I2", "from": "C2_S1_I1", "to": "C2_S1_I2", "smooth": {"type": "curvedCW", "roundness": -0.53}}, {"id": "C2_S1_I1_R1_>C2_S1_I2", "from": "C2_S1_I1", "to": "C2_S1_I2", "smooth": {"type": "curvedCW", "roundness": 0.0}}, {"id": "C2_S1_I1_R2_>C2_S1_I2", "from": "C2_S1_I1", "to": "C2_S1_I2", "smooth": {"type": "curvedCW", "roundness": 0.53}}, {"id": "C2_S1_I2_R0_>C2_S1_I3", "from": "C2_S1_I2", "to": "C2_S1_I3", "smooth": {"type": "curvedCW", "roundness": -0.53}}, {"id": "C2_S1_I2_R1_>C2_S1_I3", "from": "C2_S1_I2", "to": "C2_S1_I3", "smooth": {"type": "curvedCW", "roundness": 0.0}}, {"id": "C2_S1_I2_R2_>C2_S1_I3", "from": "C2_S1_I2", "to": "C2_S1_I3", "smooth": {"type": "curvedCW", "roundness": 0.53}}, {"id": "C2_S1_I3_R0_>C2_S1_I7", "from": "C2_S1_I3", "to": "C2_S1_I7", "smooth": {"type": "curvedCW", "roundness": -0.53}}, {"id": "C2_S1_I3_R1_>C2_S1_I4", "from": "C2_S1_I3", "to": "C2_S1_I4", "smooth": {"type": "curvedCW", "roundness": 0.0}}, {"id": "C2_S1_I3_R2_>C2_S1_I5", "from": "C2_S1_I3", "to": "C2_S1_I5", "smooth": {"type": "curvedCW", "roundness": 0.53}}, {"id": "C2_S1_I4_R0_>C2_S1_I8", "from": "C2_S1_I4", "to": "C2_S1_I8", "smooth": {"type": "curvedCW", "roundness": -0.6499999999999999}}, {"id": "C2_S1_I4_R1_>C2_S1_I9", "from": "C2_S1_I4", "to":
