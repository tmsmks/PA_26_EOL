id": "C2_S2_I10_R0_>C2_S2_I12", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Vous rappelez-vous de ce qu'on s'est dit avant-hier ?", "next_id": "12", "target_node_id": "C2_S2_I12", "edge_id": "C2_S2_I10_R1_>C2_S2_I12", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Bon on reprend la discussion de mardi, vous rappelez-vous ce de quoi nous parlions ?", "next_id": "12", "target_node_id": "C2_S2_I12", "edge_id": "C2_S2_I10_R2_>C2_S2_I12", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S2_I12", "actor": "Agathe", "text": "Pas vraiment. Je me rappelle… que vous aviez du partir pour soigner d’autres patients.", "responses": [{"text": "Oui, c’est juste, je suis partie pour soigner d’autres résidents. Et avant de partir, nous avons réfléchi ensemble à ce que ce pourrait être pour vous « Vivre le mieux possible ici ! ».", "next_id": "13", "target_node_id": "C2_S2_I13", "edge_id": "C2_S2_I12_R0_>C2_S2_I13", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Oui mais sourtout comment on allait faire pour que vous vous sentiez mieux ici.", "next_id": "13", "target_node_id": "C2_S2_I13", "edge_id": "C2_S2_I12_R1_>C2_S2_I13", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S2_I13", "actor": "Agathe", "text": "Agathe sourit, ses yeux brillent, pétillent…", "responses": [{"text": "Je vous vois sourire. Vous vous souvenez de ce que vous m’avez dit ?", "next_id": "14", "target_node_id": "C2_S2_I14", "edge_id": "C2_S2_I13_R0_>C2_S2_I14", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Lorsque nous parlons de cela, je vous vois revivre, vous souriez et vos yeux brillent. Cela me remplit de joie. Vous souvenez vous de ce que vous m’avez dit ?", "next_id": "14", "target_node_id": "C2_S2_I14", "edge_id": "C2_S2_I13_R1_>C2_S2_I14", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S2_I14", "actor": "Agathe", "text": "Agathe, des étoiles dans les yeux. Rêver !", "responses": [{"text": "Qu’est-ce qui vous fait rêver, Agathe ?", "next_id": "15", "target_node_id": "C2_S2_I15", "edge_id": "C2_S2_I14_R0_>C2_S2_I15", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Et de quoi rêvez-vous, Agathe ?", "next_id": "15", "target_node_id": "C2_S2_I15", "edge_id": "C2_S2_I14_R1_>C2_S2_I15", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Dites m'en plus.", "next_id": "15", "target_node_id": "C2_S2_I15", "edge_id": "C2_S2_I14_R2_>C2_S2_I15", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S2_I15", "actor": "Agathe", "text": "Rimbaud, Baudelaire… J’aime les mots. Voler avec l’Albatros !!!", "responses": [{"text": "Est-ce que vous lisez Agathe ?", "next_id": "17", "target_node_id": "C2_S2_I17", "edge_id": "C2_S2_I15_R0_>C2_S2_I17", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Lire, vous aimez donc lire. Nous avons une bibliothèque à disposition des résidents, je vous y emmènerai.", "next_id": "16", "target_node_id": "C2_S2_I16", "edge_id": "C2_S2_I15_R1_>C2_S2_I16", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S2_I17", "actor": "Agathe", "text": "J’ai beaucoup lu dans ma vie. Des poèmes ! Ça fait quelques années que je ne peux plus. Alors Lucie, ma voisine me fait la lecture de temps en temps.", "responses": [{"text": "Vous auriez plaisir à écouter des poèmes ?", "next_id": "18", "target_node_id": "C2_S2_I18", "edge_id": "C2_S2_I17_R0_>C2_S2_I18", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Aimeriez-vous que l'on vous fasse la lecture ?", "next_id": "18", "target_node_id": "C2_S2_I18", "edge_id": "C2_S2_I17_R1_>C2_S2_I18", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Et si on vous lisait des histoires ? Cela vous intéresserait ?", "next_id": "18", "target_node_id": "C2_S2_I18", "edge_id": "C2_S2_I17_R2_>C2_S2_I18", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S2_I18", "actor": "Agathe", "text": "Oh oui ! Je serais ravie.", "responses": [{"text": "Alors je vais en parler à Claudia, l’animatrice et nous allons faire en sorte que vous puissiez rêver !", "next_id": "19", "target_node_id": "C2_S2_I19", "edge_id": "C2_S2_I18_R0_>C2_S2_I19", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Vous pourrez en parler à Claudia, l'animatrice, c'est elle qui s'occupe de ça.", "next_id": "19", "target_node_id": "C2_S2_I19", "edge_id": "C2_S2_I18_R1_>C2_S2_I19", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S2_I19", "actor": "Agathe", "text": "Vous feriez ça pour moi ! Merci Claude ! Du fond du coeur merci !", "responses": [{"text": "e vous en prie, Agathe. Un petit silence s'installe. Vous m’avez dit aussi, si je m’en souviens bien qu’il était important pour vous de revoir votre petit-fils.", "next_id": "20", "target_node_id": "C2_S2_I20", "edge_id": "C2_S2_I19_R0_>C2_S2_I20", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Pas de soucis ! Un petit silence s'installe. Vous m’avez dit aussi, si je m’en souviens bien qu’il était important pour vous de revoir votre petit-fils.", "next_id": "20", "target_node_id": "C2_S2_I20", "edge_id": "C2_S2_I19_R1_>C2_S2_I20", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S2_I20", "actor": "Agathe", "text": "Xavier ! Il est parti travailler aux Etats-Unis et je n’ai plus de nouvelles de lui. Il venait me voir toutes les semaines. On rigolait bien tous les deux ! On jouait au scrabble.", "responses": [{"text": "Vous jouez au scrabble ?", "next_id": "21", "target_node_id": "C2_S2_I21", "edge_id": "C2_S2_I20_R0_>C2_S2_I21", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Xavier et vous jouiez au scrabble ?", "next_id": "22", "target_node_id": "C2_S2_I22", "edge_id": "C2_S2_I20_R1_>C2_S2_I22", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S2_I21", "actor": "Agathe", "text": "Oui, les lettres sont grandes, c’est plus facile pour moi.", "responses": [{"text": "J’ai souvent vu au salon, l’après-midi des résidents qui jouaient au scrabble. Est-ce que jouer au salon avec d’autres résidents, c’est quelque chose que vous pouvez imaginer.", "next_id": "23", "target_node_id": "C2_S2_I23", "edge_id": "C2_S2_I21_R0_>C2_S2_I23", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Jouez au scarbble avec les autres résidents cela pourrait être bien pour vous, ne pensez-vous pas ?", "next_id": "23", "target_node_id": "C2_S2_I23", "edge_id": "C2_S2_I21_R1_>C2_S2_I23", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S2_I23", "actor": "Agathe", "text": "Oui, si je suis libre d’y aller quand je veux.", "responses": [{"text": "C’est important pour vous de ne pas être obligée de faire quoi que ce soit. Vous m’en aviez parlé. Vous êtes-vous déjà sentie obligée de faire quelque chose ici ?", "next_id": "24", "target_node_id": "C2_S2_I24", "edge_id": "C2_S2_I23_R0_>C2_S2_I24", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "N'oubliez pas que personne ne vous force ici !", "next_id": "24", "target_node_id": "C2_S2_I24", "edge_id": "C2_S2_I23_R1_>C2_S2_I24", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Bien entendu que vous êtes libre. On ne vous oblige à rien ici.", "next_id": "24", "target_node_id": "C2_S2_I24", "edge_id": "C2_S2_I23_R2_>C2_S2_I24", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S2_I24", "actor": "Agathe", "text": "Je suis obligée de prendre mes médicaments quand vous voulez ! Chez moi, je gérais mon semainier comme je l’entendais.", "responses": [{"text": "Je vais en parler avec l’équipe et nous verrons ce qu’il est possible de mettre en place pour vous garantir un maximum d’autonomie.", "next_id": "25", "target_node_id": "C2_S2_I25", "edge_id": "C2_S2_I24_R0_>C2_S2_I25", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "C'est une idée Agathe, peut être pourrions-nous voir ensemble, ce que vous pourriez prendre de manière autonome et ce que nous vous administrions ?", "next_id": "26", "target_node_id": "C2_S2_I26", "edge_id": "C2_S2_I24_R1_>C2_S2_I26", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Il est difficile de vous permettre de prendre votre traitement ici, nous sommes garantes de sa prise, en tant qu'infirmière.", "next_id": "27", "target_node_id": "C2_S2_I27", "edge_id": "C2_S2_I24_R2_>C2_S2_I27", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Vous semblez triste parfois, vous pourriez peut être les cumuler en vue d'en faire un mauvais usage.", "next_id": "28", "target_node_id": "C2_S2_I28", "edge_id": "C2_S2_I24_R3_>C2_S2_I28", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Pensez-vous, Agathe, il est mieux que nous le fassions, c'est un souci en moins pour vous.", "next_id": "30", "target_node_id": "C2_S2_I30", "edge_id": "C2_S2_I24_R4_>C2_S2_I30", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S2_I25", "actor": "Agathe", "text": "Agathe sourit.", "responses": [{"text": "Nous avons aussi parlé de vos enfants. Comment vous sentez-vous aujourd’hui quand vous pensez à vos enfants ?", "next_id": "31", "target_node_id": "C2_S2_I31", "edge_id": "C2_S2_I25_R0_>C2_S2_I31", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Vous pensez toujours à vos enfants ? Comment vous sentez-vous ?", "next_id": "31", "target_node_id": "C2_S2_I31", "edge_id": "C2_S2_I25_R1_>C2_S2_I31", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S2_I31", "actor": "Agathe", "text": "Je suis en paix avec eux ! Ils me manquent !", "responses": [{"text": "Avez-vous songé à les appeler ? Un court silence s'installe.", "next_id": "32", "target_node_id": "C2_S2_I32", "edge_id": "C2_S2_I31_R0_>C2_S2_I32", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Ils vous manquent ?", "next_id": "36", "target_node_id": "C2_S2_I36", "edge_id": "C2_S2_I31_R1_>C2_S2_I36", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S2_I32", "actor": "Agathe", "text": "J’appellerai Margot aujourd’hui. La dernière fois que je lui ai parlée, j’étais fâchée ! Je n’ai pas pu lui demander des nouvelles de Xavier.", "responses": [{"text": "Donc Agathe, si je résume notre discussion et les différents projets qu’il est possible que vous réalisiez ici. Il y a votre amour de la poésie. J’en parlerai à Claudia, l’animatrice pour voir ce qu’elle peut mettre en place pour réaliser ce rêve. Il y a aussi le scrabble. Vous savez maintenant que certains résidents y jouent au salon, l’après-midi et que vous pouvez les rejoindre quand vous voulez. Et puis il y a, le téléphone que vous voulez faire aujourd’hui à votre fille Margot. Comment vous sentez-vous ?", "next_id": "34", "target_node_id": "C2_S2_I34", "edge_id": "C2_S2_I32_R0_>C2_S2_I34", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Donc Agathe, si je résume notre discussion et les différents projets qu’il est possible que vous réalisiez ici. * Il y a la lecture. J’en parlerai à Claudia, l’animatrice pour voir ce qu’elle peut mettre en place. Il y a aussi le scrabble. Vous savez maintenant que certains résidents y jouent au salon, l’après-midi et que vous pouvez les rejoindre quand vous voulez. Et puis il y a, le téléphone que vous voulez faire aujourd’hui à votre fille Margot. Pensez-vous que nous avons abordé tout ce qui vous préoccupait ?", "next_id": "29", "target_node_id": "C2_S2_I29", "edge_id": "C2_S2_I32_R1_>C2_S2_I29", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Agathe, pourriez-vous faire un résumé de notre discussion et des différents projets qu'il est possible que vous réalisiez ici ?", "next_id": "33", "target_node_id": "C2_S2_I33", "edge_id": "C2_S2_I32_R2_>C2_S2_I33", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S2_I34", "actor": "Agathe", "text": "Je ne pensais pas pouvoir encore vivre de bons moments ici. Ça me fait du bien de penser que c’est possible! Merci Claude.", "responses": [{"text": "Je vous en prie Agathe. Je vais vous laisser maintenant et vous souhaite de belles retrouvailles au téléphone avec votre fille. Au revoir. Je sors de la chambre d'Agathe.", "next_id": "35", "target_node_id": "C2_S2_I35", "edge_id": "C2_S2_I34_R0_>C2_S2_I35", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "C’est bien. Au revoir Agathe. ! Je sors de la chambre d'Agathe.", "next_id": "-1", "target_node_id": "", "edge_id": "", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S2_I35", "actor": "Agathe", "text": "...", "responses": [{"text": "Au revoir ! Bonne journée ! Je salue Agathe et sors de la chambre", "next_id": "-1", "target_node_id": "", "edge_id": "", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S2_I29", "actor": "Agathe", "text": "Oui merci Claude. Je salue Agathe et je sors de la chambre. Au revoir !", "responses": [{"text": "Sortir", "next_id": "-1", "target_node_id": "", "edge_id" athy": 0}, {"text": "Maintenant vous voulez revoir vos enfants...", "next_id": "32", "target_node_id": "C2_S2_I32", "edge_id": "C2_S2_I36_R1_>C2_S2_I32", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S2_I26", "actor": "Agathe", "text": "C'est tout ou rien, je l'ai fait jusqu'à présent.", "responses": [{"text": "Nous avons aussi parlé de vos enfants. Comment vous sentez-vous aujourd’hui quand vous pensez à vos enfants ?", "next_id": "31", "target_node_id": "C2_S2_I31", "edge_id": "C2_S2_I26_R0_>C2_S2_I31", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Vous pensez toujours à vos enfants ? Comment vous sentez-vous ?", "next_id": "31", "target_node_id": "C2_S2_I31", "edge_id": "C2_S2_I26_R1_>C2_S2_I31", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S2_I27", "actor": "Agathe", "text": "C'est tout ou rien, je l'ai fait jusqu'à présent.", "responses": [{"text": "Pensez-vous que nous avons abordé tout ce qui vous préoccupait ?", "next_id": "29", "target_node_id": "C2_S2_I29", "edge_id": "C2_S2_I27_R0_>C2_S2_I29", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "On a fait le tour ?", "next_id": "29", "target_node_id": "C2_S2_I29", "edge_id": "C2_S2_I27_R1_>C2_S2_I29", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S2_I28", "actor": "Agathe", "text": "C'est tout ou rien, je l'ai fait jusqu'à présent. J'explique à Agathe que je comprend et je la laisse. ", "responses": [{"text": "Je sors de la chambre d'Agathe", "next_id": "-1", "target_node_id": "", "edge_id": "", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S2_I30", "actor": "Agathe", "text": "Je comprends. Merci pour votre temps. Je salue Agathe et je sors de la chambre.", "responses": [{"text": "Sortir", "next_id": "-1", "target_node_id": "", "edge_id": "", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S2_I22", "actor": "Agathe", "text": "Oui nous avions pris l’habitude de jouer ensemble lorsqu’il était enfant déjà…, nous ne comptions pas les points. Ensuite, nous nous lancions des défis… le mot le plus long, un mot nouveau… je me demande s’il le fait maintenant avec ses copains, aux USA ? Il faudra que je lui demande.", "responses": [{"text": "C’est une belle manière de passer du temps ensemble… cela me fait penser aux moments privilégiés que j’ai passé avec ma grand-maman, j’en éprouve encore toute la joie en y repensant. J’ai souvent vu au salon, l’après-midi des résidents qui jouaient au scrabble. Est-ce que jouer au salon avec d’autres résidents, c’est quelque chose que vous pouvez imaginer.", "next_id": "23", "target_node_id": "C2_S2_I23", "edge_id": "C2_S2_I22_R0_>C2_S2_I23", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "C'est toujours sympa ces activités en groupe. Jouer avec les autres résidents ça vous tenterais ?", "next_id": "23", "target_node_id": "C2_S2_I23", "edge_id": "C2_S2_I22_R1_>C2_S2_I23", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S2_I16", "actor": "Agathe", "text": "Non, non, je ne souhaite déranger personne …en plus … je n'y tiens plus ! J’ai beaucoup lu dans ma vie. Des poèmes ! Ça fait quelques années que je ne peux plus. Alors Lucie, ma voisine me fait la lecture de temps en temps.", "responses": [{"text": "Vous auriez plaisir à écouter des poèmes ?", "next_id": "18", "target_node_id": "C2_S2_I18", "edge_id": "C2_S2_I16_R0_>C2_S2_I18", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Aimeriez-vous que l'on vous fasse la lecture ?", "next_id": "18", "target_node_id": "C2_S2_I18", "edge_id": "C2_S2_I16_R1_>C2_S2_I18", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Et si on vous lisait C2_S2_I37_R1_>C2_S2_I38", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Qu’aimiez-vous donc faire Agathe, lorsque vous aviez un peu de temps à disposition ?", "next_id": "39", "target_node_id": "C2_S2_I39", "edge_id": "C2_S2_I37_R2_>C2_S2_I39", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "L'animatrice ne vous a donc pas proposé une activité ?", "next_id": "40", "target_node_id": "C2_S2_I40", "edge_id": "C2_S2_I37_R3_>C2_S2_I40", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S2_I38", "actor": "Agathe", "text": "C’est, vrai, ma maison, mon jardin me manquent…ici je suis bloquée dans cette chambre avec ce pied !!! J’aimais mon indépendance, découvrir de nouveaux lieux… la perdre renforce mon sentiment d’inutilité.", "responses": [{"text": "Nous devons nous voir un moment aujourd'hui, vous en souvenez-vous ? Dis-je tout en roulant le chariot, avec le matériel dont j’ai besoin pour le pansement, de côté, avant de prendre une chaise et m'assoir auprès d'Agathe", "next_id": "6", "target_node_id": "C2_S2_I6", "edge_id": "C2_S2_I38_R0_>C2_S2_I6", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Allez on s'y met. Vous rappellez-vous que nous devions nous voir aujourd'hui ? Dis-je tout en roulant le chariot, avec le matériel dont j’ai besoin pour le pansement, de côté, avant de prendre une chaise et m'assoir auprès d'Agathe", "next_id": "6", "target_node_id": "C2_S2_I6", "edge_id": "C2_S2_I38_R1_>C2_S2_I6", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "C'est à votre tour pour les soins, toujours prête pour une petite discussion aujourd'hui ? Dis-je tout en roulant le chariot, avec le matériel dont j’ai besoin pour le pansement, de côté, avant de prendre une chaise et m'assoir auprès d'Agathe", "next_id": "6", "target_node_id": "C2_S2_I6", "edge_id": "C2_S2_I38_R2_>C2_S2_I6", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S2_I39", "actor": "Agathe", "text": "Justement, avant de venir ici, je n'ai jamais eu à me poser cette question.", "responses": [{"text": "Bien. Je vais faire votre pansement. Vous pouvez vous coucher dans votre lit. Ce sera plus confortable pour vous et plus facile pour moi.", "next_id": "7", "target_node_id": "C2_S2_I7", "edge_id": "C2_S2_I39_R0_>C2_S2_I7", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Couchez-vous s'il vous plaît, il est temps pour le pansement.", "next_id": "7", "target_node_id": "C2_S2_I7", "edge_id": "C2_S2_I39_R1_>C2_S2_I7", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Allez, laissez moi vous changer le pansement.", "next_id": "7", "target_node_id": "C2_S2_I7", "edge_id": "C2_S2_I39_R2_>C2_S2_I7", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S2_I40", "actor": "Agathe", "text": "Il ne s’agit pas de ça… Agathe secoue la tête et tourne son regard vers la fenêtre. Les larmes montent et commencent à couler sur ses joues. Je décide de la laisser un moment", "responses": [{"text": "Sortir de la pièce", "next_id": "-1", "target_node_id": "", "edge_id": "", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S2_I2", "actor": "Agathe", "text": "Mais attendez donc que je vous réponde ! Que diriez-vous si j'entrais chez vous ainsi ? Dit Agathe en me regardant fixement le visage renfrogné, les sourcils serrés.", "responses": [{"text": "Excusez-moi, je suis dans mes pensées et je n’ai pas pris garde à votre réponse. Avez-vous eu peur ?", "next_id": "3", "target_node_id": "C2_S2_I3", "edge_id": "C2_S2_I2_R0_>C2_S2_I3", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Excusez-moi, je suis dans mes pensées et je n’ai porté attention à votre réponse. Etes-vous en colère ?", "next_id": "3", "target_node_id": "C2_S2_I3", "edge_id": "C2_S2_I2_R1_>C2_S2_I3", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Excusez-moi, j'oublie de frapper. Je suis centrée sur ce que je vais faire et cela m'échappe.", "next_id": "3", "target_node_id": "C2_S2_I3", "edge_id": "C2_S2_I2_R2_>C2_S2_I3", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S2_I3", "actor": "Agathe", "text": "Je vais finir par me fâcher et m'adressez à votre chef ! C'est insupportable ! En plus je m'ennui !", "responses": [{"text": "e vous entends. Ce que je vous propose maintenant, c’est de faire votre pansement et après nous parlerons ensemble une vingtaine de minutes de ce que vous pourriez faire justement ici.  Est-ce que cela vous convient ?", "next_id": "6", "target_node_id": "C2_S2_I6", "edge_id": "C2_S2_I3_R0_>C2_S2_I6", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "C’est-à-dire… si vous m’en disiez un peu plus Agathe ?", "next_id": "37", "target_node_id": "C2_S2_I37", "edge_id": "C2_S2_I3_R1_>C2_S2_I37", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Je vous entends Agathe… passez de l'entretien d'une maison et d'un jardin à une obligation de rester tranquille dans une chambre, il y a un écart difficile à combler et cela me paraîtrait difficile à vivre.", "next_id": "38", "target_node_id": "C2_S2_I38", "edge_id": "C2_S2_I3_R2_>C2_S2_I38", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Qu’aimiez-vous donc faire Agathe, lorsque vous aviez un peu de temps à disposition ?", "next_id": "39", "target_node_id": "C2_S2_I39", "edge_id": "C2_S2_I3_R3_>C2_S2_I39", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "L'animatrice ne vous a donc pas proposé une activité ?", "next_id": "-1", "target_node_id": "", "edge_id": "", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "New Response", "next_id": "-1", "target_node_id": "", "edge_id": "", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}], "id_to_parcours": {"1": {"node_id": "C2_S2_I1", "actor": "Claude", "text": "...", "responses": [{"text": "Je prends un temps pour respirer et se recentrer, frappe à la porte, puis après avoir attendu qu'Agathe me réponde, j'entre, en roulant le chariot avec le matériel dont j'ai besoin pour changer le pansement. Bonjour Agathe, comment allez-vous aujourd’hui ?", "next_id": "4", "target_node_id": "C2_S2_I4", "edge_id": "C2_S2_I1_R0_>C2_S2_I4", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Quelque peu tendue à l’idée que Marc me fasse un commentaire, j’essaie de faire le vide dans mes pensées avec d’entrer en relation avec Agathe. Je frappe à la porte et entre sans attendre qu’Agathe réponde.", "next_id": "2", "target_node_id": "C2_S2_I2", "edge_id": "C2_S2_I1_R1_>C2_S2_I2", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Quelque peu tendue, je prends un temps pour me calmer en posant un regard sur ma respiration. Je frappe à la porte et entre sans attendre qu’Agathe réponde.", "next_id": "2", "target_node_id": "C2_S2_I2", "edge_id": "C2_S2_I1_R2_>C2_S2_I2", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "4": {"node_id": "C2_S2_I4", "actor": "Agathe", "text": "Agathe est dans son fauteuil : Gentiment.", "responses": [{"text": "Gentiment.", "next_id": "5", "target_node_id": "C2_S2_I5", "edge_id": "C2_S2_I4_R0_>C2_S2_I5", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Je vous vous vois le visage refrogné en me regardant fixement, êtes-vous en colère ?", "next_id": "5", "target_node_id": "C2_S2_I5", "edge_id": "C2_S2_I4_R1_>C2_S2_I5", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "5": {"node_id": "C2_S2_I5", "actor": "Agathe", "text": "Oui, ça va, je m’ennuie un peu.", "responses": [{"text": "Je vous entends. Ce que je vous propose maintenant, c’est de faire votre pansement et après nous parlerons ensemble une vingtaine de minutes de ce que vous pourriez faire justement ici.  Est-ce que cela vous convient ?", "next_id": "6", "target_node_id": "C2_S2_I6", "edge_id": "C2_S2_I5_R0_>C2_S2_I6", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "C’est-à-dire… si vous m’en disiez un peu plus Agathe ?", "next_id": "37", "target_node_id": "C2_S2_I37", "edge_id": "C2_S2_I5_R1_>C2_S2_I37", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Je vous entends Agathe… passez de l'entretien d'une maison et d'un jardin à une obligation de rester tranquille dans une chambre, il y a un écart difficile à combler et cela me paraîtrait difficile à vivre.", "next_id": "38", "target_node_id": "C2_S2_I38", "edge_id": "C2_S2_I5_R2_>C2_S2_I38", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Qu’aimiez-vous donc faire Agathe, lorsque vous aviez un peu de temps à disposition ?", "next_id": "39", "target_node_id": "C2_S2_I39", "edge_id": "C2_S2_I5_R3_>C2_S2_I39", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "L'animatrice ne vous a donc pas proposé une activité ?", "next_id": "40", "target_node_id": "C2_S2_I40", "edge_id": "C2_S2_I5_R4_>C2_S2_I40", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "6": {"node_id": "C2_S2_I6", "actor": "Agathe", "text": "Tout à fait.", "responses": [{"text": "Bien. Je vais faire votre pansement. Vous pouvez vous coucher dans votre lit. Ce sera plus confortable pour vous et plus facile pour moi.", "next_id": "7", "target_node_id": "C2_S2_I7", "edge_id": "C2_S2_I6_R0_>C2_S2_I7", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Couchez-vous s'il vous plaît, il est temps pour le pansement.", "next_id": "7", "target_node_id": "C2_S2_I7", "edge_id": "C2_S2_I6_R1_>C2_S2_I7", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Allez, laissez moi vous changer le pansement.", "next_id": "7", "target_node_id": "C2_S2_I7", "edge_id": "C2_S2_I6_R2_>C2_S2_I7", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "7": {"node_id": "C2_S2_I7", "actor": "Agathe", "text": "Agathe se lève et s’installe dans son lit. Claude change le pansement du pied d’Agathe. La plaie commence à se cicatriser.", "responses": [{"text": "Votre pied va mieux. La plaie cicatrise.", "next_id": "8", "target_node_id": "C2_S2_I8", "edge_id": "C2_S2_I7_R0_>C2_S2_I8", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Votre pied va mieux, la plaie cicatrise. Ressentez-vous un changement ou une différence ?", "next_id": "8", "target_node_id": "C2_S2_I8", "edge_id": "C2_S2_I7_R1_>C2_S2_I8", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "8": {"node_id": "C2_S2_I8", "actor": "Agathe", "text": "Agathe soupire.", "responses": [{"text": "Vous êtes soulagée.", "next_id": "9", "target_node_id": "C2_S2_I9", "edge_id": "C2_S2_I8_R0_>C2_S2_I9", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Quel soupire !", "next_id": "9", "target_node_id": "C2_S2_I9", "edge_id": "C2_S2_I8_R1_>C2_S2_I9", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "9": {"node_id": "C2_S2_I9", "actor": "Agathe", "text": "Oui, avec mon diabète, vous savez j’avais peur… Agathe tremble du menton.", "responses": [{"text": "Vous aviez très peur.", "next_id": "10", "target_node_id": "C2_S2_I10", "edge_id": "C2_S2_I9_R0_>C2_S2_I10", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Vous tremblez en me parlant Agathe, aviez-vous si peur ?", "next_id": "11", "target_node_id": "C2_S2_I11", "edge_id": "C2_S2_I9_R1_>C2_S2_I11", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "10": {"node_id": "C2_S2_I10", "actor": "Agathe", "text": "Oui, qu’on m’ampute !!! Agathe attrape son drap de lit pour s’essuyer les yeux. Je lui tends un mouchoir. Un petit silence s'installe. Merci.", "responses": [{"text": "Il y a deux jours nous avons parlé ensemble. Souvenez-vous quelque peu des termes de notre rencontre ?", "next_id": "12", "target_node_id": "C2_S2_I12", "edge_id": "C2_S2_I10_R0_>C2_S2_I12", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Vous rappelez-vous de ce qu'on s'est dit avant-hier ?", "next_id": "12", "target_node_id": "C2_S2_I12", "edge_id": "C2_S2_I10_R1_>C2_S2_I12", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Bon on reprend la discussion de mardi, vous rappelez-vous ce de quoi nous parlions ?", "next_id": "12", "target_node_id": "C2_S2_I12", "edge_id": "C2_S2_I10_R2_>C2_S2_I12", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "12": {"node_id": "C2_S2_I12", "actor": "Agathe", "text": "Pas vraiment. Je me rappelle… que vous aviez du partir pour soigner d’autres patients.", "responses": [{"text": "Oui, c’est juste, je suis partie pour soigner d’autres résidents. Et avant de partir, nous avons réfléchi ensemble à ce que ce pourrait être pour vous « Vivre le mieux possible ici ! ».", "next_id": "13", "target_node_id": "C2_S2_I13", "edge_id": "C2_S2_I12_R0_>C2_S2_I13", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Oui mais sourtout comment on allait faire pour que vous vous sentiez mieux ici.", "next_id": "13", "target_node_id": "C2_S2_I13", "edge_id": "C2_S2_I12_R1_>C2_S2_I13", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "13": {"node_id": "C2_S2_I13", "actor": "Agathe", "text": "Agathe sourit, ses yeux brillent, pétillent…", "responses": [{"text": "Je vous vois sourire. Vous vous souvenez de ce que vous m’avez dit ?", "next_id": "14", "target_node_id": "C2_S2_I14", "edge_id": "C2_S2_I13_R0_>C2_S2_I14", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Lorsque nous parlons de cela, je vous vois revivre, vous souriez et vos yeux brillent. Cela me remplit de joie. Vous souvenez vous de ce que vous m’avez dit ?", "next_id": "14", "target_node_id": "C2_S2_I14", "edge_id": "C2_S2_I13_R1_>C2_S2_I14", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "14": {"node_id": "C2_S2_I14", "actor": "Agathe", "text": "Agathe, des étoiles dans les yeux. Rêver !", "responses": [{"text": "Qu’est-ce qui vous fait rêver, Agathe ?", "next_id": "15", "target_node_id": "C2_S2_I15", "edge_id": "C2_S2_I14_R0_>C2_S2_I15", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Et de quoi rêvez-vous, Agathe ?", "next_id": "15", "target_node_id": "C2_S2_I15", "edge_id": "C2_S2_I14_R1_>C2_S2_I15", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Dites m'en plus.", "next_id": "15", "target_node_id": "C2_S2_I15", "edge_id": "C2_S2_I14_R2_>C2_S2_I15", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "15": {"node_id": "C2_S2_I15", "actor": "Agathe", "text": "Rimbaud, Baudelaire… J’aime les mots. Voler avec l’Albatros !!!", "responses": [{"text": "Est-ce que vous lisez Agathe ?", "next_id": "17", "target_node_id": "C2_S2_I17", "edge_id": "C2_S2_I15_R0_>C2_S2_I17", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Lire, vous aimez donc lire. Nous avons une bibliothèque à disposition des résidents, je vous y emmènerai.", "next_id": "16", "target_node_id": "C2_S2_I16", "edge_id": "C2_S2_I15_R1_>C2_S2_I16", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "17": {"node_id": "C2_S2_I17", "actor": "Agathe", "text": "J’ai beaucoup lu dans ma vie. Des poèmes ! Ça fait quelques années que je ne peux plus. Alors Lucie, ma voisine me fait la lecture de temps en temps.", "responses": [{"text": "Vous auriez plaisir à écouter des poèmes ?", "next_id": "18", "target_node_id": "C2_S2_I18", "edge_id": "C2_S2_I17_R0_>C2_S2_I18", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Aimeriez-vous que l'on vous fasse la lecture ?", "next_id": "18", "target_node_id": "C2_S2_I18", "edge_id": "C2_S2_I17_R1_>C2_S2_I18", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Et si on vous lisait des histoires ? Cela vous intéresserait ?", "next_id": "18", "target_node_id": "C2_S2_I18", "edge_id": "C2_S2_I17_R2_>C2_S2_I18", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "18": {"node_id": "C2_S2_I18", "actor": "Agathe", "text": "Oh oui ! Je serais ravie.", "responses": [{"text": "Alors je vais en parler à Claudia, l’animatrice et nous allons faire en sorte que vous puissiez rêver !", "next_id": "19", "target_node_id": "C2_S2_I19", "edge_id": "C2_S2_I18_R0_>C2_S2_I19", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Vous pourrez en parler à Claudia, l'animatrice, c'est elle qui s'occupe de ça.", "next_id": "19", "target_node_id": "C2_S2_I19", "edge_id": "C2_S2_I18_R1_>C2_S2_I19", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "19": {"node_id": "C2_S2_I19", "actor": "Agathe", "text": "Vous feriez ça pour moi ! Merci Claude ! Du fond du coeur merci !", "responses": [{"text": "e vous en prie, Agathe. Un petit silence s'installe. Vous m’avez dit aussi, si je m’en souviens bien qu’il était important pour vous de revoir votre petit-fils.", "next_id": "20", "target_node_id": "C2_S2_I20", "edge_id": "C2_S2_I19_R0_>C2_S2_I20", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Pas de soucis ! Un petit silence s'installe. Vous m’avez dit aussi, si je m’en souviens bien qu’il était important pour vous de revoir votre petit-fils.", "next_id": "20", "target_node_id": "C2_S2_I20", "edge_id": "C2_S2_I19_R1_>C2_S2_I20", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "20": {"node_id": "C2_S2_I20", "actor": "Agathe", "text": "Xavier ! Il est parti travailler aux Etats-Unis et je n’ai plus de nouvelles de lui. Il venait me voir toutes les semaines. On rigolait bien tous les deux ! On jouait au scrabble.", "responses": [{"text": "Vous jouez au scrabble ?", "next_id": "21", "target_node_id": "C2_S2_I21", "edge_id": "C2_S2_I20_R0_>C2_S2_I21", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Xavier et vous jouiez au scrabble ?", "next_id": "22", "target_node_id": "C2_S2_I22", "edge_id": "C2_S2_I20_R1_>C2_S2_I22", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "21": {"node_id": "C2_S2_I21", "actor": "Agathe", "text": "Oui, les lettres sont grandes, c’est plus facile pour moi.", "responses": [{"text": "J’ai souvent vu au salon, l’après-midi des résidents qui jouaient au scrabble. Est-ce que jouer au salon avec d’autres résidents, c’est quelque chose que vous pouvez imaginer.", "next_id": "23", "target_node_id": "C2_S2_I23", "edge_id": "C2_S2_I21_R0_>C2_S2_I23", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Jouez au scarbble avec les autres résidents cela pourrait être bien pour vous, ne pensez-vous pas ?", "next_id": "23", "target_node_id": "C2_S2_I23", "edge_id": "C2_S2_I21_R1_>C2_S2_I23", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "23": {"node_id": "C2_S2_I23", "actor": "Agathe", "text": "Oui, si je suis libre d’y aller quand je veux.", "responses": [{"text": "C’est important pour vous de ne pas être obligée de faire quoi que ce soit. Vous m’en aviez parlé. Vous êtes-vous déjà sentie obligée de faire quelque chose ici ?", "next_id": "24", "target_node_id": "C2_S2_I24", "edge_id": "C2_S2_I23_R0_>C2_S2_I24", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "N'oubliez pas que personne ne vous force ici !", "next_id": "24", "target_node_id": "C2_S2_I24", "edge_id": "C2_S2_I23_R1_>C2_S2_I24", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Bien entendu que vous êtes libre. On ne vous oblige à rien ici.", "next_id": "24", "target_node_id": "C2_S2_I24", "edge_id": "C2_S2_I23_R2_>C2_S2_I24", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "24": {"node_id": "C2_S2_I24", "actor": "Agathe", "text": "Je suis obligée de prendre mes médicaments quand vous voulez ! Chez moi, je gérais mon semainier comme je l’entendais.", "responses": [{"text": "Je vais en parler avec l’équipe et nous verrons ce qu’il est possible de mettre en place pour vous garantir un maximum d’autonomie.", "next_id": "25", "target_node_id": "C2_S2_I25", "edge_id": "C2_S2_I24_R0_>C2_S2_I25", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "C'est une idée Agathe, peut être pourrions-nous voir ensemble, ce que vous pourriez prendre de manière autonome et ce que nous vous administrions ?", "next_id": "26", "target_node_id": "C2_S2_I26", "edge_id": "C2_S2_I24_R1_>C2_S2_I26", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Il est difficile de vous permettre de prendre votre traitement ici, nous sommes garantes de sa prise, en tant qu'infirmière.", "next_id": "27", "target_node_id": "C2_S2_I27", "edge_id": "C2_S2_I24_R2_>C2_S2_I27", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Vous semblez triste parfois, vous pourriez peut être les cumuler en vue d'en faire un mauvais usage.", "next_id": "28", "target_node_id": "C2_S2_I28", "edge_id": "C2_S2_I24_R3_>C2_S2_I28", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Pensez-vous, Agathe, il est mieux que nous le fassions, c'est un souci en moins pour vous.", "next_id": "30", "target_node_id": "C2_S2_I30", "edge_id": "C2_S2_I24_R4_>C2_S2_I30", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "25": {"node_id": "C2_S2_I25", "actor": "Agathe", "text": "Agathe sourit.", "responses": [{"text": "Nous avons aussi parlé de vos enfants. Comment vous sentez-vous aujourd’hui quand vous pensez à vos enfants ?", "next_id": "31", "target_node_id": "C2_S2_I31", "edge_id": "C2_S2_I25_R0_>C2_S2_I31", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Vous pensez toujours à vos enfants ? Comment vous sentez-vous ?", "next_id": "31", "target_node_id": "C2_S2_I31", "edge_id": "C2_S2_I25_R1_>C2_S2_I31", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "31": {"node_id": "C2_S2_I31", "actor": "Agathe", "text": "Je suis en paix avec eux ! Ils me manquent !", "responses": [{"text": "Avez-vous songé à les appeler ? Un court silence s'installe.", "next_id": "32", "target_node_id": "C2_S2_I32", "edge_id": "C2_S2_I31_R0_>C2_S2_I32", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Ils vous manquent ?", "next_id": "36", "target_node_id": "C2_S2_I36", "edge_id": "C2_S2_I31_R1_>C2_S2_I36", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "32": {"node_id": "C2_S2_I32", "actor": "Agathe", "text": "J’appellerai Margot aujourd’hui. La dernière fois que je lui ai parlée, j’étais fâchée ! Je n’ai pas pu lui demander des nouvelles de Xavier.", "responses": [{"text": "Donc Agathe, si je résume notre discussion et les différents projets qu’il est possible que vous réalisiez ici. Il y a votre amour de la poésie. J’en parlerai à Claudia, l’animatrice pour voir ce qu’elle peut mettre en place pour réaliser ce rêve. Il y a aussi le scrabble. Vous savez maintenant que certains résidents y jouent au salon, l’après-midi et que vous pouvez les rejoindre quand vous voulez. Et puis il y a, le téléphone que vous voulez faire aujourd’hui à votre fille Margot. Comment vous sentez-vous ?", "next_id": "34", "target_node_id": "C2_S2_I34", "edge_id": "C2_S2_I32_R0_>C2_S2_I34", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Donc Agathe, si je résume notre discussion et les différents projets qu’il est possible que vous réalisiez ici. * Il y a la lecture. J’en parlerai à Claudia, l’animatrice pour voir ce qu’elle peut mettre en place. Il y a aussi le scrabble. Vous savez maintenant que certains résidents y jouent au salon, l’après-midi et que vous pouvez les rejoindre quand vous voulez. Et puis il y a, le téléphone que vous voulez faire aujourd’hui à votre fille Margot. Pensez-vous que nous avons abordé tout ce qui vous préoccupait ?", "next_id": "29", "target_node_id": "C2_S2_I29", "edge_id": "C2_S2_I32_R1_>C2_S2_I29", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Agathe, pourriez-vous faire un résumé de notre discussion et des différents projets qu'il est possible que vous réalisiez ici ?", "next_id": "33", "target_node_id": "C2_S2_I33", "edge_id": "C2_S2_I32_R2_>C2_S2_I33", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "34": {"node_id": "C2_S2_I34", "actor": "Agathe", "text": "Je ne pensais pas pouvoir encore vivre de bons moments ici. Ça me fait du bien de penser que c’est possible! Merci Claude.", "responses": [{"text": "Je vous en prie Agathe. Je vais vous laisser maintenant et vous souhaite de belles retrouvailles au téléphone avec votre fille. Au revoir. Je sors de la chambre d'Agathe.", "next_id": "35", "target_node_id": "C2_S2_I35", "edge_id": "C2_S2_I34_R0_>C2_S2_I35", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "C’est bien. Au revoir Agathe. ! Je sors de la chambre d'Agathe.", "next_id": "-1", "target_node_id": "", "edge_id": "", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "35": {"node_id": "C2_S2_I35", "actor": "Agathe", "text": "...", "responses": [{"text": "Au revoir ! Bonne journée ! Je salue Agathe et sors de la chambre", "next_id": "-1", "target_node_id": "", "edge_id": "", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "29": {"node_id": "C2_S2_I29", "actor": "Agathe", "text": "Oui merci Claude. Je salue Agathe et je sors de la chambre. Au revoir !", "responses": [{"text": "Sortir", "next_id": "-1", "target_node_id": "", "edge_id": "", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "33": {"node_id": "C2_S2_I33", "actor": "Agathe", "text": "Ma foi je ne sais pas si je me souviens de tout, je préfère que ce soit vous qui résumiez Claude.", "responses": [{"text": "Donc Agathe, si je résume notre discussion et les différents projets qu’il est possible que vous réalisiez ici. Il y a votre amour de la poésie. J’en parlerai à Claudia, l’animatrice pour voir ce qu’elle peut mettre en place pour réaliser ce rêve. Il y a aussi le scrabble. Vous savez maintenant que certains résidents y jouent au salon, l’après-midi et que vous pouvez les rejoindre quand vous voulez. Et puis il y a, le téléphone que vous voulez faire aujourd’hui à votre fille Margot. Comment vous sentez-vous ?", "next_id": "34", "target_node_id": "C2_S2_I34", "edge_id": "C2_S2_I33_R0_>C2_S2_I34", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Donc Agathe, si je résume notre discussion et les différents projets qu’il est possible que vous réalisiez ici. * Il y a la lecture. J’en parlerai à Claudia, l’animatrice pour voir ce qu’elle peut mettre en place. Il y a aussi le scrabble. Vous savez maintenant que certains résidents y jouent au salon, l’après-midi et que vous pouvez les rejoindre quand vous voulez. Et puis il y a, le téléphone que vous voulez faire aujourd’hui à votre fille Margot. Pensez-vous que nous avons abordé tout ce qui vous préoccupait ?", "next_id": "29", "target_node_id": "C2_S2_I29", "edge_id": "C2_S2_I33_R1_>C2_S2_I29", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "36": {"node_id": "C2_S2_I36", "actor": "Agathe", "text": "J’ai le sentiment de ne plus avoir de famille en ce moment et il est important que je les revois…", "responses": [{"text": "Vous souhaitez revoir vos enfants…", "next_id": "32", "target_node_id": "C2_S2_I32", "edge_id": "C2_S2_I36_R0_>C2_S2_I32", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Maintenant vous voulez revoir vos enfants...", "next_id": "32", "target_node_id": "C2_S2_I32", "edge_id": "C2_S2_I36_R1_>C2_S2_I32", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "26": {"node_id": "C2_S2_I26", "actor": "Agathe", "text": "C'est tout ou rien, je l'ai fait jusqu'à présent.", "responses": [{"text": "Nous avons aussi parlé de vos enfants. Comment vous sentez-vous aujourd’hui quand vous pensez à vos enfants ?", "next_id": "31", "target_node_id": "C2_S2_I31", "edge_id": "C2_S2_I26_R0_>C2_S2_I31", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Vous pensez toujours à vos enfants ? Comment vous sentez-vous ?", "next_id": "31", "target_node_id": "C2_S2_I31", "edge_id": "C2_S2_I26_R1_>C2_S2_I31", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "27": {"node_id": "C2_S2_I27", "actor": "Agathe", "text": "C'est tout ou rien, je l'ai fait jusqu'à présent.", "responses": [{"text": "Pensez-vous que nous avons abordé tout ce qui vous préoccupait ?", "next_id": "29", "target_node_id": "C2_S2_I29", "edge_id": "C2_S2_I27_R0_>C2_S2_I29", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "On a fait le tour ?", "next_id": "29", "target_node_id": "C2_S2_I29", "edge_id": "C2_S2_I27_R1_>C2_S2_I29", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "28": {"node_id": "C2_S2_I28", "actor": "Agathe", "text": "C'est tout ou rien, je l'ai fait jusqu'à présent. J'explique à Agathe que je comprend et je la laisse. ", "responses": [{"text": "Je sors de la chambre d'Agathe", "next_id": "-1", "target_node_id": "", "edge_id": "", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "30": {"node_id": "C2_S2_I30", "actor": "Agathe", "text": "Je comprends. Merci pour votre temps. Je salue Agathe et je sors de la chambre.", "responses": [{"text": "Sortir", "next_id": "-1", "target_node_id": "", "edge_id": "", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "22": {"node_id": "C2_S2_I22", "actor": "Agathe", "text": "Oui nous avions pris l’habitude de jouer ensemble lorsqu’il était enfant déjà…, nous ne comptions pas les points. Ensuite, nous nous lancions des défis… le mot le plus long, un mot nouveau… je me demande s’il le fait maintenant avec ses copains, aux USA ? Il faudra que je lui demande.", "responses": [{"text": "C’est une belle manière de passer du temps ensemble… cela me fait penser aux moments privilégiés que j’ai passé avec ma grand-maman, j’en éprouve encore toute la joie en y repensant. J’ai souvent vu au salon, l’après-midi des résidents qui jouaient au scrabble. Est-ce que jouer au salon avec d’autres résidents, c’est quelque chose que vous pouvez imaginer.", "next_id": "23", "target_node_id": "C2_S2_I23", "edge_id": "C2_S2_I22_R0_>C2_S2_I23", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "C'est toujours sympa ces activités en groupe. Jouer avec les autres résidents ça vous tenterais ?", "next_id": "23", "target_node_id": "C2_S2_I23", "edge_id": "C2_S2_I22_R1_>C2_S2_I23", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "16": {"node_id": "C2_S2_I16", "actor": "Agathe", "text": "Non, non, je ne souhaite déranger personne …en plus … je n'y tiens plus ! J’ai beaucoup lu dans ma vie. Des poèmes ! Ça fait quelques années que je ne peux plus. Alors Lucie, ma voisine me fait la lecture de temps en temps.", "responses": [{"text": "Vous auriez plaisir à écouter des poèmes ?", "next_id": "18", "target_node_id": "C2_S2_I18", "edge_id": "C2_S2_I16_R0_>C2_S2_I18", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Aimeriez-vous que l'on vous fasse la lecture ?", "next_id": "18", "target_node_id": "C2_S2_I18", "edge_id": "C2_S2_I16_R1_>C2_S2_I18", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Et si on vous lisait des histoires ? Cela vous intéresserait ?", "next_id": "18", "target_node_id": "C2_S2_I18", "edge_id": "C2_S2_I16_R2_>C2_S2_I18", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "11": {"node_id": "C2_S2_I11", "actor": "Agathe", "text": "Oui que je sois amputée, avec le diabète on ne sait jamais.Agathe attrape son drap de lit pour s’essuyer les yeux. Je lui tends un mouchoir. Un petit silence s'installe. Merci.", "responses": [{"text": "Il y a deux jours nous avons parlé ensemble. Souvenez-vous quelque peu des termes de notre rencontre ?", "next_id": "12", "target_node_id": "C2_S2_I12", "edge_id": "C2_S2_I11_R0_>C2_S2_I12", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Vous rappelez-vous de ce qu'on s'est dit avant-hier ?", "next_id": "12", "target_node_id": "C2_S2_I12", "edge_id": "C2_S2_I11_R1_>C2_S2_I12", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Bon on reprend la discussion de mardi, vous rappelez-vous ce de quoi nous parlions ?", "next_id": "12", "target_node_id": "C2_S2_I12", "edge_id": "C2_S2_I11_R2_>C2_S2_I12", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "37": {"node_id": "C2_S2_I37", "actor": "Agathe", "text": "Oui, je ne sais pas trop quoi faire ici.", "responses": [{"text": "Je vous entends. Ce que je vous propose maintenant, c’est de faire votre pansement et après nous parlerons ensemble une vingtaine de minutes de ce que vous pourriez faire justement ici.  Est-ce que cela vous convient ?", "next_id": "6", "target_node_id": "C2_S2_I6", "edge_id": "C2_S2_I37_R0_>C2_S2_I6", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Je vous entends Agathe… passez de l'entretien d'une maison et d'un jardin à une obligation de rester tranquille dans une chambre, il y a un écart difficile à combler et cela me paraîtrait difficile à vivre.", "next_id": "38", "target_node_id": "C2_S2_I38", "edge_id": "C2_S2_I37_R1_>C2_S2_I38", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Qu’aimiez-vous donc faire Agathe, lorsque vous aviez un peu de temps à disposition ?", "next_id": "39", "target_node_id": "C2_S2_I39", "edge_id": "C2_S2_I37_R2_>C2_S2_I39", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "L'animatrice ne vous a donc pas proposé une activité ?", "next_id": "40", "target_node_id": "C2_S2_I40", "edge_id": "C2_S2_I37_R3_>C2_S2_I40", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "38": {"node_id": "C2_S2_I38", "actor": "Agathe", "text": "C’est, vrai, ma maison, mon jardin me manquent…ici je suis bloquée dans cette chambre avec ce pied !!! J’aimais mon indépendance, découvrir de nouveaux lieux… la perdre renforce mon sentiment d’inutilité.", "responses": [{"text": "Nous devons nous voir un moment aujourd'hui, vous en souvenez-vous ? Dis-je tout en roulant le chariot, avec le matériel dont j’ai besoin pour le pansement, de côté, avant de prendre une chaise et m'assoir auprès d'Agathe", "next_id": "6", "target_node_id": "C2_S2_I6", "edge_id": "C2_S2_I38_R0_>C2_S2_I6", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Allez on s'y met. Vous rappellez-vous que nous devions nous voir aujourd'hui ? Dis-je tout en roulant le chariot, avec le matériel dont j’ai besoin pour le pansement, de côté, avant de prendre une chaise et m'assoir auprès d'Agathe", "next_id": "6", "target_node_id": "C2_S2_I6", "edge_id": "C2_S2_I38_R1_>C2_S2_I6", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "C'est à votre tour pour les soins, toujours prête pour une petite discussion aujourd'hui ? Dis-je tout en roulant le chariot, avec le matériel dont j’ai besoin pour le pansement, de côté, avant de prendre une chaise et m'assoir auprès d'Agathe", "next_id": "6", "target_node_id": "C2_S2_I6", "edge_id": "C2_S2_I38_R2_>C2_S2_I6", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "39": {"node_id": "C2_S2_I39", "actor": "Agathe", "text": "Justement, avant de venir ici, je n'ai jamais eu à me poser cette question.", "responses": [{"text": "Bien. Je vais faire votre pansement. Vous pouvez vous coucher dans votre lit. Ce sera plus confortable pour vous et plus facile pour moi.", "next_id": "7", "target_node_id": "C2_S2_I7", "edge_id": "C2_S2_I39_R0_>C2_S2_I7", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Couchez-vous s'il vous plaît, il est temps pour le pansement.", "next_id": "7", "target_node_id": "C2_S2_I7", "edge_id": "C2_S2_I39_R1_>C2_S2_I7", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Allez, laissez moi vous changer le pansement.", "next_id": "7", "target_node_id": "C2_S2_I7", "edge_id": "C2_S2_I39_R2_>C2_S2_I7", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "40": {"node_id": "C2_S2_I40", "actor": "Agathe", "text": "Il ne s’agit pas de ça… Agathe secoue la tête et tourne son regard vers la fenêtre. Les larmes montent et commencent à couler sur ses joues. Je décide de la laisser un moment", "responses": [{"text": "Sortir de la pièce", "next_id": "-1", "target_node_id": ison et d'un jardin à une obligation de rester tranquille dans une chambre, il y a un écart difficile à combler et cela me paraîtrait difficile à vivre.", "next_id": "38", "target_node_id": "C2_S2_I38", "edge_id": "C2_S2_I3_R2_>C2_S2_I38", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Qu’aimiez-vous donc faire Agathe, lorsque vous aviez un peu de temps à disposition ?", "next_id": "39", "target_node_id": "C2_S2_I39", "edge_id": "C2_S2_I3_R3_>C2_S2_I39", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "L'animatrice ne vous a donc pas proposé une activité ?", "next_id": "-1", "target_node_id": "", "edge_id": "", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "New Response", "next_id": "-1", "target_node_id": "", "edge_id": "", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}}}, {"title": "Culpabilité des proches", "scene_id": 3, "scene_intro": "Nous sommes dimanche. Claude voit Margot sortir de la chambre d’Agathe. Elle se dirige vers elle et engage la conversation.\r\n ", "nodes": [{"id": "C2_S3_I1", "label": "Elle se dirige vers elle et engage la…", "title": "[Claude] Elle se dirige vers elle et engage la conversation."}, {"id": "C2_S3_I2", "label": "Bonjour, je suis sa fille,", "title": "[Margot] Bonjour, je suis sa fille, Margot. Maman s’est endormie. Elle a l’air très fatiguée."}, {"id": "C2_S3_I3", "label": "Bonjour, maman", "title": "[Margot] Bonjour, maman s’est endormie. Elle a l’air très fatiguée."}, {"id": "C2_S3_I4", "label": "Non, mais je la trouve", "title": "[Margot] Non, mais je la trouve changée, elle respire plus rapidement, des cernes marquent le contour de ses yeux et j'ai l'impression qu'elle n'est pas si coquette que d'habitude !"}, {"id": "C2_S3_I5", "label": "Margot s’agite", "title": "[Margot] Margot s’agite, secoue la tête. Elle est au bord des larmes. Je lui prends la main."}, {"id": "C2_S3_I6", "label": "Non, mais je la trouve changée,", "title": "[Margot] Non, mais je la trouve changée, elle respire plus rapidement, des cernes marquent le contour de ses yeux et j'ai l'impression qu'elle n'est pas si coquette que d'habitude ! J’en suis responsable ! Je m’en veux ! Je n’aurais pas dû insister pour qu’elle vienne ici. Mais j’ai 70 ans. Comment voulez-vous que je fasse ? C’est pas possible ! Je ne peux pas m’en occuper ! C’est ma maman ! Margot s’agite, secoue la tête. Elle est au bord des larmes. Je lui prends la main."}, {"id": "C2_S3_I7", "label": "Non ce n'est pas", "title": "[Margot] Non ce n'est pas ce que je voulais dire… Non, non, je me suis male exprimée!"}, {"id": "C2_S3_I8", "label": "silence", "title": "[Margot] ..."}, {"id": "C2_S3_I9", "label": "Excusez-moi de vous avoir dérangée !", "title": "[Margot] Excusez-moi de vous avoir dérangée ! Margot s'en va, tête baissée, sans regard pour qui que ce soit. Elle choisit de boire un café seule en cafétéria en attendant que sa maman se repose quelque peu. Je retourne m'occuper de mes autres résidents."}, {"id": "C2_S3_I10", "label": "J’en suis responsable !", "title": "[Margot] J’en suis responsable ! Je m’en veux ! Je n’aurais pas dû insister pour qu’elle vienne ici. Mais j’ai 70 ans. Comment voulez-vous que je fasse ? C’est pas possible ! Je ne peux pas m’en occuper ! C’est ma maman ! Margot s’agite, secoue la tête. Elle est au bord des larmes. Vous lui prenez la main."}, {"id": "C2_S3_I11", "label": "Oui et je ne me sens pas bien avec ce…", "title": "[Margot] Oui et je ne me sens pas bien avec cela"}, {"id": "C2_S3_I12", "label": "Ne me dites surtout pas", "title": "[Margot] Ne me dites surtout pas que je suis trop sensible ! Mon frère me renvoie cela à chacun de nos téléphones, mais ce n'est pas lui qui prend les décisions !"}, {"id": "C2_S3_I13", "label": "Oui, je veux bien !", "title": "[Margot] Oui, je veux bien !"}, {"id": "C2_S3_I14", "label": "Merci ! dit Margot", "title": "[Margot] Merci ! dit Margot en s'asseyant"}, {"id": "C2_S3_I15", "label": "Margot en l'apercevant", "title": "[Margot] Margot en l'apercevant ainsi se lève et dit : Excusez-moi de vous déranger, je ne crois pas que cela soit le bon moment pour moi de parler finalement !"}, {"id": "C2_S3_I16", "label": "Ma maman vous a dit", "title": "[Margot] Ma maman vous a dit que je l’avais abandonnée. Elle me l’a dit plusieurs fois le jour de son entrée au home : « C’est comme ça tu m’abandonnes ! Oui c’est bien ça ! Tu m’abandonnes ! Abandonnée ! » Elle répétait ce mot ! « Abandonnée » ! Elle disait qu’elle ne voudrait plus jamais me voir ! Elle vous a dit que je l’avais abandonnée."}, {"id": "C2_S3_I17", "label": "J'avais tellement pensée", "title": "[Margot] J'avais tellement pensée la voire mourir à la maison, jamais je m'étais dit que je la mettrais en home ! Je dois dire que ma maman s'est beaucoup occupée de Xavier, elle était alors très présente pour nous…J'aurais voulu lui rendre la pareil…"}, {"id": "C2_S3_I18", "label": "Mieux que ce que je pensais.", "title": "[Margot] Mieux que ce que je pensais. J’étais très étonnée qu’elle m’appelle. Après ce que je lui ai fait !"}, {"id": "C2_S3_I19", "label": "J’ai organisé son entrée", "title": "[Margot] J’ai organisé son entrée en EMS. C’est à cause de moi qu’elle est ici ! Je suis horrible !"}, {"id": "C2_S3_I20", "label": "C’est exactement ça !", "title": "[Margot] C’est exactement ça ! J’aurais dû la prendre chez moi !"}, {"id": "C2_S3_I21", "label": "Est-ce que ce n’est pas", "title": "[Margot] Est-ce que ce n’est pas le rôle des enfants de s’occuper de leurs parents ?"}, {"id": "C2_S3_I22", "label": "Oui mais ce n'est pas", "title": "[Margot] Oui mais ce n'est pas ce que désire ma maman, elle ne se sent pas à sa place ici. Je ne crois pas qu’elle puisse s’y habituer, même avec le temps."}, {"id": "C2_S3_I23", "label": "Ecoutez, je vais l'accueillir", "title": "[Margot] Ecoutez, je vais l'accueillir à la maison, dites-moi simplement comment je do maman.", "next_id": "3", "target_node_id": "C2_S3_I3", "edge_id": "C2_S3_I1_R0_>C2_S3_I3", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Bonjour Madame, je vois que vous sortez de la chambre de Madame Salamin, puis-je savoir qui vous êtes ?", "next_id": "2", "target_node_id": "C2_S3_I2", "edge_id": "C2_S3_I1_R1_>C2_S3_I2", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S3_I3", "actor": "Margot", "text": "Bonjour, maman s’est endormie. Elle a l’air très fatiguée.", "responses": [{"text": "Agathe vit un grand changement. Et j’ai l’impression que c’est très éprouvant pour elle.", "next_id": "4", "target_node_id": "C2_S3_I4", "edge_id": "C2_S3_I3_R0_>C2_S3_I4", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Que pensez-vous qu’elle dirait si elle vous entendait dire que vous la voyez fatiguée ?", "next_id": "16", "target_node_id": "C2_S3_I16", "edge_id": "C2_S3_I3_R1_>C2_S3_I16", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Vous a-t-elle exprimée qu'elle était fatiguée ?", "next_id": "4", "target_node_id": "C2_S3_I4", "edge_id": "C2_S3_I3_R2_>C2_S3_I4", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Qu'est-ce qui vous fait dire cela ?", "next_id": "6", "target_node_id": "C2_S3_I6", "edge_id": "C2_S3_I3_R3_>C2_S3_I6", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Tout est nouveau ici pour votre maman.", "next_id": "7", "target_node_id": "C2_S3_I7", "edge_id": "C2_S3_I3_R4_>C2_S3_I7", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S3_I4", "actor": "Margot", "text": "Non, mais je la trouve changée, elle respire plus rapidement, des cernes marquent le contour de ses yeux et j'ai l'impression qu'elle n'est pas si coquette que d'habitude !", "responses": [{"text": "Je me dis que la fille de Madame Salamin semble coquette elle aussi, c'est de famille; il faudra que j'observe Agathe !", "next_id": "34", "target_node_id": "C2_S3_I34", "edge_id": "C2_S3_I4_R0_>C2_S3_I34", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Vous la voyez changée ? C'est source d'inquiétude pour vous…", "next_id": "10", "target_node_id": "C2_S3_I10", "edge_id": "C2_S3_I4_R1_>C2_S3_I10", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Je réalise qu'elle ne prend pas la peine de s’annoncer auprès de nous alors qu’elle est inquiète, elle est peut être timide !", "next_id": "5", "target_node_id": "C2_S3_I5", "edge_id": "C2_S3_I4_R2_>C2_S3_I5", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S3_I34", "actor": "Margot", "text": "...", "responses": [{"text": "Je vois que cette situation vous touche profondément. Cela vous dirait de prendre un moment maintenant pour en parler ? ", "next_id": "6", "target_node_id": "C2_S3_I6", "edge_id": "C2_S3_I34_R0_>C2_S3_I6", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Je vois que cette situation vous touche profondément et que vous semblez seule à la porter ici ?", "next_id": "11", "target_node_id": "C2_S3_I11", "edge_id": "C2_S3_I34_R1_>C2_S3_I11", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Cette situation ne vous touche-t-elle pas trop ?", "next_id": "12", "target_node_id": "C2_S3_I12", "edge_id": "C2_S3_I34_R2_>C2_S3_I12", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S3_I6", "actor": "Margot", "text": "Non, mais je la trouve changée, elle respire plus rapidement, des cernes marquent le contour de ses yeux et j'ai l'impression qu'elle n'est pas si coquette que d'habitude ! J’en suis responsable ! Je m’en veux ! Je n’aurais pas dû insister pour qu’elle vienne ici. Mais j’ai 70 ans. Comment voulez-vous que je fasse ? C’est pas possible ! Je ne peux pas m’en occuper ! C’est ma maman ! Margot s’agite, secoue la tête. Elle est au bord des larmes. Je lui prends la main.", "responses": [{"text": "Je vois que cette situation vous touche profondément. Voulez-vous en parler ?", "next_id": "13", "target_node_id": "C2_S3_I13", "edge_id": "C2_S3_I6_R0_>C2_S3_I13", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Je vois que cette situation vous touche profondément et que vous semblez seule à la porter ici ?", "next_id": "11", "target_node_id": "C2_S3_I11", "edge_id": "C2_S3_I6_R1_>C2_S3_I11", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Cette situation ne vous touche-t-elle pas trop ?", "next_id": "12", "target_node_id": "C2_S3_I12", "edge_id": "C2_S3_I6_R2_>C2_S3_I12", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S3_I13", "actor": "Margot", "text": "Oui, je veux bien !", "responses": [{"text": "Allons dans mon bureau, nous serons plus tranquilles. Margot et moi entrons dans le bureau. Lui pointant une chaise du doigt je lui dis :  Vous pouvez vous asseoir.", "next_id": "14", "target_node_id": "C2_S3_I14", "edge_id": "C2_S3_I13_R0_>C2_S3_I14", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 8, "Empathy": 0}, {"text": "Dans mon bureau cela sera plus adéquat. Margot et moi entrons dans le bureau. Lui pointant une chaise du doigt je lui dis :  Vous pouvez vous asseoir.", "next_id": "14", "target_node_id": "C2_S3_I14", "edge_id": "C2_S3_I13_R1_>C2_S3_I14", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S3_I14", "actor": "Margot", "text": "Merci ! dit Margot en s'asseyant", "responses": [{"text": "Je m'installe sur une chaise placée sur la droite de Margot afin d'être proche d'elle et afin de pouvoir lui porter toute mon attention. Je la regarde et explore le sentiment de culpabilité perçu au travers de son discours. Vous sentez vous responsable de cette situation ?", "next_id": "16", "target_node_id": "C2_S3_I16", "edge_id": "C2_S3_I14_R0_>C2_S3_I16", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Je reste debout devant mon bureau, à droit de Margot. Je jete un coup d'oeil à l'ordinateur avant de porter l'attention à cette dernière. Pensant à la quantité de travail qu'il me reste à réaliser je me demande pourquoi je l'ai invitée à prendre du temps pour discuter.", "next_id": "15", "target_node_id": "C2_S3_I15", "edge_id": "C2_S3_I14_R1_>C2_S3_I15", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Je m'installe confortablement derrière mon bureau, en face de Margot. Je jette de fréquent coups d'oeil à mon téléphone portable posé discrètement sur le côté gauche de l'ordinateur.", "next_id": "15", "target_node_id": "C2_S3_I15", "edge_id": "C2_S3_I14_R2_>C2_S3_I15", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S3_I16", "actor": "Margot", "text": "Ma maman vous a dit que je l’avais abandonnée. Elle me l’a dit plusieurs fois le jour de son entrée au home : « C’est comme ça tu m’abandonnes ! Oui c’est bien ça ! Tu m’abandonnes ! Abandonnée ! » Elle répétait ce mot ! « Abandonnée » ! Elle disait qu’elle ne voudrait plus jamais me voir ! Elle vous a dit que je l’avais abandonnée.", "responses": [{"text": "Ce que votre maman me dit est confidentiel. Je ne peux pas vous en parler. Comment se sont passées vos retrouvailles ?", "next_id": "18", "target_node_id": "C2_S3_I18", "edge_id": "C2_S3_I16_R0_>C2_S3_I18", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Vous avez le sentiment de l'avoir abandonnée ?", "next_id": "19", "target_node_id": "C2_S3_I19", "edge_id": "C2_S3_I16_R1_>C2_S3_I19", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Cela doit être très difficile de l'entendre vous dire cela ?", "next_id": "17", "target_node_id": "C2_S3_I17", "edge_id": "C2_S3_I16_R2_>C2_S3_I17", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Je ne peux pas partager avec vous ce que me dit votre maman. Toutefois, ce que vous me dites là est la réaction de nombreux résidents à leur arrivée ici.", "next_id": "21", "target_node_id": "C2_S3_I21", "edge_id": "C2_S3_I16_R3_>C2_S3_I21", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Votre maman était probablement sous le coup de la colère, il vous faut la comprendre, quitter son domicile, son jardin… de plus être restreinte dans sa mobilité. Son sentiment envers vous me semble légitime !", "next_id": "33", "target_node_id": "C2_S3_I33", "edge_id": "C2_S3_I16_R4_>C2_S3_I33", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S3_I18", "actor": "Margot", "text": "Mieux que ce que je pensais. J’étais très étonnée qu’elle m’appelle. Après ce que je lui ai fait !", "responses": [{"text": "Qu’est-ce que vous lui avez fait ?", "next_id": "19", "target_node_id": "C2_S3_I19", "edge_id": "C2_S3_I18_R0_>C2_S3_I19", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "C'est à dire ?", "next_id": "19", "target_node_id": "C2_S3_I19", "edge_id": "C2_S3_I18_R1_>C2_S3_I19", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Que sous-entendez-vous ?", "next_id": "19", "target_node_id": "C2_S3_I19", "edge_id": "C2_S3_I18_R2_>C2_S3_I19", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S3_I19", "actor": "Margot", "text": "J’ai organisé son entrée en EMS. C’est à cause de moi qu’elle est ici ! Je suis horrible !", "responses": [{"text": "Vous avez le sentiment d’être horrible parce que vous avez entrepris des démarches pour placer votre maman qui ne pouvait plus vivre seule dans un home.", "next_id": "20", "target_node_id": "C2_S3_I20", "edge_id": "C2_S3_I19_R0_>C2_S3_I20", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Vous ne devez pas vous en vouloir, elle ne pouvait plus vivre seule. Il fallait la placer chez nous.", "next_id": "20", "target_node_id": "C2_S3_I20", "edge_id": "C2_S3_I19_R1_>C2_S3_I20", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S3_I20", "actor": "Margot", "text": "C’est exactement ça ! J’aurais dû la prendre chez moi !", "responses": [{"text": "Héberger votre mère chez vous et vous en occuper au quotidien…. C’est de votre point de vue quelque chose de réalisable ?", "next_id": "21", "target_node_id": "C2_S3_I21", "edge_id": "C2_S3_I20_R0_>C2_S3_I21", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Soyez réaliste, vivre avec votre mère et vous en occuper. Comment pensez-vous réaliser cela ?", "next_id": "21", "target_node_id": "C2_S3_I21", "edge_id": "C2_S3_I20_R1_>C2_S3_I21", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S3_I21", "actor": "Margot", "text": "Est-ce que ce n’est pas le rôle des enfants de s’occuper de leurs parents ?", "responses": [{"text": "Je ne crois qu’il y ait des règles et des normes. Mais vous Margot, quels sont les avantages que vous verriez à ce que votre maman vive avec vous ?", "next_id": "35", "target_node_id": "C2_S3_I35", "edge_id": "C2_S3_I21_R0_>C2_S3_I35", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "S'il s'agissait de ma maman, je serais heureuse qu'elle puisse vivre ici, en profitant des différentes animations qui lui sont offertes et en partageant son quotidien avec les gens de son village", "next_id": "22", "target_node_id": "C2_S3_I22", "edge_id": "C2_S3_I21_R1_>C2_S3_I22", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Je ne sais pas vraiment…", "next_id": "23", "target_node_id": "C2_S3_I23", "edge_id": "C2_S3_I21_R2_>C2_S3_I23", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Réfléchissez bien, les places en home se font rares… Si votre choix est de la prendre à la maison, vous prenez le risque de la déraciner.", "next_id": "37", "target_node_id": "C2_S3_I37", "edge_id": "C2_S3_I21_R3_>C2_S3_I37", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S3_I35", "actor": "Margot", "text": "Je serais plus proche d’elle. Je la verrais tous les jours. Et comme ça je ferais mon devoir.", "responses": [{"text": "Quelles difficultés vous rencontreriez si votre maman vivait avec vous ?", "next_id": "36", "target_node_id": "C2_S3_I36", "edge_id": "C2_S3_I35_R0_>C2_S3_I36", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Ne serait-elle pas un fardeaux en vivant chez vous ? Cela ne poserait-il pas de problèmes ?", "next_id": "36", "target_node_id": "C2_S3_I36", "edge_id": "C2_S3_I35_R1_>C2_S3_I36", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S3_I36", "actor": "Margot", "text": "Je serais obligée de transformer la chambre de Xavier. Après un court silence : Je suis à la retraite et j’ai envie de voyager. Si ma maman vivait chez moi, je serais obligée de rester tous les jours à ces côtés. Je ne suis pas sûr d’avoir la force pour m’occuper d’elle au quotidien.", "responses": [{"text": "Quels seraient les avantages que vous voyiez dans le placement de votre maman chez nous ?", "next_id": "24", "target_node_id": "C2_S3_I24", "edge_id": "C2_S3_I36_R0_>C2_S3_I24", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Ne pensez-vous donc pas qu'il y a des avantages à la voir chez nous ?", "next_id": "24", "target_node_id": "C2_S3_I24", "edge_id": "C2_S3_I36_R1_>C2_S3_I24", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S3_I24", "actor": "Margot", "text": "Elle est en sécurité. Elle est en contact avec des gens de son âge.", "responses": [{"text": "Y voyiez-vous alors des désavantages ?", "next_id": "25", "target_node_id": "C2_S3_I25", "edge_id": "C2_S3_I24_R0_>C2_S3_I25", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Et il n y a pas vraiment d'aspect négatifs, si ?", "next_id": "-1", "target_node_id": "", "edge_id": "", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S3_I25", "actor": "Margot", "text": "Elle perd en autonomie. Margot baisse la tête et en regardant le sol, elle poursuit d’une voix tremblante. J’ai peur qu’elle se laisse mourir.", "responses": [{"text": "Si on regarde les avantages et désavantages de chacune des situations, qu’est-ce qu’on peut dire de ça ?", "next_id": "26", "target_node_id": "C2_S3_I26", "edge_id": "C2_S3_I25_R0_>C2_S3_I26", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Vous avez l'impression qu'elle va se laisser mourir ?", "next_id": "27", "target_node_id": "C2_S3_I27", "edge_id": "C2_S3_I25_R1_>C2_S3_I27", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Ne vous semble-t-il pas qu’elle fait quelque projet bien qu’ici ?", "next_id": "28", "target_node_id": "C2_S3_I28", "edge_id": "C2_S3_I25_R2_>C2_S3_I28", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Nous veillerons à ce que cela ne se passe pas ainsi !", "next_id": "29", "target_node_id": "C2_S3_I29", "edge_id": "C2_S3_I25_R3_>C2_S3_I29", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S3_I26", "actor": "Margot", "text": "Je me rends compte qu’on a choisi la moins mauvaise solution.", "responses": [{"text": "...", "next_id": "31", "target_node_id": "C2_S3_I31", "edge_id": "C2_S3_I26_R0_>C2_S3_I31", "Authenticit sponses": [{"text": "Sortir", "next_id": "-1", "target_node_id": "", "edge_id": "", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S3_I22", "actor": "Margot", "text": "Oui mais ce n'est pas ce que désire ma maman, elle ne se sent pas à sa place ici. Je ne crois pas qu’elle puisse s’y habituer, même avec le temps.", "responses": [{"text": "Quelles difficultés vous rencontreriez si votre maman vivait avec vous ?", "next_id": "36", "target_node_id": "C2_S3_I36", "edge_id": "C2_S3_I22_R0_>C2_S3_I36", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Ne serait-elle pas un fardeaux en vivant chez vous ? Cela ne poserait-il pas de problèmes ?", "next_id": "36", "target_node_id": "C2_S3_I36", "edge_id": "C2_S3_I22_R1_>C2_S3_I36", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S3_I23", "actor": "Margot", "text": "Ecoutez, je vais l'accueillir à la maison, dites-moi simplement comment je dois m'y prendre administrativement ?", "responses": [{"text": "Quels sont les avantages que vous voyiez dans le placement de votre maman chez nous ?", "next_id": "24", "target_node_id": "C2_S3_I24", "edge_id": "C2_S3_I23_R0_>C2_S3_I24", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Ne voyez-vous donc pas les avantages de l'avoir chez nous ?", "next_id": "24", "target_node_id": "C2_S3_I24", "edge_id": "C2_S3_I23_R1_>C2_S3_I24", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}, {"text": "Il y a quand même des aspects positifs à sa présence chez nous, ne pensez-vous pas ?", "next_id": "24", "target_node_id": "C2_S3_I24", "edge_id": "C2_S3_I23_R2_>C2_S3_I24", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C2_S3_I37", "actor": "Margot", "text": "J'ai pris ma décision ! Vous commencez à discuter de la procédure afin de retirer Agathe du home afin qu'elle aille v
