1_I6", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C3_S1_I6", "actor": "Agathe", "text": "J’ai le souffle court. Le médecin m’a mis sous oxygène. J’ai plus de force. Je perds pied.", "responses": [{"text": "Le médecin vous a bien expliqué la situation. Voulez-vous que je vous reprécise les éléments.", "next_id": "7", "target_node_id": "C3_S1_I7", "edge_id": "C3_S1_I6_R0_>C3_S1_I7", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C3_S1_I7", "actor": "Agathe", "text": "Non, mais je veux pas être réanimée ! Je veux pas qu’on me mette des tuyaux partout. Je veux pas qu’on s’acharne.", "responses": [{"text": "Claude prend une chaise, s’assied au bord du lit à la hauteur du visage d’Agathe.", "next_id": "8", "target_node_id": "C3_S1_I8", "edge_id": "C3_S1_I7_R0_>C3_S1_I8", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C3_S1_I8", "actor": "Agathe", "text": "Oui.", "responses": [{"text": "Est-ce que vous avez des souhaits par rapport à vos derniers jours?", "next_id": "9", "target_node_id": "C3_S1_I9", "edge_id": "C3_S1_I8_R0_>C3_S1_I9", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C3_S1_I9", "actor": "Agathe", "text": "Je ne veux pas devenir un légume ! Je veux choisir l’heure de ma mort !", "responses": [{"text": "Vous voulez choisir l’heure de votre mort ?", "next_id": "10", "target_node_id": "C3_S1_I10", "edge_id": "C3_S1_I9_R0_>C3_S1_I10", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C3_S1_I10", "actor": "Agathe", "text": "Agathe regarde le plafond. Son regard est réflexif. Après un long silence.", "responses": [{"text": "Qu’est-ce que vous entendez par aider ?", "next_id": "11", "target_node_id": "C3_S1_I11", "edge_id": "C3_S1_I10_R0_>C3_S1_I11", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C3_S1_I11", "actor": "Agathe", "text": "J’aimerais que vous me fassiez la piqure.", "responses": [{"text": "Vous aimeriez que je vous donne une substance qui vous ferait mourir ?", "next_id": "12", "target_node_id": "C3_S1_I12", "edge_id": "C3_S1_I11_R0_>C3_S1_I12", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C3_S1_I12", "actor": "Agathe", "text": "Oui, maintenant.", "responses": [{"text": "Est-ce qu’il y a en ce moment quelque chose qui vous amène à dire cela ?", "next_id": "13", "target_node_id": "C3_S1_I13", "edge_id": "C3_S1_I12_R0_>C3_S1_I13", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C3_S1_I13", "actor": "Agathe", "text": "Vous m’avez donné des nouveaux médicaments ! Et j’en veux pas. J’ai passé une très mauvaise nuit. J’ai beaucoup de mal à respirer. J’ai l’impression d’étouffer.", "responses": [{"text": "Agathe, ce que vous êtes en train de me dire me touche profondément, mon rôle d’infirmière comme je le conçois est de vous aider à vivre le mieux possible et pas à vous donner la mort, cependant je peux comprendre votre peur d’étouffer et votre désir de mort. Je n’ai pas le droit de vous donner la mort. Toutefois, il existe une association qui peut vous aider à mourir. Est-ce que c’est cela que vous souhaitez.", "next_id": "14", "target_node_id": "C3_S1_I14", "edge_id": "C3_S1_I13_R0_>C3_S1_I14", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C3_S1_I14", "actor": "Agathe", "text": "...", "responses": [{"text": "Mourir étouffée, cela vous effraie ?", "next_id": "15", "target_node_id": "C3_S1_I15", "edge_id": "C3_S1_I14_R0_>C3_S1_I15", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C3_S1_I15", "actor": "Agathe", "text": "Oui, c’est pour ça que je veux mourir maintenant. Mais je sais plus où j’en suis.", "responses": [{"text": "Si je résume un peu ce que vous m’avez dit, votre respiration devient difficile et vous avez le sentiment d’étouffer. Ça vous fait peur et vous n’aimeriez pas continuer à vivre cette situation. Vous demandez à mourir.e", "next_id": "16", "target_node_id": "C3_S1_I16", "edge_id": "C3_S1_I15_R0_>C3_S1_I16", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C3_S1_I16", "actor": "Agathe", "text": "Oui et ça me fait peur.", "responses": [{"text": "Agathe, est-ce que vous avez déjà pensé à écrire vos dernières volontés ?", "next_id": "17", "target_node_id": "C3_S1_I17", "edge_id": "C3_S1_I16_R0_>C3_S1_I17", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C3_S1_I17", "actor": "Agathe", "text": "Mais pourquoi faire ?", "responses": [{"text": "Pour que l’on puisse les respecter, si un jour vous perdez conscience.", "next_id": "18", "target_node_id": "C3_S1_I18", "edge_id": "C3_S1_I17_R0_>C3_S1_I18", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C3_S1_I18", "actor": "Agathe", "text": "Mais je suis pas en état d’écrire quoi que ce soit.", "responses": [{"text": "Je peux vous aider à rédiger vos directives anticipées.", "next_id": "19", "target_node_id": "C3_S1_I19", "edge_id": "C3_S1_I18_R0_>C3_S1_I19", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C3_S1_I19", "actor": "Agathe", "text": "Je sais pas ce que c’est.", "responses": [{"text": "C’est mettre par écrit vos dernières volontés.", "next_id": "20", "target_node_id": "C3_S1_I20", "edge_id": "C3_S1_I19_R0_>C3_S1_I20", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C3_S1_I20", "actor": "Agathe", "text": "Je sais pas si j’en suis capable.", "responses": [{"text": "Je peux vous aider. Il existe des documents spécifiques que nous pouvons remplir ensemble, dans lequel vous pouvez indiquer si vous souhaitez ne pas être réanimée, ne pas recevoir de traitement qui prolongeraient votre vie, si vous souhaitez qu’on ne vous alimente plus ou qu’on ne vous hydrate plus si votre situation le nécessite. Est-ce que c’est quelque chose qui pourrait vous apaiser en ce moment ?", "next_id": "21", "target_node_id": "C3_S1_I21", "edge_id": "C3_S1_I20_R0_>C3_S1_I21", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C3_S1_I21", "actor": "Agathe", "text": "Je ne veux pas mourir étouffée.", "responses": [{"text": "Nous pouvons vous proposer des moyens pour atténuer votre sensation d’étouffement. Je téléphone au plus vite au médecin pour organiser cela.", "next_id": "22", "target_node_id": "C3_S1_I22", "edge_id": "C3_S1_I21_R0_>C3_S1_I22", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C3_S1_I22", "actor": "Agathe", "text": "Mais je vous ai dit que je ne voulais pas de nouveaux médicaments. J’ai l’impression de ne pas être entendue. Je veux mourir maintenant.", "responses": [{"text": "L’un n’empêche pas l’autre. Si vous souhaitez l’intervention d’une aide pour mourir, elle ne pourra pas se faire maintenant. Et votre sentiment d’étouffer persistera jusque-là. Donc dans l’immédiat, nous pouvons agir sur votre respiration et dans un deuxième temps vous mettre en contact avec une association qui s’appelle Exit et qui peut vous fournir les substances pour mourir, à condition que vous soyez en mesure de les prendre seule.", "next_id": "23", "target_node_id": "C3_S1_I23", "edge_id": "C3_S1_I22_R0_>C3_S1_I23", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C3_S1_I23", "actor": "Agathe", "text": "Aidez-moi à respirer et faîtes-moi voir ces gens.", "responses": [{"text": "Très bien Agathe, j’ai compris votre désir. J’appelle le médecin et je prends contact avec Exit pour qu’ils viennent vous voir.", "next_id": "24", "target_node_id": "C3_S1_I24", "edge_id": "C3_S1_I23_R0_>C3_S1_I24", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope"  pas continuer à vivre cette situation. Vous demandez à mourir.e", "next_id": "16", "target_node_id": "C3_S1_I16", "edge_id": "C3_S1_I15_R0_>C3_S1_I16", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "16": {"node_id": "C3_S1_I16", "actor": "Agathe", "text": "Oui et ça me fait peur.", "responses": [{"text": "Agathe, est-ce que vous avez déjà pensé à écrire vos dernières volontés ?", "next_id": "17", "target_node_id": "C3_S1_I17", "edge_id": "C3_S1_I16_R0_>C3_S1_I17", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "17": {"node_id": "C3_S1_I17", "actor": "Agathe", "text": "Mais pourquoi faire ?", "responses": [{"text": "Pour que l’on puisse les respecter, si un jour vous perdez conscience.", "next_id": "18", "target_node_id": "C3_S1_I18", "edge_id": "C3_S1_I17_R0_>C3_S1_I18", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "18": {"node_id": "C3_S1_I18", "actor": "Agathe", "text": "Mais je suis pas en état d’écrire quoi que ce soit.", "responses": [{"text": "Je peux vous aider à rédiger vos directives anticipées.", "next_id": "19", "target_node_id": "C3_S1_I19", "edge_id": "C3_S1_I18_R0_>C3_S1_I19", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "19": {"node_id": "C3_S1_I19", "actor": "Agathe", "text": "Je sais pas ce que c’est.", "responses": [{"text": "C’est mettre par écrit vos dernières volontés.", "next_id": "20", "target_node_id": "C3_S1_I20", "edge_id": "C3_S1_I19_R0_>C3_S1_I20", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "20": {"node_id": "C3_S1_I20", "actor": "Agathe", "text": "Je sais pas si j’en suis capable.", "responses": [{"text": "Je peux vous aider. Il existe des documents spécifiques que nous pouvons remplir ensemble, dans lequel vous pouvez indiquer si vous souhaitez ne pas être réanimée, ne pas recevoir de traitement qui prolongeraient votre vie, si vous souhaitez qu’on ne vous alimente plus ou qu’on ne vous hydrate plus si votre situation le nécessite. Est-ce que c’est quelque chose qui pourrait vous apaiser en ce moment ?", "next_id": "21", "target_node_id": "C3_S1_I21", "edge_id": "C3_S1_I20_R0_>C3_S1_I21", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "21": {"node_id": "C3_S1_I21", "actor": "Agathe", "text": "Je ne veux pas mourir étouffée.", "responses": [{"text": "Nous pouvons vous proposer des moyens pour atténuer votre sensation d’étouffement. Je téléphone au plus vite au médecin pour organiser cela.", "next_id": "22", "target_node_id": "C3_S1_I22", "edge_id": "C3_S1_I21_R0_>C3_S1_I22", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "22": {"node_id": "C3_S1_I22", "actor": "Agathe", "text": "Mais je vous ai dit que je ne voulais pas de nouveaux médicaments. J’ai l’impression de ne pas être entendue. Je veux mourir maintenant.", "responses": [{"text": "L’un n’empêche pas l’autre. Si vous souhaitez l’intervention d’une aide pour mourir, elle ne pourra pas se faire maintenant. Et votre sentiment d’étouffer persistera jusque-là. Donc dans l’immédiat, nous pouvons agir sur votre respiration et dans un deuxième temps vous mettre en contact avec une association qui s’appelle Exit et qui peut vous fournir les substances pour mourir, à condition que vous soyez en mesure de les prendre seule.", "next_id": "23", "target_node_id": "C3_S1_I23", "edge_id": "C3_S1_I22_R0_>C3_S1_I23", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "23": {"node_id": "C3_S1_I23", "actor": "Agathe", "text": "Aidez-moi à respirer et faîtes-moi voir ces gens.", "responses": [{"text": "Très bien Agathe, j’ai compris votre désir. J’appelle le médecin et je prends contact avec Exit pour qu’ils viennent vous voir.", "next_id": "24", "target_node_id": "C3_S1_I24", "edge_id": "C3_S1_I23_R0_>C3_S1_I24", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, "24": {"node_id": "C3_S1_I24", "actor": "Agathe", "text": "Agathe soupire. Son visage manifeste de l’inquiétude.", "responses": [{"text": "Sortir", "next_id": "-1", "target_node_id": "", "edge_id": "", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}}}, {"title": "Les professionnels face à la mort", "scene_id": 2, "scene_intro": "10 min plus tard.\nClaude est dans le bureau de l’équipe. Elle très émue, a l’air abattue. Assise, elle se sent vide d’énergie, elle regarde par la fenêtre et pense ne plus avoir le courage de poursuivre sa journée.  Elle ne sait pas si elle a eu la bonne attitude avec Agathe. Avait-elle le droit de lui parler d’Exit ? Est-ce qu’elle ne participe pas indirectement à la décision d’Agathe ? Est-ce qu’elle ne risque pas de donner une mauvaise image de l’institution, d’elle-même et de la mission du soignant en prenant contact avec Exit ? Est-ce qu’elle a été au-delà des limites de son rôle de professionnel ? N’est-elle pas en train de générer un conflit psychique entre ses propres valeurs et le respect inconditionnel des valeurs d’Agathe. Doit-elle en parler à la famille et si oui, faut-il les impliquer dans cette démarche ? \n", "nodes": [{"id": "C3_S2_I1", "label": "Salut Claude.", "title": "[Pascal] Salut Claude. Je sors d’une séance avec la direction. Sache qu’à partir de la semaine prochaine. Nous bénéficierons d’une nouvelle tarification pour les soins palliatifs. Ce qui nous permettra de prendre plus de temps pour les soins des personnes en fin de vie."}, {"id": "C3_S2_I2", "label": "Oui, dix mais pas quinze.", "title": "[Pascal] Oui, dix mais pas quinze. Pascal ferme la porte. Ils sont  seuls. Je t’écoute."}, {"id": "C3_S2_I3", "label": "Oui, elle n’a pas changé. Tu as bien …", "title": "[Pascal] Oui, elle n’a pas changé. Tu as bien fait."}, {"id": "C3_S2_I4", "label": "De tes valeurs ?", "title": "[Pascal] De tes valeurs ?"}, {"id": "C3_S2_I5", "label": "Oui, mais là elle ne veut plus être s…", "title": "[Pascal] Oui, mais là elle ne veut plus être soignée."}, {"id": "C3_S2_I6", "label": "Tu lui as proposé de la soulager ?", "title": "[Pascal] Tu lui as proposé de la soulager ?"}, {"id": "C3_S2_I7", "label": "Agathe est une personne", "title": "[Pascal] Agathe est une personne capable de discernement. Elle est seule responsable de ses choix."}, {"id": "C3_S2_I8", "label": "Encore une fois tu n’es pas responsab…", "title": "[Pascal] Encore une fois tu n’es pas responsable de ses choix."}, {"id": "C3_S2_I9", "label": "Nos clients meurent ici que tu le veu…", "title": "[Pascal] Nos clients meurent ici que tu le veuilles ou non."}, {"id": "C3_S2_I10", "label": "Bien sûr, mais cela touche une minori…", "title": "[Pascal] Bien sûr, mais cela touche une minorité de cas."}, {"id": "C3_S2_I11", "label": "Non, surtout pas.", "title": "[Pascal] Non, surtout pas."}, {"id": "C3_S2_I12", "label": "Oui, tu peux par contre soutenir Agat…", "title": "[Pascal] Oui, tu peux par contre soutenir Agathe dans cette démarche."}, {"id": "C3_S2_I13", "label": "Il ne s’agit pas de toi mais d’Agathe.", "title": "[Pascal] Il ne s’agit pas de toi mais d’Agathe."}, {"id": "C3_S2_I14", "label": "Là, je trouve que tu exagères. Et en …", "title": "[Pascal] Là, je trouve que tu exagères. Et en plus les dix minutes sont passées."}, {"id": "C3_S2_I15", "label": "Je t’en prie. Il sort, pressé comme à…", "title": "[Pascal] Je t’en prie. Il sort, pressé comme à son habitude."}], "edges": [{"id": "C3_S2_I1_R0_>C3_S2_I2", "from": "C3_S2_I1", "to": "C3_S2_I2", "smooth": {"type": "curvedCW", "roundness": 0}}, {"id": "C3_S2_I2_R0_>C3_S2_I3", "from": "C3_S2_I2", "to": "C3_S2_I3", "smooth": {"type": "curvedCW", "roundness": 0}}, {"id": "C3_S2_I3_R0_>C3_S2_I4", "from": "C3_S2_I3", "to": "C3_S2_I4", "smooth": {"type": "curvedCW", "roundness": 0}}, {"id": "C3_S2_I4_R0_>C3_S2_I5", "from": "C3_S2_I4", "to": "C3_S2_I5", "smooth": {"type": "curvedCW", "roundness": 0}}, {"id": "C3_S2_I5_R0_>C3_S2_I6", "from": "C3_S2_I5", "to": "C3_S2_I6", "smooth": {"type": "curvedCW", "roundness": 0}}, {"id": "C3_S2_I6_R0_>C3_S2_I7", "from": "C3_S2_I6", "to": "C3_S2_I7", "smooth": {"type": "curvedCW", "roundness": 0}}, {"id": "C3_S2_I7_R0_>C3_S2_I8", "from": "C3_S2_I7", "to": "C3_S2_I8", "smooth": {"type": "curvedCW", "roundness": 0}}, {"id": "C3_S2_I8_R0_>C3_S2_I9", "from": "C3_S2_I8", "to": "C3_S2_I9", "smooth": {"type": "curvedCW", "roundness": 0}}, {"id": "C3_S2_I9_R0_>C3_S2_I10", "from": "C3_S2_I9", "to": "C3_S2_I10", "smooth": {"type": "curvedCW", "roundness": 0}}, {"id": "C3_S2_I10_R0_>C3_S2_I11", "from": "C3_S2_I10", "to": "C3_S2_I11", "smooth": {"type": "curvedCW", "roundness": 0}}, {"id": "C3_S2_I11_R0_>C3_S2_I12", "from": "C3_S2_I11", "to": "C3_S2_I12", "smooth": {"type": "curvedCW", "roundness": 0}}, {"id": "C3_S2_I12_R0_>C3_S2_I13", "from": "C3_S2_I12", "to": "C3_S2_I13", "smooth": {"type": "curvedCW", "roundness": 0}}, {"id": "C3_S2_I13_R0_>C3_S2_I14", "from": "C3_S2_I13", "to": "C3_S2_I14", "smooth": {"type": "curvedCW", "roundness": 0}}, {"id": "C3_S2_I14_R0_>C3_S2_I15", "from": "C3_S2_I14", "to": "C3_S2_I15", "smooth": {"type": "curvedCW", "roundness": 0}}], "editor": "<div class=\"block\" data-interaction-id=\"1\"><div class=\"header\">Interaction 1 — Pascal</div><label>EG-4 : Name</label><textarea class=\"edit\" data-type=\"name\" data-i=\"0\" rows=\"1\">Salut Claude.</textarea><label>EG-4 : Text</label><textarea class=\"edit\" data-type=\"text\" data-i=\"0\" rows=\"3\">Salut Claude. Je sors d’une séance avec la direction. Sache qu’à partir de la semaine prochaine. Nous bénéficierons d’une nouvelle tarification pour les soins palliatifs. Ce qui nous permettra de prendre plus de temps pour les soins des personnes en fin de vie.</textarea><div class=\"resp\"><label>Réponse 1 — Text</label><textarea class=\"edit\" data-type=\"response\" data-i=\"0\" data-r=\"0\" rows=\"2\">C’est une bonne nouvelle. Je viens de quitter Agathe. Et notre discussion m’a bouleversée. J’ai besoin de t’en parler. Peux-tu maintenant m’accorder dix minutes ?</textarea><div class=\"scores\"><label>Authenticity</label><input type=\"number\" class=\"score\" data-i=\"0\" data-r=\"0\" data-skill=\"Authenticity\" value=\"0\" min=\"-3\" max=\"3\"><label>Respect</label><input type=\"number\" class=\"score\" data-i=\"0\" data-r=\"0\" data-skill=\"Respect\" value=\"0\" min=\"-3\" max=\"3\"><label>Compassion</label><input type=\"number\" class=\"score\" data-i=\"0\" data-r=\"0\" data-skill=\"Compassion\" value=\"0\" min=\"-3\" max=\"3\"><label>Hope</label><input type=\"number\" class=\"score\" data-i=\"0\" data-r=\"0\" data-skill=\"Hope\" value=\"0\" min=\"-3\" max=\"3\"><label>Empathy</label><input type=\"number\" class=\"score\" data-i=\"0\" data-r=\"0\" data-skill=\"Empathy\" value=\"0\" min=\"-3\" max=\"3\"></div></div></div><div class=\"block\" data-interaction-id=\"2\"><div class=\"header\">Interaction 2 — Pascal</div><label>EG-4 : Name</label><textarea class=\"edit\" data-type=\"name\" data-i=\"1\" rows=\"1\">Oui, dix mais pas quinze.</textarea><label>EG-4 : Text</label><textarea class=\"edit\" data-type=\"text\" data-i=\"1\" rows=\"3\">Oui, dix mais pas quinze. Pascal ferme la porte. Ils sont  seuls. Je t’écoute.</textarea><div class=\"resp\"><label>Réponse 1 — Text</label><textarea class=\"edit\" data-type=\"response\" data-i=\"1\" data-r=\"0\" rows=\"2\">Je ne me sens pas très bien. Agathe m’a dit qu’elle voulait mourir. Je lui ai parlé d’Exit. La politique dans la maison est toujours la même ? Elle permet l’intervention des associations pour le suicide assisté, c’est bien juste ?</textarea><div class=\"scores\"><label>Authenticity</label><input type=\"number\" class=\"score\" data-i=\"1\" data-r=\"0\" data-skill=\"Authenticity\" value=\"0\" min=\"-3\" max=\"3\"><label>Respect</label><input type=\"number\" class=\"score\" data-i=\"1\" data-r=\"0\" data-skill=\"Respect\" value=\"0\" min=\"-3\" max=\"3\"><label>Compassion</label><input type=\"number\" class=\"score\" data-i=\"1\" data-r=\"0\" d "7", "target_node_id": "C3_S2_I7", "edge_id": "C3_S2_I6_R0_>C3_S2_I7", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C3_S2_I7", "actor": "Pascal", "text": "Agathe est une personne capable de discernement. Elle est seule responsable de ses choix.", "responses": [{"text": "Je sais tout ça. Je te parle de mon conflit intérieur. J’ai parlé d’Exit. Je me sens coupable. C’est aussi à cause de moi qu’elle pourrait se suicider.", "next_id": "8", "target_node_id": "C3_S2_I8", "edge_id": "C3_S2_I7_R0_>C3_S2_I8", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C3_S2_I8", "actor": "Pascal", "text": "Encore une fois tu n’es pas responsable de ses choix.", "responses": [{"text": "Mais enfin Pascal, en acceptant qu’elle se suicide ici, on donne une mauvaise image de la Maison des Lilas. C’est un lieu où l’on donne la mort.", "next_id": "9", "target_node_id": "C3_S2_I9", "edge_id": "C3_S2_I8_R0_>C3_S2_I9", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C3_S2_I9", "actor": "Pascal", "text": "Nos clients meurent ici que tu le veuilles ou non.", "responses": [{"text": "Je sais bien. Mais, je fais une grande différence entre accompagner une personne en fin de vie et lui donner la mort.", "next_id": "10", "target_node_id": "C3_S2_I10", "edge_id": "C3_S2_I9_R0_>C3_S2_I10", "Authenticity": 0, "Respect": 0, "Compassion": 0, "Hope": 0, "Empathy": 0}]}, {"node_id": "C3_S2_I10", "actor": "Pascal", "text": "Bien sûr, mais cela touche une minorité de cas.", "responses": [{"text": "Est-ce qu’il n’y aurait pas plus à faire en termes de soins palliatifs pour cette minorité ? Mes convictions personnelles et professionnelles m’amènent à penser que si Agathe pouvait être plus soulagée elle ne demanderait pas d’assistance au suicide. Qu’est-ce que je fais maintenant ? Est-ce que je dois en parler à sa famille ?", "next_id": "11", "target_node_id": "C3_S2_I11", "edge_id": var container = document.getElementById("network");
var network = null;
var nodesDS = null;
var edgesDS = null;
var currentSceneIdx = 0;
var parcoursPath = { nodes: [], edges: [] };
var parcoursCurrent = null;
var parcoursScores = { Authenticity: 0, Respect: 0, Compassion: 0, Hope: 0, Empathy: 0 };

function setMode(mode) {
    document.querySelectorAll(".mode-btn").forEach(function(b) { b.classList.toggle("active", b.dataset.mode === mode); });
    document.getElementById("panel-edit").classList.toggle("hidden", mode !== "edit");
    document.getElementById("panel-parcours").classList.toggle("active", mode === "parcours");
    if (mode === "parcours" && scenesData.length > 0) {
        parcoursPath = { nodes: [], edges: [] };
        parcoursCurrent = null;
        parcoursScores = { Authenticity: 0, Respect: 0, Compassion: 0, Hope: 0, Empathy: 0 };
        showParcoursScene(currentSceneIdx);
    } else {
        parcoursPath = { nodes: [], edges: [] };
        parcoursCurrent = null;
        if (nodesDS && edgesDS) highlightPath();
    }
}

function showParcoursScene(idx) {
    var s = scenesData[idx];
    document.getElementById("parcours-title").textContent = s.title + " — Parcours joueur";
    if (!s.parcours || s.parcours.length === 0) {
        document.getElementById("parcours-content").innerHTML = '<div class="parcours-card"><div class="parcours-end">Aucune interaction dans ce scénario.</div></div>';
        document.getElementById("parcours-restart").style.display = "none";
        return;
    }
    parcoursPath = { nodes: [], edges: [] };
    parcoursScores = { Authenticity: 0, Respect: 0, Compassion: 0, Hope: 0, Empathy: 0 };
    parcoursCurrent = s.parcours[0];
    renderParcours(s);
    highlightPath();
}

function esc(s) { if (!s) return ""; return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function renderParcours(s) {
    var ia = parcoursCurrent;
    if (!ia) {
        var totalsHtml = '<div class="parcours-card"><div class="parcours-end">Fin de cette branche.</div>';
        if (parcoursPath.nodes.length > 0) {
            totalsHtml += '<div class="parcours-totals"><h4>Score total du parcours</h4>';
            var labels = { Authenticity: "Authenticité", Respect: "Respect", Compassion: "Compassion", Hope: "Espoir", Empathy: "Empathie" };
            for (var k in parcoursScores) {
                var v = parcoursScores[k];
                var cls = v > 0 ? "positive" : (v < 0 ? "negative" : "zero");
                totalsHtml += '<div class="score-line ' + cls + '">' + (labels[k] || k) + ': ' + (v >= 0 ? '+' : '') + v + '</div>';
            }
            totalsHtml += '</div>';
        }
        totalsHtml += '</div>';
        document.getElementById("parcours-content").innerHTML = totalsHtml;
        document.getElementById("parcours-restart").style.display = parcoursPath.nodes.length > 0 ? "block" : "none";
        return;
    }
    var html = '<div class="parcours-card"><span class="actor">' + esc(ia.actor) + '</span><div class="text">' + esc(ia.text || "—") + '</div>';
    if (ia.responses && ia.responses.length > 0) {
        ia.responses.forEach(function(r, i) {
            var label = (r.text || "").length > 80 ? (r.text || "").substring(0, 80) + "…" : (r.text || "→ I" + r.next_id);
            html += '<button class="parcours-choice" data-next="' + r.next_id + '" data-target="' + esc(r.target_node_id || "") + '" data-edge="' + esc(r.edge_id || "") + '" data-auth="' + (r.Authenticity||0) + '" data-respect="' + (r.Respect||0) + '" data-compassion="' + (r.Compassion||0) + '" data-hope="' + (r.Hope||0) + '" data-empathy="' + (r.Empathy||0) + '">' + esc(label) + '</button>';
        });
    } else {
        html += '<div class="parcours-end">Fin de cette branche.</div>';
    }
    html += '</div>';
    document.getElementById("parcours-content").innerHTML = html;
    document.getElementById("parcours-restart").style.display = parcoursPath.nodes.length > 0 ? "block" : "none";
    document.querySelectorAll(".parcours-choice").forEach(function(btn) {
        btn.addEventListener("click", function() {
            parcoursScores.Authenticity += parseInt(this.dataset.auth) || 0;
            parcoursScores.Respect += parseInt(this.dataset.respect) || 0;
            parcoursScores.Compassion += parseInt(this.dataset.compassion) || 0;
            parcoursScores.Hope += parseInt(this.dataset.hope) || 0;
            parcoursScores.Empathy += parseInt(this.dataset.empathy) || 0;
            var nextId = this.dataset.next;
            var edgeId = this.dataset.edge;
            if (parcoursCurrent && parcoursCurrent.node_id) parcoursPath.nodes.push(parcoursCurrent.node_id);
            if (edgeId) parcoursPath.edges.push(edgeId);
            parcoursCurrent = s.id_to_parcours && nextId !== "-1" && nextId !== "" ? s.id_to_parcours[nextId] : null;
            if (parcoursCurrent) parcoursPath.nodes.push(parcoursCurrent.node_id);
            renderParcours(s);
            highlightPath();
        });
    });
}

function highlightPath() {
    try {
        if (!nodesDS || !edgesDS) return;
        var pathNodes = parcoursPath.nodes || [];
        var pathEdges = parcoursPath.edges || [];
        var curNode = parcoursCurrent ? parcoursCurrent.node_id : null;
        nodesDS.getIds().forEach(function(nid) {
            var inPath = pathNodes.indexOf(nid) >= 0;
            var isCurrent = curNode === nid;
            nodesDS.update({ id: nid, color: { background: inPath ? "#166534" : "#27272a", border: isCurrent ? "#fbbf24" : (inPath ? "#22c55e" : "#38bdf8") } });
        });
        edgesDS.getIds().forEach(function(eid) {
            var inPath = pathEdges.indexOf(eid) >= 0;
            edgesDS.update({ id: eid, color: inPath ? "#22c55e" : "#3f3f46" });
        });
    } catch (err) { console.warn("highlightPath:", err); }
}

function showScene(idx) {
    currentSceneIdx = idx;
    document.querySelectorAll(".scene-btn").forEach(function(b) {
        b.classList.toggle("active", parseInt(b.dataset.idx) === idx);
    });
    var s = scenesData[idx];
    document.getElementById("ed-title").textContent = s.title;
    var introHtml = '<div class="scene-intro"><label>EG-4 : SceneIntroduction</label><textarea class="edit" data-type="intro" rows="3">' + (s.scene_intro || '').replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;") + '</textarea></div>';
    document.getElementById("ed-content").innerHTML = introHtml + s.editor;

    var opts = {
        nodes: { font: { size: 18, color: "#fafafa", face: "system-ui, -apple-system, sans-serif" }, shape: "box", color: { background: "#27272a", border: "#38bdf8" }, margin: 20, borderWidth: 2, widthConstraint: { minimum: 160, maximum: 280 } },
        edges: { arrows: "to", width: 2, color: "#3f3f46", font: { color: "#94a3b8", size: 12, face: "system-ui, sans-serif" } },
        layout: { hierarchical: { enabled: true, direction: "UD", sortMethod: "directed", levelSeparation: 380, nodeSpacing: 420, treeSpacing: 380, blockShifting: true, edgeMinimization: true } },
        physics: { enabled: false },
        interaction: { zoomView: true, dragView: true }
    };

    if (nodesDS && edgesDS) {
        nodesDS.clear();
        edgesDS.clear();
        s.nodes.forEach(function(n) { nodesDS.add(n); });
        s.edges.forEach(function(e) { edgesDS.add(e); });
        setTimeout(function() { if (network) network.fit({ animation: { duration: 300 }, scale: 1.3 }); }, 200);
    } else {
        nodesDS = new vis.DataSet(s.nodes);
        edgesDS = new vis.DataSet(s.edges);
        network = new vis.Network(container, { nodes: nodesDS, edges: edgesDS }, opts);
        network.once("afterDrawing", function() { network.fit({ animation: { duration: 400 }, scale: 1.3 }); });
        setTimeout(function() { if (network) { network.redraw(); network.fit({ scale: 1.3 }); } }, 300);
        network.on("click", function(params) {
            if (params.nodes && params.nodes.length > 0) {
                var nid = String(params.nodes[0]);
                var m = nid.match(/_I(\d+)$/);
                if (m) {
                    var block = document.querySelector('.block[data-interaction-id="' + m[1] + '"]');
                    if (block) block.scrollIntoView({ behavior: "smooth" });
                }
            }
        });
    }

    attachEditors(idx);
    updateValidation();
    if (document.getElementById("panel-parcours").classList.contains("active")) {
        parcoursPath = { nodes: [], edges: [] };
        parcoursCurrent = null;
        showParcoursScene(idx);
    } else {
        highlightPath();
    }
}

function escapeHtml(s) {
    if (!s) return '';
    return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function attachEditors(idx) {
    var ch = chaptersData.Chapters[0];
    var sc = ch.Scenes[idx];
    document.querySelectorAll("#ed-content .edit").forEach(function(el) {
        el.addEventListener("input", function() {
            var type = this.dataset.type;
            var i = parseInt(this.dataset.i);
            if (type === "intro") {
                sc.SceneIntroduction = this.value;
            } else if (type === "name") {
                sc.Interactions[i].Name = this.value;
            } else if (type === "text") {
                sc.Interactions[i].Text = this.value;
                sc.Interactions[i].Name = this.value.substring(0, 50);
            } else if (type === "response") {
                var r = parseInt(this.dataset.r);
                sc.Interactions[i].Responses[r].Text = this.value;
                sc.Interactions[i].Responses[r].Name = this.value.substring(0, 80);
            }
        });
    });
    document.querySelectorAll("#ed-content .score").forEach(function(el) {
        el.addEventListener("change", function() {
            var i = parseInt(this.dataset.i), r = parseInt(this.dataset.r), skill = this.dataset.skill;
            var v = parseInt(this.value) || 0;
            if (v < -3) v = -3;
            if (v > 3) v = 3;
            sc.Interactions[i].Responses[r][skill] = v;
        });
    });
}

function updateValidation() {
    var errs = [];
    var ch = chaptersData.Chapters[0];
    ch.Scenes.forEach(function(sc) {
        var ids = {};
        sc.Interactions.forEach(function(ia) { ids[ia.Id] = true; });
        sc.Interactions.forEach(function(ia) {
            (ia.Responses || []).forEach(function(r) {
                var nid = r.NextInteractionID;
                if (nid != null && nid !== -1 && !ids[nid]) errs.push("EG-7: NextInteractionID " + nid + " invalide (scène " + sc.Title + ")");
            });
        });
    });
    var div = document.getElementById("validation");
    if (errs.length > 0) {
        div.className = "validation";
        div.textContent = errs.join(" ; ");
    } else {
        div.className = "validation ok";
        div.textContent = "EG-7 : Validation OK — NextInteractionID valides.";
    }
}

document.querySelectorAll(".scene-btn").forEach(function(b) {
    b.addEventListener("click", function() { showScene(parseInt(this.dataset.idx)); });
});

document.querySelectorAll(".mode-btn").forEach(function(b) {
    b.addEventListener("click", function() { setMode(this.dataset.mode); });
});

document.getElementById("parcours-restart").addEventListener("click", function() {
    if (scenesData.length > 0) showParcoursScene(currentSceneIdx);
});

    var q = (this.value || "").toLowerCase();
    document.querySelectorAll(".scene-btn").forEach(function(b) {
        b.style.display = q && b.textContent.toLowerCase().indexOf(q) < 0 ? "none" : "block";
    });
    if (scenesData && scenesData.length > 0) {
        var vis = (this.value || "").toLowerCase();
        if (vis && nodesDS && edgesDS) {
            var nodeIds = nodesDS.getIds();
            nodeIds.forEach(function(nid) {
                var node = nodesDS.get(nid);
                var match = (node.label && node.label.toLowerCase().indexOf(vis) >= 0) || (node.title && node.title.toLowerCase().indexOf(vis) >= 0);
                nodesDS.update({ id: nid, hidden: !match });
            });
        } else if (nodesDS) {
            nodesDS.getIds().forEach(function(nid) { nodesDS.update({ id: nid, hidden: false }); });
        }
    }
});

document.getElementById("save-btn").addEventListener("click", function() {
    var btn = this;
    var statusEl = document.getElementById("save-status");
    btn.disabled = true;
    statusEl.className = "";
    statusEl.textContent = "Enregistrement…";
    fetch("/api/save", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(chaptersData)
    }).then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
    .then(function(result) {
        btn.disabled = false;
        if (result.ok) {
            statusEl.className = "save-ok";
            statusEl.textContent = result.data.message || "Sauvegardé.";
        } else {
            statusEl.className = "save-err";
            statusEl.textContent = result.data.error || "Erreur. Utilisez python app.py pour activer la sauvegarde directe.";
        }
    }).catch(function(err) {
        btn.disabled = false;
        statusEl.className = "save-err";
        statusEl.textContent = "Erreur réseau. Lancez python app.py puis ouvrez http://localhost:8765";
    });
});

document.getElementById("export-btn").addEventListener("click", function() {
    var blob = new Blob([JSON.stringify(chaptersData, null, 2)], { type: "application/json" });
    var a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "Chapitre_" + chapterId + "_modified.json";
    a.click();
});

function init() {
    if (typeof vis === "undefined") {
        container.innerHTML = "<p style='color:#ef4444;padding:20px'>vis-network non chargé. Vérifiez votre connexion et rechargez.</p>";
        return;
    }
    if (scenesData && scenesData.length > 0) {
        try { showScene(0); } catch (err) {
            console.error("showScene:", err);
            container.innerHTML = "<p style='color:#ef4444;padding:20px'>Erreur: " + String(err.message || err) + "</p>";
        }
    } else {
        document.getElementById("ed-content").innerHTML = "<div class='empty'>Aucune donnée (erreur de chargement?).</div>";
    }
}
function runInit() {
    if (typeof vis !== "undefined") { init(); return; }
    var n = 0;
    var t = setInterval(function() {
        n++;
        if (typeof vis !== "undefined") { clearInterval(t); init(); }
        else if (n > 60) { clearInterval(t); container.innerHTML = "<p style='color:#ef4444;padding:20px'>vis-network timeout.</p>"; }
    }, 100);
}
window.addEventListener("load", function() { setTimeout(runInit, 80); });
</script>
</body>
</html>
