nity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "La situation est lourde pour moi. J’ai besoin que tu m’aides.", "next_id": "4", "target_node_id": "C4_S2_I4", "edge_id": "C4_S2_I2_R1_>C4_S2_I4", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Tu m’as annoncé des mesures à venir pour les soins palliatifs. Mais maintenant la situation d’Agathe est révélatrice d’un disfonctionnement qu’il faut absolument régler.''", "next_id": "5", "target_node_id": "C4_S2_I5", "edge_id": "C4_S2_I2_R2_>C4_S2_I5", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''De toute façon, tu n’y comprends rien ! Reste avec tes chiffres !''", "next_id": "4", "target_node_id": "C4_S2_I4", "edge_id": "C4_S2_I2_R3_>C4_S2_I4", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C4_S2_I3", "actor": "Pascal", "text": "''Je sais que la situation d’Agathe te touche mais tu n’es pas sa seule soignante Claude.''", "image": "Pascal_neutral.png", "responses": [{"text": "Elle vient de me confier personnellement sa détresse. Je dois l’aider ", "next_id": "5", "target_node_id": "C4_S2_I5", "edge_id": "C4_S2_I3_R0_>C4_S2_I5", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je viens de lui dire que je retournerai la voir pour l’aider à gérer son angoisse''", "next_id": "5", "target_node_id": "C4_S2_I5", "edge_id": "C4_S2_I3_R1_>C4_S2_I5", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "La situation est lourde pour moi. J’ai besoin que tu m’aides", "next_id": "4", "target_node_id": "C4_S2_I4", "edge_id": "C4_S2_I3_R2_>C4_S2_I4", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Tu m’as annoncé des mesures à venir pour les soins palliatifs. Mais maintenant la situation d’Agathe est révélatrice d’un disfonctionnement qu’il faut absolument régler.''", "next_id": "5", "target_node_id": "C4_S2_I5", "edge_id": "C4_S2_I3_R3_>C4_S2_I5", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''De toute façon, tu n’y comprends rien ! Reste avec tes chiffres !''", "next_id": "4", "target_node_id": "C4_S2_I4", "edge_id": "C4_S2_I3_R4_>C4_S2_I4", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C4_S2_I5", "actor": "Pascal", "text": "''Et que fais-tu des autres patients ?''", "image": "Pascal_confused.png", "responses": [{"text": "Pascal, elle est en détresse, se sent seule face à la mort, et tu voudrais que je la laisse ainsi. ", "next_id": "6", "target_node_id": "C4_S2_I6", "edge_id": "C4_S2_I5_R0_>C4_S2_I6", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Pascal, nous devons revoir notre fonctionnement. Pour le bien des résidents.", "next_id": "6", "target_node_id": "C4_S2_I6", "edge_id": "C4_S2_I5_R1_>C4_S2_I6", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Il n’y a aucune urgence à faire le soin de bouche des autres patient Pascal !''", "next_id": "6", "target_node_id": "C4_S2_I6", "edge_id": "C4_S2_I5_R2_>C4_S2_I6", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C4_S2_I6", "actor": "Pascal", "text": "''Claude, du calme ! Nous aurons bientôt plus de temps pour les soins palliatifs.''", "image": "Pascal_angry.png", "responses": [{"text": "''Tu me fais bien rire avec ton temps de plus ! Je te rappelle que cette semaine je dois faire des heures supplémentaires… Claude inspire profondément pour se calmer.''", "next_id": "7", "target_node_id": "C4_S2_I7", "edge_id": "C4_S2_I6_R0_>C4_S2_I7", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''D’accord. J’aimerais qu’on clarifie la priorité et la transmission pour éviter des erreurs.''", "next_id": "7", "target_node_id": "C4_S2_I7", "edge_id": "C4_S2_I6_R1_>C4_S2_I7", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 3}, {"text": "''Ce n’est pas mon problème, débrouillez-vous avec l’organisation.''", "next_id": "7", "target_node_id": "C4_S2_I7", "edge_id": "C4_S2_I6_R2_>C4_S2_I7", "RespectAndDignity": -2, "Empathy": 0, "Compassion": -2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": -2}]}, {"node_id": "C4_S2_I7", "actor": "Pascal", "text": "Nous aurons bientôt plus de temps pour les soins palliatifs. Revoyons ça demain calmement. ", "image": "Pascal_neutral.png", "responses" ation": 0}, {"text": "''D’accord. Merci pour ce retour, nous en reparlerons plus tard.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 3}, {"text": "''Ce n’est pas mon problème, débrouillez-vous avec l’organisation.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": -2, "Empathy": 0, "Compassion": -2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": -2}]}, {"node_id": "C4_S2_I8", "actor": "Pascal", "text": "Claude, lève-toi et remets-toi au travail. C’est la dernière fois que je te le dis.", "image": "Pascal_neutral.png", "responses": [{"text": "...", "next_id": "9", "target_node_id": "C4_S2_I9", "edge_id": "C4_S2_I8_R0_>C4_S2_I9", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''D’accord. J’aimerais qu’on clarifie la priorité et la transmission pour éviter des erreurs.''", "next_id": "9", "target_node_id": "C4_S2_I9", "edge_id": "C4_S2_I8_R1_>C4_S2_I9", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 3}, {"text": "''Ce n’est pas mon problème, débrouillez-vous avec l’organisation.''", "next_id": "9", "target_node_id": "C4_S2_I9", "edge_id": "C4_S2_I8_R2_>C4_S2_I9", "RespectAndDignity": -2, "Empathy": 0, "Compassion": -2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": -2}]}, {"node_id": "C4_S2_I4", "actor": "Pascal", "text": "Enfin Claude, s’il te plaît, ressaisis-toi et fais ce que tu as à faire.", "image": "Pascal_revieled.png", "responses": [{"text": "''Oui, Pascal.''", ": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "5": {"node_id": "C4_S2_I5", "actor": "Pascal", "text": "''Et que fais-tu des autres patients ?''", "image": "Pascal_confused.png", "responses": [{"text": "Pascal, elle est en détresse, se sent seule face à la mort, et tu voudrais que je la laisse ainsi. ", "next_id": "6", "target_node_id": "C4_S2_I6", "edge_id": "C4_S2_I5_R0_>C4_S2_I6", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Pascal, nous devons revoir notre fonctionnement. Pour le bien des résidents.", "next_id": "6", "target_node_id": "C4_S2_I6", "edge_id": "C4_S2_I5_R1_>C4_S2_I6", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Il n’y a aucune urgence à faire le soin de bouche des autres patient Pascal !''", "next_id": "6", "target_node_id": "C4_S2_I6", "edge_id": "C4_S2_I5_R2_>C4_S2_I6", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "6": {"node_id": "C4_S2_I6", "actor": "Pascal", "text": "''Claude, du calme ! Nous aurons bientôt plus de temps pour les soins palliatifs.''", "image": "Pascal_angry.png", "responses": [{"text": "''Tu me fais bien rire avec ton temps de plus ! Je te rappelle que cette semaine je dois faire des heures supplémentaires… Claude inspire profondément pour se calmer.''", "next_id": "7", "target_node_id": "C4_S2_I7", "edge_id": "C4_S2_I6_R0_>C4_S2_I7", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''D’accord. J’aimerais qu’on clarifie la priorité et la transmission pour éviter des erreurs.''", "next_id": "7", "target_node_id": "C4_S2_I7", "edge_id": "C4_S2_I6_R1_>C4_S2_I7", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 3}, {"text": "''Ce n’est pas mon problème, débrouillez-vous avec l’organisation.''", "next_id": "7", "target_node_id": "C4_S2_I7", "edge_id": "C4_S2_I6_R2_>C4_S2_I7", "RespectAndDignity": -2, "Empathy": 0, "Compassion": -2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": -2}]}, "7": {"node_id": "C4_S2_I7", "actor": "Pascal", "text": "Nous aurons bientôt plus de temps pour les soins palliatifs. Revoyons ça demain calmement. ", "image": "Pascal_neutral.png", "responses": [{"text": "Agathe a besoin de quelqu’un maintenant. Elle ne sera peut-être plus là demain. j’ai l’air désemparé", "next_id": "9", "target_node_id": "C4_S2_I9", "edge_id": "C4_S2_I7_R0_>C4_S2_I9", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Tu me l’as déjà dit. Bonne journée !''", "next_id": "9", "target_node_id": "C4_S2_I9", "edge_id": "C4_S2_I7_R1_>C4_S2_I9", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Pascal, le problème se pose maintenant. Trouvons des solutions en équipe dans l’immédiat. Parlons-en au coloc de cet après-midi… je regarde Pascal avec détermination. ", "next_id": "8", "target_node_id": "C4_S2_I8", "edge_id": "C4_S2_I7_R2_>C4_S2_I8", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Tu me fais bien rire avec ton temps de plus ! Je te rappelle que cette semaine je dois faire des heures supplémentaires… Claude inspire profondément pour se calmer.''", "next_id": "8", "target_node_id": "C4_S2_I8", "edge_id": "C4_S2_I7_R3_>C4_S2_I8", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "9": {"node_id": "C4_S2_I9", "actor": "Pascal", "text": "''On verra… puis il s’en va. Claude se lève et se rend dans la chambre suivante pour prodiguer des soins.''", "image": "Pascal_neutral.png", "responses": [{"text": "Fin", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''D’accord. Merci pour ce retour, nous en reparlerons plus tard.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 3}, {"text": "''Ce n’est pas mon problème, débrouillez-vous avec l’organisation.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": -2, "Empathy": 0, "Compassion": -2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": -2}]}, "8": {"node_id": "C4_S2_I8", "actor": "Pascal", "text": "Claude, lève-toi et remets-toi au travail. C’est la dernière fois que je te le dis.", "image": "Pascal_neutral.png", "responses": [{"text": "...", "next_id": "9", "target_node_id": "C4_S2_I9", "edge_id": "C4_S2_I8_R0_>C4_S2_I9", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''D’accord. J’aimerais qu’on clarifie la priorité et la transmission pour éviter des erreurs.''", "next_id": "9", "target_node_id": "C4_S2_I9", "edge_id": "C4_S2_I8_R1_>C4_S2_I9", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 3}, {"text": "''Ce n’est pas mon problème, débrouillez-vous avec l’organisation.''", "next_id": "9", "target_node_id": "C4_S2_I9", "edge_id": "C4_S2_I8_R2_>C4_S2_I9", "RespectAndDignity": -2, "Empathy": 0, "Compassion": -2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": -2}]}, "4": {"node_id": "C4_S2_I4", "actor": "Pascal", "text": "Enfin Claude, s’il te plaît, ressaisis-toi et fais ce que tu as à faire.", "image": "Pascal_revieled.png", "responses": [{"text": "''Oui, Pascal.''", "next_id": "7", "target_node_id": "C4_S2_I7", "edge_id": "C4_S2_I4_R0_>C4_S2_I7", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Mais Pascal ! C’est difficile. Je vais craquer.''", "next_id": "6", "target_node_id": "C4_S2_I6", "edge_id": "C4_S2_I4_R1_>C4_S2_I6", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "C’est à toi de te ressaisir et de faire ce que tu as à faire.", "next_id": "6", "target_node_id": "C4_S2_I6", "edge_id": "C4_S2_I4_R2_>C4_S2_I6", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}}}, {"title": "Rupture du lien", "scene_id": 3, "scene_intro": "Claude a fini sa tournée. Elle prend quinze minutes pour accompagner retourner auprès d’Agathe. Elle frappe à sa 12\" data-r=\"2\" data-skill=\"RespectAndDignity\" value=\"0\" min=\"-3\" max=\"3\"><label>Empathy</label><input type=\"number\" class=\"score\" data-i=\"12\" data-r=\"2\" data-skill=\"Empathy\" value=\"0\" min=\"-3\" max=\"3\"><label>Compassion</label><input type=\"number\" class=\"score\" data-i=\"12\" data-r=\"2\" data-skill=\"Compassion\" value=\"-2\" min=\"-3\" max=\"3\"><label>EmotionalRegulation</label><input type=\"number\" class=\"score\" data-i=\"12\" data-r=\"2\" data-skill=\"EmotionalRegulation\" value=\"0\" min=\"-3\" max=\"3\"><label>CommunicationClarity</label><input type=\"number\" class=\"score\" data-i=\"12\" data-r=\"2\" data-skill=\"CommunicationClarity\" value=\"0\" min=\"-3\" max=\"3\"><label>ProfessionalBoundaries</label><input type=\"number\" class=\"score\" data-i=\"12\" data-r=\"2\" data-skill=\"ProfessionalBoundaries\" value=\"0\" min=\"-3\" max=\"3\"><label>InterprofessionalCollaboration</label><input type=\"number\" class=\"score\" data-i=\"12\" data-r=\"2\" data-skill=\"InterprofessionalCollaboration\" value=\"0\" min=\"-3\" max=\"3\"></div></div></div>", "parcours": [{"node_id": "C4_S3_I1", "actor": "Agathe", "text": "Agathe la repousse.", "image": "Agathe_neutral.png", "responses": [{"text": "''Je me penche vers elle J’ai du temps pour vous Agathe. Voulez-vous que je reste un moment ?''", "next_id": "2", "target_node_id": "C4_S3_I2", "edge_id": "C4_S3_I1_R0_>C4_S3_I2", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je la regarde : Agathe, je vous sens en détresse. J’ai du temps pour vous.''", "next_id": "2", "target_node_id": "C4_S3_I2", "edge_id": "C4_S3_I1_R1_>C4_S3_I2", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Agathe je suis là… voulez-vous me dire quelque chose ?''", "next_id": "3", "target_node_id": "C4_S3_I3", "edge_id": "C4_S3_I1_R2_>C4_S3_I3", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je l’air désolé :''Je souhaite m’excuser pour tout à l’heure. Maintenant j’ai du temps pour vous.''", "next_id": "3", "target_node_id": "C4_S3_I3", "edge_id": "C4_S3_I1_R3_>C4_S3_I3", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je semble agacée par ce qui vient de se passer avec Pascal et l’interpelle à haute voix :''Allons Agathe, que se passe-t-il ?''", "next_id": "2", "target_node_id": "C4_S3_I2", "edge_id": "C4_S3_I1_R4_>C4_S3_I2", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je l’air triste :''Pourquoi vous rejetez ma main ?''", "next_id": "2", "target_node_id": "C4_S3_I2", "edge_id": "C4_S3_I1_R5_>C4_S3_I2", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 2, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je surprise :''Vous faîtes des caprices ? Qu’est-ce qui vous prend ?''", "next_id": "2", "target_node_id": "C4_S3_I2", "edge_id": "C4_S3_I1_R6_>C4_S3_I2", "RespectAndDignity": 0, "Empathy": 1, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 1, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "En la regardant :''Agathe, est-ce que ça va mieux ?''", "next_id": "3", "target_node_id": "C4_S3_I3", "edge_id": "C4_S3_I1_R7_>C4_S3_I3", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C4_S3_I2", "actor": "Agathe", "text": "Agathe ne répond pas.", "image": "Agathe_neutral.png", "responses": [{"text": "''Je baisse les yeux : Si vous ne voulez pas parler, je vais partir.''", "next_id": "4", "target_node_id": "C4_S3_I4", "edge_id": "C4_S3_I2_R0_>C4_S3_I4", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je cherche son regard :''Agathe, que veut dire ce silence ?''", "next_id": "4", "target_node_id": "C4_S3_I4", "edge_id": "C4_S3_I2_R1_>C4_S3_I4", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je regarde Agathe en silence, puis ferme les yeux et se recueille avec elle.", "next_id": "4", "target_node_id": "C4_S3_I4", "edge_id": "C4_S3_I2_R2_>C4_S3_I4", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je suis triste de vous voir comme ça.''", "next_id": "4", "target_node_id": "C4_S3_I4", "edge_id": "C4_S3_I2_R3_>C4_S3_I4", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C4_S3_I4", "actor": "Agathe", "text": "Agathe ne répond pas et continue à regarder fixement le mur face à elle.", "image": "Agathe_neutral.png", "responses": [{"text": "Je lui souris :''Il est si joli ce mur ?''", "next_id": "7", "target_node_id": "C4_S3_I7", "edge_id": "C4_S3_I4_R0_>C4_S3_I7", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je hésite :''Bon et bien si c’est comme ça, je m’en vais !''", "next_id": "7", "target_node_id": "C4_S3_I7", "edge_id": "C4_S3_I4_R1_>C4_S3_I7", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je d’un ton calme :''Je comprends que vous ne souhaitiez plus communiquer.''", "next_id": "7", "target_node_id": "C4_S3_I7", "edge_id": "C4_S3_I4_R2_>C4_S3_I7", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je avec inquiétude :''Je sens que votre mort est proche alors parlez-moi !''", "next_id": "7", "target_node_id": "C4_S3_I7", "edge_id": "C4_S3_I4_R3_>C4_S3_I7", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je offre sa présence silencieuse et tranquillement se retire.''", "next_id": "5", "target_node_id": "C4_S3_I5", "edge_id": "C4_S3_I4_R4_>C4_S3_I5", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C4_S3_I7", "actor": "Agathe", "text": "Agathe ne répond toujours pas.", "image": "Agathe_neutral.png", "responses": [{"text": "Agathe, si vous souffrez physiquement, c’est important de le dire.", "next_id": "9", "target_node_id": "C4_S3_I9", "edge_id": "C4_S3_I7_R0_>C4_S3_I9", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je le regard compatissant :''Je ne sais pas si vous enfermer dans ce mutisme est une bonne chose, mais sachez que je reste un moment avec vous.''", "next_id": "9", "target_node_id": "C4_S3_I9", "edge_id": "C4_S3_I7_R1_>C4_S3_I9", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Si c’est comme ça, faudra pas venir vous plaindre que vous êtes seule !''", "next_id": "9", "target_node_id": "C4_S3_I9", "edge_id": "C4_S3_I7_R2_>C4_S3_I9", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C4_S3_I9", "actor": "Agathe", "text": "Agathe tourne sa tête à l’opposé de Claude.", "image": "Agathe_neutral.png", "responses": [{"text": "''Puisque c’est ainsi, je pars. Au revoir Agathe !''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je la regarde avec bienveillance :''Je vois que vous avez besoin de vous retrouver en vous-même.''", "next_id": "12", "target_node_id": "C4_S3_I12", "edge_id": "C4_S3_I9_R1_>C4_S3_I12", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je l’observe :''Vous tournez la tête. Qu’est-ce que je dois comprendre ?''", "next_id": "12", "target_node_id": "C4_S3_I12", "edge_id": "C4_S3_I9_R2_>C4_S3_I12", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 1, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je déplace sa chaise et s’installe de l’autre côté du lit face à Agathe.''", "next_id": "11", "target_node_id": "C4_S3_I11", "edge_id": "C4_S3_I9_R3_>C4_S3_I11", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C4_S3_I12", "actor": "Agathe", "text": "Agathe ne réagit pas. Claude reste encore quelques instants assise aux côtés d’Agathe.", "image": "Agathe_neutral.png", "responses": [{"text": "Elle diminue la luminosité de la chambre et se retire en silence.", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je comprends qu’il se passe quelque chose d’important pour vous et avant de vous quitter je souhaite vous lire ce petit conte :''« le jeune homme et la mort ».''", "next_id": "13", "target_node_id": "C4_S3_I13", "edge_id": "C4_S3_I12_R1_>C4_S3_I13", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je sais que vous êtes croyante et pratiquante et vous propose de prier un moment avec vous. « Notre père… »''", "next_id": "13", "target_node_id": "C4_S3_I13", "edge_id": "C4_S3_I12_R2_>C4_S3_I13", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C4_S3_I13", "actor": "Agathe", "text": "Agathe ferme les yeux.", "image": "Agathe_neutral.png", "responses": [{"text": "...", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je vous entends. Ce que vous vivez est difficile. On peut prendre un moment pour en parler.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je respecte ce moment. Je vais vous laisser pour l’instant.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": -2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C4_S3_I11", "actor": "Agathe", "text": "''Agathe ne réagit pas. Claude se lève, se dirige vers l’appareil à cd et met le « Stabat Mater » de Pergolèse qu’Agathe aime tant. Elle s’assied à nouveau auprès d’elle. Ensemble elles écoutent religieusement. À la fin, Claude éteint l’appareil.''", "image": "Agathe_neutral.png", "responses": [{"text": "Je regarde Agathe : Elle pense qu’Agathe a besoin de se recueillir. Elle diminue la luminosité de la chambre et se retire en silence.", "next_id": "13", "target_node_id": "C4_S3_I13", "edge_id": "C4_S3_I11_R0_>C4_S3_I13", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je la regarde une dernière fois :''", "next_id": "13", "target_node_id": "C4_S3_I13", "edge_id": "C4_S3_I11_R1_>C4_S3_I13", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je pose la mais sur la sienne :''Je vous sens en paix. Vous pouvez partir maintenant.''", "next_id": "13", "target_node_id": "C4_S3_I13", "edge_id": "C4_S3_I11_R2_>C4_S3_I13", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C4_S3_I5", "actor": "Agathe", "text": "...", "image": "Agathe_neutral.png", "responses": [{"text": "En partant Claude jette un dernier regard sur Agathe avant de refermer la porte de sa chambre", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je vous entends. Ce que vous vivez est difficile. On peut prendre un moment pour en parler.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je respecte ce moment. Je vais vous laisser pour l’instant.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": -2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C4_S3_I3", "actor": "Agathe", "text": "''N’avez-vous pas d’autres patients à voir ?''", "image": "Agathe_confused.png", "responses": [{"text": "Je semble ne pas comprendre la réaction d’Agathe :''Est-ce que vous voulez que je parte ?''", "next_id": "6", "target_node_id": "C4_S3_I6", "edge_id": "C4_S3_I3_R0_>C4_S3_I6", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je regarde Agathe avec attention : Votre angoisse semble partie.", "next_id": "6", "target_node_id": "C4_S3_I6", "edge_id": "C4_S3_I3_R1_>C4_S3_I6", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je m’incline légèrement vers Agathe et esquisse un sourire compatissant.''", "next_id": "6", "target_node_id": "C4_S3_I6", "edge_id": "C4_S3_I3_R2_>C4_S3_I6", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je la regarde : Votre réaction m’attriste Agathe.''", "next_id": "6", "target_node_id": "C4_S3_I6", "edge_id": "C4_S3_I3_R3_>C4_S3_I6", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C4_S3_I6", "actor": "Agathe", "text": "Après tout, je me rends compte que c’est tout ce que je suis… une patiente.", "image": "Agathe_neutral.png", "responses": [{"text": "Je tout en la regardant :''Êtes-vous en colère parce que je vous ai laissée seule tout à l’heure ?''", "next_id": "8", "target_node_id": "C4_S3_I8", "edge_id": "C4_S3_I6_R0_>C4_S3_I8", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je relève la tête : La respiration de Claude s’accélère et ses yeux s’emplissent de larmes''", "next_id": "8", "target_node_id": "C4_S3_I8", "edge_id": "C4_S3_I6_R1_>C4_S3_I8", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je hausse le ton :''J’ai fait mon possible pour revenir vous voir et c’est comme ça que vous me remercier !''", "next_id": "8", "target_node_id": "C4_S3_I8", "edge_id": "C4_S3_I6_R2_>C4_S3_I8", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je pose sa main sur son avant-bras :''Je suis là pour vous… puis-je faire quelque chose de spéciale Agathe ?''", "next_id": "9", "target_node_id": "C4_S3_I9", "edge_id": "C4_S3_I6_R3_>C4_S3_I9", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C4_S3_I8", "actor": "Agathe", "text": "''Je vous faisais confiance, j’ai eu tort.''", "image": "Agathe_neutral.png", "responses": [{"text": "J’aurais aimé passer plus de temps avec vous. Ce n’était malheureusement pas possible pour moi à ce moment-là. J’en suis désolée et vous présente mes excuses.", "next_id": "10", "target_node_id": "C4_S3_I10", "edge_id": "C4_S3_I8_R0_>C4_S3_I10", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''J’inspire en levant les yeux en l’air : Agathe, sachez qu’on peut encore appeler vos enfants pour qu’ils viennent vous soutenir.''", "next_id": "9", "target_node_id": "C4_S3_I9", "edge_id": "C4_S3_I8_R1_>C4_S3_I9", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je tente de lui reprendre la main et se met à pleurer. Regardez-moi !''", "next_id": "9", "target_node_id": "C4_S3_I9", "edge_id": "C4_S3_I8_R2_>C4_S3_I9", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Agathe, je peine à comprendre ce qu’il se passe, mais sachez que lorsque le moment de mourir viendra, vous pourrez compter sur notre soutien.", "next_id": "9", "target_node_id": "C4_S3_I9", "edge_id": "C4_S3_I8_R3_>C4_S3_I9", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C4_S3_I10", "actor": "Agathe", "text": "Il est trop tard à présent.", "image": "Agathe_neutral.png", "responses": [{"text": "''Je semble découragée : : J’espère que vous pourrez mourir en paix. Elle se lève doucement, remet la chaise à sa place et s’en va sans dire mot.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je la main sur son bras :''Vous sentez que la mort approche ?''", "next_id": "12", "target_node_id": "C4_S3_I12", "edge_id": "C4_S3_I10_R1_>C4_S3_I12", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "En se penchant face à elle :''Voulez-vous que je vous laisse ?''", "next_id": "11", "target_node_id": "C4_S3_I11", "edge_id": "C4_S3_I10_R2_>C4_S3_I11", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}], "id_to_parcours": {"1": {"node_id": "C4_S3_I1", "actor": "Agathe", "text": "Agathe la repousse.", "image": "Agathe_neutral.png", "responses": [{"text": "''Je me penche vers elle J’ai du temps pour vous Agathe. Voulez-vous que je reste un moment ?''", "next_id": "2", "target_node_id": "C4_S3_I2", "edge_id": "C4_S3_I1_R0_>C4_S3_I2", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je la regarde : Agathe, je vous sens en détresse. J’ai du temps pour vous.''", "next_id": "2", "target_node_id": "C4_S3_I2", "edge_id": "C4_S3_I1_R1_>C4_S3_I2", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Agathe je suis là… voulez-vous me dire quelque chose ?''", "next_id": "3", "target_node_id": "C4_S3_I3", "edge_id": "C4_S3_I1_R2_>C4_S3_I3", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je l’air désolé :''Je souhaite m’excuser pour tout à l’heure. Maintenant j’ai du temps pour vous.''", "next_id": "3", "target_node_id": "C4_S3_I3", "edge_id": "C4_S3_I1_R3_>C4_S3_I3", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je semble agacée par ce qui vient de se passer avec Pascal et l’interpelle à haute voix :''Allons Agathe, que se passe-t-il ?''", "next_id": "2", "target_node_id": "C4_S3_I2", "edge_id": "C4_S3_I1_R4_>C4_S3_I2", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je l’air triste :''Pourquoi vous rejetez ma main ?''", "next_id": "2", "target_node_id": "C4_S3_I2", "edge_id": "C4_S3_I1_R5_>C4_S3_I2", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 2, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je surprise :''Vous faîtes des caprices ? Qu’est-ce qui vous prend ?''", "next_id": "2", "target_node_id": "C4_S3_I2", "edge_id": "C4_S3_I1_R6_>C4_S3_I2", "RespectAndDignity": 0, "Empathy": 1, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 1, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "En la regardant :''Agathe, est-ce que ça va mieux ?''", "next_id": "3", "target_node_id": "C4_S3_I3", "edge_id": "C4_S3_I1_R7_>C4_S3_I3", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "2": {"node_id": "C4_S3_I2", "actor": "Agathe", "text": "Agathe ne répond pas.", "image": "Agathe_neutral.png", "responses": [{"text": "''Je baisse les yeux : Si vous ne voulez pas parler, je vais partir.''", "next_id": "4", "target_node_id": "C4_S3_I4", "edge_id": "C4_S3_I2_R0_>C4_S3_I4", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je cherche son regard :''Agathe, que veut dire ce silence ?''", "next_id": "4", "target_node_id": "C4_S3_I4", "edge_id": "C4_S3_I2_R1_>C4_S3_I4", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je regarde Agathe en silence, puis ferme les yeux et se recueille avec elle.", "next_id": "4", "target_node_id": "C4_S3_I4", "edge_id": "C4_S3_I2_R2_>C4_S3_I4", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je suis triste de vous voir comme ça.''", "next_id": "4", "target_node_id": "C4_S3_I4", "edge_id": "C4_S3_I2_R3_>C4_S3_I4", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "4": {"node_id": "C4_S3_I4", "actor": "Agathe", "text": "Agathe ne répond pas et continue à regarder fixement le mur face à elle.", "image": "Agathe_neutral.png", "responses": [{"text": "Je lui souris :''Il est si joli ce mur ?''", "next_id": "7", "target_node_id": "C4_S3_I7", "edge_id": "C4_S3_I4_R0_>C4_S3_I7", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je hésite :''Bon et bien si c’est comme ça, je m’en vais !''", "next_id": "7", "target_node_id": "C4_S3_I7", "edge_id": "C4_S3_I4_R1_>C4_S3_I7", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je d’un ton calme :''Je comprends que vous ne souhaitiez plus communiquer.''", "next_id": "7", "target_node_id": "C4_S3_I7", "edge_id": "C4_S3_I4_R2_>C4_S3_I7", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je avec inquiétude :''Je sens que votre mort est proche alors parlez-moi !''", "next_id": "7", "target_node_id": "C4_S3_I7", "edge_id": "C4_S3_I4_R3_>C4_S3_I7", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je offre sa présence silencieuse et tranquillement se retire.''", "next_id": "5", "target_node_id": "C4_S3_I5", "edge_id": "C4_S3_I4_R4_>C4_S3_I5", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "7": {"node_id": "C4_S3_I7", "actor": "Agathe", "text": "Agathe ne répond toujours pas.", "image": "Agathe_neutral.png", "responses": [{"text": "Agathe, si vous souffrez physiquement, c’est important de le dire.", "next_id": "9", "target_node_id": "C4_S3_I9", "edge_id": "C4_S3_I7_R0_>C4_S3_I9", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je le regard compatissant :''Je ne sais pas si vous enfermer dans ce mutisme est une bonne chose, mais sachez que je reste un moment avec vous.''", "next_id": "9", "target_node_id": "C4_S3_I9", "edge_id": "C4_S3_I7_R1_>C4_S3_I9", "RespectAndDignity": 0, "Empathy": 0, " function setMode(mode) {

        parcoursPath = { nodes: [], edges: [] };
        parcoursCurrent = null;
        parcoursScores = { RespectAndDignity: 0, Empathy: 0, Compassion: 0, EmotionalRegulation: 0, CommunicationClarity: 0, ProfessionalBoundaries: 0, InterprofessionalCollaboration: 0 };

    } else {
        parcoursPath = { nodes: [], edges: [] };

        if (nodesDS && edgesDS) highlightPath();
    }

function showParcoursScene(idx) {
    var s = scenesData[idx];
    document.getElementById("parcours-title").textContent = s.title + " — Parcours joueur";
    if (!s.parcours || s.parcours.length === 0) {
        document.getElementById("parcours-content").innerHTML = '<div class="parcours-card"><div class="parcours-end">Aucune interaction dans ce scénario.</div></div>';
        document.getElementById("parcours-restart").style.display = "none";

    parcoursPath = { nodes: [], edges: [] };
    parcoursScores = { RespectAndDignity: 0, Empathy: 0, Compassion: 0, EmotionalRegulation: 0, CommunicationClarity: 0, ProfessionalBoundaries: 0, InterprofessionalCollaboration: 0 };
    parcoursCurrent = s.parcours[0];
    renderParcours(s);
    highlightPath();
}

function esc(s) { if (!s) return ""; return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function renderParcours(s) {
    var ia = parcoursCurrent;
    if (!ia) {
        var totalsHtml = '<div class="parcours-card"><div class="parcours-end">Fin de cette branche.</div>';
        if (parcoursPath.nodes.length > 0) {
            totalsHtml += '<div class="parcours-totals"><h4>Score total du parcours</h4>';
            var labels = { RespectAndDignity: "Respect et dignité", Empathy: "Empathie", Compassion: "Compassion", EmotionalRegulation: "Régulation émotionnelle", CommunicationClarity: "Clarté communication", ProfessionalBoundaries: "Frontières pro.", InterprofessionalCollaboration: "Collab. interpro." };
            for (var k in parcoursScores) {
                var v = parcoursScores[k];
                var cls = v > 0 ? "positive" : (v < 0 ? "negative" : "zero");
                totalsHtml += '<div class="score-line ' + cls + '">' + (labels[k] || k) + ': ' + (v >= 0 ? '+' : '') + v + '</div>';
            }
            totalsHtml += '</div>';
        }
        totalsHtml += '</div>';
        document.getElementById("parcours-content").innerHTML = totalsHtml;
        document.getElementById("parcours-restart").style.display = parcoursPath.nodes.length > 0 ? "block" : "none";
        return;
    }
    var imgHtml = (ia.image) ? '<img class="parcours-image" src="/api/data/images/' + esc(ia.image) + '" alt="" />' : '';
    var html = '<div class="parcours-card">' + imgHtml + '<span class="actor">' + esc(ia.actor) + '</span><div class="text">' + esc(ia.text || "—") + '</div>';
    if (ia.responses && ia.responses.length > 0) {
        ia.responses.forEach(function(r, i) {
            var label = (r.text || "").length > 80 ? (r.text || "").substring(0, 80) + "…" : (r.text || "→ I" + r.next_id);
            var scores = { RespectAndDignity: r.RespectAndDignity||0, Empathy: r.Empathy||0, Compassion: r.Compassion||0, EmotionalRegulation: r.EmotionalRegulation||0, CommunicationClarity: r.CommunicationClarity||0, ProfessionalBoundaries: r.ProfessionalBoundaries||0, InterprofessionalCollaboration: r.InterprofessionalCollaboration||0 };
            html += '<button class="parcours-choice" data-next="' + r.next_id + '" data-target="' + esc(r.target_node_id || "") + '" data-edge="' + esc(r.edge_id || "") + '" data-scores="' + esc(JSON.stringify(scores)) + '">' + esc(label) + '</button>';
        });
    } else {
        html += '<div class="parcours-end">Fin de cette branche.</div>';
    }
    html += '</div>';
    document.getElementById("parcours-content").innerHTML = html;
    document.getElementById("parcours-restart").style.display = parcoursPath.nodes.length > 0 ? "block" : "none";
    document.querySelectorAll(".parcours-choice").forEach(function(btn) {
        btn.addEventListener("click", function() {
            var scores = JSON.parse(this.dataset.scores || "{}");
            for (var k in scores) parcoursScores[k] = (parcoursScores[k] || 0) + (parseInt(scores[k]) || 0);
            var nextId = this.dataset.next;
            var edgeId = this.dataset.edge;
            if (parcoursCurrent && parcoursCurrent.node_id) parcoursPath.nodes.push(parcoursCurrent.node_id);
            if (edgeId) parcoursPath.edges.push(edgeId);
            parcoursCurrent = s.id_to_parcours && nextId !== "-1" && nextId !== "" ? s.id_to_parcours[nextId] : null;
            if (parcoursCurrent) parcoursPath.nodes.push(parcoursCurrent.node_id);
            renderParcours(s);
            highlightPath();
        });
    });
}

function highlightPath() {
    try {
        if (!nodesDS || !edgesDS) return;
        var pathNodes = parcoursPath.nodes || [];
        var pathEdges = parcoursPath.edges || [];
        var curNode = parcoursCurrent ? parcoursCurrent.node_id : null;
        nodesDS.getIds().forEach(function(nid) {
            var inPath = pathNodes.indexOf(nid) >= 0;
            var isCurrent = curNode === nid;
            nodesDS.update({ id: nid, color: { background: inPath ? "#166534" : "#27272a", border: isCurrent ? "#fbbf24" : (inPath ? "#22c55e" : "#38bdf8") } });
        });
        edgesDS.getIds().forEach(function(eid) {
            var inPath = pathEdges.indexOf(eid) >= 0;
            edgesDS.update({ id: eid, color: inPath ? "#22c55e" : "#3f3f46" });
        });
    } catch (err) { console.warn("highlightPath:", err); }
}

function showScene(idx) {
    currentSceneIdx = idx;
    document.querySelectorAll(".scene-btn").forEach(function(b) {

    var s = scenesData[idx];
    document.getElementById("ed-title").textContent = s.title;
    var introHtml = '<div class="scene-intro"><label>EG-4 : SceneIntroduction</label><textarea class="edit" data-type="intro" rows="3">' + (s.scene_intro || '').replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;") + '</textarea></div>';
    document.getElementById("ed-content").innerHTML = introHtml + s.editor;

    var opts = {
        nodes: { font: { size: 18, color: "#fafafa", face: "system-ui, -apple-system, sans-serif" }, shape: "box", color: { background: "#27272a", border: "#38bdf8" }, margin: 20, borderWidth: 2, widthConstraint: { minimum: 160, maximum: 280 } },

    if (nodesDS && edgesDS) {

        setTimeout(function() { if (network) network.fit({ animation: { duration: 300 }, scale: 1.3 }); }, 200);
    } else {
        nodesDS = new vis.DataSet(s.nodes);

            if (params.nodes && params.nodes.length > 0) {

        showParcoursScene(idx);

                sc.SceneIntroduction = this.value;
            } else if (type === "name") {
                sc.Interactions[i].Name = this.value;
            } else if (type === "text") {
                sc.Interactions[i].Text = this.value;
                sc.Interactions[i].Name = this.value.substring(0, 50);
            } else if (type === "response") {
                var r = parseInt(this.dataset.r);
                sc.Interactions[i].Responses[r].Text = this.value;
                sc.Interactions[i].Responses[r].Name = this.value.substring(0, 80);
            }
        });
    });
    document.querySelectorAll("#ed-content .score").forEach(function(el) {
        el.addEventListener("change", function() {
            var i = parseInt(this.dataset.i), r = parseInt(this.dataset.r), skill = this.dataset.skill;
            var v = parseInt(this.value) || 0;
            if (v < -3) v = -3;
            if (v > 3) v = 3;
            sc.Interactions[i].Responses[r][skill] = v;
        });
    });
}

function updateValidation() {
    var errs = [];
    var ch = chaptersData.Chapters[0];
    ch.Scenes.forEach(function(sc) {
        var ids = {};
        sc.Interactions.forEach(function(ia) { ids[ia.Id] = true; });
        sc.Interactions.forEach(function(ia) {
            (ia.Responses || []).forEach(function(r) {
                var nid = r.NextInteractionID;
                if (nid != null && nid !== -1 && !ids[nid]) errs.push("EG-7: NextInteractionID " + nid + " invalide (scène " + sc.Title + ")");
            });
        });
    });
    var div = document.getElementById("validation");
    if (errs.length > 0) {
        div.className = "validation";
        div.textContent = errs.join(" ; ");
    } else {
        div.className = "validation ok";
        div.textContent = "EG-7 : Validation OK — NextInteractionID valides.";
    }
}

document.querySelectorAll(".scene-btn").forEach(function(b) {
    b.addEventListener("click", function() { showScene(parseInt(this.dataset.idx)); });
});

document.querySelectorAll(".mode-btn").forEach(function(b) {
    b.addEventListener("click", function() { setMode(this.dataset.mode); });
});

document.getElementById("parcours-restart").addEventListener("click", function() {
    if (scenesData.length > 0) showParcoursScene(currentSceneIdx);
});

document.getElementById("search").addEventListener("input", function() {
    var q = (this.value || "").toLowerCase();
    document.querySelectorAll(".scene-btn").forEach(function(b) {
        b.style.display = q && b.textContent.toLowerCase().indexOf(q) < 0 ? "none" : "block";
    });
    if (scenesData && scenesData.length > 0) {
        var vis = (this.value || "").toLowerCase();
        if (vis && nodesDS && edgesDS) {
            var nodeIds = nodesDS.getIds();
            nodeIds.forEach(function(nid) {
                var node = nodesDS.get(nid);
                var match = (node.label && node.label.toLowerCase().indexOf(vis) >= 0) || (node.title && node.title.toLowerCase().indexOf(vis) >= 0);
                nodesDS.update({ id: nid, hidden: !match });
            });
        } else if (nodesDS) {
            nodesDS.getIds().forEach(function(nid) { nodesDS.update({ id: nid, hidden: false }); });
        }
    }
});

document.getElementById("save-btn").addEventListener("click", function() {
    var btn = this;
    var statusEl = document.getElementById("save-status");
    btn.disabled = true;
    statusEl.className = "";
    statusEl.textContent = "Enregistrement…";
    fetch("/api/save", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(chaptersData)
    }).then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
    .then(function(result) {
        btn.disabled = false;
        if (result.ok) {
            statusEl.className = "save-ok";
            statusEl.textContent = result.data.message || "Sauvegardé.";
        } else {
            statusEl.className = "save-err";
            statusEl.textContent = result.data.error || "Erreur. Utilisez python app.py pour activer la sauvegarde directe.";
        }
    }).catch(function(err) {
        btn.disabled = false;
        statusEl.className = "save-err";
        statusEl.textContent = "Erreur réseau. Lancez python app.py puis ouvrez http://localhost:8765";
    });
});

document.getElementById("export-btn").addEventListener("click", function() {
    var blob = new Blob([JSON.stringify(chaptersData, null, 2)], { type: "application/json" });
    var a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "Chapitre_" + chapterId + "_modified.json";
    a.click();
});

function init() {
    if (typeof vis === "undefined") {
        container.innerHTML = "<p style='color:#ef4444;padding:20px'>vis-network non chargé. Vérifiez votre connexion et rechargez.</p>";
        return;
    }
    if (scenesData && scenesData.length > 0) {
        try { showScene(0); } catch (err) {
            console.error("showScene:", err);
            container.innerHTML = "<p style='color:#ef4444;padding:20px'>Erreur: " + String(err.message || err) + "</p>";
        }
    } else {
        document.getElementById("ed-content").innerHTML = "<div class='empty'>Aucune donnée (erreur de chargement?).</div>";
    }
}
function runInit() {
    if (typeof vis !== "undefined") { init(); return; }
    var n = 0;
    var t = setInterval(function() {
        n++;
        if (typeof vis !== "undefined") { clearInterval(t); init(); }
        else if (n > 60) { clearInterval(t); container.innerHTML = "<p style='color:#ef4444;padding:20px'>vis-network timeout.</p>"; }
    }, 100);
}
window.addEventListener("load", function() { setTimeout(runInit, 80); });
</script>
</body>
</html>
