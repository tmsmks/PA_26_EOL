'", "next_id": "2", "target_node_id": "C4_S1_I2", "edge_id": "C4_S1_I1_R0_>C4_S1_I2", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 1, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Bonjour Agathe, je viens vite pour la bouche.''", "next_id": "2", "target_node_id": "C4_S1_I2", "edge_id": "C4_S1_I1_R1_>C4_S1_I2", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je avec entrain : Bonjour Agathe, on a de la chance, il y a du soleil aujourd’hui.''", "next_id": "2", "target_node_id": "C4_S1_I2", "edge_id": "C4_S1_I1_R2_>C4_S1_I2", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je d’une voix douce : Bonjour Agathe, je sais qu’il vous est difficile de parler. Je vais m’adapter à votre rythme.''", "next_id": "2", "target_node_id": "C4_S1_I2", "edge_id": "C4_S1_I1_R3_>C4_S1_I2", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C4_S1_I2", "actor": "Agathe", "text": "'Claude'. Agathe lui fait signe de s’asseoir. Elle peine à respirer. 'Merci pour tout'.", "image": "Agathe_grateful.png", "responses": [{"text": "''Je m’assied, lui prend la main.''", "next_id": "5", "target_node_id": "C4_S1_I5", "edge_id": "C4_S1_I2_R0_>C4_S1_I5", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je reste à distance et prépare son matériel.", "next_id": "3", "target_node_id": "C4_S1_I3", "edge_id": "C4_S1_I2_R1_>C4_S1_I3", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je m’assied et en profite pour répondre à un appel téléphonique.''", "next_id": "4", "target_node_id": "C4_S1_I4", "edge_id": "C4_S1_I2_R2_>C4_S1_I4", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je m’assied auprès d’Agathe en lui souriant.''", "next_id": "5", "target_node_id": "C4_S1_I5", "edge_id": "C4_S1_I2_R3_>C4_S1_I5", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C4_S1_I5", "actor": "Agathe", "text": "Claude lui dit : ", "image": "Agathe_neutral.png", "responses": [{"text": "''Vos remerciements me touchent. Qu’est-ce que je peux faire de plus pour vous ?''", "next_id": "26", "target_node_id": "C4_S1_I26", "edge_id": "C4_S1_I5_R0_>C4_S1_I26", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 1, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je suis heureuse de vous avoir rencontrée. Et triste à l’idée de vous voir partir.''", "next_id": "6", "target_node_id": "C4_S1_I6", "edge_id": "C4_S1_I5_R1_>C4_S1_I6", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Mais vous n’avez vraiment pas besoin de me remercier, c’était un plaisir de vous accompagner. Son regard se voila.", "next_id": "6", "target_node_id": "C4_S1_I6", "edge_id": "C4_S1_I5_R2_>C4_S1_I6", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''J’ai fait mon travail. C’est normal.''", "next_id": "6", "target_node_id": "C4_S1_I6", "edge_id": "C4_S1_I5_R3_>C4_S1_I6", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Oh Agathe, vous êtes trop chou !''", "next_id": "6", "target_node_id": "C4_S1_I6", "edge_id": "C4_S1_I5_R4_>C4_S1_I6", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je laisse sortir ses larmes.''", "next_id": "6", "target_node_id": "C4_S1_I6", "edge_id": "C4_S1_I5_R5_>C4_S1_I6", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C4_S1_I26", "actor": "Agathe", "text": "Rien. Vous m’avez respectée. Et je vous en suis reconnaissante.", "image": "Agathe_neutral.png", "responses": [{"text": "...", "next_id": "6", "target_node_id": "C4_S1_I6", "edge_id": "C4_S1_I26_R0_>C4_S1_I6", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je vous entends. Ce que vous vivez est difficile. On peut prendre un moment pour en parler.''", "next_id": "6", "target_node_id": "C4_S1_I6", "edge_id": "C4_S1_I26_R1_>C4_S1_I6", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Il faut coopérer, je ne peux pas perdre plus de temps.''", "next_id": "6", "target_node_id": "C4_S1_I6", "edge_id": "C4_S1_I26_R2_>C4_S1_I6", "RespectAndDignity": 0, "Empathy": 0, "Compassion": -2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C4_S1_I6", "actor": "Agathe", "text": "Agathe lui serre la main. 'Merci Claude.'", "image": "Agathe_grateful.png", "responses": [{"text": "Je regarde Agathe et reste quelques instants à communier avec elle en silence.", "next_id": "8", "target_node_id": "C4_S1_I8", "edge_id": "C4_S1_I6_R0_>C4_S1_I8", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je me dirige vers son matériel pour réaliser le soin de bouche.", "next_id": "8", "target_node_id": "C4_S1_I8", "edge_id": "C4_S1_I6_R1_>C4_S1_I8", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je manifeste son impatience en regardant sa montre.''", "next_id": "7", "target_node_id": "C4_S1_I7", "edge_id": "C4_S1_I6_R2_>C4_S1_I7", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C4_S1_I8", "actor": "Agathe", "text": "Claude rompt le silence.", "image": "Agathe_neutral.png", "responses": [{"text": "''Avez-vous envie que je prenne soin de votre bouche ?''", "next_id": "10", "target_node_id": "C4_S1_I10", "edge_id": "C4_S1_I8_R0_>C4_S1_I10", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "C’est l’heure de faire votre soin de bouche.", "next_id": "10", "target_node_id": "C4_S1_I10", "edge_id": "C4_S1_I8_R1_>C4_S1_I10", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je la regarde de plus près :''Je vois que vous avez la bouche sèche. Est-ce qu’un soin de bouche vous soulagerait ?''", "next_id": "10", "target_node_id": "C4_S1_I10", "edge_id": "C4_S1_I8_R2_>C4_S1_I10", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Le soin de bouche soulage beaucoup Madame Epiney. Je pense que ce serait bien pour vous aussi.", "next_id": "9", "target_node_id": "C4_S1_I9", "edge_id": "C4_S1_I8_R3_>C4_S1_I9", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C4_S1_I10", "actor": "Agathe", "text": "Agathe acquiesce.", "image": "Agathe_neutral.png", "responses": [{"text": "''Je me désinfecte les mains et prépare son matériel : pince, compresse, solution liquide. Elle s’approche de la bouche d’Agathe avec la compresse. Elle commence par les joues, puis la langue en faisant attention à ne pas provoquer de réflexe vomitif.''", "next_id": "14", "target_node_id": "C4_S1_I14", "edge_id": "C4_S1_I10_R0_>C4_S1_I14", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je me désinfecte les mains et met un masque. Elle ne rince pas la compresse et s’approche de la bouche pour commencer le soin.''", "next_id": "11", "target_node_id": "C4_S1_I11", "edge_id": "C4_S1_I10_R1_>C4_S1_I11", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je me désinfecte les mains, entoure son index d’une compresse humide et commence le soin par les joues, puis la langue.''", "next_id": "12", "target_node_id": "C4_S1_I12", "edge_id": "C4_S1_I10_R2_>C4_S1_I12", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je imbibe la compresse d’eau et la presse contre les lèvres d’Agathe afin de l’hydrater.''", "next_id": "13", "target_node_id": "C4_S1_I13", "edge_id": "C4_S1_I10_R3_>C4_S1_I13", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C4_S1_I14", "actor": "Agathe", "text": "Une fois le soin terminé, Claude dit : ", "image": "Agathe_neutral.png", "responses": [{"text": "''Je la regarde : Agathe, je dois maintenant continuer ma tournée et repasserai vers vous tout à l’heure.''", "next_id": "15", "target_node_id": "C4_S1_I15", "edge_id": "C4_S1_I14_R0_>C4_S1_I15", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je range son matériel puis dit : Au revoir Agathe.''", "next_id": "15", "target_node_id": "C4_S1_I15", "edge_id": "C4_S1_I14_R1_>C4_S1_I15", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "J’ai l’air désolé :''Je n’ai pas vu passer le temps. Je dois y aller.''", "next_id": "15", "target_node_id": "C4_S1_I15", "edge_id": "C4_S1_I14_R2_>C4_S1_I15", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Hep hep hep une bonne chose de faite. À tout à l’heure Agathe. Claude sort.", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C4_S1_I15", "actor": "Agathe", "text": "''Non, restez ! Claude ! Restez ! Claude ressent la détresse d’Agathe. En même temps, elle sait que d’autres résidents ont besoin d’elle rapidement.''", "image": "Agathe_angry.png", "responses": [{"text": "Agathe, je ne peux pas rester auprès de vous maintenant. Je reviendrai dès que possible.", "next_id": "16", "target_node_id": "C4_S1_I16", "edge_id": "C4_S1_I15_R0_>C4_S1_I16", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Agathe, je ne peux pas rester auprès de vous maintenant. Est-ce que ça vous convient si je reviens dans une heure ?''", "next_id": "16", "target_node_id": "C4_S1_I16", "edge_id": "C4_S1_I15_R1_>C4_S1_I16", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je la regarde : Agathe, je sens qu’il y a maintenant quelque chose d’important pour vous.''", "next_id": "16", "target_node_id": "C4_S1_I16", "edge_id": "C4_S1_I15_R2_>C4_S1_I16", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je dois partir maintenant mais je vous envoie la stagiaire. Claude sort.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C4_S1_I16", "actor": "Agathe", "text": "Agathe a le souffle court :''J’ai tellement peur !''", "image": "Agathe_anxious.png", "responses": [{"text": "Je la regarde :''Qu’est-ce qu’elle vous dit cette peur ?''", "next_id": "17", "target_node_id": "C4_S1_I17", "edge_id": "C4_S1_I16_R0_>C4_S1_I17", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 1, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Est-ce que ça va mieux, votre angoisse est-elle calmée ?''", "next_id": "17", "target_node_id": "C4_S1_I17", "edge_id": "C4_S1_I16_R1_>C4_S1_I17", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''J’ai peur ?''", "next_id": "17", "target_node_id": "C4_S1_I17", "edge_id": "C4_S1_I16_R2_>C4_S1_I17", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Tout passe Agathe, vous pouvez vous rassurer. Claude sort.", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je m’assied auprès d’elle, lui prend la main et fait quelques profondes respirations avec elle. Agathe se calme.''", "next_id": "17", "target_node_id": "C4_S1_I17", "edge_id": "C4_S1_I16_R4_>C4_S1_I17", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C4_S1_I17", "actor": "Agathe", "text": "''Je veux pas être seule.''", "image": "Agathe_neutral.png", "responses": [{"text": "Je reste près d’elle et dit d’un ton calme :''J’entends votre besoin et nous mettrons tout en œuvre pour y répondre.''", "next_id": "19", "target_node_id": "C4_S1_I19", "edge_id": "C4_S1_I17_R0_>C4_S1_I19", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je veux que j’appelle votre fille ?''", "next_id": "18", "target_node_id": "C4_S1_I18", "edge_id": "C4_S1_I17_R1_>C4_S1_I18", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je me pince les lèvres :''Je vais appeler vos enfants.''", "next_id": "18", "target_node_id": "C4_S1_I18", "edge_id": "C4_S1_I17_R2_>C4_S1_I18", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je pose la main sur le bras d’Agathe : Rassurez-vous Agathe, je suis là.", "next_id": "19", "target_node_id": "C4_S1_I19", "edge_id": "C4_S1_I17_R3_>C4_S1_I19", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je demande à la stagiaire de venir. Claude sort.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C4_S1_I19", "actor": "Agathe", "text": "''J’ai très peur.''", "image": "Agathe_anxious.png", "responses": [{"text": "''De quoi avez-vous peur ?''", "next_id": "22", "target_node_id": "C4_S1_I22", "edge_id": "C4_S1_I19_R0_>C4_S1_I22", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je lui frotte le bras : Tout le monde a peur de la mort.''", "next_id": "20", "target_node_id": "C4_S1_I20", "edge_id": "C4_S1_I19_R1_>C4_S1_I20", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je prends sa main :''C’est normal. Qui n’a pas peur de mourir ?''", "next_id": "20", "target_node_id": "C4_S1_I20", "edge_id": "C4_S1_I19_R2_>C4_S1_I20", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Madame Epiney aussi a peur.", "next_id": "20", "target_node_id": "C4_S1_I20", "edge_id": "C4_S1_I19_R3_>C4_S1_I20", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je dois partir maintenant et reviendrai plus tard.''", "next_id": "23", "target_node_id": "C4_S1_I23", "edge_id": "C4_S1_I19_R4_>C4_S1_I23", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C4_S1_I22", "actor": "Agathe", "text": "''J’ai tellement peur de mourir.''", "image": "Agathe_anxious.png", "responses": [{"text": "''Je lui prend la main et respire avec Agathe jusqu’à ce qu’elle s’apaise puis sort.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je lui frotte le bras : Tout le monde a peur de la mort. Claude sort juste après.''", "next_id": "23", "target_node_id": "C4_S1_I23", "edge_id": "C4_S1_I22_R1_>C4_S1_I23", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je prends sa main :''C’est normal. Qui n’a pas peur de mourir ? Claude reste un instant auprès d’Agathe.''", "next_id": "23", "target_node_id": "C4_S1_I23", "edge_id": "C4_S1_I22_R2_>C4_S1_I23", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Madame Epiney aussi a peur. Claude sort.", "next_id": "23", "target_node_id": "C4_S1_I23", "edge_id": "C4_S1_I22_R3_>C4_S1_I23", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je dois partir maintenant et reviendrai plus tard.''", "next_id": "23", "target_node_id": "C4_S1_I23", "edge_id": "C4_S1_I22_R4_>C4_S1_I23", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C4_S1_I23", "actor": "Agathe", "text": "''Non ! Agathe s’agite dans son lit.''", "image": "Agathe_angry.png", "responses": [{"text": "''Je soupire : Il y a d’autres personnes ici qui ont aussi besoin de moi. Je ne peux pas rester plus longtemps auprès de vous.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "En frottant le bras d’agathe : Agathe, je comprends votre peur. Et je reviendrai vous voir dès que possible.", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je tient toujours la main d’Agathe et respire calmement :''Je reste encore un moment avec vous.''", "next_id": "24", "target_node_id": "C4_S1_I24", "edge_id": "C4_S1_I23_R2_>C4_S1_I24", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 2, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Oui, je dois partir. Elle détourne le regard d’Agathe et s’en va.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C4_S1_I24", "actor": "Agathe", "text": "Claude lui prend la main et respire avec Agathe jusqu’à ce qu’elle s’apaise puis sort", "image": "Agathe_neutral.png", "responses": [{"text": "Sortir", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je comprends. Prenons un moment, et voyons ensemble ce qui est le plus important pour vous.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je fais au plus vite, on verra après.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": -2, "EmotionalRegulation": 0, "CommunicationClarity": -1, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C4_S1_I20", "actor": "Agathe", "text": "''Restez avec moi, s’il vous plaît !''", "image": "Agathe_angry.png", "responses": [{"text": "J’ai l’air désemparé :''Non Agathe, je ne peux pas rester avec vous maintenant. Claude sort.''", "next_id": "23", "target_node_id": "C4_S1_I23", "edge_id": "C4_S1_I20_R0_>C4_S1_I23", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je la regarde : D’accord Agathe, je reste avec vous encore cinq minutes.''", "next_id": "21", "target_node_id": "C4_S1_I21", "edge_id": "C4_S1_I20_R1_>C4_S1_I21", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je l’air dépité : J’aimerais beaucoup rester avec vous mais je ne peux pas. Claude sort.''", "next_id": "23", "target_node_id": "C4_S1_I23", "edge_id": "C4_S1_I20_R2_>C4_S1_I23", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "En ramassant son matériel : Ça va passer, à tout à l’heure Agathe. Claude sort.", "next_id": "23", "target_node_id": "C4_S1_I23", "edge_id": "C4_S1_I20_R3_>C4_S1_I23", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C4_S1_I21", "actor": "Agathe", "text": "Claude lui prend la main et respire avec Agathe jusqu’à ce qu’elle s’apaise puis sort.", "image": "Agathe_neutral.png", "responses": [{"text": "Sortir", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je comprends. Prenons un moment, et voyons ensemble ce qui est le plus important pour vous.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je fais au plus vite, on verra après.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": -2, "EmotionalRegulation": 0, "CommunicationClarity": -1, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C4_S1_I18", "actor": "Agathe", "text": "Surtout pas, je veux mourir seule. Et vous le savez.", "image": "Agathe_neutral.png", "responses": [{"text": "''Je la regarde : Excusez-moi Agathe, j’avais oublié.''", "next_id": "19", "target_node_id": "C4_S1_I19", "edge_id": "C4_S1_I18_R0_>C4_S1_I19", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je avec tact : C’est juste, je suis confuse. Vous voulez mourir seule.''", "next_id": "19", "target_node_id": "C4_S1_I19", "edge_id": "C4_S1_I18_R1_>C4_S1_I19", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''J’ai beaucoup de travail en ce moment et ne peux pas me rappeler de toutes les subtilités des différentes situations. Claude sort.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Il n’y a que les imbéciles qui ne changent pas d’avis. À bon entendeur… Claude sort.", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C4_S1_I11", "actor": "Agathe", "text": "Agathe a un léger mouvement de recul au début du soin.", "image": "Agathe_neutral.png", "responses": [{"text": "Désolée Agathe j’ai oublié d’humidifier la compresse.", "next_id": "14", "target_node_id": "C4_S1_I14", "edge_id": "C4_S1_I11_R0_>C4_S1_I14", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je vous entends. Ce que vous vivez est difficile. On peut prendre un moment pour en parler.''", "next_id": "14", "target_node_id": "C4_S1_I14", "edge_id": "C4_S1_I11_R1_>C4_S1_I14", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Il faut coopérer, je ne peux pas perdre plus de temps.''", "next_id": "14", "target_node_id": "C4_S1_I14", "edge_id": "C4_S1_I11_R2_>C4_S1_I14", "RespectAndDignity": 0, "Empathy": 0, "Compassion": -2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C4_S1_I12", "actor": "Agathe", "text": "Agathe regarde Claude pendant le soin", "image": "Agathe_neutral.png", "responses": [{"text": "...", "next_id": "14", "target_node_id": "C4_S1_I14", "edge_id": "C4_S1_I12_R0_>C4_S1_I14", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je vous entends. Ce que vous vivez est difficile. On peut prendre un moment pour en parler.''", "next_id": "14", "target_node_id": "C4_S1_I14", "edge_id": "C4_S1_I12_R1_>C4_S1_I14", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Il faut coopérer, je ne peux pas perdre plus de temps.''", "next_id": "14", "target_node_id": "C4_S1_I14", "edge_id": "C4_S1_I12_R2_>C4_S1_I14", "RespectAndDignity": 0, "Empathy": 0, "Compassion": -2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C4_S1_I13", "actor": "Agathe", "text": "Agathe écarquille soudainement les yeux.", "image": "Agathe_neutral.png", "responses": [{"text": "...", "next_id": "14", "target_node_id": "C4_S1_I14", "edge_id": "C4_S1_I13_R0_>C4_S1_I14", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je vous entends. Ce que vous vivez est difficile. On peut prendre un moment pour en parler.''", "next_id": "14", "target_node_id": "C4_S1_I14", "edge_id": "C4_S1_I13_R1_>C4_S1_I14", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Il faut coopérer, je ne peux pas perdre plus de temps.''", "next_id": "14", "target_node_id": "C4_S1_I14", "edge_id": "C4_S1_I13_R2_>C4_S1_I14", "RespectAndDignity": 0, "Empathy": 0, "Compassion": -2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C4_S1_I9", "actor": "Agathe", "text": "''Je ne suis pas Madame Épiney.''", "image": "Agathe_neutral.png", "responses": [{"text": "''Pardonnez-moi, voulez-vous que je prenne soin de votre bouche ?''", "next_id": "10", "target_node_id": "C4_S1_I10", "edge_id": "C4_S1_I9_R0_>C4_S1_I10", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''C’était maladroit de ma part. Madame Épiney est aussi en fin de vie et les soins de bouche lui font un grand bien. Voulez-vous que je vous fasse ce soin ?''", "next_id": "10", "target_node_id": "C4_S1_I10", "edge_id": "C4_S1_I9_R1_>C4_S1_I10", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Il n’empêche que ce serait bien pour vous aussi. Je peux ?''", "next_id": "10", "target_node_id": "C4_S1_I10", "edge_id": "C4_S1_I9_R2_>C4_S1_I10", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Oui mais vous êtes les deux en fin de vie. Bon alors je le fais ce soin ou pas ?''", "next_id": "10", "target_node_id": "C4_S1_I10", "edge_id": "C4_S1_I9_R3_>C4_S1_I10", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C4_S1_I7", "actor": "Agathe", "text": "''Vous êtes pressée ?''", "image": "Agathe_confused.png", "responses": [{"text": "''Oui, j’ai encore plusieurs résidents à voir aujourd’hui.''", "next_id": "27", "target_node_id": "C4_S1_I27", "edge_id": "C4_S1_I7_R0_>C4_S1_I27", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Oui mais rassurez-vous je prendrai le temps qu’il faut avec vous.''", "next_id": "27", "target_node_id": "C4_S1_I27", "edge_id": "C4_S1_I7_R1_>C4_S1_I27", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je lui souris :''Non, tout va bien Agathe.''", "next_id": "27", "target_node_id": "C4_S1_I27", "edge_id": "C4_S1_I7_R2_>C4_S1_I27", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Qui va piano va sano et lontano.", "next_id": "27", "target_node_id": "C4_S1_I27", "edge_id": "C4_S1_I7_R3_>C4_S1_I27", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C4_S1_I27", "actor": "Agathe", "text": "Agathe ne répond pas", "image": "Agathe_neutral.png", "responses": [{"text": "...", "next_id": "8", "target_node_id": "C4_S1_I8", "edge_id": "C4_S1_I27_R0_>C4_S1_I8", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je vous entends. Ce que vous vivez est difficile. On peut prendre un moment pour en parler.''", "next_id": "8", "target_node_id": "C4_S1_I8", "edge_id": "C4_S1_I27_R1_>C4_S1_I8", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Il faut coopérer, je ne peux pas perdre plus de temps.''", "next_id": "8", "target_node_id": "C4_S1_I8", "edge_id": "C4_S1_I27_R2_>C4_S1_I8", "RespectAndDignity": 0, "Empathy": 0, "Compassion": -2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C4_S1_I3", "actor": "Agathe", "text": "Agathe lui fait à nouveau signe de s’asseoir.", "image": "Agathe_neutral.png", "responses": [{"text": "''Je m’assied, lui prend la main.''", "next_id": "5", "target_node_id": "C4_S1_I5", "edge_id": "C4_S1_I3_R0_>C4_S1_I5", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je n’ai pas le temps de m’asseoir maintenant Agathe.''", "next_id": "8", "target_node_id": "C4_S1_I8", "edge_id": "C4_S1_I3_R1_>C4_S1_I8", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je ne m’assieds pas auprès de vous mais le cœur y est.''", "next_id": "8", "target_node_id": "C4_S1_I8", "edge_id": "C4_S1_I3_R2_>C4_S1_I8", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Comme j’aimerais m’asseoir auprès de vous. Claude continue à préparer son matériel.", "next_id": "8", "target_node_id": "C4_S1_I8", "edge_id": "C4_S1_I3_R3_>C4_S1_I8", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C4_S1_I4", "actor": "Agathe", "text": "Claude au téléphone : ", "image": "Agathe_neutral.png", "responses": [{"text": "''Oui je suis occupée et te rappelle dans cinq minutes. Claude boucle.''", "next_id": "5", "target_node_id": "C4_S1_I5", "edge_id": "C4_S1_I4_R0_>C4_S1_I5", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Oui, je suis avec Agathe, elle ne va pas bien du tout je te rappelle quand j’ai fini. Claude boucle.''", "next_id": "5", "target_node_id": "C4_S1_I5", "edge_id": "C4_S1_I4_R1_>C4_S1_I5", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Comme je suis contente de t’entendre, j’ai plein de choses à te raconter. Attends deux secondes. À Agathe :''Je reviendrai dans un moment. Claude sort.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 2, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Si tu sentais l’odeur dans cette chambre ! Ça sent la fin. Bon faut que je te laisse. Bisous mon lapin ! Claude boucle.''", "next_id": "25", "target_node_id": "C4_S1_I25", "edge_id": "C4_S1_I4_R3_>C4_S1_I25", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C4_S1_I25", "actor": "Agathe", "text": "Sortez immédiatement", "image": "Agathe_neutral.png", "responses": [{"text": "Sortir", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je vous entends. Ce que vous vivez est difficile. On peut prendre un moment pour en parler.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je respecte ce moment. Je vais vous laisser pour l’instant.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": -2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}], "id_to_parcours": {"1": {"node_id": "C4_S1_I1", "actor": "Agathe", "text": "Elle frappe à la porte, n’entend pas de réponse, frappe à nouveau, puis entre après avoir attendu un instant.", "image": "Agathe_neutral.png", "responses": [{"text": "Je suis souriante :''Bonjour Agathe, comment s’est passée votre nuit ?''", "next_id": "2", "target_node_id": "C4_S1_I2", "edge_id": "C4_S1_I1_R0_>C4_S1_I2", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 1, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Bonjour Agathe, je viens vite pour la bouche.''", "next_id": "2", "target_node_id": "C4_S1_I2", "edge_id": "C4_S1_I1_R1_>C4_S1_I2", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je avec entrain : Bonjour Agathe, on a de la chance, il y a du soleil aujourd’hui.''", "next_id": "2", "target_node_id": "C4_S1_I2", "edge_id": "C4_S1_I1_R2_>C4_S1_I2", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je d’une voix douce : Bonjour Agathe, je sais qu’il vous est difficile de parler. Je vais m’adapter à votre rythme.''", "next_id": "2", "target_node_id": "C4_S1_I2", "edge_id": "C4_S1_I1_R3_>C4_S1_I2", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "2": {"node_id": "C4_S1_I2", "actor": "Agathe", "text": "'Claude'. Agathe lui fait signe de s’asseoir. Elle peine à respirer. 'Merci pour tout'.", "image": "Agathe_grateful.png", "responses": [{"text": "''Je m’assied, lui prend la main.''", "next_id": "5", "target_node_id": "C4_S1_I5", "edge_id": "C4_S1_I2_R0_>C4_S1_I5", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je reste à distance et prépare son matériel.", "next_id": "3", "target_node_id": "C4_S1_I3", "edge_id": "C4_S1_I2_R1_>C4_S1_I3", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je m’assied et en profite pour répondre à un appel téléphonique.''", "next_id": "4", "target_node_id": "C4_S1_I4", "edge_id": "C4_S1_I2_R2_>C4_S1_I4", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je m’assied auprès d’Agathe en lui souriant.''", "next_id": "5", "target_node_id": "C4_S1_I5", "edge_id": "C4_S1_I2_R3_>C4_S1_I5", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "5": {"node_id": "C4_S1_I5", "actor": "Agathe", "text": "Claude lui dit : ", "image": "Agathe_neutral.png", "responses": [{"text": "''Vos remerciements me touchent. Qu’est-ce que je peux faire de plus pour vous ?''", "next_id": "26", "target_node_id": "C4_S1_I26", "edge_id": "C4_S1_I5_R0_>C4_S1_I26", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 1, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je suis heureuse de vous avoir rencontrée. Et triste à l’idée de vous voir partir.''", "next_id": "6", "target_node_id": "C4_S1_I6", "edge_id": "C4_S1_I5_R1_>C4_S1_I6", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Mais vous n’avez vraiment pas besoin de me remercier, c’était un plaisir de vous accompagner. Son regard se voila.", "next_id": "6", "target_node_id": "C4_S1_I6", "edge_id": "C4_S1_I5_R2_>C4_S1_I6", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''J’ai fait mon travail. C’est normal.''", "next_id": "6", "target_node_id": "C4_S1_I6", "edge_id": "C4_S1_I5_R3_>C4_S1_I6", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Oh Agathe, vous êtes trop chou !''", "next_id": "6", "target_node_id": "C4_S1_I6", "edge_id": "C4_S1_I5_R4_>C4_S1_I6", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je laisse sortir ses larmes.''", "next_id": "6", "target_node_id": "C4_S1_I6", "edge_id": "C4_S1_I5_R5_>C4_S1_I6", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "26": {"node_id": "C4_S1_I26", "actor": "Agathe", "text": "Rien. Vous m’avez respectée. Et je vous en suis reconnaissante.", "image": "Agathe_neutral.png", "responses": [{"text": "...", "next_id": "6", "target_node_id": "C4_S1_I6", "edge_id": "C4_S1_I26_R0_>C4_S1_I6", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je vous entends. Ce que vous vivez est difficile. On peut prendre un moment pour en parler.''", "next_id": "6", "target_node_id": "C4_S1_I6", "edge_id": "C4_S1_I26_R1_>C4_S1_I6", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Il faut coopérer, je ne peux pas perdre plus de temps.''", "next_id": "6", "target_node_id": "C4_S1_I6", "edge_id": "C4_S1_I26_R2_>C4_S1_I6", "RespectAndDignity": 0, "Empathy": 0, "Compassion": -2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "6": {"node_id": "C4_S1_I6", "actor": "Agathe", "text": "Agathe lui serre la main. 'Merci Claude.'", "image": "Agathe_grateful.png", "responses": [{"text": "Je regarde Agathe et reste quelques instants à communier avec elle en silence.", "next_id": "8", "target_node_id": "C4_S1_I8", "edge_id": "C4_S1_I6_R0_>C4_S1_I8", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je me dirige vers son matériel pour réaliser le soin de bouche.", "next_id": "8", "target_node_id": "C4_S1_I8", "edge_id": "C4_S1_I6_R1_>C4_S1_I8", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je manifeste son impatience en regardant sa montre.''", "next_id": "7", "target_node_id": "C4_S1_I7", "edge_id": "C4_S1_I6_R2_>C4_S1_I7", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "8": {"node_id": "C4_S1_I8", "actor": "Agathe", "text": "Claude rompt le silence.", "image": "Agathe_neutral.png", "responses": [{"text": "''Avez-vous envie que je prenne soin de votre bouche ?''", "next_id": "10", "target_node_id": "C4_S1_I10", "edge_id": "C4_S1_I8_R0_>C4_S1_I10", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "C’est l’heure de faire votre soin de bouche.", "next_id": "10", "target_node_id": "C4_S1_I10", "edge_id": "C4_S1_I8_R1_>C4_S1_I10", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je la regarde de plus près :''Je vois que vous avez la bouche sèche. Est-ce qu’un soin de bouche vous soulagerait ?''", "next_id": "10", "target_node_id": "C4_S1_I10", "edge_id": "C4_S1_I8_R2_>C4_S1_I10", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Le soin de bouche soulage beaucoup Madame Epiney. Je pense que ce serait bien pour vous aussi.", "next_id": "9", "target_node_id": "C4_S1_I9", "edge_id": "C4_S1_I8_R3_>C4_S1_I9", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "10": {"node_id": "C4_S1_I10", "actor": "Agathe", "text": "Agathe acquiesce.", "image": "Agathe_neutral.png", "responses": [{"text": "''Je me désinfecte les mains et prépare son matériel : pince, compresse, solution liquide. Elle s’approche de la bouche d’Agathe avec la compresse. Elle commence par les joues, puis la langue en faisant attention à ne pas provoquer de réflexe vomitif.''", "next_id": "14", "target_node_id": "C4_S1_I14", "edge_id": "C4_S1_I10_R0_>C4_S1_I14", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je me désinfecte les mains et met un masque. Elle ne rince pas la compresse et s’approche de la bouche pour commencer le soin.''", "next_id": "11", "target_node_id": "C4_S1_I11", "edge_id": "C4_S1_I10_R1_>C4_S1_I11", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je me désinfecte les mains, entoure son index d’une compresse humide et commence le soin par les joues, puis la langue.''", "next_id": "12", "target_node_id": "C4_S1_I12", "edge_id": "C4_S1_I10_R2_>C4_S1_I12", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je imbibe la compresse d’eau et la presse contre les lèvres d’Agathe afin de l’hydrater.''", "next_id": "13", "target_node_id": "C4_S1_I13", "edge_id": "C4_S1_I10_R3_>C4_S1_I13", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "14": {"node_id": "C4_S1_I14", "actor": "Agathe", "text": "Une fois le soin terminé, Claude dit : ", "image": "Agathe_neutral.png", "responses": [{"text": "''Je la regarde : Agathe, je dois maintenant continuer ma tournée et repasserai vers vous tout à l’heure.''", "next_id": "15", "target_node_id": "C4_S1_I15", "edge_id": "C4_S1_I14_R0_>C4_S1_I15", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je range son matériel puis dit : Au revoir Agathe.''", "next_id": "15", "target_node_id": "C4_S1_I15", "edge_id": "C4_S1_I14_R1_>C4_S1_I15", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "J’ai l’air désolé :''Je n’ai pas vu passer le temps. Je dois y aller.''", "next_id": "15", "target_node_id": "C4_S1_I15", "edge_id": "C4_S1_I14_R2_>C4_S1_I15", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Hep hep hep une bonne chose de faite. À tout à l’heure Agathe. Claude sort.", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "15": {"node_id": "C4_S1_I15", "actor": "Agathe", "text": "''Non, restez ! Claude ! Restez ! Claude ressent la détresse d’Agathe. En même temps, elle sait que d’autres résidents ont besoin d’elle rapidement.''", "image": "Agathe_angry.png", "responses": [{"text": "Agathe, je ne peux pas rester auprès de vous maintenant. Je reviendrai dès que possible.", "next_id": "16", "target_node_id": "C4_S1_I16", "edge_id": "C4_S1_I15_R0_>C4_S1_I16", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Agathe, je ne peux pas rester auprès de vous maintenant. Est-ce que ça vous convient si je reviens dans une heure ?''", "next_id": "16", "target_node_id": "C4_S1_I16", "edge_id": "C4_S1_I15_R1_>C4_S1_I16", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je la regarde : Agathe, je sens qu’il y a maintenant quelque chose d’important pour vous.''", "next_id": "16", "target_node_id": "C4_S1_I16", "edge_id": "C4_S1_I15_R2_>C4_S1_I16", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je dois partir maintenant mais je vous envoie la stagiaire. Claude sort.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "16": {"node_id": "C4_S1_I16", "actor": "Agathe", "text": "Agathe a le souffle court :''J’ai tellement peur !''", "image": "Agathe_anxious.png", "responses": [{"text": "Je la regarde :''Qu’est-ce qu’elle vous dit cette peur ?''", "next_id": "17", "target_node_id": "C4_S1_I17", "edge_id": "C4_S1_I16_R0_>C4_S1_I17", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 1, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Est-ce que ça va mieux, votre angoisse est-elle calmée ?''", "next_id": "17", "target_node_id": "C4_S1_I17", "edge_id": "C4_S1_I16_R1_>C4_S1_I17", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''J’ai peur ?''", "next_id": "17", "target_node_id": "C4_S1_I17", "edge_id": "C4_S1_I16_R2_>C4_S1_I17", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Tout passe Agathe, vous pouvez vous rassurer. Claude sort.", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je m’assied auprès d’elle, lui prend la main et fait quelques profondes respirations avec elle. Agathe se calme.''", "next_id": "17", "target_node_id": "C4_S1_I17", "edge_id": "C4_S1_I16_R4_>C4_S1_I17", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "17": {"node_id": "C4_S1_I17", "actor": "Agathe", "text": "''Je veux pas être seule.''", "image": "Agathe_neutral.png", "responses": [{"text": "Je reste près d’elle et dit d’un ton calme :''J’entends votre besoin et nous mettrons tout en œuvre pour y répondre.''", "next_id": "19", "target_node_id": "C4_S1_I19", "edge_id": "C4_S1_I17_R0_>C4_S1_I19", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je veux que j’appelle votre fille ?''", "next_id": "18", "target_node_id": "C4_S1_I18", "edge_id": "C4_S1_I17_R1_>C4_S1_I18", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je me pince les lèvres :''Je vais appeler vos enfants.''", "next_id": "18", "target_node_id": "C4_S1_I18", "edge_id": "C4_S1_I17_R2_>C4_S1_I18", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je pose la main sur le bras d’Agathe : Rassurez-vous Agathe, je suis là.", "next_id": "19", "target_node_id": "C4_S1_I19", "edge_id": "C4_S1_I17_R3_>C4_S1_I19", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je demande à la stagiaire de venir. Claude sort.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "19": {"node_id": "C4_S1_I19", "actor": "Agathe", "text": "''J’ai très peur.''", "image": "Agathe_anxious.png", "responses": [{"text": "''De quoi avez-vous peur ?''", "next_id": "22", "target_node_id": "C4_S1_I22", "edge_id": "C4_S1_I19_R0_>C4_S1_I22", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je lui frotte le bras : Tout le monde a peur de la mort.''", "next_id": "20", "target_node_id": "C4_S1_I20", "edge_id": "C4_S1_I19_R1_>C4_S1_I20", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je prends sa main :''C’est normal. Qui n’a pas peur de mourir ?''", "next_id": "20", "target_node_id": "C4_S1_I20", "edge_id": "C4_S1_I19_R2_>C4_S1_I20", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Madame Epiney aussi a peur.", "next_id": "20", "target_node_id": "C4_S1_I20", "edge_id": "C4_S1_I19_R3_>C4_S1_I20", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je dois partir maintenant et reviendrai plus tard.''", "next_id": "23", "target_node_id": "C4_S1_I23", "edge_id": "C4_S1_I19_R4_>C4_S1_I23", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "22": {"node_id": "C4_S1_I22", "actor": "Agathe", "text": "''J’ai tellement peur de mourir.''", "image": "Agathe_anxious.png", "responses": [{"text": "''Je lui prend la main et respire avec Agathe jusqu’à ce qu’elle s’apaise puis sort.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je lui frotte le bras : Tout le monde a peur de la mort. Claude sort juste après.''", "next_id": "23", "target_node_id": "C4_S1_I23", "edge_id": "C4_S1_I22_R1_>C4_S1_I23", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je prends sa main :''C’est normal. Qui n’a pas peur de mourir ? Claude reste un instant auprès d’Agathe.''", "next_id": "23", "target_node_id": "C4_S1_I23", "edge_id": "C4_S1_I22_R2_>C4_S1_I23", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Madame Epiney aussi a peur. Claude sort.", "next_id": "23", "target_node_id": "C4_S1_I23", "edge_id": "C4_S1_I22_R3_>C4_S1_I23", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je dois partir maintenant et reviendrai plus tard.''", "next_id": "23", "target_node_id": "C4_S1_I23", "edge_id": "C4_S1_I22_R4_>C4_S1_I23", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "23": {"node_id": "C4_S1_I23", "actor": "Agathe", "text": "''Non ! Agathe s’agite dans son lit.''", "image": "Agathe_angry.png", "responses": [{"text": "''Je soupire : Il y a d’autres personnes ici qui ont aussi besoin de moi. Je ne peux pas rester plus longtemps auprès de vous.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "En frottant le bras d’agathe : Agathe, je comprends votre peur. Et je reviendrai vous voir dès que possible.", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je tient toujours la main d’Agathe et respire calmement :''Je reste encore un moment avec vous.''", "next_id": "24", "target_node_id": "C4_S1_I24", "edge_id": "C4_S1_I23_R2_>C4_S1_I24", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 2, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Oui, je dois partir. Elle détourne le regard d’Agathe et s’en va.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "24": {"node_id": "C4_S1_I24", "actor": "Agathe", "text": "Claude lui prend la main et respire avec Agathe jusqu’à ce qu’elle s’apaise puis sort", "image": "Agathe_neutral.png", "responses": [{"text": "Sortir", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je comprends. Prenons un moment, et voyons ensemble ce qui est le plus important pour vous.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je fais au plus vite, on verra après.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": -2, "EmotionalRegulation": 0, "CommunicationClarity": -1, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "20": {"node_id": "C4_S1_I20", "actor": "Agathe", "text": "''Restez avec moi, s’il vous plaît !''", "image": "Agathe_angry.png", "responses": [{"text": "J’ai l’air désemparé :''Non Agathe, je ne peux pas rester avec vous maintenant. Claude sort.''", "next_id": "23", "target_node_id": "C4_S1_I23", "edge_id": "C4_S1_I20_R0_>C4_S1_I23", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je la regarde : D’accord Agathe, je reste avec vous encore cinq minutes.''", "next_id": "21", "target_node_id": "C4_S1_I21", "edge_id": "C4_S1_I20_R1_>C4_S1_I21", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je l’air dépité : J’aimerais beaucoup rester avec vous mais je ne peux pas. Claude sort.''", "next_id": "23", "target_node_id": "C4_S1_I23", "edge_id": "C4_S1_I20_R2_>C4_S1_I23", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "En ramassant son matériel : Ça va passer, à tout à l’heure Agathe. Claude sort.", "next_id": "23", "target_node_id": "C4_S1_I23", "edge_id": "C4_S1_I20_R3_>C4_S1_I23", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "21": {"node_id": "C4_S1_I21", "actor": "Agathe", "text": "Claude lui prend la main et respire avec Agathe jusqu’à ce qu’elle s’apaise puis sort.", "image": "Agathe_neutral.png", "responses": [{"text": "Sortir", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je comprends. Prenons un moment, et voyons ensemble ce qui est le plus important pour vous.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je fais au plus vite, on verra après.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": -2, "EmotionalRegulation": 0, "CommunicationClarity": -1, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "18": {"node_id": "C4_S1_I18", "actor": "Agathe", "text": "Surtout pas, je veux mourir seule. Et vous le savez.", "image": "Agathe_neutral.png", "responses": [{"text": "''Je la regarde : Excusez-moi Agathe, j’avais oublié.''", "next_id": "19", "target_node_id": "C4_S1_I19", "edge_id": "C4_S1_I18_R0_>C4_S1_I19", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je avec tact : C’est juste, je suis confuse. Vous voulez mourir seule.''", "next_id": "19", "target_node_id": "C4_S1_I19", "edge_id": "C4_S1_I18_R1_>C4_S1_I19", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''J’ai beaucoup de travail en ce moment et ne peux pas me rappeler de toutes les subtilités des différentes situations. Claude sort.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Il n’y a que les imbéciles qui ne changent pas d’avis. À bon entendeur… Claude sort.", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "11": {"node_id": "C4_S1_I11", "actor": "Agathe", "text": "Agathe a un léger mouvement de recul au début du soin.", "image": "Agathe_neutral.png", "responses": [{"text": "Désolée Agathe j’ai oublié d’humidifier la compresse.", "next_id": "14", "target_node_id": "C4_S1_I14", "edge_id": "C4_S1_I11_R0_>C4_S1_I14", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je vous entends. Ce que vous vivez est difficile. On peut prendre un moment pour en parler.''", "next_id": "14", "target_node_id": "C4_S1_I14", "edge_id": "C4_S1_I11_R1_>C4_S1_I14", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Il faut coopérer, je ne peux pas perdre plus de temps.''", "next_id": "14", "target_node_id": "C4_S1_I14", "edge_id": "C4_S1_I11_R2_>C4_S1_I14", "RespectAndDignity": 0, "Empathy": 0, "Compassion": -2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "12": {"node_id": "C4_S1_I12", "actor": "Agathe", "text": "Agathe regarde Claude pendant le soin", "image": "Agathe_neutral.png", "responses": [{"text": "...", "next_id": "14", "target_node_id": "C4_S1_I14", "edge_id": "C4_S1_I12_R0_>C4_S1_I14", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je vous entends. Ce que vous vivez est difficile. On peut prendre un moment pour en parler.''", "next_id": "14", "target_node_id": "C4_S1_I14", "edge_id": "C4_S1_I12_R1_>C4_S1_I14", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Il faut coopérer, je ne peux pas perdre plus de temps.''", "next_id": "14", "target_node_id": "C4_S1_I14", "edge_id": "C4_S1_I12_R2_>C4_S1_I14", "RespectAndDignity": 0, "Empathy": 0, "Compassion": -2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "13": {"node_id": "C4_S1_I13", "actor": "Agathe", "text": "Agathe écarquille soudainement les yeux.", "image": "Agathe_neutral.png", "responses": [{"text": "...", "next_id": "14", "target_node_id": "C4_S1_I14", "edge_id": "C4_S1_I13_R0_>C4_S1_I14", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je vous entends. Ce que vous vivez est difficile. On peut prendre un moment pour en parler.''", "next_id": "14", "target_node_id": "C4_S1_I14", "edge_id": "C4_S1_I13_R1_>C4_S1_I14", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Il faut coopérer, je ne peux pas perdre plus de temps.''", "next_id": "14", "target_node_id": "C4_S1_I14", "edge_id": "C4_S1_I13_R2_>C4_S1_I14", "RespectAndDignity": 0, "Empathy": 0, "Compassion": -2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "9": {"node_id": "C4_S1_I9", "actor": "Agathe", "text": "''Je ne suis pas Madame Épiney.''", "image": "Agathe_neutral.png", "responses": [{"text": "''Pardonnez-moi, voulez-vous que je prenne soin de votre bouche ?''", "next_id": "10", "target_node_id": "C4_S1_I10", "edge_id": "C4_S1_I9_R0_>C4_S1_I10", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''C’était maladroit de ma part. Madame Épiney est aussi en fin de vie et les soins de bouche lui font un grand bien. Voulez-vous que je vous fasse ce soin ?''", "next_id": "10", "target_node_id": "C4_S1_I10", "edge_id": "C4_S1_I9_R1_>C4_S1_I10", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Il n’empêche que ce serait bien pour vous aussi. Je peux ?''", "next_id": "10", "target_node_id": "C4_S1_I10", "edge_id": "C4_S1_I9_R2_>C4_S1_I10", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Oui mais vous êtes les deux en fin de vie. Bon alors je le fais ce soin ou pas ?''", "next_id": "10", "target_node_id": "C4_S1_I10", "edge_id": "C4_S1_I9_R3_>C4_S1_I10", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "7": {"node_id": "C4_S1_I7", "actor": "Agathe", "text": "''Vous êtes pressée ?''", "image": "Agathe_confused.png", "responses": [{"text": "''Oui, j’ai encore plusieurs résidents à voir aujourd’hui.''", "next_id": "27", "target_node_id": "C4_S1_I27", "edge_id": "C4_S1_I7_R0_>C4_S1_I27", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Oui mais rassurez-vous je prendrai le temps qu’il faut avec vous.''", "next_id": "27", "target_node_id": "C4_S1_I27", "edge_id": "C4_S1_I7_R1_>C4_S1_I27", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je lui souris :''Non, tout va bien Agathe.''", "next_id": "27", "target_node_id": "C4_S1_I27", "edge_id": "C4_S1_I7_R2_>C4_S1_I27", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Qui va piano va sano et lontano.", "next_id": "27", "target_node_id": "C4_S1_I27", "edge_id": "C4_S1_I7_R3_>C4_S1_I27", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "27": {"node_id": "C4_S1_I27", "actor": "Agathe", "text": "Agathe ne répond pas", "image": "Agathe_neutral.png", "responses": [{"text": "...", "next_id": "8", "target_node_id": "C4_S1_I8", "edge_id": "C4_S1_I27_R0_>C4_S1_I8", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je vous entends. Ce que vous vivez est difficile. On peut prendre un moment pour en parler.''", "next_id": "8", "target_node_id": "C4_S1_I8", "edge_id": "C4_S1_I27_R1_>C4_S1_I8", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Il faut coopérer, je ne peux pas perdre plus de temps.''", "next_id": "8", "target_node_id": "C4_S1_I8", "edge_id": "C4_S1_I27_R2_>C4_S1_I8", "RespectAndDignity": 0, "Empathy": 0, "Compassion": -2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "3": {"node_id": "C4_S1_I3", "actor": "Agathe", "text": "Agathe lui fait à nouveau signe de s’asseoir.", "image": "Agathe_neutral.png", "responses": [{"text": "''Je m’assied, lui prend la main.''", "next_id": "5", "target_node_id": "C4_S1_I5", "edge_id": "C4_S1_I3_R0_>C4_S1_I5", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je n’ai pas le temps de m’asseoir maintenant Agathe.''", "next_id": "8", "target_node_id": "C4_S1_I8", "edge_id": "C4_S1_I3_R1_>C4_S1_I8", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je ne m’assieds pas auprès de vous mais le cœur y est.''", "next_id": "8", "target_node_id": "C4_S1_I8", "edge_id": "C4_S1_I3_R2_>C4_S1_I8", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Comme j’aimerais m’asseoir auprès de vous. Claude continue à préparer son matériel.", "next_id": "8", "target_node_id": "C4_S1_I8", "edge_id": "C4_S1_I3_R3_>C4_S1_I8", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "4": {"node_id": "C4_S1_I4", "actor": "Agathe", "text": "Claude au téléphone : ", "image": "Agathe_neutral.png", "responses": [{"text": "''Oui je suis occupée et te rappelle dans cinq minutes. Claude boucle.''", "next_id": "5", "target_node_id": "C4_S1_I5", "edge_id": "C4_S1_I4_R0_>C4_S1_I5", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Oui, je suis avec Agathe, elle ne va pas bien du tout je te rappelle quand j’ai fini. Claude boucle.''", "next_id": "5", "target_node_id": "C4_S1_I5", "edge_id": "C4_S1_I4_R1_>C4_S1_I5", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Comme je suis contente de t’entendre, j’ai plein de choses à te raconter. Attends deux secondes. À Agathe :''Je reviendrai dans un moment. Claude sort.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 2, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Si tu sentais l’odeur dans cette chambre ! Ça sent la fin. Bon faut que je te laisse. Bisous mon lapin ! Claude boucle.''", "next_id": "25", "target_node_id": "C4_S1_I25", "edge_id": "C4_S1_I4_R3_>C4_S1_I25", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "25": {"node_id": "C4_S1_I25", "actor": "Agathe", "text": "Sortez immédiatement", "image": "Agathe_neutral.png", "responses": [{"text": "Sortir", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je vous entends. Ce que vous vivez est difficile. On peut prendre un moment pour en parler.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je respecte ce moment. Je vais vous laisser pour l’instant.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": -2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}}}, {"title": "Conflit intérieur", "scene_id": 2, "scene_intro": "''Claude est en proie au doute. A-t-elle pris la bonne décision en quittant Agathe ? Elle est tiraillée entre son devoir d’aide et les contraintes organisationnelles. Elle s’assied sur une chaise dans le couloir, sa tête dans ses mains. Au même moment, Pascal passe. 'Claude, ça va ? Je te rappelle que tu as une journée très chargée aujourd’hui. Que se passe-t-il ?'''", "nodes": [{"id": "C4_S2_I1", "label": "1) J’ai fait le soin de bouche d’Agat…", "title": "[Claude] ''J’ai fait le soin de bouche d’Agathe. Elle a peur. Elle sent qu’elle va partir et veut que je reste auprès d’elle.''"}, {"id": "C4_S2_I2", "label": "2) Ce n’est pas possible maintenant, …", "title": "[Pascal] ''Ce n’est pas possible maintenant, Claude ! Tu le sais bien.''"}, {"id": "C4_S2_I3", "label": "2.a) Je
