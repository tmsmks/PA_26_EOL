    scenesData = [{"title": "Le deuil", "scene_id": 1, "scene_intro": "Trois jours plus tard, selon ses volontés, Agathe est décédée seule dans sa chambre. Il est très difficile pour Claude d’accepter sa mort. Elle a, en peu de temps, noué des liens avec Agathe et s’est beaucoup investie dans cette relation. Voici venu maintenant le temps du deuil. Un deuil à faire rapidement : un nouveau résident entrera demain en chambre 14… Claude se rend dans la chambre d’Agathe. Elle y rencontre Margot, venue prendre les affaires de sa maman. Margot est en larmes et cesse de ranger la chambre d’Agathe. Elle a les yeux rouges et regarde Claude : ", "nodes": [{"id": "C5_S1_I1", "label": "1. Pourquoi vous ne m’avez pas appelé…", "title": "[Margot] ''Pourquoi vous ne m’avez pas appelée ? Je n’ai pas pu dire au revoir à ma maman ! Vous vous rendez compte ?''"}, {"id": "C5_S1_I2", "label": "2. Margot semble abasourdie", "title": "[Margot] Margot semble abasourdie :''Vous n’avez vraiment aucun tact. Ça vous arrive de vous mettre à la place des autres ? J’avais encore beaucoup de choses à lui dire.''"}, {"id": "C5_S1_I3", "label": "2.a Margot outrée dit", "title": "[Margot] Margot outrée dit :''Non mais ! Figurez-vous que je viens de perdre ma maman et que je n’ai rien pu lui dire avant de partir.''"}, {"id": "C5_S1_I4", "label": "2.b. M : Que pourriez-vous", "title": "[Margot] ''Que pourriez-vous m’expliquer ? Cette situation est juste inacceptable !''"}, {"id": "C5_S1_I5", "label": "3. M :''Vous ne comprenez''", "title": "[Margot] ''Vous ne comprenez rien du tout ! Comment je vais pouvoir faire mon deuil maintenant ? La dernière fois que je l’ai vue, elle était vivante, heureuse. Et là ! Je n’ai pas pu lui dire adieu, lui dire que je l’aimais.''"}, {"id": "C5_S1_I6", "label": "3.a M : Respecter ma maman !", "title": "[Margot] ''Respecter ma maman ! En ne me permettant pas que je lui dise adieu… que je l’aimais !''"}, {"id": "C5_S1_I7", "label": "3.b Margot la regarde", "title": "[Margot] Margot la regarde les yeux remplis de larmes :''Difficile ?... Vous êtes loin du compte…''"}, {"id": "C5_S1_I8", "label": "4. M elle soupire :", "title": "[Margot] Margot ramasse un châle d’Agathe en soupirant :''Il est trop tard maintenant ! C’est avant qu’il fallait vous soucier de mes besoins ! Elle est morte toute seule. Margot pleure à nouveau.''"}, {"id": "C5_S1_I9", "label": "5. M : Pourquoi vous ne m’avez pas ap…", "title": "[Margot] ''Pourquoi vous ne m’avez pas appelée ?''"}, {"id": "C5_S1_I10", "label": "5a. Claude sort laissant Margot", "title": "[Margot] Claude sort laissant Margot rassembler les affaires de sa maman avec peine."}, {"id": "C5_S1_I11", "label": "6. M :''Je suis très bien''", "title": "[Margot] ''Je suis très bien debout et à ce que j’ai cru comprendre vous êtes débordée et n’avez que peu de temps à m’accorder.''"}, {"id": "C5_S1_I12", "label": "6.a M : Que voulez-vous dire par là ?", "title": "[Margot] ''Que voulez-vous dire par là ?''"}, {"id": "C5_S1_I13", "label": "6.b M :''Je ne crois pas que ça m’aid…", "title": "[Margot] ''Je ne crois pas que ça m’aide… je veux simplement que vous répondiez à ma question.''"}, {"id": "C5_S1_I14", "label": "6.c M :''Je n’sais pas…''", "title": "[Margot] ''Je n’sais pas… mais elle n’aurait pas voulu me voir si triste.''"}, {"id": "C5_S1_I15", "label": "7. M : Allez-y, je vous écoute.", "title": "[Margot] Allez-y, je vous écoute."}, {"id": "C5_S1_I16", "label": "7.a M : C’est-à-dire ?", "title": "[Margot] ''C’est-à-dire ?''"}, {"id": "C5_S1_I17", "label": "7.b M : Mais enfin !...", "title": "[Margot] ''Mais enfin !... Je crois que j’ai le droit de savoir comment se sont passés les derniers instants de la vie de ma maman.''"}, {"id": "C5_S1_I18", "label": "7.c M : Au fond vous le saviez qu’il …", "title": "[Margot] Au fond vous le savez qu’il aurait fallu m’appeler."}, {"id": "C5_S1_I19", "label": "8. M : Et vous avez accepté ?", "title": "[Margot] ''Et vous avez accepté ?''"}, {"id": "C5_S1_I20", "label": "8.a M : Comment osez-vous me", "title": "[Margot] ''Comment osez-vous me culpabiliser ainsi. J’étais là il y a 2 semaines, maman paraissait un peu fatiguée mais pas mourante. Vous êtes horrible !''"}, {"id": "C5_S1_I21", "label": "8.b M :''Vous voulez dire''", "title": "[Margot] ''Vous voulez dire qu’elle ne souhaitait pas que je sois au courant de son état ?... Et vous avez accepté ?''"}, {"id": "C5_S1_I22", "label": "8.c M : Mais pourquoi ?...", "title": "[Margot] ''Mais pourquoi ?... ce que vous avez fait est lourd de conséquences !''"}, {"id": "C5_S1_I23", "label": "9. M : Alors Vous avez accepté ?", "title": "[Margot] ''Alors Vous avez accepté ?''"}, {"id": "C5_S1_I24", "label": "9.a Margot répète en hochant la tête", "title": "[Margot] Margot répète en hochant la tête :''Vous avez accepté ce choix ?... Ma mère refusait toujours l’aide des autres même si au fond elle l’aurait bien accepté. Margot est en pleurs.''"}, {"id": "C5_S1_I25", "label": "9.b M : je suis désolée Claude", "title": "[Margot] ''Je suis désolée Claude mais c’était à moi d’être présente auprès d’elle, pas les membres de votre équipe !''"}, {"id": "C5_S1_I26", "label": "10. M dans un soupire :", "title": "[Margot] Margot dans un soupire :''Pourquoi vous ne m’avez pas appelée ?''"}, {"id": "C5_S1_I27", "label": "10.a M : Pourquoi vous ne m’avez", "title": "[Margot] ''Pourquoi vous ne m’avez donc pas appelée ? … Pourtant je vous ai dit que ce n’était pas par gaieté de cœur que je l’avais placé ici mais parce que je n’avais pas le choix !''"}, {"id": "C5_S1_I28", "label": "11. M la tête baissée répond", "title": "[Margot] Margot la tête baissée répond à voix basse :''Je n’ai pas pu lui dire adieu. Elle pleure.''"}, {"id": "C5_S1_I29", "label": "11.a M semble abasourdie :", "title": "[Margot] Margot semble abasourdie :''Je n’ai rien pu lui dire, même pas adieu. Des larmes coulent sur ses joues''"}, {"id": "C5_S1_I30", "label": "12. M :''Je vous l’ai déjà dit.''", "title": "[Margot] ''Je vous l’ai déjà dit. Je n’ai pas pu dire adieu à ma maman. Laissez-moi seule, je vous prie.''"}, {"id": "C5_S1_I31", "label": "12.a Margot répond en pleurant", "title": "[Margot] Margot répond en pleurant :''Non je ne crois pas… à présent laissez-moi seule, je vous prie.''"}], "edges": [{"id": "C5_S1_I1_R0_>C5_S1_I2", "from": "C5_S1_I1", "to": "C5_S1_I2", "smooth": {"type": "curvedCW", "roundness": -0.77}}, {"id": "C5_S1_I1_R1_>C5_S1_I2", "from": "C5_S1_I1", "to": "C5_S1_I2", "smooth": {"type": "curvedCW", "roundness": -0.5133333333333334}}, {"id": "C5_S1_I1_R2_>C5_S1_I3", "from": "C5_S1_I1", "to": "C5_S1_I3", "smooth": {"type": "curvedCW", "roundness": -0.2566666666666667}}, {"id": "C5_S1_I1_R3_>C5_S1_I4", "from": "C5_S1_I1", "to": "C5_S1_I4", "smooth": {"type": "curvedCW", "roundness": 0.0}}, {"id": "C5_S1_I1_R4_>C5_S1_I3", "from": "C5_S1_I1", "to": "C5_S1_I3", "smooth": {"type": "curvedCW", "roundness": 0.2566666666666666}}, {"id": "C5_S1_I1_R5_>C5_S1_I2", "from": "C5_S1_I1", "to": "C5_S1_I2", "smooth": {"type": "curvedCW", "roundness": 0.5133333333333334}}, {"id": "C5_S1_I1_R6_>C5_S1_I3", "from": "C5_S1_I1", "to": "C5_S1_I3", "smooth": {"type": "curvedCW", "roundness": 0.77}}, {"id": "C5_S1_I2_R0_>C5_S1_I6", "from": "C5_S1_I2", "to": "C5_S1_I6", "smooth": {"type": "curvedCW", "roundness": -0.53}}, {"id": "C5_S1_I2_R1_>C5_S1_I5", "from": "C5_S1_I2", "to": "C5_S1_I5", "smooth": {"type": "curvedCW", "roundness": 0.0}}, {"id": "C5_S1_I2_R2_>C5_S1_I7", "from": "C5_S1_I2", "to": "C5_S1_I7", "smooth": {"type": "curvedCW", "roundness": 0.53}}, {"id": "C5_S1_I3_R0_>C5_S1_I8", "from": "C5_S1_I3", "to": "C5_S1_I8", "smooth": {"type": "curvedCW", "roundness": -0.53}}, {"id": "C5_S1_I3_R1_>C5_S1_I5", "from": "C5_S1_I3", "to": "C5_S1_I5", "smooth": {"type": "curvedCW", "roundness": 0.0}}, {"id": "C5_S1_I3_R2_>C5_S1_I8", "from": "C5_S1_I3", "to": "C5_S1_I8", "smooth": {"type": "curvedCW", "roundness": 0.53}}, {"id": "C5_S1_I4_R0_>C5_S1_I7", "from": "C5_S1_I4", "to": "C5_S1_I7" nquer de tact mais de respecter votre maman.''", "next_id": "6", "target_node_id": "C5_S1_I6", "edge_id": "C5_S1_I2_R0_>C5_S1_I6", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je hoche la tête :''Vous aviez encore beaucoup de choses à lui dire ?''", "next_id": "5", "target_node_id": "C5_S1_I5", "edge_id": "C5_S1_I2_R1_>C5_S1_I5", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je le regard bienveillant : Votre maman n’a pas imaginé que ce serait si difficile, elle voulait vous préserver.''", "next_id": "7", "target_node_id": "C5_S1_I7", "edge_id": "C5_S1_I2_R2_>C5_S1_I7", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S1_I6", "actor": "Margot", "text": "''Respecter ma maman ! En ne me permettant pas que je lui dise adieu… que je l’aimais !''", "image": "Margot_angry.png", "responses": [{"text": "Je la regarde :''Que vous l’aimiez ?''", "next_id": "8", "target_node_id": "C5_S1_I8", "edge_id": "C5_S1_I6_R0_>C5_S1_I8", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je avec tact :''Je comprends très bien ce que vous vivez. Quand ma grand-mère est morte j’étais aussi en colère.''", "next_id": "8", "target_node_id": "C5_S1_I8", "edge_id": "C5_S1_I6_R1_>C5_S1_I8", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je respecte votre moment. Je suis là si vous avez besoin de parler.''", "next_id": "8", "target_node_id": "C5_S1_I8", "edge_id": "C5_S1_I6_R2_>C5_S1_I8", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S1_I8", "actor": "Margot", "text": "Margot ramasse un châle d’Agathe en soupirant :''Il est trop tard maintenant ! C’est avant qu’il fallait vous soucier de mes besoins ! Elle est morte toute seule. Margot pleure à nouveau.''", "image": "Margot_angry.png", "responses": [{"text": "Je pose sa main sur le bras de Margot : Votre tristesse me touche profondément et j’aurais aimé que vous viviez autrement la mort de votre mère.", "next_id": "9", "target_node_id": "C5_S1_I9", "edge_id": "C5_S1_I8_R0_>C5_S1_I9", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je reste silencieuse et présente.", "next_id": "9", "target_node_id": "C5_S1_I9", "edge_id": "C5_S1_I8_R1_>C5_S1_I9", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je la regarde et calmement lui demande :''Voudriez-vous qu’on se revoie un de ces prochains jours pour en parler ?''", "next_id": "9", "target_node_id": "C5_S1_I9", "edge_id": "C5_S1_I8_R2_>C5_S1_I9", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 2, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Il est trop tard vous pensez ?''", "next_id": "9", "target_node_id": "C5_S1_I9", "edge_id": "C5_S1_I8_R3_>C5_S1_I9", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Elle voulait mourir seule.", "next_id": "11", "target_node_id": "C5_S1_I11", "edge_id": "C5_S1_I8_R4_>C5_S1_I11", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Votre maman avait peur que vous la forciez à s’alimenter.", "next_id": "11", "target_node_id": "C5_S1_I11", "edge_id": "C5_S1_I8_R5_>C5_S1_I11", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S1_I9", "actor": "Margot", "text": "''Pourquoi vous ne m’avez pas appelée ?''", "image": "Margot_confused.png", "responses": [{"text": "Je vais vous le dire. Asseyez-vous Margot.", "next_id": "11", "target_node_id": "C5_S1_I11", "edge_id": "C5_S1_I9_R0_>C5_S1_I11", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Nous nous sommes engagés à respecter les dernières volontés de votre maman.", "next_id": "12", "target_node_id": "C5_S1_I12", "edge_id": "C5_S1_I9_R1_>C5_S1_I12", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Qu’est-ce que vous en pensez ?''", "next_id": "13", "target_node_id": "C5_S1_I13", "edge_id": "C5_S1_I9_R2_>C5_S1_I13", "RespectAndDignity": 0, "Empathy": 1, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 1, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je la regarde :''Que répondrait votre maman à votre question ?''", "next_id": "14", "target_node_id": "C5_S1_I14", "edge_id": "C5_S1_I9_R3_>C5_S1_I14", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 1, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je ne peux pas vous le dire.''", "next_id": "12", "target_node_id": "C5_S1_I12", "edge_id": "C5_S1_I9_R4_>C5_S1_I12", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je m’avez déjà posé la question. Restons-en là. Bonne journée.''", "next_id": "10", "target_node_id": "C5_S1_I10", "edge_id": "C5_S1_I9_R5_>C5_S1_I10", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je d’un ton neutre :''Je vous propose une rencontre avec le médecin traitant et des membres de votre famille.''", "next_id": "13", "target_node_id": "C5_S1_I13", "edge_id": "C5_S1_I9_R6_>C5_S1_I13", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S1_I11", "actor": "Margot", "text": "''Je suis très bien debout et à ce que j’ai cru comprendre vous êtes débordée et n’avez que peu de temps à m’accorder.''", "image": "Margot_neutral.png", "responses": [{"text": "''Je tiens à vous donner les explications que vous m’avez demandées.''", "next_id": "15", "target_node_id": "C5_S1_I15", "edge_id": "C5_S1_I11_R0_>C5_S1_I15", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Alors restons debout.", "next_id": "15", "target_node_id": "C5_S1_I15", "edge_id": "C5_S1_I11_R1_>C5_S1_I15", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je suis désolée. Prenez votre temps. Si vous voulez, je peux rester un moment avec vous.''", "next_id": "15", "target_node_id": "C5_S1_I15", "edge_id": "C5_S1_I11_R2_>C5_S1_I15", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S1_I15", "actor": "Margot", "text": "Allez-y, je vous écoute.", "image": "Margot_neutral.png", "responses": [{"text": "Il y a quelques jours, votre maman nous a demandé de ne plus être alimentée ni hydratée.", "next_id": "22", "target_node_id": "C5_S1_I22", "edge_id": "C5_S1_I15_R0_>C5_S1_I22", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je la regarde et lui dit posément : Margot votre maman a décliné en quelques jours… elle ne voulait pas d’acharnement et sa dernière volonté était de rester seule.''", "next_id": "19", "target_node_id": "C5_S1_I19", "edge_id": "C5_S1_I15_R1_>C5_S1_I19", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je suis désolée. Prenez votre temps. Si vous voulez, je peux rester un moment avec vous.''", "next_id": "22", "target_node_id": "C5_S1_I22", "edge_id": "C5_S1_I15_R2_>C5_S1_I22", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S1_I22", "actor": "Margot", "text": "''Mais pourquoi ?... ce que vous avez fait est lourd de conséquences !''", "image": "Margot_angry.png", "responses": [{"text": "''J’ai tenté de raisonner vôtre maman mais je ne pouvais pas la contraindre… ensuite tout est allé très vite mais je peux vous assurer qu’elle n’a pas souffert.''", "next_id": "24", "target_node_id": "C5_S1_I24", "edge_id": "C5_S1_I22_R0_>C5_S1_I24", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Margot, toute l’équipe a été très attentive à ses besoins jusqu’à la fin", "next_id": "23", "target_node_id": "C5_S1_I23", "edge_id": "C5_S1_I22_R1_>C5_S1_I23", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je respecte votre moment. Je suis là si vous avez besoin de parler.''", "next_id": "24", "target_node_id": "C5_S1_I24", "edge_id": "C5_S1_I22_R2_>C5_S1_I24", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S1_I24", "actor": "Margot", "text": "Margot répète en hochant la tête :''Vous avez accepté ce choix ?... Ma mère refusait toujours l’aide des autres même si au fond elle l’aurait bien accepté. Margot est en pleurs.''", "image": "Margot_confused.png", "responses": [{"text": "''Je vous propose une rencontre avec le médecin traitant et des membres de votre famille.''", "next_id": "26", "target_node_id": "C5_S1_I26", "edge_id": "C5_S1_I24_R0_>C5_S1_I26", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je lui pose la main sur le bras : J’ai l’impression que c’est trop difficile d’entendre ce que j’ai à vous dire.''", "next_id": "26", "target_node_id": "C5_S1_I26", "edge_id": "C5_S1_I24_R1_>C5_S1_I26", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je respecte votre moment. Je suis là si vous avez besoin de parler.''", "next_id": "26", "target_node_id": "C5_S1_I26", "edge_id": "C5_S1_I24_R2_>C5_S1_I26", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S1_I26", "actor": "Margot", "text": "Margot dans un soupire :''Pourquoi vous ne m’avez pas appelée ?''", "image": "Margot_confused.png", "responses": [{"text": "''Je penche légèrement sa tête et la regarde avec compassion : C’était le souhait de votre maman.''", "next_id": "28", "target_node_id": "C5_S1_I28", "edge_id": "C5_S1_I26_R0_>C5_S1_I28", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Et vous, pourquoi n’avez-vous pas appelé ?''", "next_id": "29", "target_node_id": "C5_S1_I29", "edge_id": "C5_S1_I26_R1_>C5_S1_I29", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 2, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je suis désolée. Prenez votre temps. Si vous voulez, je peux rester un moment avec vous.''", "next_id": "28", "target_node_id": "C5_S1_I28", "edge_id": "C5_S1_I26_R2_>C5_S1_I28", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S1_I28", "actor": "Margot", "text": "Margot la tête baissée répond à voix basse :''Je n’ai pas pu lui dire adieu. Elle pleure.''", "image": "Margot_neutral.png", "responses": [{"text": "''Qu’est-ce qui est le plus difficile pour vous maintenant ?''", "next_id": "30", "target_node_id": "C5_S1_I30", "edge_id": "C5_S1_I28_R0_>C5_S1_I30", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 1, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je vais chercher le regarde de Margot :''Qu’est-ce que vous auriez souhaité lui dire ?''", "next_id": "30", "target_node_id": "C5_S1_I30", "edge_id": "C5_S1_I28_R1_>C5_S1_I30", "RespectAndDignity": 0, "Empathy": 1, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 1, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je calmement : Il existe d’autres manières de lui dire adieu.''", "next_id": "31", "target_node_id": "C5_S1_I31", "edge_id": "C5_S1_I28_R2_>C5_S1_I31", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 2, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S1_I30", "actor": "Margot", "text": "''Je vous l’ai déjà dit. Je n’ai pas pu dire adieu à ma maman. Laissez-moi seule, je vous prie.''", "image": "Margot_neutral.png", "responses": [{"text": "''D’accord Margot. Claude sort. Margot rassemble les affaires de sa maman.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "C’est vous qui voyez. Claude sort. Margot rassemble doucement les affaires de sa maman.", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je suis désolée. Prenez votre temps. Si vous voulez, je peux rester un moment avec vous.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S1_I31", "actor": "Margot", "text": "Margot répond en pleurant :''Non je ne crois pas… à présent laissez-moi seule, je vous prie.''", "image": "Margot_neutral.png", "responses": [{"text": "''Je ne sachant que faire face au désarroi de Margot dit : J’appelle le docteur. Claude sort de la chambre et va chercher de l’aide.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je la main posée sur son bras, la regarde avec compassion : Mais je ne peux pas vous laisser comme ça. Claude propose à Margot de prendre un café pour discuter de ce qu’elle ressent une fois qu’elle aura terminé de rassembler les affaires de sa mère.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je hoche la tête : J’entends votre demande. Je vais partir mais sachez que vous avez la possibilité de me contacter à tout moment.  Claude pose sa main sur son bras et reste un moment à ses côtés. Ensuite Claude sort de la chambre laissant Margot rassembler tranquillement les affaires de sa maman.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S1_I29", "actor": "Margot", "text": "Margot semble abasourdie :''Je n’ai rien pu lui dire, même pas adieu. Des larmes coulent sur ses joues''", "image": "Margot_sad.png", "responses": [{"text": "Nous savons que ce genre de situation génère beaucoup de culpabilité.", "next_id": "31", "target_node_id": "C5_S1_I31", "edge_id": "C5_S1_I29_R0_>C5_S1_I31", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je pose la main sur son bras et lui dit avec tact :''Je le sais et je comprends votre souffrance.''", "next_id": "31", "target_node_id": "C5_S1_I31", "edge_id": "C5_S1_I29_R1_>C5_S1_I31", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Ca va passer !''", "next_id": "31", "target_node_id": "C5_S1_I31", "edge_id": "C5_S1_I29_R2_>C5_S1_I31", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S1_I23", "actor": "Margot", "text": "''Alors Vous avez accepté ?''", "image": "Margot_confused.png", "responses": [{"text": "Margot, avant de respecter les dernières volontés de votre mère, nous en avons beaucoup parlé. ", "next_id": "26", "target_node_id": "C5_S1_I26", "edge_id": "C5_S1_I23_R0_>C5_S1_I26", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Y a-t-il quelqu’un dans l’équipe avec qui vous aimeriez en parler ?''", "next_id": "27", "target_node_id": "C5_S1_I27", "edge_id": "C5_S1_I23_R1_>C5_S1_I27", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je respecte votre moment. Je suis là si vous avez besoin de parler.''", "next_id": "26", "target_node_id": "C5_S1_I26", "edge_id": "C5_S1_I23_R2_>C5_S1_I26", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S1_I27", "actor": "Margot", "text": "''Pourquoi vous ne m’avez donc pas appelée ? … Pourtant je vous ai dit que ce n’était pas par gaieté de cœur que je l’avais placé ici mais parce que je n’avais pas le choix !''", "image": "Margot_resigned.png", "responses": [{"text": "''Je n’avais pas le droit de vous avertir.''", "next_id": "28", "target_node_id": "C5_S1_I28", "edge_id": "C5_S1_I27_R0_>C5_S1_I28", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Qu’est-ce que ça aurait changé ?''", "next_id": "29", "target_node_id": "C5_S1_I29", "edge_id": "C5_S1_I27_R1_>C5_S1_I29", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 1, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je suis désolée. Prenez votre temps. Si vous voulez, je peux rester un moment avec vous.''", "next_id": "28", "target_node_id": "C5_S1_I28", "edge_id": "C5_S1_I27_R2_>C5_S1_I28", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S1_I19", "actor": "Margot", "text": "''Et vous avez accepté ?''", "image": "Margot_confused.png", "responses": [{"text": "''Qu’auriez-vous fait à ma place ?''", "next_id": "24", "target_node_id": "C5_S1_I24", "edge_id": "C5_S1_I19_R0_>C5_S1_I24", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je d’une voix calme : Votre maman a été clairement informée des conséquences de son choix. Et c’est en connaissance de causes qu’elle a pris sa décision.''", "next_id": "23", "target_node_id": "C5_S1_I23", "edge_id": "C5_S1_I19_R1_>C5_S1_I23", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je suis désolée. Prenez votre temps. Si vous voulez, je peux rester un moment avec vous.''", "next_id": "24", "target_node_id": "C5_S1_I24", "edge_id": "C5_S1_I19_R2_>C5_S1_I24", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S1_I12", "actor": "Margot", "text": "''Que voulez-vous dire par là ?''", "image": "Margot_confused.png", "responses": [{"text": "''Je me suis engagée moralement vis-à-vis de votre maman et j’ai respecté cet engagement''", "next_id": "16", "target_node_id": "C5_S1_I16", "edge_id": "C5_S1_I12_R0_>C5_S1_I16", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Votre maman m’a donné des directives claires sur la manière dont elle voulait finir ses jours.", "next_id": "16", "target_node_id": "C5_S1_I16", "edge_id": "C5_S1_I12_R1_>C5_S1_I16", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je suis désolée. Prenez votre temps. Si vous voulez, je peux rester un moment avec vous.''", "next_id": "16", "target_node_id": "C5_S1_I16", "edge_id": "C5_S1_I12_R2_>C5_S1_I16", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S1_I16", "actor": "Margot", "text": "''C’est-à-dire ?''", "image": "Margot_confused.png", "responses": [{"text": "Le choix de votre maman l’a aidée à partir plus sereinement.", "next_id": "21", "target_node_id": "C5_S1_I21", "edge_id": "C5_S1_I16_R0_>C5_S1_I21", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Votre maman ne voulait pas qu’on vous prévienne qu’elle allait de plus en plus mal.", "next_id": "19", "target_node_id": "C5_S1_I19", "edge_id": "C5_S1_I16_R1_>C5_S1_I19", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je respecte votre moment. Je suis là si vous avez besoin de parler.''", "next_id": "21", "target_node_id": "C5_S1_I21", "edge_id": "C5_S1_I16_R2_>C5_S1_I21", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S1_I21", "actor": "Margot", "text": "''Vous voulez dire qu’elle ne souhaitait pas que je sois au courant de son état ?... Et vous avez accepté ?''", "image": "Margot_confused.png", "responses": [{"text": "Votre maman avait tout son discernement pour décider.", "next_id": "23", "target_node_id": "C5_S1_I23", "edge_id": "C5_S1_I21_R0_>C5_S1_I23", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''On aurait dû essayer de vous réunir pour poser les choses ensemble. Nous ne l’avons pas fait et nous en sommes désolés.''", "next_id": "22", "target_node_id": "C5_S1_I22", "edge_id": "C5_S1_I21_R1_>C5_S1_I22", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je respecte votre moment. Je suis là si vous avez besoin de parler.''", "next_id": "23", "target_node_id": "C5_S1_I23", "edge_id": "C5_S1_I21_R2_>C5_S1_I23", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S1_I13", "actor": "Margot", "text": "''Je ne crois pas que ça m’aide… je veux simplement que vous répondiez à ma question.''", "image": "Margot_neutral.png", "responses": [{"text": "Je reste impassible :''Je ne suis pas autorisée à divulguer ces informations.''", "next_id": "17", "target_node_id": "C5_S1_I17", "edge_id": "C5_S1_I13_R0_>C5_S1_I17", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je la regarde avec attention :''En quoi c’est important pour vous de le savoir ?''", "next_id": "17", "target_node_id": "C5_S1_I17", "edge_id": "C5_S1_I13_R1_>C5_S1_I17", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je suis désolée. Prenez votre temps. Si vous voulez, je peux rester un moment avec vous.''", "next_id": "17", "target_node_id": "C5_S1_I17", "edge_id": "C5_S1_I13_R2_>C5_S1_I17", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S1_I17", "actor": "Margot", "text": "''Mais enfin !... Je crois que j’ai le droit de savoir comment se sont passés les derniers instants de la vie de ma maman.''", "image": "Margot_revieled.png", "responses": [{"text": "''Je dis posément : Ce que je peux vous dire c’est qu’elle n’a pas souffert.''", "next_id": "22", "target_node_id": "C5_S1_I22", "edge_id": "C5_S1_I17_R0_>C5_S1_I22", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je comprends qu’il est difficile pour vous de ne pas savoir mais j’ai un devoir de confidentialité vis-à-vis de votre maman.''", "next_id": "21", "target_node_id": "C5_S1_I21", "edge_id": "C5_S1_I17_R1_>C5_S1_I21", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je suis désolée. Prenez votre temps. Si vous voulez, je peux rester un moment avec vous.''", "next_id": "22", "target_node_id": "C5_S1_I22", "edge_id": "C5_S1_I17_R2_>C5_S1_I22", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S1_I14", "actor": "Margot", "text": "''Je n’sais pas… mais elle n’aurait pas voulu me voir si triste.''", "image": "Margot_sad.png", "responses": [{"text": "''Je baisse le regard un instant et reste silencieuse.''", "next_id": "18", "target_node_id": "C5_S1_I18", "edge_id": "C5_S1_I14_R0_>C5_S1_I18", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Margot je vous en prie soyez raisonnable.", "next_id": "18", "target_node_id": "C5_S1_I18", "edge_id": "C5_S1_I14_R1_>C5_S1_I18", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je suis désolée. Prenez votre temps. Si vous voulez, je peux rester un moment avec vous.''", "next_id": "18", "target_node_id": "C5_S1_I18", "edge_id": "C5_S1_I14_R2_>C5_S1_I18", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S1_I18", "actor": "Margot", "text": "Au fond vous le savez qu’il aurait fallu m’appeler.", "image": "Margot_neutral.png", "responses": [{"text": "''Je l’air désolé : Nous n’avions pas d’autres alternatives que de ne pas vous appeler.''", "next_id": "22", "target_node_id": "C5_S1_I22", "edge_id": "C5_S1_I18_R0_>C5_S1_I22", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Pourquoi n’êtes-vous plus venue ?''", "next_id": "20", "target_node_id": "C5_S1_I20", "edge_id": "C5_S1_I18_R1_>C5_S1_I20", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 2, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je ne suis pas responsable de ce que votre mère a décidé vous comprenez.''", "next_id": "21", "target_node_id": "C5_S1_I21", "edge_id": "C5_S1_I18_R2_>C5_S1_I21", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S1_I20", "actor": "Margot", "text": "''Comment osez-vous me culpabiliser ainsi. J’étais là il y a 2 semaines, maman paraissait un peu fatiguée mais pas mourante. Vous êtes horrible !''", "image": "Margot_angry.png", "responses": [{"text": "''Je suis navrée. Elle ne sait que répondre et quitte la pièce sans rien dire, laissant Margot ranger les affaires de sa maman.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je suis désolée. Prenez votre temps. Si vous voulez, je peux rester un moment avec vous.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je respecte votre moment. Je suis là si vous avez besoin de parler.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S1_I10", "actor": "Margot", "text": "Claude sort laissant Margot rassembler les affaires de sa maman avec peine.", "image": "Margot_neutral.png", "responses": [{"text": "Sortir", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je suis désolée. Prenez votre temps. Si vous voulez, je peux rester un moment avec vous.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je respecte votre moment. Je suis là si vous avez besoin de parler.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S1_I5", "actor": "Margot", "text": "''Vous ne comprenez rien du tout ! Comment je vais pouvoir faire mon deuil maintenant ? La dernière fois que je l’ai vue, elle était vivante, heureuse. Et là ! Je n’ai pas pu lui dire adieu, lui dire que je l’aimais.''", "image": "Margot_happy.png", "responses": [{"text": "Je suis attentive :''Vous vous souciez de votre capacité à vivre ce deuil ? C’est quoi le plus difficile pour vous ?''", "next_id": "8", "target_node_id": "C5_S1_I8", "edge_id": "C5_S1_I5_R0_>C5_S1_I8", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je parle posément : Ecrire à votre maman et lui dire votre amour pourrait vous aider à amorcer le travail de deuil''", "next_id": "8", "target_node_id": "C5_S1_I8", "edge_id": "C5_S1_I5_R1_>C5_S1_I8", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je peux vous conseiller un excellent psychologue pour vous soutenir dans cette épreuve''", "next_id": "8", "target_node_id": "C5_S1_I8", "edge_id": "C5_S1_I5_R2_>C5_S1_I8", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S1_I7", "actor": "Margot", "text": "Margot la regarde les yeux remplis de larmes :''Difficile ?... Vous êtes loin du compte…''", "image": "Margot_sad.png", "responses": [{"text": "Je me rapproche d’elle :''De quoi avez-vous besoin maintenant ?''", "next_id": "8", "target_node_id": "C5_S1_I8", "edge_id": "C5_S1_I7_R0_>C5_S1_I8", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je d’un ton calme :''Qu’est-ce qui est le plus important pour vous maintenant ? Comment je peux vous aider ?''", "next_id": "8", "target_node_id": "C5_S1_I8", "edge_id": "C5_S1_I7_R1_>C5_S1_I8", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 1, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je respecte votre moment. Je suis là si vous avez besoin de parler.''", "next_id": "8", "target_node_id": "C5_S1_I8", "edge_id": "C5_S1_I7_R2_>C5_S1_I8", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S1_I3", "actor": "Margot", "text": "Margot outrée dit :''Non mais ! Figurez-vous que je viens de perdre ma maman et que je n’ai rien pu lui dire avant de partir.''", "image": "Margot_angry.png", "responses": [{"text": "Je le regard compatissant :''Qu’est-ce que vous auriez souhaité lui dire ?''", "next_id": "8", "target_node_id": "C5_S1_I8", "edge_id": "C5_S1_I3_R0_>C5_S1_I8", "RespectAndDignity": 0, "Empathy": 1, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 1, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Ecoutez, je ne suis pas payée pour me faire engueuler, alors du respect s’il vous plaît.", "next_id": "5", "target_node_id": "C5_S1_I5", "edge_id": "C5_S1_I3_R1_>C5_S1_I5", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je suis désolée. Prenez votre temps. Si vous voulez, je peux rester un moment avec vous.''", "next_id": "8", "target_node_id": "C5_S1_I8", "edge_id": "C5_S1_I3_R2_>C5_S1_I8", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S1_I4", "actor": "Margot", "text": "''Que pourriez-vous m’expliquer ? Cette situation est juste inacceptable !''", "image": "Margot_angry.png", "responses": [{"text": "Je d’un ton calme :''Je sens que c’est difficile pour vous et je comprends votre colère.''", "next_id": "7", "target_node_id": "C5_S1_I7", "edge_id": "C5_S1_I4_R0_>C5_S1_I7", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Les études sur le deuil ont démontré que votre vive réaction est tout à fait normale. Ne vous inquiétez pas.", "next_id": "5", "target_node_id": "C5_S1_I5", "edge_id": "C5_S1_I4_R1_>C5_S1_I5", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je respecte votre moment. Je suis là si vous avez besoin de parler.''", "next_id": "7", "target_node_id": "C5_S1_I7", "edge_id": "C5_S1_I4_R2_>C5_S1_I7", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S1_I25", "actor": "Margot", "text": "''Je suis désolée Claude mais c’était à moi d’être présente auprès d’elle, pas les membres de votre équipe !''", "image": "Margot_angry.png", "responses": [{"text": "''Souhaitez-vous en parler avec mon responsable ?''", "next_id": "27", "target_node_id": "C5_S1_I27", "edge_id": "C5_S1_I25_R0_>C5_S1_I27", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je d’un ton calme : Margot je suis sincèrement navrée que les choses ne ce soient pas passées ainsi… ne l’interprétez pas contre vous, vôtre maman a fait le choix de la pudeur… peut-être voulait elle vous préserver''", "next_id": "26", "target_node_id": "C5_S1_I26", "edge_id": "C5_S1_I25_R1_>C5_S1_I26", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je respecte votre moment. Je suis là si vous avez besoin de parler.''", "next_id": "27", "target_node_id": "C5_S1_I27", "edge_id": "C5_S1_I25_R2_>C5_S1_I27", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}], "id_to_parcours": {"1": {"node_id": "C5_S1_I1", "actor": "Margot", "text": "''Pourquoi vous ne m’avez pas appelée ? Je n’ai pas pu dire au revoir à ma maman ! Vous vous rendez compte ?''", "image": "Margot_angry.png", "responses": [{"text": "''Je l’air désolé : Margot, j’entends votre colère et votre tristesse.''", "next_id": "2", "target_node_id": "C5_S1_I2", "edge_id": "C5_S1_I1_R0_>C5_S1_I2", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je avec tact :''Je sens que c’est difficile pour vous. Voulez-vous le partager avec moi ?''", "next_id": "2", "target_node_id": "C5_S1_I2", "edge_id": "C5_S1_I1_R1_>C5_S1_I2", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je surprise par cet accueil :''Margot, que veut dire cette colère ?''", "next_id": "3", "target_node_id": "C5_S1_I3", "edge_id": "C5_S1_I1_R2_>C5_S1_I3", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je me rapproche de Margot : Margot je suis navrée de cette situation mais laissez-moi vous expliquer''", "next_id": "4", "target_node_id": "C5_S1_I4", "edge_id": "C5_S1_I1_R3_>C5_S1_I4", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je ne sait que dire :''Vous me semblez triste ?''", "next_id": "3", "target_node_id": "C5_S1_I3", "edge_id": "C5_S1_I1_R4_>C5_S1_I3", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je fronce les sourcils : Bien sûr que je m’en rends compte.''", "next_id": "2", "target_node_id": "C5_S1_I2", "edge_id": "C5_S1_I1_R5_>C5_S1_I2", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je sursaute légèrement : Arrêtez de m’agresser s’il vous plaît.''", "next_id": "3", "target_node_id": "C5_S1_I3", "edge_id": "C5_S1_I1_R6_>C5_S1_I3", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "2": {"node_id": "C5_S1_I2", "actor": "Margot", "text": "Margot semble abasourdie :''Vous n’avez vraiment aucun tact. Ça vous arrive de vous mettre à la place des autres ? J’avais encore beaucoup de choses à lui dire.''", "image": "Margot_confused.png", "responses": [{"text": "''Je la regarde et répond avec calme : Mon intention n’était pas de manquer de tact mais de respecter votre maman.''", "next_id": "6", "target_node_id": "C5_S1_I6", "edge_id": "C5_S1_I2_R0_>C5_S1_I6", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je hoche la tête :''Vous aviez encore beaucoup de choses à lui dire ?''", "next_id": "5", "target_node_id": "C5_S1_I5", "edge_id": "C5_S1_I2_R1_>C5_S1_I5", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je le regard bienveillant : Votre maman n’a pas imaginé que ce serait si difficile, elle voulait vous préserver.''", "next_id": "7", "target_node_id": "C5_S1_I7", "edge_id": "C5_S1_I2_R2_>C5_S1_I7", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "6": {"node_id": "C5_S1_I6", "actor": "Margot", "text": "''Respecter ma maman ! En ne me permettant pas que je lui dise adieu… que je l’aimais !''", "image": "Margot_angry.png", "responses": [{"text": "Je la regarde :''Que vous l’aimiez ?''", "next_id": "8", "target_node_id": "C5_S1_I8", "edge_id": "C5_S1_I6_R0_>C5_S1_I8", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je avec tact :''Je comprends très bien ce que vous vivez. Quand ma grand-mère est morte j’étais aussi en colère.''", "next_id": "8", "target_node_id": "C5_S1_I8", "edge_id": "C5_S1_I6_R1_>C5_S1_I8", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je respecte votre moment. Je suis là si vous avez besoin de parler.''", "next_id": "8", "target_node_id": "C5_S1_I8", "edge_id": "C5_S1_I6_R2_>C5_S1_I8", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "8": {"node_id": "C5_S1_I8", "actor": "Margot", "text": "Margot ramasse un châle d’Agathe en soupirant :''Il est trop tard maintenant ! C’est avant qu’il fallait vous soucier de mes besoins ! Elle est morte toute seule. Margot pleure à nouveau.''", "image": "Margot_angry.png", "responses": [{"text": "Je pose sa main sur le bras de Margot : Votre tristesse me touche profondément et j’aurais aimé que vous viviez autrement la mort de votre mère.", "next_id": "9", "target_node_id": "C5_S1_I9", "edge_id": "C5_S1_I8_R0_>C5_S1_I9", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je reste silencieuse et présente.", "next_id": "9", "target_node_id": "C5_S1_I9", "edge_id": "C5_S1_I8_R1_>C5_S1_I9", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je la regarde et calmement lui demande :''Voudriez-vous qu’on se revoie un de ces prochains jours pour en parler ?''", "next_id": "9", "target_node_id": "C5_S1_I9", "edge_id": "C5_S1_I8_R2_>C5_S1_I9", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 2, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Il est trop tard vous pensez ?''", "next_id": "9", "target_node_id": "C5_S1_I9", "edge_id": "C5_S1_I8_R3_>C5_S1_I9", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Elle voulait mourir seule.", "next_id": "11", "target_node_id": "C5_S1_I11", "edge_id": "C5_S1_I8_R4_>C5_S1_I11", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Votre maman avait peur que vous la forciez à s’alimenter.", "next_id": "11", "target_node_id": "C5_S1_I11", "edge_id": "C5_S1_I8_R5_>C5_S1_I11", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "9": {"node_id": "C5_S1_I9", "actor": "Margot", "text": "''Pourquoi vous ne m’avez pas appelée ?''", "image": "Margot_confused.png", "responses": [{"text": "Je vais vous le dire. Asseyez-vous Margot.", "next_id": "11", "target_node_id": "C5_S1_I11", "edge_id": "C5_S1_I9_R0_>C5_S1_I11", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Nous nous sommes engagés à respecter les dernières volontés de votre maman.", "next_id": "12", "target_node_id": "C5_S1_I12", "edge_id": "C5_S1_I9_R1_>C5_S1_I12", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Qu’est-ce que vous en pensez ?''", "next_id": "13", "target_node_id": "C5_S1_I13", "edge_id": "C5_S1_I9_R2_>C5_S1_I13", "RespectAndDignity": 0, "Empathy": 1, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 1, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je la regarde :''Que répondrait votre maman à votre question ?''", "next_id": "14", "target_node_id": "C5_S1_I14", "edge_id": "C5_S1_I9_R3_>C5_S1_I14", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 1, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je ne peux pas vous le dire.''", "next_id": "12", "target_node_id": "C5_S1_I12", "edge_id": "C5_S1_I9_R4_>C5_S1_I12", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je m’avez déjà posé la question. Restons-en là. Bonne journée.''", "next_id": "10", "target_node_id": "C5_S1_I10", "edge_id": "C5_S1_I9_R5_>C5_S1_I10", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je d’un ton neutre :''Je vous propose une rencontre avec le médecin traitant et des membres de votre famille.''", "next_id": "13", "target_node_id": "C5_S1_I13", "edge_id": "C5_S1_I9_R6_>C5_S1_I13", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "11": {"node_id": "C5_S1_I11", "actor": "Margot", "text": "''Je suis très bien debout et à ce que j’ai cru comprendre vous êtes débordée et n’avez que peu de temps à m’accorder.''", "image": "Margot_neutral.png", "responses": [{"text": "''Je tiens à vous donner les explications que vous m’avez demandées.''", "next_id": "15", "target_node_id": "C5_S1_I15", "edge_id": "C5_S1_I11_R0_>C5_S1_I15", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Alors restons debout.", "next_id": "15", "target_node_id": "C5_S1_I15", "edge_id": "C5_S1_I11_R1_>C5_S1_I15", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je suis désolée. Prenez votre temps. Si vous voulez, je peux rester un moment avec vous.''", "next_id": "15", "target_node_id": "C5_S1_I15", "edge_id": "C5_S1_I11_R2_>C5_S1_I15", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "15": {"node_id": "C5_S1_I15", "actor": "Margot", "text": "Allez-y, je vous écoute.", "image": "Margot_neutral.png", "responses": [{"text": "Il y a quelques jours, votre maman nous a demandé de ne plus être alimentée ni hydratée.", "next_id": "22", "target_node_id": "C5_S1_I22", "edge_id": "C5_S1_I15_R0_>C5_S1_I22", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je la regarde et lui dit posément : Margot votre maman a décliné en quelques jours… elle ne voulait pas d’acharnement et sa dernière volonté était de rester seule.''", "next_id": "19", "target_node_id": "C5_S1_I19", "edge_id": "C5_S1_I15_R1_>C5_S1_I19", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je suis désolée. Prenez votre temps. Si vous voulez, je peux rester un moment avec vous.''", "next_id": "22", "target_node_id": "C5_S1_I22", "edge_id": "C5_S1_I15_R2_>C5_S1_I22", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "22": {"node_id": "C5_S1_I22", "actor": "Margot", "text": "''Mais pourquoi ?... ce que vous avez fait est lourd de conséquences !''", "image": "Margot_angry.png", "responses": [{"text": "''J’ai tenté de raisonner vôtre maman mais je ne pouvais pas la contraindre… ensuite tout est allé très vite mais je peux vous assurer qu’elle n’a pas souffert.''", "next_id": "24", "target_node_id": "C5_S1_I24", "edge_id": "C5_S1_I22_R0_>C5_S1_I24", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Margot, toute l’équipe a été très attentive à ses besoins jusqu’à la fin", "next_id": "23", "target_node_id": "C5_S1_I23", "edge_id": "C5_S1_I22_R1_>C5_S1_I23", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je respecte votre moment. Je suis là si vous avez besoin de parler.''", "next_id": "24", "target_node_id": "C5_S1_I24", "edge_id": "C5_S1_I22_R2_>C5_S1_I24", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "24": {"node_id": "C5_S1_I24", "actor": "Margot", "text": "Margot répète en hochant la tête :''Vous avez accepté ce choix ?... Ma mère refusait toujours l’aide des autres même si au fond elle l’aurait bien accepté. Margot est en pleurs.''", "image": "Margot_confused.png", "responses": [{"text": "''Je vous propose une rencontre avec le médecin traitant et des membres de votre famille.''", "next_id": "26", "target_node_id": "C5_S1_I26", "edge_id": "C5_S1_I24_R0_>C5_S1_I26", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je lui pose la main sur le bras : J’ai l’impression que c’est trop difficile d’entendre ce que j’ai à vous dire.''", "next_id": "26", "target_node_id": "C5_S1_I26", "edge_id": "C5_S1_I24_R1_>C5_S1_I26", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je respecte votre moment. Je suis là si vous avez besoin de parler.''", "next_id": "26", "target_node_id": "C5_S1_I26", "edge_id": "C5_S1_I24_R2_>C5_S1_I26", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "26": {"node_id": "C5_S1_I26", "actor": "Margot", "text": "Margot dans un soupire :''Pourquoi vous ne m’avez pas appelée ?''", "image": "Margot_confused.png", "responses": [{"text": "''Je penche légèrement sa tête et la regarde avec compassion : C’était le souhait de votre maman.''", "next_id": "28", "target_node_id": "C5_S1_I28", "edge_id": "C5_S1_I26_R0_>C5_S1_I28", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Et vous, pourquoi n’avez-vous pas appelé ?''", "next_id": "29", "target_node_id": "C5_S1_I29", "edge_id": "C5_S1_I26_R1_>C5_S1_I29", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 2, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je suis désolée. Prenez votre temps. Si vous voulez, je peux rester un moment avec vous.''", "next_id": "28", "target_node_id": "C5_S1_I28", "edge_id": "C5_S1_I26_R2_>C5_S1_I28", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "28": {"node_id": "C5_S1_I28", "actor": "Margot", "text": "Margot la tête baissée répond à voix basse :''Je n’ai pas pu lui dire adieu. Elle pleure.''", "image": "Margot_neutral.png", "responses": [{"text": "''Qu’est-ce qui est le plus difficile pour vous maintenant ?''", "next_id": "30", "target_node_id": "C5_S1_I30", "edge_id": "C5_S1_I28_R0_>C5_S1_I30", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 1, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je vais chercher le regarde de Margot :''Qu’est-ce que vous auriez souhaité lui dire ?''", "next_id": "30", "target_node_id": "C5_S1_I30", "edge_id": "C5_S1_I28_R1_>C5_S1_I30", "RespectAndDignity": 0, "Empathy": 1, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 1, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je calmement : Il existe d’autres manières de lui dire adieu.''", "next_id": "31", "target_node_id": "C5_S1_I31", "edge_id": "C5_S1_I28_R2_>C5_S1_I31", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 2, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "30": {"node_id": "C5_S1_I30", "actor": "Margot", "text": "''Je vous l’ai déjà dit. Je n’ai pas pu dire adieu à ma maman. Laissez-moi seule, je vous prie.''", "image": "Margot_neutral.png", "responses": [{"text": "''D’accord Margot. Claude sort. Margot rassemble les affaires de sa maman.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "C’est vous qui voyez. Claude sort. Margot rassemble doucement les affaires de sa maman.", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je suis désolée. Prenez votre temps. Si vous voulez, je peux rester un moment avec vous.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "31": {"node_id": "C5_S1_I31", "actor": "Margot", "text": "Margot répond en pleurant :''Non je ne crois pas… à présent laissez-moi seule, je vous prie.''", "image": "Margot_neutral.png", "responses": [{"text": "''Je ne sachant que faire face au désarroi de Margot dit : J’appelle le docteur. Claude sort de la chambre et va chercher de l’aide.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je la main posée sur son bras, la regarde avec compassion : Mais je ne peux pas vous laisser comme ça. Claude propose à Margot de prendre un café pour discuter de ce qu’elle ressent une fois qu’elle aura terminé de rassembler les affaires de sa mère.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je hoche la tête : J’entends votre demande. Je vais partir mais sachez que vous avez la possibilité de me contacter à tout moment.  Claude pose sa main sur son bras et reste un moment à ses côtés. Ensuite Claude sort de la chambre laissant Margot rassembler tranquillement les affaires de sa maman.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "29": {"node_id": "C5_S1_I29", "actor": "Margot", "text": "Margot semble abasourdie :''Je n’ai rien pu lui dire, même pas adieu. Des larmes coulent sur ses joues''", "image": "Margot_sad.png", "responses": [{"text": "Nous savons que ce genre de situation génère beaucoup de culpabilité.", "next_id": "31", "target_node_id": "C5_S1_I31", "edge_id": "C5_S1_I29_R0_>C5_S1_I31", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je pose la main sur son bras et lui dit avec tact :''Je le sais et je comprends votre souffrance.''", "next_id": "31", "target_node_id": "C5_S1_I31", "edge_id": "C5_S1_I29_R1_>C5_S1_I31", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Ca va passer !''", "next_id": "31", "target_node_id": "C5_S1_I31", "edge_id": "C5_S1_I29_R2_>C5_S1_I31", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "23": {"node_id": "C5_S1_I23", "actor": "Margot", "text": "''Alors Vous avez accepté ?''", "image": "Margot_confused.png", "responses": [{"text": "Margot, avant de respecter les dernières volontés de votre mère, nous en avons beaucoup parlé. ", "next_id": "26", "target_node_id": "C5_S1_I26", "edge_id": "C5_S1_I23_R0_>C5_S1_I26", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Y a-t-il quelqu’un dans l’équipe avec qui vous aimeriez en parler ?''", "next_id": "27", "target_node_id": "C5_S1_I27", "edge_id": "C5_S1_I23_R1_>C5_S1_I27", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je respecte votre moment. Je suis là si vous avez besoin de parler.''", "next_id": "26", "target_node_id": "C5_S1_I26", "edge_id": "C5_S1_I23_R2_>C5_S1_I26", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "27": {"node_id": "C5_S1_I27", "actor": "Margot", "text": "''Pourquoi vous ne m’avez donc pas appelée ? … Pourtant je vous ai dit que ce n’était pas par gaieté de cœur que je l’avais placé ici mais parce que je n’avais pas le choix !''", "image": "Margot_resigned.png", "responses": [{"text": "''Je n’avais pas le droit de vous avertir.''", "next_id": "28", "target_node_id": "C5_S1_I28", "edge_id": "C5_S1_I27_R0_>C5_S1_I28", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Qu’est-ce que ça aurait changé ?''", "next_id": "29", "target_node_id": "C5_S1_I29", "edge_id": "C5_S1_I27_R1_>C5_S1_I29", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 1, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je suis désolée. Prenez votre temps. Si vous voulez, je peux rester un moment avec vous.''", "next_id": "28", "target_node_id": "C5_S1_I28", "edge_id": "C5_S1_I27_R2_>C5_S1_I28", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "19": {"node_id": "C5_S1_I19", "actor": "Margot", "text": "''Et vous avez accepté ?''", "image": "Margot_confused.png", "responses": [{"text": "''Qu’auriez-vous fait à ma place ?''", "next_id": "24", "target_node_id": "C5_S1_I24", "edge_id": "C5_S1_I19_R0_>C5_S1_I24", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je d’une voix calme : Votre maman a été clairement informée des conséquences de son choix. Et c’est en connaissance de causes qu’elle a pris sa décision.''", "next_id": "23", "target_node_id": "C5_S1_I23", "edge_id": "C5_S1_I19_R1_>C5_S1_I23", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je suis désolée. Prenez votre temps. Si vous voulez, je peux rester un moment avec vous.''", "next_id": "24", "target_node_id": "C5_S1_I24", "edge_id": "C5_S1_I19_R2_>C5_S1_I24", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "12": {"node_id": "C5_S1_I12", "actor": "Margot", "text": "''Que voulez-vous dire par là ?''", "image": "Margot_confused.png", "responses": [{"text": "''Je me suis engagée moralement vis-à-vis de votre maman et j’ai respecté cet engagement''", "next_id": "16", "target_node_id": "C5_S1_I16", "edge_id": "C5_S1_I12_R0_>C5_S1_I16", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Votre maman m’a donné des directives claires sur la manière dont elle voulait finir ses jours.", "next_id": "16", "target_node_id": "C5_S1_I16", "edge_id": "C5_S1_I12_R1_>C5_S1_I16", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je suis désolée. Prenez votre temps. Si vous voulez, je peux rester un moment avec vous.''", "next_id": "16", "target_node_id": "C5_S1_I16", "edge_id": "C5_S1_I12_R2_>C5_S1_I16", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "16": {"node_id": "C5_S1_I16", "actor": "Margot", "text": "''C’est-à-dire ?''", "image": "Margot_confused.png", "responses": [{"text": "Le choix de votre maman l’a aidée à partir plus sereinement.", "next_id": "21", "target_node_id": "C5_S1_I21", "edge_id": "C5_S1_I16_R0_>C5_S1_I21", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Votre maman ne voulait pas qu’on vous prévienne qu’elle allait de plus en plus mal.", "next_id": "19", "target_node_id": "C5_S1_I19", "edge_id": "C5_S1_I16_R1_>C5_S1_I19", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je respecte votre moment. Je suis là si vous avez besoin de parler.''", "next_id": "21", "target_node_id": "C5_S1_I21", "edge_id": "C5_S1_I16_R2_>C5_S1_I21", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "21": {"node_id": "C5_S1_I21", "actor": "Margot", "text": "''Vous voulez dire qu’elle ne souhaitait pas que je sois au courant de son état ?... Et vous avez accepté ?''", "image": "Margot_confused.png", "responses": [{"text": "Votre maman avait tout son discernement pour décider.", "next_id": "23", "target_node_id": "C5_S1_I23", "edge_id": "C5_S1_I21_R0_>C5_S1_I23", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''On aurait dû essayer de vous réunir pour poser les choses ensemble. Nous ne l’avons pas fait et nous en sommes désolés.''", "next_id": "22", "target_node_id": "C5_S1_I22", "edge_id": "C5_S1_I21_R1_>C5_S1_I22", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je respecte votre moment. Je suis là si vous avez besoin de parler.''", "next_id": "23", "target_node_id": "C5_S1_I23", "edge_id": "C5_S1_I21_R2_>C5_S1_I23", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "13": {"node_id": "C5_S1_I13", "actor": "Margot", "text": "''Je ne crois pas que ça m’aide… je veux simplement que vous répondiez à ma question.''", "image": "Margot_neutral.png", "responses": [{"text": "Je reste impassible :''Je ne suis pas autorisée à divulguer ces informations.''", "next_id": "17", "target_node_id": "C5_S1_I17", "edge_id": "C5_S1_I13_R0_>C5_S1_I17", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je la regarde avec attention :''En quoi c’est important pour vous de le savoir ?''", "next_id": "17", "target_node_id": "C5_S1_I17", "edge_id": "C5_S1_I13_R1_>C5_S1_I17", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je suis désolée. Prenez votre temps. Si vous voulez, je peux rester un moment avec vous.''", "next_id": "17", "target_node_id": "C5_S1_I17", "edge_id": "C5_S1_I13_R2_>C5_S1_I17", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "17": {"node_id": "C5_S1_I17", "actor": "Margot", "text": "''Mais enfin !... Je crois que j’ai le droit de savoir comment se sont passés les derniers instants de la vie de ma maman.''", "image": "Margot_revieled.png", "responses": [{"text": "''Je dis posément : Ce que je peux vous dire c’est qu’elle n’a pas souffert.''", "next_id": "22", "target_node_id": "C5_S1_I22", "edge_id": "C5_S1_I17_R0_>C5_S1_I22", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je comprends qu’il est difficile pour vous de ne pas savoir mais j’ai un devoir de confidentialité vis-à-vis de votre maman.''", "next_id": "21", "target_node_id": "C5_S1_I21", "edge_id": "C5_S1_I17_R1_>C5_S1_I21", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je suis désolée. Prenez votre temps. Si vous voulez, je peux rester un moment avec vous.''", "next_id": "22", "target_node_id": "C5_S1_I22", "edge_id": "C5_S1_I17_R2_>C5_S1_I22", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "14": {"node_id": "C5_S1_I14", "actor": "Margot", "text": "''Je n’sais pas… mais elle n’aurait pas voulu me voir si triste.''", "image"
