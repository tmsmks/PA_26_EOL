ez, je peux rester un moment avec vous.''", "next_id": "27", "target_node_id": "C5_S2_I27", "edge_id": "C5_S2_I23_R2_>C5_S2_I27", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "13": {"node_id": "C5_S2_I13", "actor": "Ralph", "text": "''Alors tant mieux ! Au cas où vous ne l’auriez pas remarqué je n’ai plus l’âge d’être bichonné.''", "image": "Ralph_angry.png", "responses": [{"text": "Je lui souris :''Vous permettez que je m’asseye à côté de vous.''", "next_id": "16", "target_node_id": "C5_S2_I16", "edge_id": "C5_S2_I13_R0_>C5_S2_I16", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je sur un ton léger :''Je vous remercie, figurez-vous que je m’en étais aperçue et mon intention n’est pas de vous infantiliser.''", "next_id": "20", "target_node_id": "C5_S2_I20", "edge_id": "C5_S2_I13_R1_>C5_S2_I20", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je incline la tête et sourit :''Je ne souhaite pas vous bichonner mais vous apporter un peu de réconfort dans cette étape.''", "next_id": "18", "target_node_id": "C5_S2_I18", "edge_id": "C5_S2_I13_R2_>C5_S2_I18", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "16": {"node_id": "C5_S2_I16", "actor": "Ralph", "text": "Ralph lève les yeux au ciel et dit : Mais non de non, c'est qu’elle va pas me foutre la paix.", "image": "Ralph_neutral.png", "responses": [{"text": "Si mes questions vous gênent, vous êtes en droit de ne pas répondre. Je comprendrai. ", "next_id": "18", "target_node_id": "C5_S2_I18", "edge_id": "C5_S2_I16_R0_>C5_S2_I18", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je hausse légèrement la voix :''Non car ma tâche est de vérifier que tout va bien et j’ai l’impression que tout ne va pas bien !''", "next_id": "23", "target_node_id": "C5_S2_I23", "edge_id": "C5_S2_I16_R1_>C5_S2_I23", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je respecte votre moment. Je suis là si vous avez besoin de parler.''", "next_id": "18", "target_node_id": "C5_S2_I18", "edge_id": "C5_S2_I16_R2_>C5_S2_I18", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "18": {"node_id": "C5_S2_I18", "actor": "Ralph", "text": "''Si vous voulez m’apportez du réconfort vous vous y prenez très mal !''", "image": "Ralph_angry.png", "responses": [{"text": "Je soupire :''Vous me fatiguez !''", "next_id": "19", "target_node_id": "C5_S2_I19", "edge_id": "C5_S2_I18_R0_>C5_S2_I19", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je hoche la tête :''Merci de me le dire, j’en prends note. Sachez que ça partait d’une bonne intention.''", "next_id": "23", "target_node_id": "C5_S2_I23", "edge_id": "C5_S2_I18_R1_>C5_S2_I23", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je fronce les sourcils :''Vous pouvez me parler sur un autre ton ?''", "next_id": "20", "target_node_id": "C5_S2_I20", "edge_id": "C5_S2_I18_R2_>C5_S2_I20", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "14": {"node_id": "C5_S2_I14", "actor": "Ralph", "text": "Ralph s’emporte :''Que voulez-vous que j’vous dise, ça ne va pas très bien voilà, vous êtes contente ! Il continue de regarder par la fenêtre''", "image": "Ralph_happy.png", "responses": [{"text": "Je me tait… puis dit avec tact :''Je sens de la détresse dans vos propos.''", "next_id": "19", "target_node_id": "C5_S2_I19", "edge_id": "C5_S2_I14_R0_>C5_S2_I19", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Est-ce que vous souhaitez en parler à mon collègue Mr. Kaufmann qui est psychologue ?''", "next_id": "16", "target_node_id": "C5_S2_I16", "edge_id": "C5_S2_I14_R1_>C5_S2_I16", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je avec bienveillance :''Votre famille est déjà venue vous rendre visite ?''", "next_id": "16", "target_node_id": "C5_S2_I16", "edge_id": "C5_S2_I14_R2_>C5_S2_I16", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "4": {"node_id": "C5_S2_I4", "actor": "Ralph", "text": "Ralph la regarde avec défi : vous êtes un laideron qui n’a pas sa langue dans sa poche.", "image": "Ralph_neutral.png", "responses": [{"text": "Et encore vous n’avez pas tout vu, je peux également prendre soin de vous dit-elle en souriant ", "next_id": "10", "target_node_id": "C5_S2_I10", "edge_id": "C5_S2_I4_R0_>C5_S2_I10", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je avec un regard bienveillant :''bon, mais on va pas jouer à ce jeu encore longtemps, qu’en dites-vous ?''", "next_id": "9", "target_node_id": "C5_S2_I9", "edge_id": "C5_S2_I4_R1_>C5_S2_I9", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Votre attitude m’étonne. ", "next_id": "7", "target_node_id": "C5_S2_I7", "edge_id": "C5_S2_I4_R2_>C5_S2_I7", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "9": {"node_id": "C5_S2_I9", "actor": "Ralph", "text": "Ralph regarde par la fenêtre :''Je ne comprends pas pourquoi vous me manifester tant d’égard ? Il soupire''", "image": "Ralph_confused.png", "responses": [{"text": "Je lui souris, puis lui dit calmement :''On pourrait peut-être essayer de faire des efforts… Nous serons amenés à nous voir souvent et nous ne partons pas sur de bonnes bases.''", "next_id": "11", "target_node_id": "C5_S2_I11", "edge_id": "C5_S2_I9_R0_>C5_S2_I11", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 2, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je penche la tête et tente de capter le regard de Ralph :''Je voudrais que tout se passe bien entre nous et que vous vous sentiez bien ici''", "next_id": "11", "target_node_id": "C5_S2_I11", "edge_id": "C5_S2_I9_R1_>C5_S2_I11", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je d’un ton calme : ça ne doit pas être évident pour vous de changer d’environnement. Je voudrais vous apporter le réconfort qu’on a besoin dans une telle situation.''", "next_id": "18", "target_node_id": "C5_S2_I18", "edge_id": "C5_S2_I9_R2_>C5_S2_I18", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "11": {"node_id": "C5_S2_I11", "actor": "Ralph", "text": "D’un ton sec :''Votre travail est de me soigner non ?''", "image": "Ralph_confused.png", "responses": [{"text": "Mon travail est effectivement de prendre soin de vous, c’est pour ça que je veux savoir si vous allez bien. ", "next_id": "17", "target_node_id": "C5_S2_I17", "edge_id": "C5_S2_I11_R0_>C5_S2_I17", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je peine à comprendre le sens de votre attitude. Voulez-vous qu’on en parle ?''", "next_id": "14", "target_node_id": "C5_S2_I14", "edge_id": "C5_S2_I11_R1_>C5_S2_I14", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Votre bien être mental est à mes yeux aussi important que votre bien-être physique. ", "next_id": "15", "target_node_id": "C5_S2_I15", "edge_id": "C5_S2_I11_R2_>C5_S2_I15", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "7": {"node_id": "C5_S2_I7", "actor": "Ralph", "text": "''Laide et bête, ben dis donc !''", "image": "Ralph_angry.png", "responses": [{"text": "''Je soupire : Dans ces conditions, je ne pense pas que nous pouvons continuer cet entretien. Je vous laisse donc et reviendrai plus tard.''", "next_id": "8", "target_node_id": "C5_S2_I8", "edge_id": "C5_S2_I7_R0_>C5_S2_I8", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je avec calme :''Qu’est-ce qui ne va pas avec vous ? Je vous sens extrêmement en colère.''", "next_id": "11", "target_node_id": "C5_S2_I11", "edge_id": "C5_S2_I7_R1_>C5_S2_I11", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 1, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je respecte votre moment. Je suis là si vous avez besoin de parler.''", "next_id": "8", "target_node_id": "C5_S2_I8", "edge_id": "C5_S2_I7_R2_>C5_S2_I8", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "8": {"node_id": "C5_S2_I8", "actor": "Ralph", "text": "C’est ça, bon vent. ", "image": "Ralph_neutral.png", "responses": [{"text": "Margot sort", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je suis désolée. Prenez votre temps. Si vous voulez, je peux rester un moment avec vous.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je respecte votre moment. Je suis là si vous avez besoin de parler.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "5": {"node_id": "C5_S2_I5", "actor": "Ralph", "text": "''Ecoutez je n’ai rien à dire hormis que je souhaite qu’on me laisse tranquille !''", "image": "Ralph_angry.png", "responses": [{"text": "Je le regarde :''Je sens beaucoup d’agressivité dans vos propos. Souhaitez-vous en parler ?''", "next_id": "7", "target_node_id": "C5_S2_I7", "edge_id": "C5_S2_I5_R0_>C5_S2_I7", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je avec calme : J’ai l’impression que votre situation doit être difficile à vivre.''", "next_id": "6", "target_node_id": "C5_S2_I6", "edge_id": "C5_S2_I5_R1_>C5_S2_I6", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je respecte votre moment. Je suis là si vous avez besoin de parler.''", "next_id": "7", "target_node_id": "C5_S2_I7", "edge_id": "C5_S2_I5_R2_>C5_S2_I7", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "31": {"node_id": "C5_S2_I31", "actor": "Ralph", "text": "N’insistez pas pour aujourd’hui, j’ai besoin de rester seul. Revenez demain.", "image": "Ralph_neutral.png", "responses": [{"text": "''Je avec un léger sourire : Comme vous voudrez, à demain alors. Elle s’en va doucement''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je repasserai tout de même pour m’assurer que tout va bien.''", "next_id": "32", "target_node_id": "C5_S2_I32", "edge_id": "C5_S2_I31_R1_>C5_S2_I32", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je respecte votre moment. Je suis là si vous avez besoin de parler.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}}}, {"title": "Comment faire son deuil", "scene_id": 3, "scene_intro": "Claude a demandé un rendez-vous avec Pascal. Elle vit difficilement la mort d’Agathe et l’attitude du nouveau résident la déstabilise. Elle se questionne autour de la problématique du deuil. Ils se rencontrent dans son bureau.", "nodes": [{"id": "C5_S3_I1", "label": "1) Qu’est-ce qu’il y a Claude ?", "title": "[Pascal] ''Qu’est-ce qu’il y a Claude ?''"}, {"id": "C5_S3_I2", "label": "2) On a fait ce qu’il", "title": "[Pascal] ''On a fait ce qu’il y avait à faire Claude, on n’a rien à se reprocher.''"}, {"id": "C5_S3_I3", "label": "2.a) Accroche-toi Claude", "title": "[Pascal] ''Accroche-toi Claude, j’ai besoin de toi. Tu ne vas pas me lâcher maintenant ?''"}, {"id": "C5_S3_I4", "label": "3) Ce n’est pas possible", "title": "[Pascal] Ce n’est pas possible Claude et tu le sais, ça demanderait de revoir notre organisation. "}, {"id": "C5_S3_I5", "label": "3.a) Je pense que ta tristesse", "title": "[Pascal] Je pense que ta tristesse fausse ton jugement. Je te le répète tu as fait ce qu’il fallait Claude."}, {"id": "C5_S3_I6", "label": "4) La mise en place", "title": "[Pascal] La mise en place d’un suivi psychologique t’aiderait certainement à passer ce cap. Il faut que tu en parles pour aller mieux et continuer à t’investir comme tu le faisais. "}, {"id": "C5_S3_I7", "label": "5) Ton bien être", "title": "[Pascal] Ton bien être m’est important, l’équipe a besoin de toi mais pas seulement, ta famille aussi. Ne surinterprète pas mes paroles Claude."}, {"id": "C5_S3_I8", "label": "5.a) Claude je suis infirmier", "title": "[Pascal] Claude je suis infirmier comme toi, pas psychothérapeute. "}, {"id": "C5_S3_I9", "label": "6) Pascal regarde soudainement", "title": "[Pascal] Pascal regarde soudainement sa montre et inspire profondément : Claude  suis fatiguée, je n’ai plus d’énergie.''", "next_id": "3", "target_node_id": "C5_S3_I3", "edge_id": "C5_S3_I1_R5_>C5_S3_I3", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je me seule. Je n’arrive pas à en parler.''", "next_id": "6", "target_node_id": "C5_S3_I6", "edge_id": "C5_S3_I1_R6_>C5_S3_I6", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Devant la porte de la chambre 14, j’ai l’impression que je vais retrouver Agathe. ", "next_id": "3", "target_node_id": "C5_S3_I3", "edge_id": "C5_S3_I1_R7_>C5_S3_I3", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je pleure à chaudes larmes.''", "next_id": "3", "target_node_id": "C5_S3_I3", "edge_id": "C5_S3_I1_R8_>C5_S3_I3", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S3_I2", "actor": "Pascal", "text": "''On a fait ce qu’il y avait à faire Claude, on n’a rien à se reprocher.''", "image": "Pascal_neutral.png", "responses": [{"text": "''Est-ce qu’on peut organiser un moment de recueillement avec l’équipe en mémoire d’Agathe ?''", "next_id": "4", "target_node_id": "C5_S3_I4", "edge_id": "C5_S3_I2_R0_>C5_S3_I4", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Est-ce que je peux aller à l’enterrement d’Agathe sur mon temps de travail ?''", "next_id": "4", "target_node_id": "C5_S3_I4", "edge_id": "C5_S3_I2_R1_>C5_S3_I4", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Il faudrait laisser plus de temps de recueillement aux résidents et au personnel avant d’emmener le corps du défunt. ", "next_id": "4", "target_node_id": "C5_S3_I4", "edge_id": "C5_S3_I2_R2_>C5_S3_I4", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Ça nous aiderait énormément si les chambres pouvaient après un décès rester inoccupée pendant une semaine. ", "next_id": "4", "target_node_id": "C5_S3_I4", "edge_id": "C5_S3_I2_R3_>C5_S3_I4", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''J’aimerais bien qu’on invite Margot à venir partager un repas avec nous.''", "next_id": "4", "target_node_id": "C5_S3_I4", "edge_id": "C5_S3_I2_R4_>C5_S3_I4", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "J’aurais besoin qu’après le souper on puisse parler d’Agathe avec les résidents. ", "next_id": "4", "target_node_id": "C5_S3_I4", "edge_id": "C5_S3_I2_R5_>C5_S3_I4", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Peux-tu faire intervenir un psychologue pour l’équipe après tout ce qui s’est passé avec Agathe ?''", "next_id": "5", "target_node_id": "C5_S3_I5", "edge_id": "C5_S3_I2_R6_>C5_S3_I5", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S3_I4", "actor": "Pascal", "text": "Ce n’est pas possible Claude et tu le sais, ça demanderait de revoir notre organisation. ", "image": "Pascal_neutral.png", "responses": [{"text": "''Je crois que tu ne saisis pas, je me sens fatiguée, vidée… par ce qui s’est passé et par ton organisation !''", "next_id": "10", "target_node_id": "C5_S3_I10", "edge_id": "C5_S3_I4_R0_>C5_S3_I10", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Pascal, tu ne comprends pas, je n’ai plus de plaisir à exercer dans de telles conditions. Vraiment. ", "next_id": "6", "target_node_id": "C5_S3_I6", "edge_id": "C5_S3_I4_R1_>C5_S3_I6", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''J’ai l’impression qu’un paysan a de meilleures relations avec ses animaux que nous avec nos patients.''", "next_id": "5", "target_node_id": "C5_S3_I5", "edge_id": "C5_S3_I4_R2_>C5_S3_I5", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je suis infirmière Pascal… je me suis impliquée auprès d’Agathe, elle comptait pour moi.''", "next_id": "5", "target_node_id": "C5_S3_I5", "edge_id": "C5_S3_I4_R3_>C5_S3_I5", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 2, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S3_I10", "actor": "Pascal", "text": "6.a) Je te sens à fleur de peau. Je te conseille vivement de prendre rendez-vous avec Mme Kaufmann parce qu’on ne peut pas continuer comme ça. Je dois aller à une séance maintenant, tiens-moi au courant. Tu peux rester encore un moment ici si tu veux.", "image": "Pascal_neutral.png", "responses": [{"text": "''Je m’attendais à ce type de réaction. Mais aucuns soucis j’ai l’habitude de gérer seule les choses.''", "next_id": "12", "target_node_id": "C5_S3_I12", "edge_id": "C5_S3_I10_R0_>C5_S3_I12", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Il ne s’agit pas que de moi Pascal, cette fois je vais informer l’administration de ce disfonctionnement. ", "next_id": "12", "target_node_id": "C5_S3_I12", "edge_id": "C5_S3_I10_R1_>C5_S3_I12", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je suis visiblement en colère :''Sinon quoi ?''", "next_id": "12", "target_node_id": "C5_S3_I12", "edge_id": "C5_S3_I10_R2_>C5_S3_I12", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S3_I12", "actor": "Pascal", "text": "Pascal la regarde dans les yeux : Ton manque de professionnalisme m’étonnera toujours. Puis il part.", "image": "Pascal_neutral.png", "responses": [{"text": "Fin", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je suis désolée. Prenez votre temps. Si vous voulez, je peux rester un moment avec vous.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je respecte votre moment. Je suis là si vous avez besoin de parler.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S3_I6", "actor": "Pascal", "text": "La mise en place d’un suivi psychologique t’aiderait certainement à passer ce cap. Il faut que tu en parles pour aller mieux et continuer à t’investir comme tu le faisais. ", "image": "Pascal_neutral.png", "responses": [{"text": "''J’ai l’impression qu’il n’y a que ça qui t’intéresse, mon investissement au sein de l’établissement.''", "next_id": "7", "target_node_id": "C5_S3_I7", "edge_id": "C5_S3_I6_R0_>C5_S3_I7", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Ce qui m’aiderait c’est que nous gérions les choses différemment Pascal !''", "next_id": "10", "target_node_id": "C5_S3_I10", "edge_id": "C5_S3_I6_R1_>C5_S3_I10", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Non ça va. Je me ressource en allant courir.''", "next_id": "9", "target_node_id": "C5_S3_I9", "edge_id": "C5_S3_I6_R2_>C5_S3_I9", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Pourrais-tu arrêter un instant de tout ramener au travail pour te soucier du bien être d’une collègue ?''", "next_id": "7", "target_node_id": "C5_S3_I7", "edge_id": "C5_S3_I6_R3_>C5_S3_I7", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S3_I7", "actor": "Pascal", "text": "Ton bien être m’est important, l’équipe a besoin de toi mais pas seulement, ta famille aussi. Ne surinterprète pas mes paroles Claude.", "image": "Pascal_neutral.png", "responses": [{"text": "''Je sais, excuse-moi Pascal mais parfois j’ai l’impression que tout ce qui importe pour toi c’est l’organisation du service.''", "next_id": "9", "target_node_id": "C5_S3_I9", "edge_id": "C5_S3_I7_R0_>C5_S3_I9", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Ça fait du bien de te l’entendre dire. En fait mon interprétation vient de la cadence que tu nous impose qui nous empêche d’être de véritables infirmières. Claude craque. ", "next_id": "9", "target_node_id": "C5_S3_I9", "edge_id": "C5_S3_I7_R1_>C5_S3_I9", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "J’aurais aimé l’entendre avant. ", "next_id": "8", "target_node_id": "C5_S3_I8", "edge_id": "C5_S3_I7_R2_>C5_S3_I8", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S3_I9", "actor": "Pascal", "text": "Pascal regarde soudainement sa montre et inspire profondément : Claude, je suis navrée mais j’ai un rendez-vous, n’hésite pas à revenir si ça ne va pas. Tu sais également que la psychologue Mme Kaufmann est de très bon conseil. Tu peux rester dans mon bureau le temps de te remettre de tes émotions. À plus tard.", "image": "Pascal_neutral.png", "responses": [{"text": "''Merci du conseil Pascal. Je vais rester encore un moment. j’ai les larmes aux yeux.''", "next_id": "11", "target_node_id": "C5_S3_I11", "edge_id": "C5_S3_I9_R0_>C5_S3_I11", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je répond d’une voix monocorde :''Merci de m’avoir accordé ce moment Pascal. Son regard est perdu dans le vide.''", "next_id": "11", "target_node_id": "C5_S3_I11", "edge_id": "C5_S3_I9_R1_>C5_S3_I11", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je crois que j’ai vraiment besoin de faire le point. Je vais prendre quelques jours de repos Pascal.''", "next_id": "11", "target_node_id": "C5_S3_I11", "edge_id": "C5_S3_I9_R2_>C5_S3_I11", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S3_I11", "actor": "Pascal", "text": "Pascal lui pose la main sur l’épaule en partant.", "image": "Pascal_neutral.png", "responses": [{"text": "Fin", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je suis désolée. Prenez votre temps. Si vous voulez, je peux rester un moment avec vous.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je respecte votre moment. Je suis là si vous avez besoin de parler.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S3_I8", "actor": "Pascal", "text": "Claude je suis infirmier comme toi, pas psychothérapeute. ", "image": "Pascal_neutral.png", "responses": [{"text": "C’est tellement plus simple de contourner le problème", "next_id": "10", "target_node_id": "C5_S3_I10", "edge_id": "C5_S3_I8_R0_>C5_S3_I10", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "J’te remercie de cette précision mais je m’en étais aperçue figure toi. ", "next_id": "10", "target_node_id": "C5_S3_I10", "edge_id": "C5_S3_I8_R1_>C5_S3_I10", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je la gorge serrée :''Je ne demande qu’à être écoutée sur ce qui me semble difonctionnel au niveau de la prise en charge des résidents.''", "next_id": "10", "target_node_id": "C5_S3_I10", "edge_id": "C5_S3_I8_R2_>C5_S3_I10", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je sais Pascal, il n’empêche qu’il faut qu’on aborde certains points qui sont tout aussi important pour les résidents que pour nous les soignants.''", "next_id": "10", "target_node_id": "C5_S3_I10", "edge_id": "C5_S3_I8_R3_>C5_S3_I10", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S3_I5", "actor": "Pascal", "text": "Je pense que ta tristesse fausse ton jugement. Je te le répète tu as fait ce qu’il fallait Claude.", "image": "Pascal_neutral.png", "responses": [{"text": "''Alors pourquoi je me sens si mal ?''", "next_id": "8", "target_node_id": "C5_S3_I8", "edge_id": "C5_S3_I5_R0_>C5_S3_I8", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 2, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je la voix tremblante :''Je suis triste, en colère aussi… nous n’avons pas été assez présent au moment où Agathe en avait le plus besoin.''", "next_id": "6", "target_node_id": "C5_S3_I6", "edge_id": "C5_S3_I5_R1_>C5_S3_I6", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je pense que nous aurions pu accorder plus d’attention à son apaisement psychique. ", "next_id": "6", "target_node_id": "C5_S3_I6", "edge_id": "C5_S3_I5_R2_>C5_S3_I6", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S3_I3", "actor": "Pascal", "text": "''Accroche-toi Claude, j’ai besoin de toi. Tu ne vas pas me lâcher maintenant ?''", "image": "Pascal_confused.png", "responses": [{"text": "''Je n’ai pas l’intention de partir. J’essaye de comprendre ce qui m’arrive et j’aimerais que tu me soutiennes.''", "next_id": "6", "target_node_id": "C5_S3_I6", "edge_id": "C5_S3_I3_R0_>C5_S3_I6", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''J’ai besoin de m’arrêter quelque temps.''", "next_id": "6", "target_node_id": "C5_S3_I6", "edge_id": "C5_S3_I3_R1_>C5_S3_I6", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''J’ai écrit une lettre à Agathe. Je l’ai lancée dans la rivière et ça m’a fait beaucoup de bien.''", "next_id": "6", "target_node_id": "C5_S3_I6", "edge_id": "C5_S3_I3_R2_>C5_S3_I6", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "C’est comme si une partie de moi était partie avec Agathe", "next_id": "6", "target_node_id": "C5_S3_I6", "edge_id": "C5_S3_I3_R3_>C5_S3_I6", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}], "id_to_parcours": {"1": {"node_id": "C5_S3_I1", "actor": "Pascal", "text": "''Qu’est-ce qu’il y a Claude ?''", "image": "Pascal_confused.png", "responses": [{"text": "''Je ne sais pas. J’éprouve de la difficulté à entrer en relation avec les patients.''", "next_id": "2", "target_node_id": "C5_S3_I2", "edge_id": "C5_S3_I1_R0_>C5_S3_I2", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''J’ai l’impression d’être distante.''", "next_id": "3", "target_node_id": "C5_S3_I3", "edge_id": "C5_S3_I1_R1_>C5_S3_I3", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je me responsable de la colère de Margot.''", "next_id": "2", "target_node_id": "C5_S3_I2", "edge_id": "C5_S3_I1_R2_>C5_S3_I2", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''On s’est planté dans la gestion de la situation d’Agathe.''", "next_id": "2", "target_node_id": "C5_S3_I2", "edge_id": "C5_S3_I1_R3_>C5_S3_I2", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "J’aurais tellement aimé qu’Agathe puisse dire au revoir à ses proches. Je me coupable. ", "next_id": "2", "target_node_id": "C5_S3_I2", "edge_id": "C5_S3_I1_R4_>C5_S3_I2", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je suis fatiguée, je n’ai plus d’énergie.''", "next_id": "3", "target_node_id": "C5_S3_I3", "edge_id": "C5_S3_I1_R5_>C5_S3_I3", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je me seule. Je n’arrive pas à en parler.''", "next_id": "6", "target_node_id": "C5_S3_I6", "edge_id": "C5_S3_I1_R6_>C5_S3_I6", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Devant la porte de la chambre 14, j’ai l’impression que je vais retrouver Agathe. ", "next_id": "3", "target_node_id": "C5_S3_I3", "edge_id": "C5_S3_I1_R7_>C5_S3_I3", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je pleure à chaudes larmes.''", "next_id": "3", "target_node_id": "C5_S3_I3", "edge_id": "C5_S3_I1_R8_>C5_S3_I3", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "2": {"node_id": "C5_S3_I2", "actor": "Pascal", "text": "''On a fait ce qu’il y avait à faire Claude, on n’a rien à se reprocher.''", "image": "Pascal_neutral.png", "responses": [{"text": "''Est-ce qu’on peut organiser un moment de recueillement avec l’équipe en mémoire d’Agathe ?''", "next_id": "4", "target_node_id": "C5_S3_I4", "edge_id": "C5_S3_I2_R0_>C5_S3_I4", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Est-ce que je peux aller à l’enterrement d’Agathe sur mon temps de travail ?''", "next_id": "4", "target_node_id": "C5_S3_I4", "edge_id": "C5_S3_I2_R1_>C5_S3_I4", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Il faudrait laisser plus de temps de recueillement aux résidents et au personnel avant d’emmener le corps du défunt. ", "next_id": "4", "target_node_id": "C5_S3_I4", "edge_id": "C5_S3_I2_R2_>C5_S3_I4", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Ça nous aiderait énormément si les chambres pouvaient après un décès rester inoccupée pendant une semaine. ", "next_id": "4", "target_node_id": "C5_S3_I4", "edge_id": "C5_S3_I2_R3_>C5_S3_I4", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''J’aimerais bien qu’on invite Margot à venir partager un repas avec nous.''", "next_id": "4", "target_node_id": "C5_S3_I4", "edge_id": "C5_S3_I2_R4_>C5_S3_I4", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "J’aurais besoin qu’après le souper on puisse parler d’Agathe avec les résidents. ", "next_id": "4", "target_node_id": "C5_S3_I4", "edge_id": "C5_S3_I2_R5_>C5_S3_I4", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Peux-tu faire intervenir un psychologue pour l’équipe après tout ce qui s’est passé avec Agathe ?''", "next_id": "5", "target_node_id": "C5_S3_I5", "edge_id": "C5_S3_I2_R6_>C5_S3_I5", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "4": {"node_id": "C5_S3_I4", "actor": "Pascal", "text": "Ce n’est pas possible Claude et tu le sais, ça demanderait de revoir notre organisation. ", "image": "Pascal_neutral.png", "responses": [{"text": "''Je crois que tu ne saisis pas, je me sens fatiguée, vidée… par ce qui s’est passé et par ton organisation !''", "next_id": "10", "target_node_id": "C5_S3_I10", "edge_id": "C5_S3_I4_R0_>C5_S3_I10", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Pascal, tu ne comprends pas, je n’ai plus de plaisir à exercer dans de telles conditions. Vraiment. ", "next_id": "6", "target_node_id": "C5_S3_I6", "edge_id": "C5_S3_I4_R1_>C5_S3_I6", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''J’ai l’impression qu’un paysan a de meilleures relations avec ses animaux que nous avec nos patients.''", "next_id": "5", "target_node_id": "C5_S3_I5", "edge_id": "C5_S3_I4_R2_>C5_S3_I5", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je suis infirmière Pascal… je me suis impliquée auprès d’Agathe, elle comptait pour moi.''", "next_id": "5", "target_node_id": "C5_S3_I5", "edge_id": "C5_S3_I4_R3_>C5_S3_I5", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 2, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "10": {"node_id": "C5_S3_I10", "actor": "Pascal", "text": "6.a) Je te sens à fleur de peau. Je te conseille vivement de prendre rendez-vous avec Mme Kaufmann parce qu’on ne peut pas continuer comme ça. Je dois aller à une séance maintenant, tiens-moi au courant. Tu peux rester encore un moment ici si tu veux.", "image": "Pascal_neutral.png", "responses": [{"text": "''Je m’attendais à ce type de réaction. Mais aucuns soucis j’ai l’habitude de gérer seule les choses.''", "next_id": "12", "target_node_id": "C5_S3_I12", "edge_id": "C5_S3_I10_R0_>C5_S3_I12", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Il ne s’agit pas que de moi Pascal, cette fois je vais informer l’administration de ce disfonctionnement. ", "next_id": "12", "target_node_id": "C5_S3_I12", "edge_id": "C5_S3_I10_R1_>C5_S3_I12", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je suis visiblement en colère :''Sinon quoi ?''", "next_id": "12", "target_node_id": "C5_S3_I12", "edge_id": "C5_S3_I10_R2_>C5_S3_I12", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "12": {"node_id": "C5_S3_I12", "actor": "Pascal", "text": "Pascal la regarde dans les yeux : Ton manque de professionnalisme m’étonnera toujours. Puis il part.", "image": "Pascal_neutral.png", "responses": [{"text": "Fin", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je suis désolée. Prenez votre temps. Si vous voulez, je peux rester un moment avec vous.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je respecte votre moment. Je suis là si vous avez besoin de parler.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "6": {"node_id": "C5_S3_I6", "actor": "Pascal", "text": "La mise en place d’un suivi psychologique t’aiderait certainement à passer ce cap. Il faut que tu en parles pour aller mieux et continuer à t’investir comme tu le faisais. ", "image": "Pascal_neutral.png", "responses": [{"text": "''J’ai l’impression qu’il n’y a que ça qui t’intéresse, mon investissement au sein de l’établissement.''", "next_id": "7", "target_node_id": "C5_S3_I7", "edge_id": "C5_S3_I6_R0_>C5_S3_I7", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Ce qui m’aiderait c’est que nous gérions les choses différemment Pascal !''", "next_id": "10", "target_node_id": "C5_S3_I10", "edge_id": "C5_S3_I6_R1_>C5_S3_I10", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Non ça va. Je me ressource en allant courir.''", "next_id": "9", "target_node_id": "C5_S3_I9", "edge_id": "C5_S3_I6_R2_>C5_S3_I9", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Pourrais-tu arrêter un instant de tout ramener au travail pour te soucier du bien être d’une collègue ?''", "next_id": "7", "target_node_id": "C5_S3_I7", "edge_id": "C5_S3_I6_R3_>C5_S3_I7", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "7": {"node_id": "C5_S3_I7", "actor": "Pascal", "text": "Ton bien être m’est important, l’équipe a besoin de toi mais pas seulement, ta famille aussi. Ne surinterprète pas mes paroles Claude.", "image": "Pascal_neutral.png", "responses": [{"text": "''Je sais, excuse-moi Pascal mais parfois j’ai l’impression que tout ce qui importe pour toi c’est l’organisation du service.''", "next_id": "9", "target_node_id": "C5_S3_I9", "edge_id": "C5_S3_I7_R0_>C5_S3_I9", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Ça fait du bien de te l’entendre dire. En fait mon interprétation vient de la cadence que tu nous impose qui nous empêche d’être de véritables infirmières. Claude craque. ", "next_id": "9", "target_node_id": "C5_S3_I9", "edge_id": "C5_S3_I7_R1_>C5_S3_I9", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "J’aurais aimé l’entendre avant. ", "next_id": "8", "target_node_id": "C5_S3_I8", "edge_id": "C5_S3_I7_R2_>C5_S3_I8", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "9": {"node_id": "C5_S3_I9", "actor": "Pascal", "text": "Pascal regarde soudainement sa montre et inspire profondément : Claude, je suis navrée mais j’ai un rendez-vous, n’hésite pas à revenir si ça ne va pas. Tu sais également que la psychologue Mme Kaufmann est de très bon conseil. Tu peux rester dans mon bureau le temps de te remettre de tes émotions. À plus tard.", "image": "Pascal_neutral.png", "responses": [{"text": "''Merci du conseil Pascal. Je vais rester encore un moment. j’ai les l var container = document.getElementById("network");
var network = null;
var nodesDS = null;
var edgesDS = null;
var currentSceneIdx = 0;
var parcoursPath = { nodes: [], edges: [] };
var parcoursCurrent = null;
var parcoursScores = { RespectAndDignity: 0, Empathy: 0, Compassion: 0, EmotionalRegulation: 0, CommunicationClarity: 0, ProfessionalBoundaries: 0, InterprofessionalCollaboration: 0 };

function setMode(mode) {
    document.querySelectorAll(".mode-btn").forEach(function(b) { b.classList.toggle("active", b.dataset.mode === mode); });
    document.getElementById("panel-edit").classList.toggle("hidden", mode !== "edit");
    document.getElementById("panel-parcours").classList.toggle("active", mode === "parcours");
    if (mode === "parcours" && scenesData.length > 0) {
        parcoursPath = { nodes: [], edges: [] };
        parcoursCurrent = null;
        parcoursScores = { RespectAndDignity: 0, Empathy: 0, Compassion: 0, EmotionalRegulation: 0, CommunicationClarity: 0, ProfessionalBoundaries: 0, InterprofessionalCollaboration: 0 };
        showParcoursScene(currentSceneIdx);
    } else {
        parcoursPath = { nodes: [], edges: [] };
        parcoursCurrent = null;
        if (nodesDS && edgesDS) highlightPath();
    }
}

function showParcoursScene(idx) {
    var s = scenesData[idx];
    document.getElementById("parcours-title").textContent = s.title + " — Parcours joueur";
    if (!s.parcours || s.parcours.length === 0) {
        document.getElementById("parcours-content").innerHTML = '<div class="parcours-card"><div class="parcours-end">Aucune interaction dans ce scénario.</div></div>';
        document.getElementById("parcours-restart").style.display = "none";
        return;
    }
    parcoursPath = { nodes: [], edges: [] };
    parcoursScores = { RespectAndDignity: 0, Empathy: 0, Compassion: 0, EmotionalRegulation: 0, CommunicationClarity: 0, ProfessionalBoundaries: 0, InterprofessionalCollaboration: 0 };
    parcoursCurrent = s.parcours[0];
    renderParcours(s);
    highlightPath();
}

function esc(s) { if (!s) return ""; return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function renderParcours(s) {
    var ia = parcoursCurrent;
    if (!ia) {
        var totalsHtml = '<div class="parcours-card"><div class="parcours-end">Fin de cette branche.</div>';
        if (parcoursPath.nodes.length > 0) {
            totalsHtml += '<div class="parcours-totals"><h4>Score total du parcours</h4>';
            var labels = { RespectAndDignity: "Respect et dignité", Empathy: "Empathie", Compassion: "Compassion", EmotionalRegulation: "Régulation émotionnelle", CommunicationClarity: "Clarté communication", ProfessionalBoundaries: "Frontières pro.", InterprofessionalCollaboration: "Collab. interpro." };
            for (var k in parcoursScores) {
                var v = parcoursScores[k];
                var cls = v > 0 ? "positive" : (v < 0 ? "negative" : "zero");
                totalsHtml += '<div class="score-line ' + cls + '">' + (labels[k] || k) + ': ' + (v >= 0 ? '+' : '') + v + '</div>';
            }
            totalsHtml += '</div>';
        }
        totalsHtml += '</div>';
        document.getElementById("parcours-content").innerHTML = totalsHtml;
        document.getElementById("parcours-restart").style.display = parcoursPath.nodes.length > 0 ? "block" : "none";
        return;
    }
    var imgHtml = (ia.image) ? '<img class="parcours-image" src="/api/data/images/' + esc(ia.image) + '" alt="" />' : '';
    var html = '<div class="parcours-card">' + imgHtml + '<span class="actor">' + esc(ia.actor) + '</span><div class="text">' + esc(ia.text || "—") + '</div>';
    if (ia.responses && ia.responses.length > 0) {
        ia.responses.forEach(function(r, i) {
            var label = r.text || ("→ I" + r.next_id);
            var scores = { RespectAndDignity: r.RespectAndDignity||0, Empathy: r.Empathy||0, Compassion: r.Compassion||0, EmotionalRegulation: r.EmotionalRegulation||0, CommunicationClarity: r.CommunicationClarity||0, ProfessionalBoundaries: r.ProfessionalBoundaries||0, InterprofessionalCollaboration: r.InterprofessionalCollaboration||0 };
            html += '<button class="parcours-choice" data-next="' + r.next_id + '" data-target="' + esc(r.target_node_id || "") + '" data-edge="' + esc(r.edge_id || "") + '" data-scores="' + esc(JSON.stringify(scores)) + '">' + esc(label) + '</button>';
        });
    } else {
        html += '<div class="parcours-end">Fin de cette branche.</div>';
    }
    html += '</div>';

    // Affichage du score courant du parcours (mise à jour en direct)
    var labels = { RespectAndDignity: "Respect et dignité", Empathy: "Empathie", Compassion: "Compassion", EmotionalRegulation: "Régulation émotionnelle", CommunicationClarity: "Clarté communication", ProfessionalBoundaries: "Frontières pro.", InterprofessionalCollaboration: "Collab. interpro." };
    var liveTotals = '<div class="parcours-totals"><h4>Score courant du parcours</h4>';
    for (var k in parcoursScores) {
        var v = parcoursScores[k] || 0;
        var cls = v > 0 ? "positive" : (v < 0 ? "negative" : "zero");
        liveTotals += '<div class="score-line ' + cls + '">' + (labels[k] || k) + ': ' + (v >= 0 ? '+' : '') + v + '</div>';
    }
    liveTotals += '</div>';
    html += liveTotals;
    document.getElementById("parcours-content").innerHTML = html;
    document.getElementById("parcours-restart").style.display = parcoursPath.nodes.length > 0 ? "block" : "none";
    document.querySelectorAll(".parcours-choice").forEach(function(btn) {
        btn.addEventListener("click", function() {
            var scores = JSON.parse(this.dataset.scores || "{}");
            for (var k in scores) parcoursScores[k] = (parcoursScores[k] || 0) + (parseInt(scores[k]) || 0);
            var nextId = this.dataset.next;
            var edgeId = this.dataset.edge;
            if (parcoursCurrent && parcoursCurrent.node_id) parcoursPath.nodes.push(parcoursCurrent.node_id);
            if (edgeId) parcoursPath.edges.push(edgeId);
            parcoursCurrent = s.id_to_parcours && nextId !== "-1" && nextId !== "" ? s.id_to_parcours[nextId] : null;
            if (parcoursCurrent) parcoursPath.nodes.push(parcoursCurrent.node_id);
            renderParcours(s);
            highlightPath();
        });
    });
}

function highlightPath() {
    try {
        if (!nodesDS || !edgesDS) return;
        var pathNodes = parcoursPath.nodes || [];
        var pathEdges = parcoursPath.edges || [];
        var curNode = parcoursCurrent ? parcoursCurrent.node_id : null;
        nodesDS.getIds().forEach(function(nid) {
            var inPath = pathNodes.indexOf(nid) >= 0;
            var isCurrent = curNode === nid;
            nodesDS.update({ id: nid, color: { background: inPath ? "#166534" : "#27272a", border: isCurrent ? "#fbbf24" : (inPath ? "#22c55e" : "#38bdf8") } });
        });
        edgesDS.getIds().forEach(function(eid) {
            var inPath = pathEdges.indexOf(eid) >= 0;
            edgesDS.update({ id: eid, color: inPath ? "#4ade80" : "#9ca3af" });
        });
    } catch (err) { console.warn("highlightPath:", err); }
}

function showScene(idx) {
    currentSceneIdx = idx;
    document.querySelectorAll(".scene-btn").forEach(function(b) {
        b.classList.toggle("active", parseInt(b.dataset.idx) === idx);
    });
    var s = scenesData[idx];
    document.getElementById("ed-title").textContent = s.title;
    var introHtml = '<div class="scene-intro"><label>EG-4 : SceneIntroduction</label><textarea class="edit" data-type="intro" rows="3">' + (s.scene_intro || '').replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;") + '</textarea></div>';
    document.getElementById("ed-content").innerHTML = introHtml + s.editor;

    var opts = {
        nodes: { font: { size: 38, color: "#f9fafb", face: "system-ui, -apple-system, sans-serif", bold: true }, shape: "box", color: { background: "#18181b", border: "#38bdf8" }, margin: 32, borderWidth: 2, widthConstraint: { minimum: 260, maximum: 360 } },
        edges: { arrows: "to", width: 2, color: "#9ca3af", font: { color: "#e5e7eb", size: 20, face: "system-ui, sans-serif" } },
        layout: { hierarchical: { enabled: true, direction: "UD", sortMethod: "directed", levelSeparation: 380, nodeSpacing: 480, treeSpacing: 440, blockShifting: true, edgeMinimization: true } },
        physics: { enabled: false },
        interaction: { zoomView: true, dragView: true }
    };

    if (nodesDS && edgesDS) {
        nodesDS.clear();
        edgesDS.clear();
        s.nodes.forEach(function(n) { nodesDS.add(n); });
        s.edges.forEach(function(e) { edgesDS.add(e); });
        setTimeout(function() { if (network) network.fit({ animation: { duration: 300 }, scale: 1.3 }); }, 200);
    } else {
        nodesDS = new vis.DataSet(s.nodes);
        edgesDS = new vis.DataSet(s.edges);
        network = new vis.Network(container, { nodes: nodesDS, edges: edgesDS }, opts);
        network.once("afterDrawing", function() { network.fit({ animation: { duration: 400 }, scale: 1.6 }); });
        setTimeout(function() { if (network) { network.redraw(); network.fit({ scale: 1.6 }); } }, 300);
        network.on("click", function(params) {
            if (params.nodes && params.nodes.length > 0) {
                var nid = String(params.nodes[0]);
                var m = nid.match(/_I(\d+)$/);
                if (m) {
                    var block = document.querySelector('.block[data-interaction-id="' + m[1] + '"]');
                    if (block) block.scrollIntoView({ behavior: "smooth" });
                }
            }
        });
    }

    attachEditors(idx);
    updateValidation();
    if (document.getElementById("panel-parcours").classList.contains("active")) {
        parcoursPath = { nodes: [], edges: [] };
        parcoursCurrent = null;
        showParcoursScene(idx);
    } else {
        highlightPath();
    }
}

function escapeHtml(s) {
    if (!s) return '';
    return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function attachEditors(idx) {
    var ch = chaptersData.Chapters[0];
    var sc = ch.Scenes[idx];
    document.querySelectorAll("#ed-content .edit").forEach(function(el) {
        el.addEventListener("input", function() {
            var type = this.dataset.type;
            var i = parseInt(this.dataset.i);
            if (type === "intro") {
                sc.SceneIntroduction = this.value;
            } else if (type === "name") {
                sc.Interactions[i].Name = this.value;
            } else if (type === "text") {
                sc.Interactions[i].Text = this.value;
                sc.Interactions[i].Name = this.value.substring(0, 50);
            } else if (type === "response") {
                var r = parseInt(this.dataset.r);
                sc.Interactions[i].Responses[r].Text = this.value;
                sc.Interactions[i].Responses[r].Name = this.value.substring(0, 80);
            }
        });
    });
    document.querySelectorAll("#ed-content .score").forEach(function(el) {
        el.addEventListener("change", function() {
            var i = parseInt(this.dataset.i), r = parseInt(this.dataset.r), skill = this.dataset.skill;
            var v = parseInt(this.value) || 0;
            if (v < -3) v = -3;
            if (v > 3) v = 3;
            sc.Interactions[i].Responses[r][skill] = v;
        });
    });
}

function updateValidation() {
    var errs = [];
    var ch = chaptersData.Chapters[0];
    ch.Scenes.forEach(function(sc) {
        var ids = {};
        sc.Interactions.forEach(function(ia) { ids[ia.Id] = true; });
        sc.Interactions.forEach(function(ia) {
            (ia.Responses || []).forEach(function(r) {
                var nid = r.NextInteractionID;
                if (nid != null && nid !== -1 && !ids[nid]) errs.push("EG-7: NextInteractionID " + nid + " invalide (scène " + sc.Title + ")");
            });
        });
    });
    var div = document.getElementById("validation");
    if (errs.length > 0) {
        div.className = "validation";
        div.textContent = errs.join(" ; ");
    } else {
        div.className = "validation ok";
        div.textContent = "EG-7 : Validation OK — NextInteractionID valides.";
    }
}

document.querySelectorAll(".scene-btn").forEach(function(b) {
    b.addEventListener("click", function() { showScene(parseInt(this.dataset.idx)); });
});

document.querySelectorAll(".mode-btn").forEach(function(b) {
    b.addEventListener("click", function() { setMode(this.dataset.mode); });
});

document.getElementById("parcours-restart").addEventListener("click", function() {
    if (scenesData.length > 0) showParcoursScene(currentSceneIdx);
});

document.getElementById("search").addEventListener("input", function() {
    var q = (this.value || "").toLowerCase();
    document.querySelectorAll(".scene-btn").forEach(function(b) {
        b.style.display = q && b.textContent.toLowerCase().indexOf(q) < 0 ? "none" : "block";
    });
    if (scenesData && scenesData.length > 0) {
        var vis = (this.value || "").toLowerCase();
        if (vis && nodesDS && edgesDS) {
            var nodeIds = nodesDS.getIds();
            nodeIds.forEach(function(nid) {
                var node = nodesDS.get(nid);
                var match = (node.label && node.label.toLowerCase().indexOf(vis) >= 0) || (node.title && node.title.toLowerCase().indexOf(vis) >= 0);
                nodesDS.update({ id: nid, hidden: !match });
            });
        } else if (nodesDS) {
            nodesDS.getIds().forEach(function(nid) { nodesDS.update({ id: nid, hidden: false }); });
        }
    }
});

document.getElementById("save-btn").addEventListener("click", function() {
    var btn = this;
    var statusEl = document.getElementById("save-status");
    btn.disabled = true;
    statusEl.className = "";
    statusEl.textContent = "Enregistrement…";
    fetch("/api/save", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(chaptersData)
    }).then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
    .then(function(result) {
        btn.disabled = false;
        if (result.ok) {
            statusEl.className = "save-ok";
            statusEl.textContent = result.data.message || "Sauvegardé.";
        } else {
            statusEl.className = "save-err";
            statusEl.textContent = result.data.error || "Erreur. Utilisez python app.py pour activer la sauvegarde directe.";
        }
    }).catch(function(err) {
        btn.disabled = false;
        statusEl.className = "save-err";
        statusEl.textContent = "Erreur réseau. Lancez python app.py puis ouvrez http://localhost:8765";
    });
});

document.getElementById("export-btn").addEventListener("click", function() {
    var blob = new Blob([JSON.stringify(chaptersData, null, 2)], { type: "application/json" });
    var a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "Chapitre_" + chapterId + "_modified.json";
    a.click();
});

function init() {
    if (typeof vis === "undefined") {
        container.innerHTML = "<p style='color:#ef4444;padding:20px'>vis-network non chargé. Vérifiez votre connexion et rechargez.</p>";
        return;
    }
    if (scenesData && scenesData.length > 0) {
        try { showScene(0); } catch (err) {
            console.error("showScene:", err);
            container.innerHTML = "<p style='color:#ef4444;padding:20px'>Erreur: " + String(err.message || err) + "</p>";
        }
    } else {
        document.getElementById("ed-content").innerHTML = "<div class='empty'>Aucune donnée (erreur de chargement?).</div>";
    }
}
function runInit() {
    if (typeof vis !== "undefined") { init(); return; }
    var n = 0;
    var t = setInterval(function() {
        n++;
        if (typeof vis !== "undefined") { clearInterval(t); init(); }
        else if (n > 60) { clearInterval(t); container.innerHTML = "<p style='color:#ef4444;padding:20px'>vis-network timeout.</p>"; }
    }, 100);
}
window.addEventListener("load", function() { setTimeout(runInit, 80); });
</script>
</body>
</html>
