: "Margot_sad.png", "responses": [{"text": "''Je baisse le regard un instant et reste silencieuse.''", "next_id": "18", "target_node_id": "C5_S1_I18", "edge_id": "C5_S1_I14_R0_>C5_S1_I18", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Margot je vous en prie soyez raisonnable.", "next_id": "18", "target_node_id": "C5_S1_I18", "edge_id": "C5_S1_I14_R1_>C5_S1_I18", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je suis désolée. Prenez votre temps. Si vous voulez, je peux rester un moment avec vous.''", "next_id": "18", "target_node_id": "C5_S1_I18", "edge_id": "C5_S1_I14_R2_>C5_S1_I18", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "18": {"node_id": "C5_S1_I18", "actor": "Margot", "text": "Au fond vous le savez qu’il aurait fallu m’appeler.", "image": "Margot_neutral.png", "responses": [{"text": "''Je l’air désolé : Nous n’avions pas d’autres alternatives que de ne pas vous appeler.''", "next_id": "22", "target_node_id": "C5_S1_I22", "edge_id": "C5_S1_I18_R0_>C5_S1_I22", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Pourquoi n’êtes-vous plus venue ?''", "next_id": "20", "target_node_id": "C5_S1_I20", "edge_id": "C5_S1_I18_R1_>C5_S1_I20", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 2, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je ne suis pas responsable de ce que votre mère a décidé vous comprenez.''", "next_id": "21", "target_node_id": "C5_S1_I21", "edge_id": "C5_S1_I18_R2_>C5_S1_I21", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "20": {"node_id": "C5_S1_I20", "actor": "Margot", "text": "''Comment osez-vous me culpabiliser ainsi. J’étais là il y a 2 semaines, maman paraissait un peu fatiguée mais pas mourante. Vous êtes horrible !''", "image": "Margot_angry.png", "responses": [{"text": "''Je suis navrée. Elle ne sait que répondre et quitte la pièce sans rien dire, laissant Margot ranger les affaires de sa maman.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je suis désolée. Prenez votre temps. Si vous voulez, je peux rester un moment avec vous.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je respecte votre moment. Je suis là si vous avez besoin de parler.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "10": {"node_id": "C5_S1_I10", "actor": "Margot", "text": "Claude sort laissant Margot rassembler les affaires de sa maman avec peine.", "image": "Margot_neutral.png", "responses": [{"text": "Sortir", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je suis désolée. Prenez votre temps. Si vous voulez, je peux rester un moment avec vous.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je respecte votre moment. Je suis là si vous avez besoin de parler.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "5": {"node_id": "C5_S1_I5", "actor": "Margot", "text": "''Vous ne comprenez rien du tout ! Comment je vais pouvoir faire mon deuil maintenant ? La dernière fois que je l’ai vue, elle était vivante, heureuse. Et là ! Je n’ai pas pu lui dire adieu, lui dire que je l’aimais.''", "image": "Margot_happy.png", "responses": [{"text": "Je suis attentive :''Vous vous souciez de votre capacité à vivre ce deuil ? C’est quoi le plus difficile pour vous ?''", "next_id": "8", "target_node_id": "C5_S1_I8", "edge_id": "C5_S1_I5_R0_>C5_S1_I8", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je parle posément : Ecrire à votre maman et lui dire votre amour pourrait vous aider à amorcer le travail de deuil''", "next_id": "8", "target_node_id": "C5_S1_I8", "edge_id": "C5_S1_I5_R1_>C5_S1_I8", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je peux vous conseiller un excellent psychologue pour vous soutenir dans cette épreuve''", "next_id": "8", "target_node_id": "C5_S1_I8", "edge_id": "C5_S1_I5_R2_>C5_S1_I8", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "7": {"node_id": "C5_S1_I7", "actor": "Margot", "text": "Margot la regarde les yeux remplis de larmes :''Difficile ?... Vous êtes loin du compte…''", "image": "Margot_sad.png", "responses": [{"text": "Je me rapproche d’elle :''De quoi avez-vous besoin maintenant ?''", "next_id": "8", "target_node_id": "C5_S1_I8", "edge_id": "C5_S1_I7_R0_>C5_S1_I8", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je d’un ton calme :''Qu’est-ce qui est le plus important pour vous maintenant ? Comment je peux vous aider ?''", "next_id": "8", "target_node_id": "C5_S1_I8", "edge_id": "C5_S1_I7_R1_>C5_S1_I8", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 1, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je respecte votre moment. Je suis là si vous avez besoin de parler.''", "next_id": "8", "target_node_id": "C5_S1_I8", "edge_id": "C5_S1_I7_R2_>C5_S1_I8", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "3": {"node_id": "C5_S1_I3", "actor": "Margot", "text": "Margot outrée dit :''Non mais ! Figurez-vous que je viens de perdre ma maman et que je n’ai rien pu lui dire avant de partir.''", "image": "Margot_angry.png", "responses": [{"text": "Je le regard compatissant :''Qu’est-ce que vous auriez souhaité lui dire ?''", "next_id": "8", "target_node_id": "C5_S1_I8", "edge_id": "C5_S1_I3_R0_>C5_S1_I8", "RespectAndDignity": 0, "Empathy": 1, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 1, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Ecoutez, je ne suis pas payée pour me faire engueuler, alors du respect s’il vous plaît.", "next_id": "5", "target_node_id": "C5_S1_I5", "edge_id": "C5_S1_I3_R1_>C5_S1_I5", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je suis désolée. Prenez votre temps. Si vous voulez, je peux rester un moment avec vous.''", "next_id": "8", "target_node_id": "C5_S1_I8", "edge_id": "C5_S1_I3_R2_>C5_S1_I8", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "4": {"node_id": "C5_S1_I4", "actor": "Margot", "text": "''Que pourriez-vous m’expliquer ? Cette situation est juste inacceptable !''", "image": "Margot_angry.png", "responses": [{"text": "Je d’un ton calme :''Je sens que c’est difficile pour vous et je comprends votre colère.''", "next_id": "7", "target_node_id": "C5_S1_I7", "edge_id": "C5_S1_I4_R0_>C5_S1_I7", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Les études sur le deuil ont démontré que votre vive réaction est tout à fait normale. Ne vous inquiétez pas.", "next_id": "5", "target_node_id": "C5_S1_I5", "edge_id": "C5_S1_I4_R1_>C5_S1_I5", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je respecte votre moment. Je suis là si vous avez besoin de parler.''", "next_id": "7", "target_node_id": "C5_S1_I7", "edge_id": "C5_S1_I4_R2_>C5_S1_I7", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "25": {"node_id": "C5_S1_I25", "actor": "Margot", "text": "''Je suis désolée Claude mais c’était à moi d’être présente auprès d’elle, pas les membres de votre équipe !''", "image": "Margot_angry.png", "responses": [{"text": "''Souhaitez-vous en parler avec mon responsable ?''", "next_id": "27", "target_node_id": "C5_S1_I27", "edge_id": "C5_S1_I25_R0_>C5_S1_I27", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je d’un ton calme : Margot je suis sincèrement navrée que les choses ne ce soient pas passées ainsi… ne l’interprétez pas contre vous, vôtre maman a fait le choix de la pudeur… peut-être voulait elle vous préserver''", "next_id": "26", "target_node_id": "C5_S1_I26", "edge_id": "C5_S1_I25_R1_>C5_S1_I26", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je respecte votre moment. Je suis là si vous avez besoin de parler.''", "next_id": "27", "target_node_id": "C5_S1_I27", "edge_id": "C5_S1_I25_R2_>C5_S1_I27", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}}}, {"title": "Un nouveau patient en chambre 14", "scene_id": 2, "scene_intro": "Le lendemain, la Maison des Lilas accueille un nouveau patient. Ralph Riederneiter occupe l’ancienne chambre d’Agathe. Claude prend son service en fin d’après-midi et se rend dans la chambre 14 pour rencontrer Ralph qui est assis devant la fenêtre perdu dans ses pensées.", "nodes": [{"id": "C5_S2_I1", "label": "1) je me rend dans", "title": "[Claude] ''Je me rend dans la chambre 14 pour rencontrer Ralph''"}, {"id": "C5_S2_I2", "label": "2) Ce que vous êtes moche !", "title": "[Ralph] ''Ce que vous êtes moche !''"}, {"id": "C5_S2_I3", "label": "3) Vous avez des problèmes", "title": "[Ralph] ''Vous avez des problèmes d’audition ?''"}, {"id": "C5_S2_I4", "label": "3.a ) la regarde avec dé Bonjour, est-ce que je peux prendre un moment avec vous ?''", "next_id": "2", "target_node_id": "C5_S2_I2", "edge_id": "C5_S2_I1_R3_>C5_S2_I2", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Bonjour comment va le petit nouveau ?''", "next_id": "2", "target_node_id": "C5_S2_I2", "edge_id": "C5_S2_I1_R4_>C5_S2_I2", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je m’avance vers Mr. Riederneiter pour le saluer : Bonjour Monsieur Riederneiter je vous souhaite la bienvenue à la Maison des Lilas, je m’appelle Claude et suis infirmière ici. Je tenais à vous saluer car nous serons amenés à nous voir régulièrement. Elle le regarde en souriant.''", "next_id": "2", "target_node_id": "C5_S2_I2", "edge_id": "C5_S2_I1_R5_>C5_S2_I2", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 2, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S2_I2", "actor": "Ralph", "text": "''Ce que vous êtes moche !''", "image": "Ralph_angry.png", "responses": [{"text": "Je écarquille les yeux :''Pardon ? aller au 3''", "next_id": "3", "target_node_id": "C5_S2_I3", "edge_id": "C5_S2_I2_R0_>C5_S2_I3", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je stupéfaite :''ça va l’bocal !''", "next_id": "4", "target_node_id": "C5_S2_I4", "edge_id": "C5_S2_I2_R1_>C5_S2_I4", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je reste bouche bée… après un bref instant elle répond d’un air amusé :''Nul n’est parfait !''", "next_id": "4", "target_node_id": "C5_S2_I4", "edge_id": "C5_S2_I2_R2_>C5_S2_I4", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je suis outrée :''Vous vous êtes vu ? e''", "next_id": "4", "target_node_id": "C5_S2_I4", "edge_id": "C5_S2_I2_R3_>C5_S2_I4", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je semble perplexe :''Qu’est-ce que vous voulez me dire par là ?''", "next_id": "3", "target_node_id": "C5_S2_I3", "edge_id": "C5_S2_I2_R4_>C5_S2_I3", "RespectAndDignity": 0, "Empathy": 1, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 1, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je surprise de cette réaction :''Je me agressée par vos propos.''", "next_id": "5", "target_node_id": "C5_S2_I5", "edge_id": "C5_S2_I2_R5_>C5_S2_I5", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je estomaquée :''Stop ! Je vous arrête de suite.''", "next_id": "5", "target_node_id": "C5_S2_I5", "edge_id": "C5_S2_I2_R6_>C5_S2_I5", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S2_I3", "actor": "Ralph", "text": "''Vous avez des problèmes d’audition ?''", "image": "Ralph_confused.png", "responses": [{"text": "''Non. Vous trouvez que je suis moche ?''", "next_id": "6", "target_node_id": "C5_S2_I6", "edge_id": "C5_S2_I3_R0_>C5_S2_I6", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je avec un sourire narquois : J’ai oublié de mettre mon sonotone.''", "next_id": "6", "target_node_id": "C5_S2_I6", "edge_id": "C5_S2_I3_R1_>C5_S2_I6", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je sur un ton sarcastique :''Vous avez fait l’école du rire vous''", "next_id": "6", "target_node_id": "C5_S2_I6", "edge_id": "C5_S2_I3_R2_>C5_S2_I6", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S2_I6", "actor": "Ralph", "text": "''Vous êtes d’une rare laideur.''", "image": "Ralph_neutral.png", "responses": [{"text": "''Je hausse les épaules, regarde en l’air et sourit : Il y a des goûts et des couleurs.''", "next_id": "10", "target_node_id": "C5_S2_I10", "edge_id": "C5_S2_I6_R0_>C5_S2_I10", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je semble contrariée :''Vous êtes malhonnête !''", "next_id": "10", "target_node_id": "C5_S2_I10", "edge_id": "C5_S2_I6_R1_>C5_S2_I10", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je sur le ton de la plaisanterie : décidément le disque est rayé.''", "next_id": "14", "target_node_id": "C5_S2_I14", "edge_id": "C5_S2_I6_R2_>C5_S2_I14", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S2_I10", "actor": "Ralph", "text": "''Vous ne m’obligerez pas à vous voir et vous ne me toucherez pas. Vous êtes trop moche.''", "image": "Ralph_neutral.png", "responses": [{"text": "Je le regarde attentivement :''Comment s’est passée votre arrivée ici ?''", "next_id": "12", "target_node_id": "C5_S2_I12", "edge_id": "C5_S2_I10_R0_>C5_S2_I12", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 1, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "En le regardant : En effet, je ne suis pas autorisée à vous toucher sans votre autorisation. ", "next_id": "13", "target_node_id": "C5_S2_I13", "edge_id": "C5_S2_I10_R1_>C5_S2_I13", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Parce que vous pensez que vous me donnez envie de vous toucher ?''", "next_id": "13", "target_node_id": "C5_S2_I13", "edge_id": "C5_S2_I10_R2_>C5_S2_I13", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S2_I12", "actor": "Ralph", "text": "Mal.", "image": "Ralph_neutral.png", "responses": [{"text": "Je hoche la tête :''Qu’est-ce qui est difficile pour vous ?''", "next_id": "15", "target_node_id": "C5_S2_I15", "edge_id": "C5_S2_I12_R0_>C5_S2_I15", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 1, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Et vous ne vous gênez pas de le montrer !''", "next_id": "19", "target_node_id": "C5_S2_I19", "edge_id": "C5_S2_I12_R1_>C5_S2_I19", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je le regarde avec compassion : Quitter son lieu de vie pour entrer en EMS est une épreuve.''", "next_id": "15", "target_node_id": "C5_S2_I15", "edge_id": "C5_S2_I12_R2_>C5_S2_I15", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S2_I15", "actor": "Ralph", "text": "''Vous êtes infirmière ou vous êtes psy ?''", "image": "Ralph_confused.png", "responses": [{"text": "Il est important pour moi de savoir comment vous vous sentez pour vous accompagner au mieux dans cette nouvelle étape de votre vie. ", "next_id": "17", "target_node_id": "C5_S2_I17", "edge_id": "C5_S2_I15_R0_>C5_S2_I17", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je suis infirmière''", "next_id": "26", "target_node_id": "C5_S2_I26", "edge_id": "C5_S2_I15_R1_>C5_S2_I26", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 2, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''J’ai besoin de voir un psy ?''", "next_id": "22", "target_node_id": "C5_S2_I22", "edge_id": "C5_S2_I15_R2_>C5_S2_I22", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je étonnée :''Que voulez-vous dire ?''", "next_id": "22", "target_node_id": "C5_S2_I22", "edge_id": "C5_S2_I15_R3_>C5_S2_I22", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S2_I17", "actor": "Ralph", "text": "''Je me comme on peut se sentir devant la plus moche des moches.''", "image": "Ralph_neutral.png", "responses": [{"text": "''Je sourit : Monsieur Riederneiter j’ai compris. Vous me trouvez moche, c’est ainsi. Nous pouvons maintenant nous concentrer sur votre bien être ici.''", "next_id": "19", "target_node_id": "C5_S2_I19", "edge_id": "C5_S2_I17_R0_>C5_S2_I19", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''C’est une obsession chez vous ? Vous avez des problèmes avec les femmes ?''", "next_id": "20", "target_node_id": "C5_S2_I20", "edge_id": "C5_S2_I17_R1_>C5_S2_I20", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je incline la tête : C’est ainsi, vous devrez vous satisfaire de mon apparence pour l’instant.''", "next_id": "20", "target_node_id": "C5_S2_I20", "edge_id": "C5_S2_I17_R2_>C5_S2_I20", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je quitte la pièce en claquant la porte.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S2_I19", "actor": "Ralph", "text": "''Je n’ai pas envie d’être ici.''", "image": "Ralph_neutral.png", "responses": [{"text": "''Où est-ce que vous auriez envie d’être ?''", "next_id": "21", "target_node_id": "C5_S2_I21", "edge_id": "C5_S2_I19_R0_>C5_S2_I21", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je n’avez pas choisi d’être ici ?''", "next_id": "22", "target_node_id": "C5_S2_I22", "edge_id": "C5_S2_I19_R1_>C5_S2_I22", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Et bien moi non plus !''", "next_id": "22", "target_node_id": "C5_S2_I22", "edge_id": "C5_S2_I19_R2_>C5_S2_I22", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S2_I21", "actor": "Ralph", "text": "''Je voudrais continuer de m’occuper de mon jardin et de mes poules.''", "image": "Ralph_neutral.png", "responses": [{"text": "Je hoche la tête et dit :''Je vois…''", "next_id": "24", "target_node_id": "C5_S2_I24", "edge_id": "C5_S2_I21_R0_>C5_S2_I24", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je lui souris :''Vous pourriez trouver de nouvelles activités ici.''", "next_id": "26", "target_node_id": "C5_S2_I26", "edge_id": "C5_S2_I21_R1_>C5_S2_I26", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je le regarde :''Je suis certaine que votre jardin et vos poules sont entre de bonnes mains.''", "next_id": "27", "target_node_id": "C5_S2_I27", "edge_id": "C5_S2_I21_R2_>C5_S2_I27", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S2_I24", "actor": "Ralph", "text": "''Vous n’voyez rien du tout ma p’tite ! Ce soir vous rentrerez chez vous dans votre maison, pas moi !''", "image": "Ralph_angry.png", "responses": [{"text": "''Pardonnez-moi, je ne voulais pas paraître présomptueuse… mes grands-parents sont étrangers et je sais que ça a été difficile pour eux de recréer une nouvelle vie en Suisse.''", "next_id": "27", "target_node_id": "C5_S2_I27", "edge_id": "C5_S2_I24_R0_>C5_S2_I27", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je suis à présent chez vous à la Maison des Lilas''", "next_id": "27", "target_node_id": "C5_S2_I27", "edge_id": "C5_S2_I24_R1_>C5_S2_I27", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je respecte votre moment. Je suis là si vous avez besoin de parler.''", "next_id": "27", "target_node_id": "C5_S2_I27", "edge_id": "C5_S2_I24_R2_>C5_S2_I27", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S2_I27", "actor": "Ralph", "text": "Ralph ne répond pas.", "image": "Ralph_neutral.png", "responses": [{"text": "Monsieur Riederneiter, je vais vous laisser. En cas de besoin vous pouvez sonner. Je reviendrai vous voir en fin de journée", "next_id": "29", "target_node_id": "C5_S2_I29", "edge_id": "C5_S2_I27_R0_>C5_S2_I29", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Si vous souhaitez encore discuter, je repasserai en fin de journée. ", "next_id": "32", "target_node_id": "C5_S2_I32", "edge_id": "C5_S2_I27_R1_>C5_S2_I32", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je suis calme : Respecte le silence. Après quelques minutes elle dit : très bien je vais vous laisser à présent. À demain.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S2_I29", "actor": "Ralph", "text": "Envoyez-moi quelqu’un d’autre vous êtes trop moche. ", "image": "Ralph_neutral.png", "responses": [{"text": "Au revoir Monsieur.", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Nous n’allons pas nous réconcilier aujourd’hui ! Elle sort sur le champ.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Si vous souhaitez être traiter avec égard, je vous conseille de changer d’attitude. Au revoir !''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S2_I32", "actor": "Ralph", "text": "Mr. Riederneiter soupire. ", "image": "Ralph_neutral.png", "responses": [{"text": "''Je quitte aussitôt la pièce.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je suis désolée. Prenez votre temps. Si vous voulez, je peux rester un moment avec vous.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je respecte votre moment. Je suis là si vous avez besoin de parler.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S2_I26", "actor": "Ralph", "text": "Ralph inspire profondément et dit :''Vous savez, j’étais boulanger avant… j’ai tenu ma propre boulangerie pendant 40 ans.''", "image": "Ralph_neutral.png", "responses": [{"text": "''Je avec intérêt : Ah, vous pourrez faire du pain à l’animation''", "next_id": "27", "target_node_id": "C5_S2_I27", "edge_id": "C5_S2_I26_R0_>C5_S2_I27", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je lui souris : C’est un beau métier de faire du pain.''", "next_id": "28", "target_node_id": "C5_S2_I28", "edge_id": "C5_S2_I26_R1_>C5_S2_I28", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je respecte votre moment. Je suis là si vous avez besoin de parler.''", "next_id": "27", "target_node_id": "C5_S2_I27", "edge_id": "C5_S2_I26_R2_>C5_S2_I27", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S2_I28", "actor": "Ralph", "text": "C’était une autre époque… il soupire ", "image": "Ralph_neutral.png", "responses": [{"text": "''Je tente de lui prendre la main.''", "next_id": "30", "target_node_id": "C5_S2_I30", "edge_id": "C5_S2_I28_R0_>C5_S2_I30", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je quitte la pièce en silence.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je respecte votre moment. Je suis là si vous avez besoin de parler.''", "next_id": "30", "target_node_id": "C5_S2_I30", "edge_id": "C5_S2_I28_R2_>C5_S2_I30", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S2_I30", "actor": "Ralph", "text": "Ralph la repousse et reste silencieux. ", "image": "Ralph_neutral.png", "responses": [{"text": "''Je me met à pleurer et quitte la pièce.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''J’ai accompagné une résidente qui est décédée dans cette chambre avant-hier. J’avais un très bon contact avec elle. C’est trop difficile pour moi… - les larmes lui monte au yeux – je vais continuer mes visites, au revoir. Elle sort immédiatement.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je suis désolée. Prenez votre temps. Si vous voulez, je peux rester un moment avec vous.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S2_I22", "actor": "Ralph", "text": "''Mais vous êtes de la police ou quoi ?''", "image": "Ralph_confused.png", "responses": [{"text": "Je avec intérêt :''Vous étiez policier ?''", "next_id": "25", "target_node_id": "C5_S2_I25", "edge_id": "C5_S2_I22_R0_>C5_S2_I25", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Non mais si vous continuez à être malpoli, je vais les appeler !''", "next_id": "27", "target_node_id": "C5_S2_I27", "edge_id": "C5_S2_I22_R1_>C5_S2_I27", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Que vient faire la police ici ? Que voulez-vous me dire ?''", "next_id": "29", "target_node_id": "C5_S2_I29", "edge_id": "C5_S2_I22_R2_>C5_S2_I29", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S2_I25", "actor": "Ralph", "text": "''Non, j’étais boulanger.''", "image": "Ralph_neutral.png", "responses": [{"text": "Je sourit :''Comme mon grand-père. Vous avez travaillé où ?''", "next_id": "27", "target_node_id": "C5_S2_I27", "edge_id": "C5_S2_I25_R0_>C5_S2_I27", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je m’avance vers lui :''Voulez-vous me parler de votre métier ?''", "next_id": "28", "target_node_id": "C5_S2_I28", "edge_id": "C5_S2_I25_R1_>C5_S2_I28", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je avec intérêt : C’est un métier important pour les gens.''", "next_id": "28", "target_node_id": "C5_S2_I28", "edge_id": "C5_S2_I25_R2_>C5_S2_I28", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S2_I20", "actor": "Ralph", "text": "''Je veux juste que vous arrêtiez vos simagrées et que vous soyez normale avec moi.''", "image": "Ralph_neutral.png", "responses": [{"text": "''Je hoche la tête : Désolée, je n’ai pas eu l’impression d’en faire trop.''", "next_id": "23", "target_node_id": "C5_S2_I23", "edge_id": "C5_S2_I20_R0_>C5_S2_I23", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Ça vous met en colère que j’agisse ainsi ?''", "next_id": "24", "target_node_id": "C5_S2_I24", "edge_id": "C5_S2_I20_R1_>C5_S2_I24", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Et qu’est-ce que vous ressentez vis-à-vis de mon comportement ?''", "next_id": "22", "target_node_id": "C5_S2_I22", "edge_id": "C5_S2_I20_R2_>C5_S2_I22", "RespectAndDignity": 0, "Empathy": 3, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 1, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S2_I23", "actor": "Ralph", "text": "''Je ne veux pas d’une baby-sitter ou d’une fille de substitution, je n’ai pas besoin de ça !''", "image": "Ralph_angry.png", "responses": [{"text": "Je étonnée :''Vous vous sentez surveillé ?''", "next_id": "27", "target_node_id": "C5_S2_I27", "edge_id": "C5_S2_I23_R0_>C5_S2_I27", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je lui souris et dit :''Vous pouvez avoir confiance en moi.''", "next_id": "26", "target_node_id": "C5_S2_I26", "edge_id": "C5_S2_I23_R1_>C5_S2_I26", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je suis désolée. Prenez votre temps. Si vous voulez, je peux rester un moment avec vous.''", "next_id": "27", "target_node_id": "C5_S2_I27", "edge_id": "C5_S2_I23_R2_>C5_S2_I27", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S2_I13", "actor": "Ralph", "text": "''Alors tant mieux ! Au cas où vous ne l’auriez pas remarqué je n’ai plus l’âge d’être bichonné.''", "image": "Ralph_angry.png", "responses": [{"text": "Je lui souris :''Vous permettez que je m’asseye à côté de vous.''", "next_id": "16", "target_node_id": "C5_S2_I16", "edge_id": "C5_S2_I13_R0_>C5_S2_I16", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je sur un ton léger :''Je vous remercie, figurez-vous que je m’en étais aperçue et mon intention n’est pas de vous infantiliser.''", "next_id": "20", "target_node_id": "C5_S2_I20", "edge_id": "C5_S2_I13_R1_>C5_S2_I20", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je incline la tête et sourit :''Je ne souhaite pas vous bichonner mais vous apporter un peu de réconfort dans cette étape.''", "next_id": "18", "target_node_id": "C5_S2_I18", "edge_id": "C5_S2_I13_R2_>C5_S2_I18", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S2_I16", "actor": "Ralph", "text": "Ralph lève les yeux au ciel et dit : Mais non de non, c'est qu’elle va pas me foutre la paix.", "image": "Ralph_neutral.png", "responses": [{"text": "Si mes questions vous gênent, vous êtes en droit de ne pas répondre. Je comprendrai. ", "next_id": "18", "target_node_id": "C5_S2_I18", "edge_id": "C5_S2_I16_R0_>C5_S2_I18", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je hausse légèrement la voix :''Non car ma tâche est de vérifier que tout va bien et j’ai l’impression que tout ne va pas bien !''", "next_id": "23", "target_node_id": "C5_S2_I23", "edge_id": "C5_S2_I16_R1_>C5_S2_I23", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je respecte votre moment. Je suis là si vous avez besoin de parler.''", "next_id": "18", "target_node_id": "C5_S2_I18", "edge_id": "C5_S2_I16_R2_>C5_S2_I18", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S2_I18", "actor": "Ralph", "text": "''Si vous voulez m’apportez du réconfort vous vous y prenez très mal !''", "image": "Ralph_angry.png", "responses": [{"text": "Je soupire :''Vous me fatiguez !''", "next_id": "19", "target_node_id": "C5_S2_I19", "edge_id": "C5_S2_I18_R0_>C5_S2_I19", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je hoche la tête :''Merci de me le dire, j’en prends note. Sachez que ça partait d’une bonne intention.''", "next_id": "23", "target_node_id": "C5_S2_I23", "edge_id": "C5_S2_I18_R1_>C5_S2_I23", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je fronce les sourcils :''Vous pouvez me parler sur un autre ton ?''", "next_id": "20", "target_node_id": "C5_S2_I20", "edge_id": "C5_S2_I18_R2_>C5_S2_I20", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S2_I14", "actor": "Ralph", "text": "Ralph s’emporte :''Que voulez-vous que j’vous dise, ça ne va pas très bien voilà, vous êtes contente ! Il continue de regarder par la fenêtre''", "image": "Ralph_happy.png", "responses": [{"text": "Je me tait… puis dit avec tact :''Je sens de la détresse dans vos propos.''", "next_id": "19", "target_node_id": "C5_S2_I19", "edge_id": "C5_S2_I14_R0_>C5_S2_I19", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Est-ce que vous souhaitez en parler à mon collègue Mr. Kaufmann qui est psychologue ?''", "next_id": "16", "target_node_id": "C5_S2_I16", "edge_id": "C5_S2_I14_R1_>C5_S2_I16", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je avec bienveillance :''Votre famille est déjà venue vous rendre visite ?''", "next_id": "16", "target_node_id": "C5_S2_I16", "edge_id": "C5_S2_I14_R2_>C5_S2_I16", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S2_I4", "actor": "Ralph", "text": "Ralph la regarde avec défi : vous êtes un laideron qui n’a pas sa langue dans sa poche.", "image": "Ralph_neutral.png", "responses": [{"text": "Et encore vous n’avez pas tout vu, je peux également prendre soin de vous dit-elle en souriant ", "next_id": "10", "target_node_id": "C5_S2_I10", "edge_id": "C5_S2_I4_R0_>C5_S2_I10", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je avec un regard bienveillant :''bon, mais on va pas jouer à ce jeu encore longtemps, qu’en dites-vous ?''", "next_id": "9", "target_node_id": "C5_S2_I9", "edge_id": "C5_S2_I4_R1_>C5_S2_I9", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Votre attitude m’étonne. ", "next_id": "7", "target_node_id": "C5_S2_I7", "edge_id": "C5_S2_I4_R2_>C5_S2_I7", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S2_I9", "actor": "Ralph", "text": "Ralph regarde par la fenêtre :''Je ne comprends pas pourquoi vous me manifester tant d’égard ? Il soupire''", "image": "Ralph_confused.png", "responses": [{"text": "Je lui souris, puis lui dit calmement :''On pourrait peut-être essayer de faire des efforts… Nous serons amenés à nous voir souvent et nous ne partons pas sur de bonnes bases.''", "next_id": "11", "target_node_id": "C5_S2_I11", "edge_id": "C5_S2_I9_R0_>C5_S2_I11", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 2, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je penche la tête et tente de capter le regard de Ralph :''Je voudrais que tout se passe bien entre nous et que vous vous sentiez bien ici''", "next_id": "11", "target_node_id": "C5_S2_I11", "edge_id": "C5_S2_I9_R1_>C5_S2_I11", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je d’un ton calme : ça ne doit pas être évident pour vous de changer d’environnement. Je voudrais vous apporter le réconfort qu’on a besoin dans une telle situation.''", "next_id": "18", "target_node_id": "C5_S2_I18", "edge_id": "C5_S2_I9_R2_>C5_S2_I18", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S2_I11", "actor": "Ralph", "text": "D’un ton sec :''Votre travail est de me soigner non ?''", "image": "Ralph_confused.png", "responses": [{"text": "Mon travail est effectivement de prendre soin de vous, c’est pour ça que je veux savoir si vous allez bien. ", "next_id": "17", "target_node_id": "C5_S2_I17", "edge_id": "C5_S2_I11_R0_>C5_S2_I17", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je peine à comprendre le sens de votre attitude. Voulez-vous qu’on en parle ?''", "next_id": "14", "target_node_id": "C5_S2_I14", "edge_id": "C5_S2_I11_R1_>C5_S2_I14", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Votre bien être mental est à mes yeux aussi important que votre bien-être physique. ", "next_id": "15", "target_node_id": "C5_S2_I15", "edge_id": "C5_S2_I11_R2_>C5_S2_I15", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S2_I7", "actor": "Ralph", "text": "''Laide et bête, ben dis donc !''", "image": "Ralph_angry.png", "responses": [{"text": "''Je soupire : Dans ces conditions, je ne pense pas que nous pouvons continuer cet entretien. Je vous laisse donc et reviendrai plus tard.''", "next_id": "8", "target_node_id": "C5_S2_I8", "edge_id": "C5_S2_I7_R0_>C5_S2_I8", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je avec calme :''Qu’est-ce qui ne va pas avec vous ? Je vous sens extrêmement en colère.''", "next_id": "11", "target_node_id": "C5_S2_I11", "edge_id": "C5_S2_I7_R1_>C5_S2_I11", "RespectAndDignity": 0, "Empathy": 2, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 1, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je respecte votre moment. Je suis là si vous avez besoin de parler.''", "next_id": "8", "target_node_id": "C5_S2_I8", "edge_id": "C5_S2_I7_R2_>C5_S2_I8", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S2_I8", "actor": "Ralph", "text": "C’est ça, bon vent. ", "image": "Ralph_neutral.png", "responses": [{"text": "Margot sort", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je suis désolée. Prenez votre temps. Si vous voulez, je peux rester un moment avec vous.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je respecte votre moment. Je suis là si vous avez besoin de parler.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S2_I5", "actor": "Ralph", "text": "''Ecoutez je n’ai rien à dire hormis que je souhaite qu’on me laisse tranquille !''", "image": "Ralph_angry.png", "responses": [{"text": "Je le regarde :''Je sens beaucoup d’agressivité dans vos propos. Souhaitez-vous en parler ?''", "next_id": "7", "target_node_id": "C5_S2_I7", "edge_id": "C5_S2_I5_R0_>C5_S2_I7", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je avec calme : J’ai l’impression que votre situation doit être difficile à vivre.''", "next_id": "6", "target_node_id": "C5_S2_I6", "edge_id": "C5_S2_I5_R1_>C5_S2_I6", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je respecte votre moment. Je suis là si vous avez besoin de parler.''", "next_id": "7", "target_node_id": "C5_S2_I7", "edge_id": "C5_S2_I5_R2_>C5_S2_I7", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, {"node_id": "C5_S2_I31", "actor": "Ralph", "text": "N’insistez pas pour aujourd’hui, j’ai besoin de rester seul. Revenez demain.", "image": "Ralph_neutral.png", "responses": [{"text": "''Je avec un léger sourire : Comme vous voudrez, à demain alors. Elle s’en va doucement''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je repasserai tout de même pour m’assurer que tout va bien.''", "next_id": "32", "target_node_id": "C5_S2_I32", "edge_id": "C5_S2_I31_R1_>C5_S2_I32", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je respecte votre moment. Je suis là si vous avez besoin de parler.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}], "id_to_parcours": {"1": {"node_id": "C5_S2_I1", "actor": "Claude", "text": "''Je me rend dans la chambre 14 pour rencontrer Ralph''", "image": "Claude_neutral.png", "responses": [{"text": "''Bonjour Monsieur Riederneiter, je m’appelle Claude. Je suis infirmière ici et suis heureuse de faire votre connaissance.''", "next_id": "2", "target_node_id": "C5_S2_I2", "edge_id": "C5_S2_I1_R0_>C5_S2_I2", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 2, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Bienvenue Monsieur Riederneiter, je m’appelle Claude. Je suis infirmière. Je suis très émue de vous rencontrer dans cette chambre. Il y a deux jours, une résidente que j’aimais beaucoup est décédée ici.", "next_id": "2", "target_node_id": "C5_S2_I2", "edge_id": "C5_S2_I1_R1_>C5_S2_I2", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 2, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Bonjour ! Claude prend une chaise et s’assied à côté de lui.''", "next_id": "2", "target_node_id": "C5_S2_I2", "edge_id": "C5_S2_I1_R2_>C5_S2_I2", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Bonjour, est-ce que je peux prendre un moment avec vous ?''", "next_id": "2", "target_node_id": "C5_S2_I2", "edge_id": "C5_S2_I1_R3_>C5_S2_I2", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Bonjour comment va le petit nouveau ?''", "next_id": "2", "target_node_id": "C5_S2_I2", "edge_id": "C5_S2_I1_R4_>C5_S2_I2", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je m’avance vers Mr. Riederneiter pour le saluer : Bonjour Monsieur Riederneiter je vous souhaite la bienvenue à la Maison des Lilas, je m’appelle Claude et suis infirmière ici. Je tenais à vous saluer car nous serons amenés à nous voir régulièrement. Elle le regarde en souriant.''", "next_id": "2", "target_node_id": "C5_S2_I2", "edge_id": "C5_S2_I1_R5_>C5_S2_I2", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 2, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "2": {"node_id": "C5_S2_I2", "actor": "Ralph", "text": "''Ce que vous êtes moche !''", "image": "Ralph_angry.png", "responses": [{"text": "Je écarquille les yeux :''Pardon ? aller au 3''", "next_id": "3", "target_node_id": "C5_S2_I3", "edge_id": "C5_S2_I2_R0_>C5_S2_I3", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je stupéfaite :''ça va l’bocal !''", "next_id": "4", "target_node_id": "C5_S2_I4", "edge_id": "C5_S2_I2_R1_>C5_S2_I4", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je reste bouche bée… après un bref instant elle répond d’un air amusé :''Nul n’est parfait !''", "next_id": "4", "target_node_id": "C5_S2_I4", "edge_id": "C5_S2_I2_R2_>C5_S2_I4", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je suis outrée :''Vous vous êtes vu ? e''", "next_id": "4", "target_node_id": "C5_S2_I4", "edge_id": "C5_S2_I2_R3_>C5_S2_I4", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je semble perplexe :''Qu’est-ce que vous voulez me dire par là ?''", "next_id": "3", "target_node_id": "C5_S2_I3", "edge_id": "C5_S2_I2_R4_>C5_S2_I3", "RespectAndDignity": 0, "Empathy": 1, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 1, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je surprise de cette réaction :''Je me agressée par vos propos.''", "next_id": "5", "target_node_id": "C5_S2_I5", "edge_id": "C5_S2_I2_R5_>C5_S2_I5", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je estomaquée :''Stop ! Je vous arrête de suite.''", "next_id": "5", "target_node_id": "C5_S2_I5", "edge_id": "C5_S2_I2_R6_>C5_S2_I5", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "3": {"node_id": "C5_S2_I3", "actor": "Ralph", "text": "''Vous avez des problèmes d’audition ?''", "image": "Ralph_confused.png", "responses": [{"text": "''Non. Vous trouvez que je suis moche ?''", "next_id": "6", "target_node_id": "C5_S2_I6", "edge_id": "C5_S2_I3_R0_>C5_S2_I6", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je avec un sourire narquois : J’ai oublié de mettre mon sonotone.''", "next_id": "6", "target_node_id": "C5_S2_I6", "edge_id": "C5_S2_I3_R1_>C5_S2_I6", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je sur un ton sarcastique :''Vous avez fait l’école du rire vous''", "next_id": "6", "target_node_id": "C5_S2_I6", "edge_id": "C5_S2_I3_R2_>C5_S2_I6", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "6": {"node_id": "C5_S2_I6", "actor": "Ralph", "text": "''Vous êtes d’une rare laideur.''", "image": "Ralph_neutral.png", "responses": [{"text": "''Je hausse les épaules, regarde en l’air et sourit : Il y a des goûts et des couleurs.''", "next_id": "10", "target_node_id": "C5_S2_I10", "edge_id": "C5_S2_I6_R0_>C5_S2_I10", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je semble contrariée :''Vous êtes malhonnête !''", "next_id": "10", "target_node_id": "C5_S2_I10", "edge_id": "C5_S2_I6_R1_>C5_S2_I10", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je sur le ton de la plaisanterie : décidément le disque est rayé.''", "next_id": "14", "target_node_id": "C5_S2_I14", "edge_id": "C5_S2_I6_R2_>C5_S2_I14", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "10": {"node_id": "C5_S2_I10", "actor": "Ralph", "text": "''Vous ne m’obligerez pas à vous voir et vous ne me toucherez pas. Vous êtes trop moche.''", "image": "Ralph_neutral.png", "responses": [{"text": "Je le regarde attentivement :''Comment s’est passée votre arrivée ici ?''", "next_id": "12", "target_node_id": "C5_S2_I12", "edge_id": "C5_S2_I10_R0_>C5_S2_I12", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 1, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "En le regardant : En effet, je ne suis pas autorisée à vous toucher sans votre autorisation. ", "next_id": "13", "target_node_id": "C5_S2_I13", "edge_id": "C5_S2_I10_R1_>C5_S2_I13", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Parce que vous pensez que vous me donnez envie de vous toucher ?''", "next_id": "13", "target_node_id": "C5_S2_I13", "edge_id": "C5_S2_I10_R2_>C5_S2_I13", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "12": {"node_id": "C5_S2_I12", "actor": "Ralph", "text": "Mal.", "image": "Ralph_neutral.png", "responses": [{"text": "Je hoche la tête :''Qu’est-ce qui est difficile pour vous ?''", "next_id": "15", "target_node_id": "C5_S2_I15", "edge_id": "C5_S2_I12_R0_>C5_S2_I15", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 1, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Et vous ne vous gênez pas de le montrer !''", "next_id": "19", "target_node_id": "C5_S2_I19", "edge_id": "C5_S2_I12_R1_>C5_S2_I19", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je le regarde avec compassion : Quitter son lieu de vie pour entrer en EMS est une épreuve.''", "next_id": "15", "target_node_id": "C5_S2_I15", "edge_id": "C5_S2_I12_R2_>C5_S2_I15", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "15": {"node_id": "C5_S2_I15", "actor": "Ralph", "text": "''Vous êtes infirmière ou vous êtes psy ?''", "image": "Ralph_confused.png", "responses": [{"text": "Il est important pour moi de savoir comment vous vous sentez pour vous accompagner au mieux dans cette nouvelle étape de votre vie. ", "next_id": "17", "target_node_id": "C5_S2_I17", "edge_id": "C5_S2_I15_R0_>C5_S2_I17", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je suis infirmière''", "next_id": "26", "target_node_id": "C5_S2_I26", "edge_id": "C5_S2_I15_R1_>C5_S2_I26", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 2, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''J’ai besoin de voir un psy ?''", "next_id": "22", "target_node_id": "C5_S2_I22", "edge_id": "C5_S2_I15_R2_>C5_S2_I22", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je étonnée :''Que voulez-vous dire ?''", "next_id": "22", "target_node_id": "C5_S2_I22", "edge_id": "C5_S2_I15_R3_>C5_S2_I22", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "17": {"node_id": "C5_S2_I17", "actor": "Ralph", "text": "''Je me comme on peut se sentir devant la plus moche des moches.''", "image": "Ralph_neutral.png", "responses": [{"text": "''Je sourit : Monsieur Riederneiter j’ai compris. Vous me trouvez moche, c’est ainsi. Nous pouvons maintenant nous concentrer sur votre bien être ici.''", "next_id": "19", "target_node_id": "C5_S2_I19", "edge_id": "C5_S2_I17_R0_>C5_S2_I19", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''C’est une obsession chez vous ? Vous avez des problèmes avec les femmes ?''", "next_id": "20", "target_node_id": "C5_S2_I20", "edge_id": "C5_S2_I17_R1_>C5_S2_I20", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je incline la tête : C’est ainsi, vous devrez vous satisfaire de mon apparence pour l’instant.''", "next_id": "20", "target_node_id": "C5_S2_I20", "edge_id": "C5_S2_I17_R2_>C5_S2_I20", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je quitte la pièce en claquant la porte.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "19": {"node_id": "C5_S2_I19", "actor": "Ralph", "text": "''Je n’ai pas envie d’être ici.''", "image": "Ralph_neutral.png", "responses": [{"text": "''Où est-ce que vous auriez envie d’être ?''", "next_id": "21", "target_node_id": "C5_S2_I21", "edge_id": "C5_S2_I19_R0_>C5_S2_I21", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je n’avez pas choisi d’être ici ?''", "next_id": "22", "target_node_id": "C5_S2_I22", "edge_id": "C5_S2_I19_R1_>C5_S2_I22", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Et bien moi non plus !''", "next_id": "22", "target_node_id": "C5_S2_I22", "edge_id": "C5_S2_I19_R2_>C5_S2_I22", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "21": {"node_id": "C5_S2_I21", "actor": "Ralph", "text": "''Je voudrais continuer de m’occuper de mon jardin et de mes poules.''", "image": "Ralph_neutral.png", "responses": [{"text": "Je hoche la tête et dit :''Je vois…''", "next_id": "24", "target_node_id": "C5_S2_I24", "edge_id": "C5_S2_I21_R0_>C5_S2_I24", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je lui souris :''Vous pourriez trouver de nouvelles activités ici.''", "next_id": "26", "target_node_id": "C5_S2_I26", "edge_id": "C5_S2_I21_R1_>C5_S2_I26", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je le regarde :''Je suis certaine que votre jardin et vos poules sont entre de bonnes mains.''", "next_id": "27", "target_node_id": "C5_S2_I27", "edge_id": "C5_S2_I21_R2_>C5_S2_I27", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "24": {"node_id": "C5_S2_I24", "actor": "Ralph", "text": "''Vous n’voyez rien du tout ma p’tite ! Ce soir vous rentrerez chez vous dans votre maison, pas moi !''", "image": "Ralph_angry.png", "responses": [{"text": "''Pardonnez-moi, je ne voulais pas paraître présomptueuse… mes grands-parents sont étrangers et je sais que ça a été difficile pour eux de recréer une nouvelle vie en Suisse.''", "next_id": "27", "target_node_id": "C5_S2_I27", "edge_id": "C5_S2_I24_R0_>C5_S2_I27", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je suis à présent chez vous à la Maison des Lilas''", "next_id": "27", "target_node_id": "C5_S2_I27", "edge_id": "C5_S2_I24_R1_>C5_S2_I27", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je respecte votre moment. Je suis là si vous avez besoin de parler.''", "next_id": "27", "target_node_id": "C5_S2_I27", "edge_id": "C5_S2_I24_R2_>C5_S2_I27", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "27": {"node_id": "C5_S2_I27", "actor": "Ralph", "text": "Ralph ne répond pas.", "image": "Ralph_neutral.png", "responses": [{"text": "Monsieur Riederneiter, je vais vous laisser. En cas de besoin vous pouvez sonner. Je reviendrai vous voir en fin de journée", "next_id": "29", "target_node_id": "C5_S2_I29", "edge_id": "C5_S2_I27_R0_>C5_S2_I29", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Si vous souhaitez encore discuter, je repasserai en fin de journée. ", "next_id": "32", "target_node_id": "C5_S2_I32", "edge_id": "C5_S2_I27_R1_>C5_S2_I32", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je suis calme : Respecte le silence. Après quelques minutes elle dit : très bien je vais vous laisser à présent. À demain.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "29": {"node_id": "C5_S2_I29", "actor": "Ralph", "text": "Envoyez-moi quelqu’un d’autre vous êtes trop moche. ", "image": "Ralph_neutral.png", "responses": [{"text": "Au revoir Monsieur.", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Nous n’allons pas nous réconcilier aujourd’hui ! Elle sort sur le champ.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Si vous souhaitez être traiter avec égard, je vous conseille de changer d’attitude. Au revoir !''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "32": {"node_id": "C5_S2_I32", "actor": "Ralph", "text": "Mr. Riederneiter soupire. ", "image": "Ralph_neutral.png", "responses": [{"text": "''Je quitte aussitôt la pièce.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je suis désolée. Prenez votre temps. Si vous voulez, je peux rester un moment avec vous.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je respecte votre moment. Je suis là si vous avez besoin de parler.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "26": {"node_id": "C5_S2_I26", "actor": "Ralph", "text": "Ralph inspire profondément et dit :''Vous savez, j’étais boulanger avant… j’ai tenu ma propre boulangerie pendant 40 ans.''", "image": "Ralph_neutral.png", "responses": [{"text": "''Je avec intérêt : Ah, vous pourrez faire du pain à l’animation''", "next_id": "27", "target_node_id": "C5_S2_I27", "edge_id": "C5_S2_I26_R0_>C5_S2_I27", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je lui souris : C’est un beau métier de faire du pain.''", "next_id": "28", "target_node_id": "C5_S2_I28", "edge_id": "C5_S2_I26_R1_>C5_S2_I28", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je respecte votre moment. Je suis là si vous avez besoin de parler.''", "next_id": "27", "target_node_id": "C5_S2_I27", "edge_id": "C5_S2_I26_R2_>C5_S2_I27", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "28": {"node_id": "C5_S2_I28", "actor": "Ralph", "text": "C’était une autre époque… il soupire ", "image": "Ralph_neutral.png", "responses": [{"text": "''Je tente de lui prendre la main.''", "next_id": "30", "target_node_id": "C5_S2_I30", "edge_id": "C5_S2_I28_R0_>C5_S2_I30", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je quitte la pièce en silence.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je respecte votre moment. Je suis là si vous avez besoin de parler.''", "next_id": "30", "target_node_id": "C5_S2_I30", "edge_id": "C5_S2_I28_R2_>C5_S2_I30", "RespectAndDignity": 1, "Empathy": 0, "Compassion": 1, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "30": {"node_id": "C5_S2_I30", "actor": "Ralph", "text": "Ralph la repousse et reste silencieux. ", "image": "Ralph_neutral.png", "responses": [{"text": "''Je me met à pleurer et quitte la pièce.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''J’ai accompagné une résidente qui est décédée dans cette chambre avant-hier. J’avais un très bon contact avec elle. C’est trop difficile pour moi… - les larmes lui monte au yeux – je vais continuer mes visites, au revoir. Elle sort immédiatement.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je suis désolée. Prenez votre temps. Si vous voulez, je peux rester un moment avec vous.''", "next_id": "-1", "target_node_id": "", "edge_id": "", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 2, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "22": {"node_id": "C5_S2_I22", "actor": "Ralph", "text": "''Mais vous êtes de la police ou quoi ?''", "image": "Ralph_confused.png", "responses": [{"text": "Je avec intérêt :''Vous étiez policier ?''", "next_id": "25", "target_node_id": "C5_S2_I25", "edge_id": "C5_S2_I22_R0_>C5_S2_I25", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Non mais si vous continuez à être malpoli, je vais les appeler !''", "next_id": "27", "target_node_id": "C5_S2_I27", "edge_id": "C5_S2_I22_R1_>C5_S2_I27", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Que vient faire la police ici ? Que voulez-vous me dire ?''", "next_id": "29", "target_node_id": "C5_S2_I29", "edge_id": "C5_S2_I22_R2_>C5_S2_I29", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "25": {"node_id": "C5_S2_I25", "actor": "Ralph", "text": "''Non, j’étais boulanger.''", "image": "Ralph_neutral.png", "responses": [{"text": "Je sourit :''Comme mon grand-père. Vous avez travaillé où ?''", "next_id": "27", "target_node_id": "C5_S2_I27", "edge_id": "C5_S2_I25_R0_>C5_S2_I27", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je m’avance vers lui :''Voulez-vous me parler de votre métier ?''", "next_id": "28", "target_node_id": "C5_S2_I28", "edge_id": "C5_S2_I25_R1_>C5_S2_I28", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je avec intérêt : C’est un métier important pour les gens.''", "next_id": "28", "target_node_id": "C5_S2_I28", "edge_id": "C5_S2_I25_R2_>C5_S2_I28", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "20": {"node_id": "C5_S2_I20", "actor": "Ralph", "text": "''Je veux juste que vous arrêtiez vos simagrées et que vous soyez normale avec moi.''", "image": "Ralph_neutral.png", "responses": [{"text": "''Je hoche la tête : Désolée, je n’ai pas eu l’impression d’en faire trop.''", "next_id": "23", "target_node_id": "C5_S2_I23", "edge_id": "C5_S2_I20_R0_>C5_S2_I23", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Ça vous met en colère que j’agisse ainsi ?''", "next_id": "24", "target_node_id": "C5_S2_I24", "edge_id": "C5_S2_I20_R1_>C5_S2_I24", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Et qu’est-ce que vous ressentez vis-à-vis de mon comportement ?''", "next_id": "22", "target_node_id": "C5_S2_I22", "edge_id": "C5_S2_I20_R2_>C5_S2_I22", "RespectAndDignity": 0, "Empathy": 3, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 1, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}]}, "23": {"node_id": "C5_S2_I23", "actor": "Ralph", "text": "''Je ne veux pas d’une baby-sitter ou d’une fille de substitution, je n’ai pas besoin de ça !''", "image": "Ralph_angry.png", "responses": [{"text": "Je étonnée :''Vous vous sentez surveillé ?''", "next_id": "27", "target_node_id": "C5_S2_I27", "edge_id": "C5_S2_I23_R0_>C5_S2_I27", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "Je lui souris et dit :''Vous pouvez avoir confiance en moi.''", "next_id": "26", "target_node_id": "C5_S2_I26", "edge_id": "C5_S2_I23_R1_>C5_S2_I26", "RespectAndDignity": 0, "Empathy": 0, "Compassion": 0, "EmotionalRegulation": 0, "CommunicationClarity": 0, "ProfessionalBoundaries": 0, "InterprofessionalCollaboration": 0}, {"text": "''Je suis désolée. Prenez votre temps. Si vous voul
